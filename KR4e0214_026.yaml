body:
  text: 溫恭毅集卷二十六明溫純撰尺牘與申瑶泉相國條議撫浙事宜入浙未幾疆事安敢冒言顧察輿論有一二關切大者敬陳其槩一織造新增每嵗浙局約用銀六萬兩前留事例今嵗猶不滿三萬過此愈少非户工二部破格存留恐難濟事蓋浙自用兵以來且四十年養兵之費未已閭閻以此稱困即逋負嚴徴能完亦僅足兵餉耳司府那移日久抵還無期今且無銀可那矣一大將舊駐定海為定海為倭夷入犯之衝又南可以援溫台也近議移駐㑹城㑹城兵僅三千定海萬有五千舍多就少已非體又㑹城有兩遊擊及諸總哨又移一總兵即總兵亦不樂居省城以交際之費十倍定海也先是有各院不欲總兵駐省之說實非通論但題允未久輒難議改俟求妥當請裁一兑運在江以南之民稱改折若稍減每石五六錢即兩平不惟便民亦便國蓋太倉米可足八年然大半紅腐每年支不過二百餘萬石若半改年可得銀百餘萬即多減一二錢較之米猶有實用俟年大豐再議全運本色未晚也惟尊裁其二浙中方靣海道重次清軍杭嚴與溫處兵巡此四道得人則浙之安攘大計過半而前日兵民繼閧之事可預銷矣海道駐定海定海為倭夷入犯要害所轄兵士萬餘一失機宜即毫釐千里葉憲使夢熊八靣才也軍民一口歸頌切欲加御久任為地方計忽調永平或居來意也前調顧憲使去今再調葉憲使去塞事誠急謂海防何純嘗念任法不如任人故今叨撫浙謂莫如求廟堂為東南大省擇司道府正其州縣正與諸佐二純可自行激勸有不簡與飾之不悛者可不時論罷或徑逮究大要以分别淑慝為主若一切之法可行於此或不可行於彼無益也葉憲使倘可留借一二年容疏請加御清軍杭嚴二道內有資俸稍深者倘遷轉願推擇通明有識者代之廣中兵變降一憲臣罷一郡守不令紀綱難振且益驕兵士恣睢心乎前浙中失事各官降斥太多方為此計欲擇其中才行可者稍加優叙以辨冠履蜀中差官逮有司法也苐舉大事如各省修河築城名雖動官銀其實民自陪補甚多即今採木亦未必各官盡入已也且近日駕帖差人稍多不可不防其漸惟門下調和至懇其三通判姜竒方髙品實政巡鹽詹直指與竒方繼令宣城談竒方治宣城狀不類俗吏今倅杭大類宣城不佞往往見民願就竒方對簿者千百人一口及令鞫審無不曲盡民情詰其左遷之故則以直犯鄉里先達尤足多也杭為省會地總捕同知責任匪輕若不得人則民間之易動難安者猶如故故願以竒方代喻均無非為地方計懼具題瑣瀆聖聽且用人乃主爵者事不宜從外越俎惟借一言其四運船缺料敢請漕糧量改因近年米賤大為農困若銀數仍如例行糧仍徴解於民情大不便故先是江南士民紛紛必欲本色為此也今議減銀數免行糧而折銀正數之外仍有火耗髙稱之費實祇得其平乃太倉積此可用銀於國計稍補且令賦繁役重之鄉可省目前造舟之費山僻三縣米數不多倘得嵗免糧運為幸至於改折臨時酌請之議乃為倉米僅可蓄五六年過此則腐爛無用其隨時定價非徒便小民如是而後改折之法可常行耳其五盧參將䝉允留地方幸甚蓋人之才固有宜於彼而不宜於此者若止為官計而不為地方計或遷就姑用於平日而倉卒更置於臨時均非勝算且武職任使有二都司與腹裏守備可用其亷謹者邊海之將亷謹要矣更以威信服衆臨陳敢戰為主惟門下裁焉今嵗大汛已過海波不驚純已歸而入武林矣近國是甫定忽新舊言者又相攻擊不多事乎惟潜消默化使國體不傷正人得安其位幸甚其六浙省漕糧奉㫖改折三分緣未減價銀恐槩行小民不便行有司查審通融酌派而民之産米寡者水次逺者以得减行糧亦頗願折總計三分八釐四毫較户部原題改折五分之數尚少但行糧前題止免改折三分今多折之數併祈一體免徴以廣皇仁坐𣲖賞假原分十運一年一運先已解過五運有零應十六年起織今內庫併催六運至十運限八月內完浙省連年織造庫藏空虛前雖荷䝉聖恩減織袍服乃所留三年存留錢糧內多蠲免難以凑織賞假况前解假價尚未完給民已汹汹赴訴再難强民代辦不得已請寬限議留事例其詳具疏揭中其七浙省營兵東西九總軍兵一總自兵民變後添設軍兵一總五百四十二員名嵗用銀三千餘兩每出汛加給九總官兵坐糧三月銀一千七百餘兩又添北關水兵三百四十三員名嵗用餉銀三千六百餘兩而先年為省糧計每什定以八名夫大勢多則糧餉難繼本什少則行伍單弱均屬不便純於去年出汛時查坐糧係額外新加當即盡革近於春初趂數補之時稍稍汰去老弱共去二總實得民兵七總軍兵一總仍以十人為什即以二總之兵補各總之缺更有餘令食糧候缺一則嵗可省銀五千一則兵不增而行伍免於單弱自是糧餉可繼在上不復存兵多之慮衆志安定在下無復懷減兵之疑蓋就人情而為之無大更張向煩廟堂南顧今已安妥附聞其八王總兵化熙明達有執不獨亷介海上兵士甚德之今左遷無非為海防計苐恐亷者稍抑則不亷者且藉口益肆而亷者亦觀望灰心大都選將重才不得已之談也重才又重其才而亷者乃可不然剝削成風請託有效武事終無時可振化熙有恥可用人也倘䝉蚤補以風勵武辨亦馭將之一機也與許頴陽相國屢睹大疏求退或避政府皆同鄉之嫌為讓位計忘已忘人有道之見自逺恐帝眷方隆同心共濟如三公為近世所未睹似不必因小嫌而妨大計無已則更引一位如龍江丈者未為不可其二北方久旱民不聊生恐有他虞頃滕少松留百萬漕糧之請未及處補京邊糧餉且百萬太多宜該部之難於允而格其說也思之今嵗災傷為百年來所未有非破格不可太倉太僕銀尚可借若借三十萬金俟豐收給京軍則二庫所損無幾而軍得一月銀足抵三月之糧蓋倉米一石直不及二錢而多得至五錢是便於軍一也三十萬銀應兑留六十萬米於臨德二倉使二三月賑民則此六十萬石新米可抵舊米二百萬石而米價可減所活必多是便於民二也無處而坐待其民流離恐奸民鼓煽而起即用兵撲滅所費豈止三十萬若先是以此繫人心則費省民安且正米既留二倉各官軍所帶私米亦必市於其地而得厚價是便於公司與運糧官軍三也有此三便望請御札施行其三織造䝉聖恩減三之一又允留錢糧外吏舉手加額頌主上恤民至意即古堯舜不過然非門下默贊恐部院之言未必能動上聽純等當與江南父老感念刻骨不忘獨保留盧述原非曲循部曲意前兑嵎為龎𬈑在本鄉不便故欲與述相調而述則江西人也今𬈑未調而述調矣純上疏借軍士言以見公論不謂反䝉見疑前部中以居來意留朱先或今不可又以純言留述耳然區區實為地方計也與王荆石相國聞門下必欲去國念時事有大可慮者恐後生因識行藏古人當事有不得已而默又有不得已而愚者其識逺甚且去國不難難於匡時惟圖其難者其二頃以愚默之說進蓋念三子反覆誠可恨而始亦有以激之幸天祚國以山陵事敗不然雖百口亦難為詞易之夬言決小人之道甚詳其曰健而悅決而和言可去則揚于王庭決之而已不可則寧悅而和必不自疏令小人以密防我中我以誤國家大計也故孔子以愚為不可及中庸之默從德性問學來偶追念往事為謬悠說然不異布鼓雷門矣與楊二山太宰頃者以翁推轂起家數月中再遷使當兩浙重地於涯分踰矣拜違為內子醫藥稽程月餘始抵里無何即發而南於至後入疆受事睹閭閻非曩所稱吳越守藏吏為織造大窘國計民瘼欲兩利難矣獨節費時徴奏留為今日不容已自分力恐未能然業已在事曷可辭得習水土將畢力圖之以副知己之望然所仰藉廟堂指迷至殷在燕辱督教臨發又辱雅貺於心不能忘附候興居所欲請者圖專布焉其二喜國是已定議論或從此可息然願當國衆老休休藏納默佐大化為幸純沿途傍觀吏治大都以府太守為重太守得人各屬無不嚴憚砥礪故欲民安擇撫臣尚矣其次莫如擇太守太守有缺似未可循資序遷為也不佞叨撫臣甚懼或無益於地方倘各府缺守幸念浙為海內大省遴選名流為一方重即不佞亦可藉以補塞惟尊裁與凌二洲從邸報見大疏齒及僕若以為可久於任夫久任撫臣真省事息民一要計即僕始願亦若此苐積戻無補竊甚慚恐為大方厭如昔人所云推不去者而門下直請留於朝不益增僕慚而重為大方纍又為門下知人之明纍乎倘主上自是擇賢者而久之即僕以不職去而門下為德於桑梓者宏矣答劉少嵐太守日聞借總鹺事蓋當塗方急國計故為官推擇如此即不然苟可宣力何論要散彼以要散論者淺乎覩矣當塗類有識肯以此待兄兄有識肯以此意當塗而薄一中大夫耶齊魯鹺事甚簡一中材足辦而用一積勞良二千石是以烏獲而舉鴻毛不謬哉然就近遷拜省輪蹄之勞或亦體恤行役者之便計也與趙麟陽議從祀讀翁議江陵疏令法紀國體兩全讀議陳王二先生從祀疏令超詣心得之㫖曉然於世乃一二君子亦有異同何也大都從祀有宗傳羽翼兩者諸君子不思耳宗傳尚矣羽翼不必道脈即篤行博學亦可與於俎豆之末况二先生耶惟翁力持之其說自定寄閣部諸公論西夏功西夏以困成功不待核勘可知督臣又激聖怒意聖明以此激勵東征將士耳苐督臣老矣倘一旦不勝苦楚而死即令共事者獨受上賞徒啓後日紛紛之議亦非所以核功實而慎賞罰也蓋督臣所以不急入者以諸逆既戕撫道有不可宥之罪非如回紇疑畏土番以郭令公助攻為喜故令公可單騎往也假令以兵入逆方為收堡計而不能拒且誘以質如張傑乎西夏城但可困欲困必先復衆堡以剪其翼而絶敵人往來之路翼剪矣路絶矣又兩戰大勝打死哱雲以挫其鋭迄事平不敢更出城一戰為遊釡之魚然後一意防敵困城抵秋深則敵之氣衰而城不攻自潰可知督臣力能辦而言不足今其料中矣亦可以為深謀逺慮者式而戒輕率喪師者而或猶短其無才過矣大率西夏之功當以復城堡及城外兩戰為首假令堡不復鋭氣不挫哱雲不死則逆與敵一家矣我兵雖欲渡河而西亦難且八月以前外憂强敵內憂師老危可知己八月以後城困敵退卧俟之耳若不揣其本而齊其末或難以服逺近之心督臣之品之識古今希有惟憐豁回天亦國家程功核實惜才勵世一大機也寄政府東警宜更遣舊宦各邊者經略遼事如巡撫未至可别用即令兼管尤專而以李寧逺佐之輕車熟路可恃前遣止經略山海以西戰將速調西人屢經戰如王通麻貴徐隆蕭如蕙輩使各帶軍丁千餘援薊永全用三連火器必易成功勝一時烏合逺矣但西夏之勞或未盡酬非先厚賚無以服其心而鼓其氣如逺不可即至先調王保而以他將代之何如寄政府從報知朝鮮戮倭千餘燒船百餘死可數千時天寒倭不慣經又衣薄不利一也食盡無可搶必饑不利二也倭以毁王墓激朝鮮人之忿朝鮮方乘勝知所以破倭矣不利三也倭之北也空數十國强之以行已有思反者今聞敗必堅其始謀關白且不免不利四也今其發兵助陳時矣西兵入衛三千既留各給犒賞銀三四兩以鼓其氣仍令祖承訓帶遼兵令渡鴨緑於二三十里內分三道為常山蛇陳以進仍先遣牌使朝鮮辦十許萬軍馬芻糧同朝鮮兵環而攻之必大勝此聲一布或不待我兵至而倭盡戮於朝鮮矣倭一敗百敗我一勝百勝時乎時乎不可失也寄政府西夏功成告廟獻俘大慶也華夷觀望從諸大夫疏請聖駕昔石州破穆宗於講筵下問徐文貞公曰石州如何破了此言一出四海歡頌今方禦倭皇上一舉玉趾其鼓舞將士勝於賞亦勝於鈇鉞惟贊成寄部科救魏確菴聞逮總督逺近驚訝總督為一代忠良今且老矣何能勝此苦楚初所慮者恐與敵合而入據內地也今深秋事機已過敵難再入即寧賊未擒而已如逰釡之魚不足慮矣旦夕論功奪我大帥以快逆心可乎昨交代時官軍哭聲動地擁留不放今再聞逮不知作何景象萬一更有他虞將來事勢愈難措手此可想而知也寧城可困不可攻攻之徒損我將士困之為填路入城之計或不待水入城而賊可得也宣大兵急應放回事完分别論功稍增犒賞秦人之氣自倍時有大捷天顔必齊行伍之情攻戰之機或有出於傳聞陳奏之外者惟蚤為暴白使目前軍心早定使熙朝賞罰功罪不爽又使反側不復藉口其二報中云魏某已有㫖豈曾有㫖已宥或仍不欲宥耶此用兵大機括所關繫非止人才可惜也正用兵西逮一督臣東逮一將官徒使我將士撓亂無暇他圖而敵人則大快矣㑹議叙事體仍叙其功乃可自督臣入任甫一年報首獲級八百餘為各鎮所無功一也寧逆分據城堡四十餘羽翼已成不數日盡復擒其僞將使今日得行其困城之計而敵與逆不便渾合功二也敵大舉以搗巢使其內顧速回而我城堡無一失功三也先是固原甘榆軍皆思變自督臣至遂改慮功四也賊兩出迎戰皆大敗死數千哱雲勇冠寧鎮一死而諸逆喪氣不敢更言戰功五也秦邊腹軍民戴督撫如父母而乃以罪奪矣旦夕論功將舍主帥而專歸所部與後之人乎知督臣至聖明必宥且叙功恐老臣一旦成疾而不忍言者悔將何及此國家大政也此鼓舞各邊督撫一機宜也主上一不允則再疏再不允則三疏四疏未為煩瀆惟鼎力倡之想得寧夏人心者有戴忠齊名光啓先為㑹寧令為兵科都閲西邊又為寧夏道明達出類止因會試取中舊輔之子遂廢夫以此曖昧之過棄不可得之才宜乎有乏才之嘆也若蚤補秦中為他日督撫地不患無良督撫矣姚又軒入關云寧城可困不可攻是到家之談涖任次日即赴邊略無難色士民即相對喜曰若此則地方安矣然猶有短其才者何也報王懷棘總督雲谷間壯猷亦耳其略得佳刻亟流覽始詳收史夷裁嵗賞揚威治內及諸鎮利恩利威如射中的夫恩人爭言之誰齒及威即秦塞年來用威亦多利蓋塞上行間終不可積弛積玩令日弱一日不可復振也惟萬全必勝之計非多算深謀不得又非真有為國為疆場之心亦不得今門下其人也幸晉樞管會東征所賴石畫不淺聞大將有專恃批搗鄙火攻者即勝亦互有得失况得不償失蓋不知以守為戰也守惟以弩為城以連炮為地雷即逺征亦步步不忘守百戰百勝無踰此曾為里人趙鎮撫世登籌之業見收于司馬門幸勿以年稍長而忽之也杞人在林下不能已之懷如此寄李漸菴總憲寧夏君軍民怨恨已極京中不知何也如冒濫又不及必須以南大理處之蓋此地為前兩君已壞而此君又甚之不可不急救此一方也與沈蛟門宗伯當寧以翁執秩為爰立地乃一時共事為楊李二公識者以為翁與二公皆今所稱名賢大君子也相與持衡稱量海內人才拔茅夬莧化枉為直惟此時然矣純受事大方計惟察别官屬使各舉職為兢兢然為官擇人就近隨宜使官與地相安則亦惟是持衡者之力是賴疆事詳揭中惟委照與張心齊往魏確老道翁事母篤孝私竊髙之乃終身之慕如此即古所稱閔損王祥奚多焉獨國家倚翁為柱石恐難徑情而去幸念主上眷留之意少已山林之興為僕等外藩張仲浙兵士不難鎮定王總戎清操偉度大服行伍當前官狼狽後殫力振作為一方禆益不淺將官中如此者有幾區區禮貌已為處分妥當決不令失大將體亦無非為地方計也與楊晴川大司農浙中賞假已解價計銀三萬六千餘越五年不給織户紛紛告擾閭閻生計蕭索亦坐此朝廷富有四海奚吝此乃知前嵗兵民恣睢以上下之情不通也錢已預給應留應抵者詳咨文中惟題請至􅈤與黃思軒浙中佐領年來稍多奮者以得為善之利也然激發全賴貴司頃直指君薦者皆卓然可用幸拔其尤以風勵他屬使堅其志於閭閻未必無益昌化令鄭國士亷而得民者近為一惡宦肆謗致齎捧官注劣考屢核之無左驗而士民驚惶恐劣遷去願緩之果與地方不相宜則為疏請改調未晚也與王蓮塘太史聞蓮泉令弟之變傷之而頃得蓮洲年兄書則又知有鼓盆之戚别來不三載何福宅亦多難如此乃純入浙後連失兩女則罪多天降之罰也喜明公春闈得士為公家梁棟何論桃李行且見鹽梅和羹於明公為梓里重南太宰當即柄用永昌可與膚施富平同當大任純親老又行能薄歸田意甚切獨今不可言耳書且發㑹故新昌令以竿牘至極感注存溫恭毅集卷二十六
