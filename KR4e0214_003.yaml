body:
  text: 溫恭毅集卷三明溫純撰疏忠臣巳褒外親未宥懇乞聖恩推廣明詔大慰忠靈以培聖代綱常疏甲申時任督撫浙江兵部右侍郎兼都察院右僉都御史卷查先準兵部咨該廣東道監察御史屠叔方題前事本部覆奉欽依咨行各撫按官通行司府州縣衛所弔取節年軍册備查革除年間被罪諸臣除齊泰黃子澄外其方孝孺等連纍發遣親故不拘見在死絶遵奉明旨務查世代逺近接輩來厯明白的確開具奏免以廣皇仁內有族黨親戚墳宅資産久在戌所者若一槩遷移回籍於人情恐有不堪合聽其自便願回者給與免帖放回不願回者給與免帖仍在戌所附入民籍隨住該衛即將册內軍名削除不許復行勾提本部仍載入考成簿內通限本年十二月終奏報如原無應宥人數查實咨部不得輕信流移姦人妄告混免等因備咨前撫臣蕭準經案行浙江布政使司轉行各清軍守巡海兵等道及各府州縣衛所逐一查議呈詳以憑具題去後未報該臣接管催據該司呈稱依奉行據杭湖紹金衢嚴處七府各回稱所屬州縣衛所並無革除年間被罪諸臣方孝孺等連纍發遣親故無從開報各具印結繳覆在卷又據嘉興府申稱平湖崇德海鹽嘉善四縣海寧嘉興二衛所並無前項纍遣親故止據嘉興縣申開應宥軍人吳阿真秀水縣申開軍人朱慶員等雖無明書方孝孺事迹而有姦惡外親字樣范小孫等係忠臣方孝孺株連楊任外親纍遣桐鄉縣申開軍人仲阿添等事亦因革除年間忠臣方孝孺株連楊任外親牽纍發遣俱各有據均應一體申豁等因又據寧波府申稱鄞慈定象四縣寧定昌三衛所俱無前項纍遣親故外據奉化縣申開忠臣戴德彞纍遣軍人屠叔保并户絶軍人楊佛童等擬合轉申豁免等因又據台州府申稱黃巖天台二縣并台州衛左右中前水軍等所松門衛左右中前楚隘等所海門衛外屬前新桃健等所各無應宥軍人其臨海太平仙居寧海四縣台州衛後所松門衛後所海門衛左右中等所各造忠臣方孝孺王叔英鄭恕纍遣軍人陳景原等文册到府理合申詳豁免等因又據溫州府申稱永樂平泰四縣溫金盤三衛海瑞平等所各無前項纍遣應宥軍人止據瑞安縣申開忠臣卓敬纍遣軍人徐亞生等到府合行轉申遵例矜豁等因及準清軍守巡海兵等道各咨覆到司該本司左布政使衷貞吉右布政使余一龍查得原題止稱革除年間被罪諸臣方孝孺等並未開有諸臣細名今據各府造到册內有忠臣戴德彞王叔英鄭恕卓敬纍遣親故隨查得先為仰遵明詔查録遺忠以彰聖政事該巡按浙江監察御史蕭具題革除年間被罪諸臣方孝孺陳性善戴德彞卓敬劉璟鄭恕鄭華王叔英程本立盧原質龔泰盧逈一十二人俱經禮部覆查遵奉欽依褒表備行撫按二院轉行本司於省城總建一祠春秋致祭訖為照戴德彞等既與方孝孺俱係已褒忠臣則凡纍遣親故通應一體推恩矜宥但有祖充軍役繼復纍遣而調併别衛者雖應宥其後衛軍役而原係軍籍隨衛安居多年似不必更張生擾至如原籍有丁盡而户存及丁盡而户絶者均應照例開豁再照嘉興府申送嘉興等縣册開有方孝孺株連忠臣楊任致纍伊外親范小孫等遣戌雖范小孫等非方孝孺親故而遣戌實繇方孝孺波及亦應併免今將各府縣衛所查過纍遣軍人姓名來歷分欵造册見在呈乞本部院再加查核俯賜會議題請施行等因到臣據此該臣會同巡按浙江監察御史范議照捐軀盡節人臣殉國之忠褒往勸來聖王礪世之典革除年間被罪諸臣方孝孺等節蒙纍朝褒崇恤録所以振綱常表節義者誠千載之一時矣但諸臣外視族屬連纍發遣者尚未矜復似猶未足以普聖澤而慰忠魂也茲者仰荷皇上俯納部院諸臣之言特旨查豁綸音一下非惟株連蔓繫久戌窮囚喜得更生之幸而凡率土臣民莫不舉手加額感激鼓舞共思殫忠畢義報效於明時矣臣等仰承德意敢不竭力清查以期對揚於萬一今行據該司呈報前來臣等逐一細加查核除祖充軍役繼復纍遣調併一衛者照舊軍籍隨住不必更動生擾外其方孝孺戴德彞王叔英鄭恕卓敬諸臣纍遣親故見在伍供役者似應悉從矜宥以霑浩蕩之恩原籍丁盡户存户絶者均應遵例開豁以免勾擾之害至如方孝孺連纍楊任併纍伊外親發遣者雖非孝孺親故而實繇孝孺殃及亦應併請宥豁以𢎞一視之仁據呈查議的確委無詐冒姦弊相應具題伏乞敕下該部再加查議覆請將革除年間被罪諸臣方孝孺等纍遣親故見在著伍吳阿真等八十二名連纍楊任外親范小孫等十一名併丁盡户存户絶朱阿定等六百九十一名通行本省各該府縣衛所盡行宥免願回者給與免帖不願回者亦給免帖仍在戌所附入民籍當差該衛削除軍名不許復行勾擾仍督行外省直衛所遵照但有營丁在衛者一體查明豁免開除施行庶聖恩廣施忠魂永慰不惟雪彼時株蔓之寃亦且扶萬世綱常之重矣議留緊要將官以重海防疏督撫臣近接邸報見兵部推分守寧紹參將盧述調補四川松潘薊鎮中路遊擊朱先升補寧紹參將又接邸報該本部題留朱先仍在薊鎮中路推中路遊擊任𢎞道改調署寧紹參將事俱經題奉欽依訖該臣會同巡按浙江監察御史王議照分守寧紹參將盧述駐劄舟山統督水陸官兵控轄沿海衛所軍務繁劇本官在任以來謀勇兼資恩威並用恤邊困而苞苴無染遇警報而矢石親攖先據定昌等營衛兵軍胡亮等俱稱本官愛士卒如嬰兒甘儉素如寒士惟恐任轉他省有失怙恃節經具狀願留加銜久任等情臣正批行司道查議呈報間不意忽調前職又據定昌等衛所官軍李環等連名告留情詞懇切臣當即一面牌行本官遵奉交代近例照舊管事外臣等竊惟浙省海防寧紹實居上遊而定海最為首衝參將所轄四區而駐劄舟山者孤懸海島之中與各參腹裏近海者不同非慣習風濤素協軍旅之望者未易勝任今盧述一官七載久任多勞觀其合詞懇留可徴輿情胥戴况近據被虜人口回稱倭夷旱荒四年造船意圖入犯搶劫今嵗隄備事宜視往年更宜加慎目今大汛屆期一切選練兵卒繕飭船器分布哨道控扼險要等務本官見任料理出洋蒙改松潘原非升轉其後代者萬一海波未習再議更調非惟人心失望抑恐地方有虞臣等質之司道察之行間輿論與近日海上傳聞倭情皆以留參將盧述為便輒敢冒昧具題伏乞皇上俯念邉海重地汛期正臨敕下兵部查議覆請將參將盧述照舊留任或念任久量加副總兵職銜照舊管事地方幸甚乞賜議處佐二首領官員以風厲吏治疏督撫臣在先帝時叨任户科給事中條議各省直州縣佐二首領賢者另疏薦舉該吏部覆奉欽依其後山東撫按疏舉吏員縣佐趙蛟楊果遂成良令而各省亦相繼遵行為例各佐二首領官慶一時破格之遇未必無感激思奮者但臣建白初意原為科貢之外例貢吏承二途拘於資格即有賢能如先臣况鍾之能為名知府者亦無由自拔且以佐二首領所管清軍水利徴糧巡捕諸務無日不與相關得其人則閭閻省追呼之擾不得其人則苛瑣需求但視錢貨多寡為處分輕重其受害者更係貧弱小民故臣當時有此論列今行之既久多以各官難保其終即有與民相安者亦不敢輒舉一省中佐二首領何止二三百人乃所薦舉寥寥二三人耳各官知難與二三人中也始甘心敗矣下官既甘心于敗上官不得不戒與逐夫戒與逐而可以風厲各官使改心易慮乎祗見戒逐愈煩敗者愈衆是戒逐止足以速其貪而貪者又不可盡戒與逐也於是容隱之弊滋而苟且之政多矣以臣愚見必大為鼓舞導以為善之利而又使之不得不為善其州縣佐二及三司府衛首領賢能著者不拘舉貢吏承照舊循例薦舉果係多才之地仍增益其數若有與地方相安不能盡舉者仍聽督撫與各差御史嵗終或復命及地方緊要員缺具咨揭薦舉該部酌量本省相應員缺次第遷轉在各官事體風俗易於諳曉有熟路之便不得薦於疏者或得薦于咨揭其途既廣其趨自衆是導之以為善之利也歷官本省無勉強粉􅎖於此乘便改節於彼之弊是使之不得不為善也且往時升任誰能不用里甲夫馬迎送而今可省矣或者以各省地方善不善為詞而一省中亦有善不善况風厲各官以上進之路尤不當論地方善不善以先啓其私便之圖其各官舉後或有改節即今日薦舉明日論劾斥逐尤足以見無成心而不得以各官改節過責舉者庶此法可以久行是於就近遷轉之中寓久任責成之意化苟且見小之念為感激圖報之忠使閭閻小民盡受其澤亦熙朝一盛事也伏乞敕下吏部酌議施行懇乞天恩俯賜議處漕糧以蘇運務以拯民困疏督撫據浙江布政使司督理糧儲漕務道右參政王應乾呈稱本省淺船嵗𣲖民七料銀三萬一千三百餘兩去年造船六百五十七隻該工料銀六萬七千六百餘兩除嵗𣲖外餘欠尚多若明年全運本色再造新船必如前數方足額用船料萬分無措乞賜議處改折免致缺船臨期誤事等因該臣批行該司查議通詳間又為懇恩永蘇民困事準户部咨開據杭州府新城於濳昌化三縣糧長章通茂等狀稱三縣山僻舟楫不通運米艱難向係徴銀解司給領買米牙保勒索運軍刁詐盡遭塗炭乞將三縣糧米改折解淮抵嘉湖之三六二府出米兊運代三縣之漕糧等情到部咨煩查三縣兊運果為民纍審據衆論相同即準改折回咨定奪坐𣲖等因又經臣案行該司查議明妥詳報去後今據左布政使衷貞吉右布政使余一龍呈稱行準糧儲漕務道咨議及據杭嘉湖三府州縣各掌印官逐一查處明悉申覆到司轉呈到臣據此該臣會同巡按監察御史王世揚議照該浙省財賦凡起解本折輸納京邊視他省獨多邇來災傷頻仍織造繁數兼以兵民二變致閭閻蕭條庫藏空虛小民以逋負之故日困一日臣等受事以來除督責各屬及時催徴外查得本省漕糧正改兊六十三萬石額𣲖杭嘉湖三府係干軍國大計豈敢輕議改折但明嵗船料無從處辦臣等反覆思維念太倉之米頗有贏餘若暫量改折色解部似亦計之便者至於新城於潛昌化委係山僻小縣去水次甚逺糧運果費多大為民纍尤以改折為便既經該司查議前來故敢列欵冒昧具題伏乞敕下該部查議如果臣等所言不謬速為覆請允行國計幸甚地方幸甚一議改折分數銀數據該司呈稱浙省杭嘉湖三府嵗辦正兊六十萬石改兊三萬石每年全運該淺船一千九百九十九隻額徴民七銀三萬一千三百餘兩軍三銀係減存運軍月糧內扣抵去嵗因先是料銀缺乏修造失時併造新船六百五十七隻每隻該工料銀一百三兩共該銀六萬七千六百餘兩除民七銀外餘欠尚多見在議處若明年全運應再造船六百有餘既難加𣲖小民又無運軍減存月糧可抵船料委難措處合無將萬歷十三年漕糧暫改十分之三銀數每石照萬歷十一年户部題奉欽依正兊六錢改兊五錢等因到臣臣等竊照節年漕糧遇恩詔或地方災傷方行改折為便民也乃往往既改之後反稱不便或必欲仍運本色此何以故以今日江南米價視往時大不相若也蓋往時米不甚賤今兵餉徴銀州縣一切差徭亦以條鞭法徴銀則用銀多矣用銀多則米不得不賤不惟豐年即少收穫亦不得不賤米賤則農家困當此米賤農困之時而折銀仍照舊數無怪乎改折之法行之昔日則便行之今日則不便也除將差徭應免徴銀者行令給票兊支外倘蒙將萬歷十三年漕糧允改十分之三每石連席板耗腳輕齎正兊折銀六錢改兊五錢以今日每石三錢時價計之亦祗得其平耳而其利乃在國用其省乃在本省免船料行糧之費也况米貯過五年則腐爛不可食即多改數年不為害若以後倉米果不足五六年用即令全運本色亦未晚也伏候聖裁一議免徴改折行糧臣等查得漕糧單例每淺船一隻運正米三百三十石用旗軍一十一名每名給行糧三石三府改折十分之三計米一十八萬九千石約省運軍六千三百名行糧一萬八千九百石往遇改折復徴行糧解部以是小民苦稱不便今查行糧原為運軍逺出於三府州縣計畝𣲖徴倘糧準改折仍將本年減存運軍行糧免令徴解是三府改折之銀雖止合時值平價而行糧之免每石可省銀五分則蒙實惠矣東南賦重役繁之地我皇上或不吝此五分之利使百姓不蒙寬一分之賜也伏候聖裁一議山縣全準改折臣等看得杭州府屬新城於濳昌化三縣僻居山谷舟楫不通轉運甚難向係徴銀解司臨期給令買米交兊市河牙保難免索勒且無倉厫租囤民居多致浥爛委為民纍所據糧里章通茂等告詞果出通縣公議但各役欲將本縣正米通改全折抵減嘉湖二府隨糧三六銀兩二府代運三縣糧米一節在三縣固為利益設遇荒歉嘉湖未必樂從恐難經久查新城縣正兊米一千九百五十石於濳縣一千六百石昌化縣一千一百石總僅四千六百有奇合無準於本省本色內照數永令改𣲖折色十三年分仍照前議正兊一石折銀六錢改兊一石折銀五錢以後年分正兊一石七錢改兊六錢著為定規其減存運軍行糧永免徴解庶山僻小民嵗免轉運之苦永荷更生之慶矣伏候聖裁一議改折臨時酌請臣等看得嵗時有豐歉而米價之貴賤因之嵗豐米賤則輸米易辦銀難若預令折色則求為本色而不可得嵗荒米貴則輸米難辦銀易若預定本色則求為折色而不可得以國家大計生民膏脂所供而不求一通融便計恐民病而國亦不能不病今莫如查太倉米果僅足用誠難輕議如有贏餘於十分中以七分為不易本色以三分行各有漕糧省直除豐熟仍運本色外如遇水旱災傷及别項事故即於本年八月以前奏報將三分改折照時價請定銀數行糧應否免徴則災傷事故在本年寬恤亦在本年不必發倉不損國計小民即蒙實惠若應再行寬恤不妨續議計無便於此者伏候聖裁地方異常水災疏督撫據浙江布政使司呈稱奉臣批據杭州府申據富陽縣申稱本縣城臨大江自五月十六日起至二十一日止霪雨如注江水湧漲與城垜相連居民廬舍悉皆漂溺悲號滿路預備倉穀俱被浸沒新城縣申據本縣太平等鄉民周珍等産居港口田地沿江一帶極低土宜早禾苦力種耘正秀何期連久霪雨洪水汛淹半月勢極滔天棲房衝壞老幼悲號近見水退田成白土苗根爛盡民命何生懇天憐救紹興府申據山會二縣居民馮亮等告稱五月十八日至二十三日大雨如傾晝夜不息又值衢嚴水發衝壞麻溪等􅄵水長丈餘漂沒民居髙低田地禾苗盡皆淹腐國課民命兩無倚賴蕭山縣申稱五月十六等日暴雨連數晝夜山洪驟至江海交擊水頭髙於堤岸者數十尺塘腳坍於風浪者百餘丈一瀉莫禦廬舍半浮田畝俱沒且今衙署城垣隨處傾倒司宇禁墻半行頽壞事勢難支上虞餘姚諸暨新昌嵊縣俱申報非常水災相同嚴州府申據桐廬縣申稱五月中旬天降大雨直至十八日夜半陡然髙浪滔天民居淹溺縣堂水幾丈餘官吏衙舍獄禁分司儒學驛房浸沒殆盡建德縣申稱五月十七日梅雨連綿至十九日洪水泛濫湧入城內官民衙舍盡皆淹沒分水縣申稱五月十六日至二十三日梅雨不止洪水驟發本縣六鄉兩邊俱山中流大溪田地附山傍水形勢迅急今遇水災墟岸推倒民田衝坍將半禾稻遍填沙礫居民淹沒房屋飄流哭聲震天淳安遂安夀昌三縣及嚴州守禦千户所各報地方并屯田水災相同各等因俱經奉批仰布政司會勘呈詳該本司看得杭紹嚴三府各縣俱於本年五月中旬各被異常水災田廬漂沒禾苖淹腐小民委不堪命已經通行守巡該道勘議但今六月上旬若候勘覆至日轉報恐致愆期請乞本部院先行奏報仍行駐劄該道委官再加勘議分數的確或蠲或賑另行呈詳等因到臣據此該臣看得杭州府屬富陽新城二縣紹興府屬八縣嚴州府屬六縣或僻阻山谷或逼臨江海地窄民稠生理鮮薄必得雨暘時若庶幾收成可望民生獲寧不意今嵗五月十六至二十三等日霪雨連綿不止上而山溪洪水泛漲下而江海潮汐衝湧以致城垣室廬多被漂蕩禾苖沒水日久盡皆腐死即今逺地求秧不可多得即得又恐烈日難成今嵗秋成終屬失望頃者京畿旱災恭遇皇上徒步祈禱布袍齋心前後頒布聖諭寬寃抑蠲逋賦及嚴戒有司實心愛民臣待罪地方捧讀感泣正與各屬飭勵遵行以求仰副皇上畏天保民之治乃三府各縣復遭此異常水災實臣奉職無狀所致除痛自修省及督行布政司會同守巡道將被災各縣委官踏勘分别某里某户田地若干被災幾分查勘的確另議蠲賑外伏乞敕下户部照舊行事例巡按御史再行覆實具奏施行府官不簡物議昭彰乞賜議處以肅吏治疏督撫臣惟國家欲肅吏治以安民生在慎選守令而守尤急以一方表率之責於守焉繫也臣自入浙以來於諸郡守責望尤切不謂素以才稱如金華府知府張守約者怨議叢生臣安敢不據實上陳謹按守約故激切急於進用而才力實能為且經挫抑或知懲艾固不逆其守不可信也守金華二年問斷敏速條畫多可行臣亦心器之而以同年故未有以不簡狀報者久之有云取與太濫臣猶謂其或急進用心使之也明為本官言冀令改圗巳閲開報寮屬考語有貪肆通判楊萬言照磨陸徑典史髙起鳯者皆注美詞始疑之而猶謂其或襲近時郡守槩稱寮屬之浮套也博訪則知楊萬言及諸佐二委署印信及遇生日節令皆有餽送髙起鳯以餽送多故橫甚比臣與巡按王御史拏問萬言而始補送貪縱事實何以掩前日縱惡之咎也提學副使林偕春被劾人歸罪本官曰本官之引拔童生盧鴻記等皆以賄及不盡允則艴然託故不為禮惡吏徐應星稱送本官以訪察詐富民張十八馮聖五十四等銀各以百計又以盜情詐蘭溪富民倪十八等銀亦各以百計安得曰盡吏受之有自金衢來者道本官家眷回籍行李充斥察其所得非錢糧多加兊頭詞訟多問有力稍有力則取鋪行假絹貨物不給價值方今聖明在上屢因旱災詔臣等撫按官糾察有司不許徇情容縱又用臺臣言特重郡守而郡守中有臣若此欲望寮屬不相效尤以共成約已愛民之政難矣臣非不念同年私好而迫於公議安敢復徇情容縱不遵奉詔旨不為地方計也參照金華府知府張守約才雖可以集事守不足以服人始以欲進之心遂亡在得之戒私植桃李且以賄聞公受餽遺惟為囊計訪察欲以懲惡而反害及富民盜賊豈容妄攀而乃擾及善類寮屬無所懼而敢於為惡閭閻何所恃而得以安生所當亟行議處以警官邪者也伏乞敕下吏部再加查訪如果臣言不謬將張守約照不謹例間住員缺推擇賢能者代之使一方表率得人而吏治庶可興矣縣官馭下太踈致招許訟乞賜議處以飭吏治疏督撫臣竊惟縣令最為親民欲民安在責成縣令而縣亦有難治如處州松陽僻居山中其民頑梗多豪舉持縣官短長前令多以告訐敗去以是上官稍右民懼難為令稍右令懼難為民而其實為令者或先以頑梗逆民而純用法或即以脂韋廢事而甘善敗松陽之不治大率坐此知縣程子課初政振作亦有善狀其後乃以謬戾聞本年三月中巡按御史王世揚準生員李應科訐告本官行分守溫處道右參政胡緒究審臣亦牌行參政胡緒查勘虛實續據該道招解前來大約謂李應科祗因爭山起釁遂爾誣告行私中間贓迹除無影者不論外即有一二可指又皆吏胥葉以榮等所為其實本官並無沾染獨追徴無序作為太驟以致人心已失後效難期相應酌議别用等因該臣看得本官物議大著告有多贓恐多未究之情就經批行按察司再問詳報隨據該司按察使馮時雨呈稱覆審無異應照原擬發落等因到臣除批本官暫令還職及玩法誣告各犯查照律例遣配外該臣謹會同巡按監察御史王世揚議照知縣程子課法令雖稱敢為催科全無撫字民之不堪其操切也已有日矣奈何又偏信吏書葉以榮等五六人大肆鴟張公開騙局則亦何以解百姓之疑哉然則應科之告固應科之刁而以頑梗逆民以脂韋縱吏亦本官自有以取之也苐再三行勘委無入已之贓脫因人言遽使終棄不惟本官之抱屈可憫將使該縣頑梗之習益長亦非所以為一縣計也臣竊以為官體民風似當俱重乞敕吏部查議覆請將程子課照不及例降用惟復念其守未縱肆姑以原官量調簡僻則本官之罪既足以示懲而後來者亦不至沮喪矣懇乞聖明久任賢能府正官員以安民生疏督撫據浙江布政使司呈稱奉臣等案驗準都察院咨該本院題奉欽依責成各撫按官用心督察有司尤重各守巡道與府正官等因行司查議呈報依奉備行守巡各道查訪去後隨準杭嘉湖守巡道左參政林喬相副使陳用賓手本俱稱嘉興府知府龔勉以先令嘉興熟知地方民情土俗故注措悉中肯綮入任三年以來敦崇節愛盡革府縣弊政尤先教化即今令行禁止閭閻安生樂業士類日益蔚起乞賜議加服俸久任以為屬縣表率等因各到司該左布政使衷貞吉右布政使余一龍會同按察司按察使馮時雨看得知府龔勉本英明仁恕之心敷正大和平之政寬黎庶而里甲免借辦之煩振青襟而􅓺宫有興起之效三年報績士民咸赴省而攀依一聞議留郡邑並舉手而稱慶既經二道會議相同復參輿論歸向協一呈乞本部院會議具題量加服俸久任等因到臣據此該臣謹會同巡按監察御史王世揚議照生民之休戚係守令之賢否而表率令長以保安民生者郡守之責尤重嘉興統屬七縣賦重訟繁號為劇郡惟往時知府楊繼宗以亷明聞而民至今德之以繼宗在郡九年故也今查知府龔勉前令嘉興已協士民之望繼守該郡益為逺近所歸興革無遺教養並舉蓋輕車得熟路之便而來暮愜去後之思即令步繼宗之芳躅何難今若循資遷官而去則地方既難以遂借冦之情而本官亦無以竟牧民之願矣方今聖明在上拳拳以核吏治安民生責臣等撫按官臣等敢不仰體聖衷加意考核除物議大著者已行糾參外賢如龔勉安能不為一方乞留蓋不肖者去之惟恐其不速賢者留之惟恐其不久一郡守去留之間而吏治之勸懲民生之利賴胥此焉繫矣既經該司議呈前來相應具題伏乞敕下吏部查議覆請合無將知府龔勉先加服俸留任供職即不能如楊繼宗九年若候再歷三年政績益著破格升擢於地方裨益不淺矣司農告匱年甚一年敬遵明詔陳末議以備採擇疏督撫準户部咨該本部題奉欽依將萬歷十三年起運漕糧再折一百五十萬石照今年見折規則浙江五分若地方豐熟百姓不願改折者聽漕運衙門預先𣲖撥撫按官將應折應運本色明白具奏等因又為懇乞天恩俯賜議處漕糧以蘇運務以拯民困事準户部咨該臣謹會同巡按御史題前事本部覆奉欽依咨行撫按官將該省萬歷十三年分漕糧通融𣲖折十分之三折色每石兊運七錢改兊六錢連席板腳耗輕齎在內行糧免徴新城於濳昌化三縣準全折一年等因各備咨到臣準經案行浙江布政使司遵照及又會牌行司通行各府州縣掌印官召集糧里從公查審通融酌𣲖務求民便呈報去後今據該司呈稱依奉行據杭州府申稱除新城於濳昌化三縣奉文全折外仁和錢塘富陽餘杭臨安額米不多甚苦搬運願全折海寧地近水次願折五分嘉興府申稱海鹽平湖米多且水次更近願全運本色嘉興秀水崇德桐鄉願折三分嘉善願折五分湖州府申稱歸安烏程願折三分長興願折二分安吉德清武康願折五分各等因到司該本司左布政使衷貞吉右布政使余一龍看得杭嘉湖三府額𣲖漕糧陸十三萬石今奉議改折據各州縣𣲖撥分數除本色三十八萬八千石四斗外共折色二十四萬一千九百九十九石六斗通融計算十分內改折三分八釐四毫民情俱已允服但查部文原議止免改折三分行糧今多折八釐有零行糧似應一體議免呈乞會題施行等因到臣據此該臣謹會同巡按監察御史王世揚查得浙省漕糧已奉旨改折三分而先是部文行議改折五分如有不願許臣等具奏比臣等議減銀數免行糧不蒙盡允恐一切改折三分民亦有不便者故查産米多寡水次逺近逐一酌審民情而民之産米寡者水次逺者以其得免行糧也遂亦稍稍願改今據該司呈開各州縣審定分數或多或寡或全改或全兊通融總計十分內改折三分八釐肆毫較臣等題奉欽依三分之數稍多視部奉欽依五分前數尚少既稱民情允服相應準從及查改折行糧近蒙聖恩免徴前議原止三分今改折數逾八釐四毫其應徴行糧數亦不多若仍𣲖徴不惟民駭異同亦非所以廣皇上一視之仁既經該司議呈前來合行具題伏乞敕下該部查議覆請將萬歷十三年該省漕糧準照今議仁和錢塘富陽臨安餘杭五縣照新城於濳昌化全折安吉州海寧嘉善德清武康四縣改折五分嘉興秀水崇德桐鄉歸安烏程六縣改折三分長興縣改折二分海鹽平湖二縣全兊本色共改折三分八釐四毫行糧照見折分數免徴每兊運一石折銀七錢改兊一石折銀六錢連席板腳耗輕齎在內徴完依限解部庶國計有裨而民運亦稍蘇矣府佐貪穢究核已真懇乞聖明亟賜罷斥以肅吏治以阜民生疏督撫據浙江按察司按察使馮時雨呈問得一名楊萬言招年四十四嵗福建漳州府南靖縣籍同安縣人繇選貢歷升浙江金華府通判萬歷十年十月初三日到任至萬歷十一年閏二月內萬言蒙委署蘭溪縣印本年六月內因本府地方荒歉行文禁米出境萬言轉行已問革回籍典史髙起鳯出示禁約比有已到官富民趙三四等有米要行逺出糶賣不合率衆出銀共十二兩與髙起鳯轉送萬言不合接受入已私放及有問結在官唐子逺有婦徐氏賣與已到官江思道為義婦後因晒穀跌死比唐子逺添揑打死情繇具告萬言準行髙典史相驗江思道告要免簡髙起鳯向伊説稱你可將銀送與縣堂方可免簡江思道不合聽從將銀十二兩交送髙起鳯代送萬言又不合收受入已問擬江思道等各杖罪發落至本年八月十四日萬言將印交與許縣丞署管回府後至萬歷十二年六月十五日永康縣鍾知縣病故隨蒙仍委萬言署印點將已到官吏翁朝佑吕邦本各承管支應并直庫收放錢糧萬言又不合接受各常例銀共二十二兩入已以致二吏狎恃各不合因而侵冒官銀俱巳總計翁朝佑十三兩七錢吕邦本二十二兩七錢二分零及故違指官誆財計贓徒罪以上發邊衛充軍事例并以承行名色誆索事犯銀翁朝佑四十七兩六錢吕邦本二十九兩三錢陸續入已比有在官吕十七因人命牽連被翁朝佑將保狀故稟萬言標注監究事樣嚇取伊銀一十二兩萬言收受入已該縣春秋二祭用鹿二隻比已到官庫書潘桂等不合向以羊代萬言將各責治坐追潘桂等名下二季鹿價銀八兩作為公用又不合乾沒入己本年八月內該萬言考取童生有未到官郎鳯鳴吳大樂各不合行求共備銀十二兩萬言又不合接收續取類送後有未到官林應豸入學隨備表裏銀十二兩送謝萬言亦又不合收受入已及有巳到官應子嘉與問結應六五採摘桕子忿爭互相紐打各具狀赴訴萬言準差未到官楊草四行拘不合嚇索應子嘉銀十二兩過送萬言又不合收受入已擬各不應納贖應子嘉供明查係鍾知縣有行仍追應子嘉出銀五兩併罪外科罰别起事犯俞朝忠銀十二兩李浩九銀六兩俱送鍾知縣助喪訖萬言署印問過犯人金四等各起紙贖共銀一十八兩三錢七分零侵收入已併各贓私多係翁朝佑吕邦本過送萬歷十三年四月內蒙金衢守巡二道訪將萬言前項贓私實迹併各役玩法侵誆事情具揭通行呈報巡撫溫都御史巡按王御史會行按察司拏問隨蒙審發杭州府致蒙余知府審出前情萬言又不合將追匿金四等紙贖各銀兩隱不供出取供問擬萬言徒罪翁朝佑等引例充軍趙三四等杖罪具招解蒙本司審得楊萬言侵索多贓彰彰可據且署印紙贖一無追解不知作何支銷仰王推官覆究招報隨蒙本官查得萬言問追金四等紙贖並無支銷下落委係侵沒隱匿不供致蒙將萬言等照原擬罪名具招呈蒙本司覆審轉招通行呈解撫按二院又蒙本部院詳審招情未盡批行本司覆究招詳蒙司轉發杭州府余知府再加研審萬言方將原受事犯銀兩實情供出復蒙具招呈解本司覆審無異及蒙參看得楊萬言材質龍鍾操持狼籍攝縣事而官銀侵冒甘為逐臭之流任姦吏而賄賂潛通殊失烹鮮之義贓證既確徒革允宜將萬言等取問罪犯外結得銀每兩值鈔八十貫招結是實議得楊萬言除非因公科斂人財入已及餽送又與翁朝佑吕邦本除監臨官吏求索翁朝佑吕邦本又除誆詐與説事過錢并不應等罪俱不坐外楊萬言翁朝佑吕邦本俱依官物但有人守掌侵欺者並計贓以監守自盜論四十貫律各斬係雜犯並準徒五年趙三四江思道潘桂俱係不應得為而為之事理重者律各杖八十趙三四等有大誥減等各杖七十楊萬言係官翁朝佑吕邦本係吏翁朝佑吕邦本免徒定發邊衛充軍終身拘僉妻解發遣招達部知趙三四江思道並審有力與楊萬言各納穀潘桂審稍有力折納工價各贖罪楊萬言贖完係犯贓官革職為民員缺招行布政司報部銓補楊萬言候奏請明文施行照出趙三四江思道潘桂民紙各一分罪穀楊萬言七十五石趙三四江思道各一十石五斗潘桂工價銀一兩三錢五分楊萬言名下該追收侵事犯金四等紙贖乾沒鹿價共三十八兩三錢零俱還官送鍾知縣助喪銀免追餘犯查照追贓髙起鳯已經問革回籍免提等因到臣據此案查臣欽奉敕諭節開所屬文武職官敢有貪殘不職者文官五品以下徑自拏問欽此及近奉明旨慎選有司申嚴墨吏之禁臣欽遵通行各司道府州縣共期潔已愛民以仰稱皇上奉天子民至意隨據守巡二道訪報通判楊萬言貪縱不簡事欵到臣臣即會同按臣覆訪相同牌行按察司提問招解前來又經駁問去後今據前因除將犯人翁朝佑等定衛批行發遣發落楊萬言候奏請明文外該臣會同巡按浙江監察御史王世揚參看得楊萬言器本斗筲欲同溪壑鍾鳴漏盡曽無止足之思鼠竊狼貪不顧亷隅之喪視攝符為利藪所在需求引猾吏為腹交聽憑關節事無可否惟入賂即可周旋訟有是非但得錢便為倒置贖鍰已不當取更加罰之謂何鹿價固所宜追乃乾沒則可恨所幸贓不逾例猶得罪止擬徒據法非寃揆情允協既經司府等官查勘明確又該臣等核審相同理合具題如蒙乞敕都察院再加議擬上請行臣等將楊萬言追完贓贖革職為民庶墨吏咸知法紀之嚴小民得免剝削之苦其於聖明願治之懷未必無一二少慰也假解限迫工料難湊乞賜議留例銀酌定限期以便織造疏督撫準工部咨該內承運庫太監孔成等題稱坐𣲖假匹專供御前賞用限寬不能接濟乞敕撫按已後未完坐𣲖分為兩運限萬歷十三年四月八月內盡數解完等因奉聖旨這坐𣲖假匹著行與各該撫按官嚴督所司如法織造嵗造拖欠未完的上緊嚴催完解欽此備咨前來準經案行浙江布政使司欽遵織解去後今據該司呈稱查得浙省原奉坐𣲖假二萬五千匹估工料銀一十八萬二千六百五十一兩四分零分為十運每年一運解二千五百匹扣至萬歷二十年止初運限萬歷十一年七月尋改限十年十二月解進又奉嚴催二運三運即織完四千匹解訖又嚴催四運五運復織完八千八百二十四匹及蟒衣斗牛三百四十八匹解訖以原限計之已足萬歷十一年起至十六年五運三分之數原𣲖民間機户自辦工料織造價值該銀四萬有奇尚未完給今該庫欲將未織假一萬一千八百餘匹限八月內解完時方織進袍服庫藏空虛前留織造銀因奉蠲免愈少限期甚迫難以措處呈乞會議具題限期照原議候萬歷十六年起織如自萬歷十三年始每年織解二千五百匹將工部見開事例銀留一萬六千餘兩或織解數多盡於事例銀內支用等因到臣據此該臣會同巡按浙江監察御史王世揚查得浙省坐𣲖賞假二萬五千匹原分十運原限萬歷二十年解完乃未幾併催二運三運又未幾并催四運五運今又併催六運七運八運九運十運是先以二年而完五年應解之數今欲以五年應解之數而完於一年該庫為各省未完分數較浙省必多其預解者較浙省必少故通行題催以致部文一槩催解即今預解舊價未給民巳洶洶訴討新價措處無從再難強民代織查前撫按及工部皆曽以寬減賞假上請我皇上軫念民瘼雖供用袍服亦減三分之一如蒙聖慈俯念袍服雖減前留織造銀以蠲免自少難以湊織賞假節縮賞賚量減假數庶公私不致大匱萬一賞賚缺用必不容已伏乞敕下工部查各省未完分數定一易辦期限上請事例銀準照每年織解假匹多寡留用庶辦織小民不致獨纍如往嵗下情不能上通而於國用亦無誤矣酌議調補縣令以安民生疏臣竊惟親民莫如縣令而縣有繁簡以器使人則人才皆適於用兩浙如金華府屬頗多巖邑而東陽尤稱難治為八邑最非甲科素練達者治之鮮克有濟自知縣龔聞道物故邑事遂多廢弛近經題缺除補尚未有期即除補恐初試為令者未必輒與地方相宜卷查先準吏部咨該工科給事中王育陽條議本部議覆咨行撫按官通將所屬府州縣正官嚴加查訪應更調者通限一月內具奏等因題奉欽依通行欽遵外該臣會同巡按浙江監察御史王世揚杳議得嚴州府淳安縣知縣嚴貞度明敏能防左右心思常在閭閻催徴真不擾民淡泊至於廢禮但該縣俗厚事簡以本官處之誠未足以展其驥足處州府青田縣縣丞鍾文瑞素恥詭隨綽優幹濟雖左遷而志不少懈屢署邑而事皆有條懲艾已深才猷日練淹處縣佐亦未足以鼓其牛刀今若以嚴貞度調任東陽以鍾文瑞升補淳安則在嚴貞度當盤錯之會而利器自别在鍾文瑞感桑榆之拔而收效可期是以國家器使之道竟各官未盡之長而就近量移以責治效以安民生計無有便於此者伏乞敕下吏部查議如果臣等所言不謬將嚴貞度調任東陽縣知縣鍾文瑞升補淳安縣知縣各赴任供職施行地方異常災傷疏督撫據台州府申據仙居縣申據本縣里老尹璜等呈稱縣坐山僻止靠農田今春以來雨不及時分秧遲晚夏末秋初根苗方秀又值雨水太多早禾僅得半收晚禾發蟲遍野螵白不期八月初九等日狂風大作猛雨傾盆洪水泥濫田地衝坍禾稻腐爛顆粒無收男女悽惶展轉溝壑乞賜申達拯救等情到府轉申到臣就經批行浙江布政使司會同台州兵巡道作速勘明呈報以憑具題去後今據該司呈稱行準兵巡該道僉事周守愚手本開稱行委該府推官王道顯督同知縣湯聘尹遍歷都里逐一履畝查勘得該縣地方僻坐山隅水性寒濕早禾僅種二三止獲半收晚禾反居七八夏月發秀之時才覺生蟲秋間吐穗之際蟲勢愈盛風雨連綿遂致攻心蠧節繼遭大水湧漲水退旬日髙阜者螵死殆盡一無結實低窪者衝坍淹沒沾泥就稿顆粒無收各鄉田中一望枯桿尚存即以該縣田畝傷數乘總通計算被災七分之上等因到司該本司查得仙居縣秋災雖已過七月於例以為後期但該縣被災於八月初旬覆勘委為重大難以拘泥常例呈乞先為具題所有應賑應蠲事宜仍聽本司備行該道議覆至日另詳等因到臣據此該臣看得台州府仙居縣坐居山僻商賈不通小民惟以耕種為生計即時和年豐猶然稱纍乃今秋晚正當結實之候先以蟲蠧繼以水淹致使顆粒無收俯仰失望委為異常災傷此皆臣待罪地方奉職無狀之所致也除痛自修省及督行布政司會同兵巡該道將被災分數再勘的確另行酌議蠲賑外伏乞敕下户部照例轉行巡按御史覆實具奏施行糾劾方面官員以備考察疏督撫臣叨撫兩浙適當三年考察之期例有糾劾於方面官員尤加意體訪除照常填造賢否册揭咨送部院查考外謹按原任浙江按察司溫處兵巡道副使陳澗刻薄不體民情恣肆惟圗身便守衢全無惠政斂怨實有煩言理詞則原被不分惟喜罰贖收餉則出入任意但較羡餘市硃不堪雖十餘斤盡入水傾擲買絹稍惡縱數十匹亦信手割殘及轉憲司尤多戾政散兵糧月扣一二十兩積送者把總陳仲紳也而仲紳因以倚勢為姦取溪紬數至百十餘價被抑勒受害者鋪户王伯等也而鋪户或以索價杖斃指禮儀以取土物假犒賞以取漁稅鄉官兵士徒受虛名嫁贓迹於李知府縱狎昵於祝頑童官常行簡真成掃地此一臣者穢迹久干公議休致未快輿情所當照不謹例間住者也浙江按察司寧紹台分巡道僉事周守愚才本可以有為而功名之心太急每任情而拂衆學亦足以飾治而亢厲之氣欠平遂賈妬以招尤理詞不悉原被之情即片言決斷徒滋告擾馭兵不恤行伍之苦乃任法朴責難免逃亡繩吏書不善關防致詐騙踰垣真法愈嚴而人則愈玩察屬吏欲懲貪黷乃評品多舛蓋實未核而名則是循同僚副使林偕春被論懷忿以素多潝訿之嫌安在其為協恭舊屬知縣陳九功退有怨言以不却臨行之禮安在其為體恤且以下僚陟本省方面既人與已多相猜疑而以淺衷當最要海防自官與地兩不便利但性本有執絶不類淟涊之流才可曲成不難收桑榆之效此一臣者所當照不及例調簡者也伏乞敕下吏部都察院再加查訪照例考察施行糾劾有司官員以備考察疏督撫臣叨撫兩浙適當三年考察之期例有糾劾於所屬有司悉心體訪除照常造報賢否册揭咨送部院查考外謹按台州府知府張會宗性甚寬平而意氣未免消沮心若抑畏而事體難望精明知事袁行可收各縣之糧出有扣入有加雖坊里王汝應等側目怨言亦不覺察庫吏徐光裕收童生之卷或十金或二十金致生儒金汝濟等買置髙等竟罔聞知以考拔之恩而存鄉官何知府遂縱伊子大壯等乘機肆詐無乃薄已厚人以同鄉之故而庇太平陳知縣且坐小民應善等誣告重罪豈是愛民約屬問詞遲疑承行吏董大成等已需索害民矣乃又有於發落票內私加稍力者左右真如虎翼徴糧怠玩經管吏邵興道等已捺解勒例矣乃又有於收放餉銀私扣數兩者姦弊何啻蝟毛贖鍰妄費雖無暮夜之金餽贈全收亦有廣財之號原任處州府知府今丁憂陳九敘心無矯飾而察姦之智未周學類迂流而理繁之機猶滯牌票不分緩急一郡之勾攝何堪裁決盡倚吏書各役之需求特甚禮吏程觀國以造童生册騙銀矣而門子葉一材復與交騙富童張經等足徴法紀之太疏千户杜經邦以訪武職詐人矣而姦吏查春復與同挾把總曹應龍實由防間之欠密監生張綬以人命姦情收獄用銀一百兩求吏吳伯淑出豁雖本官未必知情而羣小之舞弄巳甚商人張松以木牌匿稅被逮用銀四十兩託吏陳守銓過送雖本官未必即受而政柄之下移可知在任而親族之往來甚多縣驛豈能不纍瀕行而軍儲之支放太迫物議安得不生原任嘉興府通判今升任髙珍才本昏庸志尤貪鄙居官全無幹理遇事一味苛求以衙吏萬全漁民而受嘉興等縣白糧解户張舒等例銀約有三百用甲首謝祖罔利而受秀水等縣白糧船户劉茂等例銀一百有餘署海鹽因收頭張墀等耗羡不足罰穀百餘石實歸囊槖署嘉興見僧人定倫建屋起釁罰銀二十兩始放焚修領運回任不辭各縣花幣已可醜矣乃嘉善少幣一端亦逼令縣官買補何計利不遺錙銖署府送禮妄𣲖兩縣糧解已可駭矣乃衙內雞鵝微物亦𣲖及鋪行納價真多欲不啻溪壑嘉興府通判楊瀧志本怠於左遷智亦昏於多欲署崇德以沈德代唐曉發遣雖沈德已受私幫而唐曉之出柙謂何準詞訟為王科嚴比謝啓望等債銀致劉阿四纍死而計子明之騰謗有自部白糧受解户潘林等例銀已極多矣而運糧船頭又逐名索銀二兩方許駕運催漕糧受解户潘應龍等例銀亦不少矣而領解折銀又發出傾銷竟重兊百金以潤私囊進京受水手於屬官恬不為愧賖貨致虧損乎行鋪習以為常况酒色是耽政事難望振作而刑罰且重怨讟業巳叢生原任紹興府通判今升任楊莊外飾謙恭中懷譎詐小才雖堪任使巧計極善彌縫署上虞以盛筵曲媚過賔致三月有八十金之費署各邑以敏斷多收罪贖有半月得半百金之謡丈勘欺隱田糧凡巨室有新墾者輒與開除真畏勢重於畏法清查冒免差役凡左右有關節者隨行寢閣徒為私不知為公減軍糧於署郡印張朋已赴道稱屈矣而反坐誣恐衆軍之耳目難欺圗奇貨於署理刑張大祥已被告人命矣而乃末減致朱氏之寃魂無訴倚書手陸良等罔利而急完文移以悅上官真是巧宦之俠用斗級余敬等過銀而取給口説以愚僚友豈非漏網之魚原任慶元縣知縣今升任史著勳性頗機警才亦圓融筮仕尚博能名末路大改前節受汚吏吳詔銀帶金杯遂令管庫致盜庫銀四百餘兩扣民壯鮑子元等工食指給書手實半入囊每年不下四十餘金去府城令里排供應往來甘違明禁遇節慶受富民杯盤花假不恤謗謡理詞多靠錢神周蘭聰五十金葉孔昭四十金吳言儒三十金即犯姦敗倫皆模糊不問審徭亦通關節姚植等三十兩吳京等二十兩鮑法華等五十兩凡糧里斗級俱索取無遺造解黃册請換印信清丈田糧事事不肯輕放童生進學鄉飲延賓旌善給匾人人皆送謝儀原任於潛縣知縣今升任談廷輔性類狼貪形同狐媚任家童踰垣淫縱防簡全踈寵何榜通賄橫行苞苴公受匿張翊買和銀四十兩用謝承渙稅契銀一百兩𣲖阮守義家伙銀二十兩各役之賠纍何堪受耆民謝棟等冠帶銀一百兩取糧解常例銀一百兩索里長鋪陳銀五十兩合邑之需求已遍天目僧如謨罰銀二十兩方許焚修各寺院行童納銀四五兩徑給縣牒苟可得利曷恤敗官原任昌化縣知縣今升任熊守謙外剛而內實多欲心刻而民則何堪信庫吏許應學為腹心交通無忌用戲子程九臯為門役狎昵有聲圖寺僧紹蘭等匾額謝銀卑汚殊甚匿當鋪胡富被盜金飾亷耻何存王之臣謀真普寺産託陳五送銀四十兩使真普有還俗之寃周龍圖袁文龍田房託劉繼明送銀一百兩致文龍有失産之恨黃公敏歙富童也以銀一百兩得稟入學而陳鳯寶八十兩邵文茂五十兩則皆以詞訟賄求徐梯邑訪犯也以銀一百兩得即回申而許際銀三十兩王偶銀六十兩則皆以爭産請託汚行大干公議劣轉未盡厥辜開化縣知縣王文昌性褊急不近民情志卑鄙且多物議受姦吏張宗元等撥置惟言是從任惡快鄭繼元等橫行使民受害追通縣駁册罪銀另加耗贈而管庫吏方得賢又分外索求追里長貼解役銀半入私囊而承牌人汪朝選因乘機誆詐造黃册則假官紙扣取鋪價未見支銷查稅契則以匿稅濫罰富民竟無下落造座船而縱老人胡精倚勢遍斫墳木視民財何啻沙泥掘山河而委巡簡許潤嚴刑凍死役夫輕人命真如草芥印絹匹則於解户考童生則於冒籍徴條鞭則於耗銀事事有誅求之謗吳大望以斫木金子龍以告訐程坤秀以人命人人有通賄之名丈地不辨等則而朦朧起科已大失百姓之心告糧不與處分而輕縱刁民幾釀成地方之變原任宣平縣知縣今升任黃文豹年邁性迂法弛政玩文卷束之髙閣錢糧盡入私衙雖正賦亦聽逋負不徴凡支銷則任左右濫費息詞本以便民也而犯人徐應雷等姦拐重情亦受賄給照奬勵本以勸賢也而里民俞三綱等錦幛折儀亦槩受不辭斗級苦役巳扣除工食矣而復費匿贖銀偽增穀數豈思賠纍之艱前官被告已在省對簿矣而顧留難文卷勒送餽儀奚念寅恭之義印信憑家人盜使雖交通賄賂而不知庫藏被積吏私開即侵分扒平而莫覺一籌莫展百弊叢生原任定海縣知縣今丁憂吕明倫性雖急於懲玩才實難以長民理詞而罪犯之輕重多不得情頓生怨議審丁而户口之加減每不核實嘖有煩言行條鞭以便小民此本官創議也乃指稱轉解明加火耗令銀匠有包賠之苦收商稅不許加勒此見行嚴禁也乃另置大等委吏稱收縱積埠有侵詐之姦開局造册而總書每名三兩散書每名一兩姦吏烏應禎等之敢於科𣲖者豈盡公家正支點卯認狀而鋪兵每名五錢閘夫每名四錢快手余政等之敢於徴收者豈盡羣小竊取清查縣基使耆民羅尚絅陳鳯謨住址沒為官舍未必皆有罪之人擅用鋪行致董世明陸秉濟臨行訴於通衢實多去後之恨原任海寧縣知縣今調簡黃淳才本疏庸性更狎玩溺詩酒而薄民事令邑務日混淆難清喜丹青而寫扇端致門役傳倡妓不恤家奴八小厮等恃寵用事雖丈田亦令隨行歌唱苟得賄則言無不從寵門子吳光彩等朋惡為姦因查寺受僧道泮銀物一稟白則事皆立效受主簿劉世淳厚餽而縱容巡捕肆害豈是潔已率僚用庫吏王承宗收糧而坐視重兊取耗足徴容姦剝下造册鎖禁總書為革弊也書算華大山等指誆各里銀三百兩即事發問徒何益各關查驗鹽引為通商也書手趙大拱等指騙各商銀百餘兩致上下心迹難明寧海之謗巳多有庫之民何罪浦江縣知縣蔣鳴琅性過優柔才難振作慈祥雖著於舊任功名頓損於今官牌票則甲止而乙復行雖壯快四出猶恐不及文移則朝發而夕不記雖左右爭匿莫敢誰何俞良文以供書朱忠以總書橫行騙詐法令之廢弛可知蔣惟霆以户吏周子華以門役任意索求關防之踈漏難免僉押而羣小叢集致來吏滿堂之謡問理而是非不明又有魚換鮝之謗龍遊縣知縣魯崇賢文學甚優作為過激矜已長以凌人士民多怨媚過客以延譽吏卒稱疲徐九苞管解糧銀例有幫貼而以承行吏曹槐妄稟之故僉撥貧民遺九苞以賠補之難余卸苟歐殺人命律宜正刑而以尸親徐熊得財之故止擬過失致邑民有枉法之議孫棣以虛引修學宫祝五秀以賭博修公署終是病民訪吏尹文昌得更名復役禮吏諸葛魁因鄉飲扣銀乃屬縱惡收都總何愚等罪贖久不申報雖銀尚在庫而心則難明為同年羅舉人作興殃及寺僧雖利歸他人而怨則獨任新昌縣知縣劉庭蕙年資甚青而性執易於招謗學識儘裕而防疏難以懾姦日昃而始升堂安免沉閣節令有時失禮可曰恭勤以懶散為髙而宿南明寺造洞心亭豈名教之真樂因公署被火而採民間木及墳中樹致怨議之沸騰嵊令之揭陷雖多誣詞而公出曽帶里長終違禁約寺田之變價固未私費而科罰以充修理奉何明文用鋪行而給價欠平致失民望稅印契而經年不發故起浮言據新政力改前非似不必追論其既往在邑民猶騰舊謗恐不便展布於將來寧海縣知縣孫桴性本健忘目尤近視晝夜之憂苦無益左右之竊㺯堪憐報訪犯而王寵田豹等之濫列竟借聽於學官豈稱明恕之體徴錢糧而趙國逺林佐等之拆封敢同謀以竊取安望摘發之明陳應龍私剋鋪兵工食每名至二兩矣雖王淵等通衢呌嚷而亦涵容何邦盛加兊條鞭銀每兩多五分矣致王科等窮民受害而竟不究理詞訟則曲直不分而槩擬稍力罰贖豈徒刁疲之邑難振僉糧役則貧富不審而多送見面土宜殆亦庸鄙之性使然以上共一十六員內髙珍史著勳談廷輔熊守謙貪肆特甚怨謗尤多當照貪例為民楊瀧楊莊王文昌志行不端官針無望當照不謹例黃文豹庸懦長姦當照罷軟例各間住張會宗吕明倫黃淳長吏已不勝任裁抑或可曲成當照不及例降用蔣鳴琅不堪民牧當照不及例降調間散陳九敘才弱任淺魯崇賢性躁才踈劉庭蕙始怠終悔當照不及例調簡孫桴才短而學未荒當照不及例改教者也伏乞敕下吏部都察院再加查訪照例考察施行溫恭毅集卷三
