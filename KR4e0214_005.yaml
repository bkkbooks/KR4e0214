body:
  text: 温恭毅集巻五明温純撰䟽乞恩辭免陞任以安愚分䟽己丑年時任都察院右都御史兼户部右侍郎總督倉塲臣陜西西安府三原縣人繇嘉靖四十四年進士累陞今官據吏部咨為缺官事奉聖㫖是温純陞都察院右都御史兼户部右侍郎總督倉塲寫勅與他欽此欽遵臣聞命自天措躬無地竊念臣材踈識淺行薄望輕猥䝉二聖陶鎔歴中外全無寸績恭荷皇上㧞擢躐臺省更負素餐方今錢榖出納之司尤關軍國利病匪淺豈乏才俊誤及庸愚即令以原職督儲已非其任况加以長憲崇秩益承之羞豈因臣舊撫越中或知財藪有竭澤之困近佐計務或知帑藏無數嵗之餘故責以識途而不計其駑駘遂揚之使前而得同於糠粃睠惟嵗出常溢於嵗入而入者毫不可増出者萬不可缺安望府庫之充盈又惟積荒加之以旱災而荒者未必盡蘇旱者又且請命正值東南之疾苦盡蠲則病國可慮盡歛則病民可虞雖責之極才極練之臣亦難收足國足民之效臣自揣分實切循牆敢謂經畫益損之有人事可分理抑恐督運典守之無䇿責亦難辭與其操刀試割以滋多傷不若避路遜賢以免曠廢伏乞皇上鑒臣言非繇矯餙重國計别授才賢使臣安愚分仍守舊官尚勉効夫犬馬即臣役太倉免増新秩亦少逭於負乘矣臣無任激切懇祈之至為此具本親齎謹具奏聞伏候勅㫖請停新増供應䟽總督倉塲臣照得本部八月初二日應進金花銀拾萬兩買辦銀伍萬兩今解到金花銀止蘇州府叄萬玖千捌百捌拾捌兩廣東貳萬伍千兩尚少叄萬伍千壹百餘兩及買辦伍萬兩行太倉銀庫查堪動銀權借凑進隨據管庫主事楊應宿呈稱外庫止有實在銀壹拾肆萬餘兩尚不足山西一鎮應發年例委無措處等因到臣臣係守藏吏計無所出故不得不懇請於皇上臣查得自祖宗朝以來止每嵗例進金花銀壹百萬兩坐𣲖蘇松江浙福建廣東湖廣等處原無買辦應用名色每季加買辦銀伍萬兩自皇上登極之六年始計每増進銀貳拾萬兩皆本部於備邉銀内那借應命以奉皇上稍充即行停取之㫖日望停免不謂延至於今計已壹拾貳年進過銀貳百餘萬即使帑藏充溢閭閻豐登臣猶謂聖明在上不宜重内庫輕外庫以示天下臣民觀望况拾陸年以前山陜河南浙直非水潦則旱疫蠲停嵗以為常以故數年起運京邉解不及半今黄河以南浙江湖廣南直𨽻皆國家財賦所出久旱不雨不但秧苗未蒔抑且斷流竭源無水可飲民之填溝壑離鄉井者不可勝計而仍令有司恣􅒱扑供賦稅難矣葢數年南北之民遇水旱苦不水旱亦苦而今嵗之旱又為數百年所未有豈非催徴上干和氣以致天心仁愛古稱天人感應㨗於影響而人主一呼吸即與天通有出一善言而災星退舍者皇上視今日閭閻之状何如也蘇槁回春不敢望發内庫但罷不急之務停額外之取使所司省此可已之供以充荷戈之腹而緩取盈之征庶幾民困少蘇和氣上蒸延禧永命之道實在於此倘若謂皇上富有四海何吝此伍萬然壹嵗則貳拾萬矣拾嵗則貳百萬矣先是太倉新舊銀不近千萬乎今十餘年已費伍百萬而半充買辦用再十餘年能保不盡費而更或有水旱軍旅何以應則國又何以為國也臣日夜熟思實切寒心伏乞皇上俯念民艱邉計除金花銀容照數凑進外其買辦伍萬兩自今日停免使經費有常不至竭府庫難繼亦修儉徳弭災異之一實政也臣不勝悚息懇祈之至糾監督主事䟽總督倉塲據巡倉御史荆州俊叅論監督主事王顯先掲帖大都謂顯先日用所需取辦歇家即以歇家為心腹收納不必乾圓潔淨每船索銀一兩因書辦黄化受指揮張遇時千户李臣等銀三十三兩為書辦張純正靣詰因歇家張盛受指揮倪懋中銀三十六兩因歇家部繼臣受千户何文銀二十五兩因李儒受指揮白吉銀六十六兩又盗留守前衛倉餘米五十石託郜繼臣賣銀三十餘兩又託張澤盗虎賁衛倉米七十餘石為臨倉内使國用挾買毎石止價銀五錢八分移怒於澤令賠銀三兩五錢且責十五板幾致縊死等因臣初受事見其姑息太過疑之尋聞物議猶恐未真今據御史荆州俊論列是以監督之臣甘為盗跖之行亷恥掃地盡矣罪豈止於罷斥但未經審質恐本官有辭而各役狐䑕之奸不正法紀亦屬漏網其各衛所官數千里輸将既苦需求又多事完回南雖難一槩拘提所有書辦黄化等歇家張盛等受害張澤及留守前虎賁二衛倉米石數一勘審而罪即有歸着方今正當收受之際不容一日缺官伏乞勅下該部先将主事王顯先革事另選委主事一員暫署監督一靣行法司提各役審究果王顯先有礙操守一併提問正罪以為部屬貪肆無恥之戒庶奸弊可清而國儲亦有頼矣因母久病驚悸成疾乞賜放歸以便侍養調理䟽總督倉塲臣繇嘉靖四十四年進士歴陞今官感戴皇上高厚之恩即摩頂至踵不足以報萬一但念臣父封大理寺卿朝鳯年八十臣母封淑人王氏年七十有四往嵗臣撫浙江臣父母恐臣内顧强偕行以堅臣於浙臣不敢言歸既遷官而北以臣父母責臣力官會臣里大疫遂将臣父母入京以是二三年來臣父母心雖欲歸而口不言以堅臣於京臣亦不敢言歸今臣父母衰如風燭臣母久患秘結致火毒上攻自今嵗六月伏枕謂旦夕即已乃數病數已既已又病臣亦因以驚憂恐悸致精血耗損耳鳴心動痰欝膈痛如刺臣母子交相慮而臣母病益増於枕間數謂臣安得歸吾家而病其已乎以臣母離家六年中孫男女殤者七人積痛傷心已非一日故今病中言及家而泪即淫淫下也臣計必歸田里乃可以慰臣母之心而病或易已縦臣無病亦必偕歸乃可扶侍臣父母於間關數千里之逺以盡烏鳥反哺之情而猶恨乞歸之晚致臣母至此况臣亦病不但事臣父母之日短而臣愁苦無已亦将従此危也葢醫藥不效則苦欲歸而不能即登途則又苦若蚤得請一日猶可蚤慰臣母一日臣有此萬分不得已之苦情不得不懇鳴於皇上伏乞皇上垂憐准臣囘籍調理倘臣母子得遂生還是即皇上再造而臣當効銜結之報於世世矣臣不勝懇切祈請之至遵例陳情為母請乞䘏典䟽即已丑年總督倉塲丁内艱臣父朝鳯自幼聘娶臣母王氏生臣臣頃因臣母患病具䟽請歸䝉聖恩諭留不意臣母前病益篤醫藥不效未及旬日儵忽棄世臣竊自念幸逢聖朝所至得将父母少遂祿養但以臣戀官之故致臣母旅食六年不遂生還竟客死於數千里之外臣拊心踊地無以自解幸遇國恩曠蕩皇上達孝及親不遺閨閫臣雖無所比數猶可徼冀以補臣闕查得大明會典一欵文臣三品以上不論已未考滿父母曽受本等封者俱照例祭葬又查得原任兵部左侍郎汪道昆母淑人胡氏病故已䝉給與䘏典臣雖叨列二品臣母三遇兩朝覃恩封至淑人僅與胡氏同乞勅該部遵照典例議覆取自上裁倘臣心幸而獲伸則臣母死且不朽殁存啣結不敢遺餘力以報恩私矣為親老身病乞恩賜免重任以便侍親調理䟽壬辰年起陞南京吏部尚書臣接邸報該吏部等衙門會推奉聖㫖温純陞南京吏部尚書欽此竊念臣以草土餘息荷䝉皇上起之邱壑㧞置留銓恩至渥也會時多故主憂臣辱苟餘頂踵寧復自愛顧臣有萬不得已苦切之情不得不懇鳴于皇上當臣母存時與臣父封大理寺卿温朝鳯率就養於臣宦所今臣父年八十有三老且鰥矣久有痰疾近又増以眩暈真如風中之燭臣欲迎養則逺渉難欲獨往則絶裾難臣亦舊耗心血兼以母䘮傷痛怔忡消縮獨其形存耳以是臣憂臣父臣父亦憂臣俱不能解於其心若不及今相倚調攝臣父子且不可保况尚書喉舌之寄留銓人才所關明嵗又當京察必得負重望者方能以堂上之身分别堂下曲直而臣望輕多病内顧情廹即在官亦當循例引退乃今承乏柄事冐昧就列寧不誤國家大計傷皇上知人之明哉方今人才濟濟賢於臣者何限其無疾無内顧者亦何限伏乞皇上察臣烏鳥之情憐臣犬馬之疾别簡名賢以重銓務容臣在籍侍臣父朝夕調理冀幸臣父或因臣少延桑榆之景而臣亦萬一不即填溝壑是皆我皇上天高地厚之恩臣當結草銜環圖報于将來者也臣不勝懇切祈望之至再辭南吏部尚書䟽臣頃起陞今官因病具奏懇辭奉聖㫖留銓重寄特兹簡任卿宜上𦂳前去供職不准辭吏部知道欽此臣竊惟臣以一介庸品叨冐踰涯及以私請又荷温㫖未允臣心口感念通籍且三十年列在六卿之末時方多虞義不得更言其私但臣初請臣猶僅苦怔忡臣父雖痰𠻳眩暈猶未甚也自陳情後於五月十四日臣父忽痰發目閉口𦂳四肢如氷急投藥移時方蘇此豈老年人所能堪而亦豈人子可以絶裾之時臣父子相望淚注即時時温清時時奉湯藥能幾何而臣亦因此驚悸火炎心跳耳鳴屢延醫藥不效臣恐先填溝壑為臣父憂臣之方寸臣之病體如此勢不能勉强受事徒以進退狼狽之身誤國家六年激勸之典臣之罪愈不可逃况計期廹矣即及今查訪猶恐遲一日未得代臣者則臣悚懼一日是以不得不更懇鳴于皇上伏乞皇上念計典最重憐臣病苦絶無矯飾避難别情别簡委任容臣在籍調理臣無任廹切懇祈之至考察已竣聞言自愧懇乞聖明罷斥以重大典䟽南京吏部尚書臣等代匱南銓適當考察各思竭誠秉公仰副任使凡一切親故盡不敢狥自謂可幸無過惟是原任南京工部主事閔世翔於考功司郎中錢士完為周親曽經南京御史李用中論其夤緣改北隨該吏部覆奉欽依照舊供職當考察時亦曾議及但臣等互相叅覈無實可據而都御史陳有年朱鴻謨曾撫按江西皆稱其令安福甚得民心及查科道訪單無名詢吉安安福之官南中與南中衆論皆無異辭臣等是以從公議留非一錢士完所能專也既經科臣論列想其别有真聞是臣等咨訪未詳愧死無地伏乞皇上将臣等罷斥其閔世翔鑚刺有無一付公論則計典肅而衆心以平浮議息而國是可定矣臣等無任隕越待罪之至乞宥督臣䟽南京吏部尚書竊聞古帝王之御将也有不測之威亦有不測之恩威雖與恩交濟而要之仁可過也義不可過也况總督重臣為皇上股肱乃節制文武諸臣者尤非将比其有勞績為将士所愛戴者尤宜曲全以重國體葢必如此而後總督之權可行於将領将領之權可行於軍士不致陵替以啓驕悍借口庶乎紀綱肅而干城可固也我皇上因寧夏未平逮問總督魏學曽繼因城潰賊平先發賞銀二十萬兩仍待勘明陞賞文武将士獨學曽尚在縲絏之中近該九卿科道及督撫各陳學曽當事之難用力之苦與今日成功之繇監軍御史梅國禎初嘗論列之者亦悔其言之過謂學曽每夜焚香露禱願以餘生贖一城生命解任而軍民戀戀埀泣不忍其去被逮而官軍相向痛哭今總兵李如松又謂學曽首先渡河收復城堡使敵不得内犯賊不得外逃即古韓范不過而又極感學曽屢授方畧制敵當擊其未定破賊宜散其脇從此不但可施於西鎮乃如松能聴之而功成不居盡以歸學曽人皆服如松之言公言也非學曽誠心任事而能令如松心服若此耶假使學曽不據花馬池靈州要害而城堡不復則賊之羽翼未剪屢戰不勝哱雲不死則賊之銳氣未挫而賊與敵且遂其始謀渡河以向關中矣曷論寧夏又使學曽輕身急於入城時賊久蓄異圖又戕撫道總兵有必不可宥之罪自知當死計必萬端要挾從之不可逆之不可不為黨馨則為張傑損威辱國将遺西鎮以愈不可為之勢矣然則學曽不輕以身試虎狼之口者非誠愛身亦以愛國而未可以是罪之也且将兵之權唐宋以前太重我明以來太輕今悍軍叛士處處有之撫臣不得保其首領督臣不得免於囹圄即督撫諸臣欲行法以申明號令其軍士且譁而指曰汝且不能保而恐喝我耶此其所關繫邉疆非細而獨學曽一人可惜已耶况今遼左方用兵禦倭曩學曽曽撫其地最熟遼事即東征諸臣亦宜問計於學曾我皇上一宥學曾其将與軍士多學曾素所教訓而撫綏之者聞學曾一旦有更生之幸必懽忻踴躍代學曾力戰破賊以報皇上即九邉督撫亦有顔靣立於三軍之上而九邉軍士聞皇上於督臣之賢者竟以将士感恩泣留痛哭之故不忍摧折亦必懽忻踴躍以報皇上是我皇上不測之威與不測之恩並行不悖為激勸天下一大機括而紀綱不自此大振邉疆不自此敉寧者臣等不信也伏乞皇上俯念邉疆重臣之權宜隆誠心任事之臣難得将總督魏學曽特賜矜憐放歸聴勘如果罪有可原功不可冺仍乞皇上一體叙用以勵忠藎臣等無任懇切祈望之至遵例懇乞天恩准令開壙以光泉壤䟽癸巳陞工部尚書過里乞恩得請在籍侍養未幾丁外艱臣父温朝鳯累封通議大夫大理寺卿不幸於萬歴二十一年十月三十日病故臣竊自痛念幸荷恩命累封臣父至今官臣於二十一年五月内自南京改官過家會臣父食减形縮臣以私請復荷皇上允臣在籍侍養臣烏鳥之情得遂内顧不意臣父衰竭難醫儵忽棄世臣拊心踊地反哺無及呼天頌聖感戴皇上令臣猶及於父疾間得視湯藥屬纊得躬含殮臣啣恤鏤骨莫知為報又念國恩曠蕩皇上達孝及親臣父生前既屢沐高厚之澤没後似可冀泉壤之榮查得大明會典欵開文臣三品以上不論已未考滿父母曾受本等封者俱照例祭葬又開文武大臣官為造墳者夫故在前併造妻壙妻故在前併造夫壙後死者止令所在官起倩夫匠開壙安葬又查得䘏典條例欵開今後品官父母病故者許並祭當臣母封淑人王氏卒時䝉勅有司營葬當即預為臣父造壙以待臣今将為父卜期合葬所據開壙並祭前例不得不哀懇于皇上乞勅該部查議覆請上裁倘臣心幸而獲伸臣父死且不朽殁存啣結不敢遺餘力以報恩私矣庸病不堪重任懇乞天恩俯賜别簡以重風紀䟽戊戌起都察院左都御史臣據吏部咨照得都察院左都御史員缺該吏部等衙門會題奉聖㫖温純起都察院左都御史欽此臣聞命當即望闕叩頭謝恩訖伏念臣以襪線庸流遭逢盛世雖嘗踐履中外實慚嵗月虚糜而苦家艱覺形神之屢變久甘自棄惟藥餌之是資不謂聖明㧞於田間使登要路豈皇上因法紀之久廢欲重激揚念微臣實圖報之難前祗増悚懼葢都察院正維風之地而左都御史乃總憲之官朝廷倚其風力以振肅朝綱各都御史亦資其督率以澄清天下必端方明達而後可以消官邪必潔肅公忠而後可以貞憲度臣何人也敢望此階况臣心悸耳鳴終難責桑榆之效望輕任重徒空抱犬馬之忱幸今與推諸臣皆臣素所不逮伏願皇上容臣在籍苟延餘生别簡一員使肩兹任庶風紀有得人之慶而微臣免覆餗之虞不勝感激懇祈之至為此具本專差某齎捧謹具奏聞伏候勅㫖舊病未愈新疾復増再乞天恩准令在籍調理以免乆虚重任䟽再辭都察院左都御史臣頃䝉皇上起臣都察院左都御史臣以庸病實情具奏奉聖㫖總憲重任特兹簡用卿宜遵㫖前來供職不准辭吏部知道欽此臣竊念臣以一介書生屢荷三朝作養又䝉皇上特恩起用嚴㫖督趣苟非草木能忘報答尚餘喘息何惜頂踵况今九卿多缺水旱倭虜開採冦盗所在可憂正臣子為國家汲汲分猷念之時臣雖前懼重任難勝猶心口自許倘萬一不䝉皇上矜允即力疾赴任勉效犬馬不意今嵗臣陜西大旱異常土焦禾枯道路愁嘆臣亦因此受暑動火前患怔忡轉劇今復齒痛食艱兩目障翳戀主雖切登途實難又念京察伊邇非預採訪安能輙辨妍媸而以病軀致妨大典尤臣之所大懼也伏乞皇上俯念風紀重任急于得人臣情激切原非矯飾别簡名賢受事准臣在籍調理庶總憲不致久虚臣疾亦可漸愈臣不勝懇祈仰望之至中途疾劇趨命難前懇乞聖明准令回籍以延殘喘䟽三辭都察院左都御史臣近以舊病未愈新疾復増再具䟽乞准在籍調理等因奉聖㫖總憲久虚特㫖起用如何復有此奏國家多事卿宜上𦂳前來供職不准辭吏部知道欽此臣除即望闕叩頭謝恩外伏念臣望輕行薄無所比數不自意誤䝉皇上特知先後四起臣於田間臣仰戴皇上曠蕩之恩匪覆載不足云喻臣前此聞命即趨惟恐上負鴻造今國家多事信如聖諭臣雖有疾豈遑寧處遂强起床枕於前月二十六日登途時臣一弟一子或在疾間或方疾愈相向埀涕數日而别謂此身已非臣有安恤其他葢臣素慕唐臣郭子儀為人雖屢遭譛黜一有軍旅之寄召至即行况臣未遭譛黜又總憲非有軍旅之寄何嫌何避惟是蒲柳易衰藥餌罔效出關冐寒眩暈舖舍久之方蘇猶强起且行且息抵河南靈寳呼醫調治然頭益眩復増心蕩昔人以心蕩卜命不延臣今蕩矣知填溝壑何所自分生前無復更面天顔以効犬馬未盡之力有淚交頥但冀他日化為異物銜環結草再圖補報倘従此歸而得正首丘臣大幸或冀不死漸倚藥餌生活與黄童野叟歌頌太平為聖世逸民臣益大幸然不敢必也伏乞皇上速簡夙望名賢使司總憲重任准臣囘籍調理臣曷勝迫苦懇祈之至宸居鼎建願捐㣲俸以助大工䟽已亥任都察院左都御史頃者兩宫肇興凡中外文武諸臣各已捐俸助工臣病伏草野未效㣲忱今䝉聖恩起臣今職兹于十二月二十四日遵奉明㫖到任管事伏見大工浩繁財用詘乏臣謹竭愚悃願捐俸一年少助萬一雖撮土無禆泰山之髙而寸丹敬效芹曝之獻伏乞勅下戸部照數扣除以資工費臣無任瞻仰懇切之至為此具本謹具奏聞伏候勅㫖礦税釀禍已深重地用兵尤急懇乞聖明速允停止以遏亂萌以保鴻業䟽總憲時率同九卿上章臣等近睹時事不勝杞憂竊幸皇上屢禁𣙜採擾害散遣隨從虎翼中外臣民舉手加額謂聖明日月照臨停止可旦夕待也不意蕞爾貴州亦遣稅使臣等職在獻替若徒以一言塞責不求實回天聴是曠官職是昧禍機是負皇上坐待有事圖之無及臣等之罪将用何詞以解葢自𣙜採四出其害則閭閻隠忍已極雖官司未必盡知其禍則官民相向深憂而皇上以為無事歴星變火災水旱民不聊生之地在在有礦稅之役在皇上愛民盛心固曰不忍加派乃有此舉在地方有司官吏則曰奉有明㫖誰敢不遵於是或攤之行户或派之經紀或為頭會箕歛或為椎髓剝膚蠅頭錐末雖細不遺肩挑背負無微不及其所進數萬數千皇上以為數止于此不知此特其一耳而各官役之狼攫侵牟充私囊者十而九也夫攘臂而奪之食弱者必怒於色强者必怒於言悍者必操戈從之矣豈有奪民之財而戕其命能使之束手而待斃乎彼特有所俟而未發耳皇上毋謂臨清儀真激變之後竟亦帖然無足慮也亦毋謂今日解銀幾千明日解銀幾萬可以惟其所欲而無不如意也夫多藏厚亡天地大數財聚民散黻扆箴規不可不深長思也在昔忠臣愛君必防其漸傳稱長國家而務財用必自小人菑害並至今所用惟不知民艱之中使苟求衣食無頼之棍徒從來大盗徃徃乗釁待隙今鹽法壊軍餉匱戎馬凋疲顧此失彼山澤之雄樂禍幸亂離散之民有死無生征戍之役沿途肆虐葢岌岌乎不止釁與隙矣而語目前之多故莫如遼左尤莫如貴州與四川在四川苦採木之役民已喪其樂生在貴州號彈丸之區餉皆資之各省而播酋復肆鴟張為川貴大害皇上惻然西顧方且趣兩省督撫星馳征討以拯塗炭柰何復從而重困之軍馬芻餉方望内帑給發數十百萬不止而又求數萬之稅於其地與素不産之名馬乎此驅民使之歸播驅商旅使不更出入於滇楚譬如藩垣不培盗必斬關而入病夫埀斃而復飲以烏啄鮮有不立仆者皇上不為封疆計則已苟為封疆計可任網利之徒恣意漁獵以徹其藩垣且益之疾而速其斃乎故語民間愁苦各省礦稅皆宜報罷為生靈命脉計也語及疆事安危則川貴遼左尤宜先罷為國家保障計也夫生靈之休戚較諸一已之玩好孰輕孰重國家之大計較諸一時之小利孰利孰害矧與民争利而究也必不得享其利又孰與以天下之利還之天下而使一朝愛戴疆圉無虞之為愉快耶臣等切懼時艱不忍徒仰屋空嘆是用昧死而進其狂愚伏乞皇上深惟安攘之至計遐攬元元之苦情亟将各省𣙜稅諸使慨然召回于以上綿皇祖之鴻業下答四海之民心宗社幸甚倘少須時日次第罷遣則乞于川貴遼左用兵之處先停征稅庶重地免分外之擾征討有底定之期其關係國家尤非淺鮮惟聖明幸留意焉臣等無任懇切待命之至遵聖諭循職掌摘陳修省要務懇乞聖明嚴勅中外憲臣實心舉行以回天意以保治安疏總憲近該禮部恭奉聖諭去冬至今亢旱為災已歴三時河井乾竭二麥枯槁民無所頼朕日夜焦思動火深為失徳致此你部裡便具儀遣官祭告天地社稷山川應祀神祗神廟竭誠祈禱内外大小臣工着令痛加修省各勤職業以回天意毋得徒飾虚文欽此欽遵臣等叨任風憲雖居常尤宜先自簡飭以修職業况今仰承聖諭此主憂臣辱燬室倒懸之時豈宜更事修省虚文夫修省以實猶恐天不降鑒况以文焉臣等且不知稅駕所矣而能為國重輕耶第臣等雖司總憲以宣達督察為職而所頼倍加振刷撫循以固民心以消亂萌者巡撫都御史與各差巡按巡視御史之責也都御史與臣等為僚若不實相規切御史則臣等所統若不嚴行申飭則中外之精神不貫上下之責成無據欲舉實政以救時事於萬一而保治安甚難臣等觸目驚心謹據憲綱所載久廢弛而目前尤關切急者開欵條列總期於歸實懇祈皇上埀鑒勅下臣等查照遵行風紀幸甚天下幸甚未敢擅便謹題請㫖計開一重激揚激濁揚清本院職也先是掌院輔臣張孚敬申飭所舉止於卓異其後有議舉刺方靣有司宜有薦有刺有不薦不刺又有議照𢎞治以前事例大省薦若干小省薦若干總之務實意也乃今方靣與甲科有司不刺則槩登薦而方靣雖有議亦曲附薦末矣故昔之所薦即後之所用今之所用雖亦不出所薦實多繇採訪而定夫使人不信薦舉而信採訪則司風憲者之過也况薦語徃徃稱天日山嶽金玉冰蘗淵澄犀利運斤行空等語然耶否耶胡一有緩急動稱乏才稍當事任類即不効且叅劾已有贓矣又議降調謂法紀何合嚴行申飭以後撫按遵奉明㫖如限薦舉所薦必亷勤公謹所刺必貪酷罷輭不謹不及老疾所議處必與所叅劾語相符其績效未著議論不定者勿輕薦以襲軟熟之風而傷憲體各御史回院冊開所薦所刺不薦不刺姓名以慿覈實凡年終類報及一切薦語但直書亷勤公謹等語以復雅道方靣以上堪大用者仍書某任某事有已試之效數語於後凡前項綺語䛕詞及一切不情譬喻盡洗去司府及州縣正官考語止二十字其餘佐幕教職止八字或四字庶吏治可核而䛕風一掃伏乞聖裁一肅憲體自古稱御史臺朝廷紀綱臺綱正則朝廷正而天下治定故啣命而徃凡大小文武皆得以白簡上聞職至要也故其體與他官異即獨立獨行寡合無侣正其體當如此乃今稍溺其職上下凌替起于贓罰一冊間有臨造禀請刪改以掩飾濫費者則自以其偽示之下安得不凌上安得不替也是在巡按正本清源凡一切煩縟儀文盡行禁革便所動支皆可入冊聴其登報禁其禀請清風勁節儼然為百吏師庶幾臺端吐氣憲度惟貞伏乞聖裁一抑趨承上官之與下官其相臨截然有分不與朋儕等故必絶饋問逺嫌疑而後體統始肅近來柔媚成風逢迎接踵凡監司守令分雖相臨禮若平等如遇到任生辰嵗時喜慶徃徃侈筐篚以致慇懃在逺方尤甚彼上官賢者縱峻却不受大體已褻苟一為所餌後雖真知其人不肖非有所狥而不忍發則有所畏而不敢發欲求吏治之清無繇已以後撫按嚴禁各屬餽遺毋私授受以肅體統監司郡守能舉發屬官違例饋遺者其操尚卓然可風即題請紀録優轉庶憲度嚴明人心整肅如御史視為虚文奉行不實回道日聴本院體訪叅治伏乞聖裁一核廵歴御史持斧一方必遍郡邑而後民間疾苦得以周知奸豪有所歛戢近嵗或因道里遼濶而馬跡不及周或沿弔考舊規而逺邑不親歴使官吏鱗集於鄰壤囚犯䟦渉於長途而遐陬小民無繇一望直指之襜帷夫堂廡之下尚有隠奸而况足跡不履其地者乎且守令逺出有失事之虞囚犯解審有脫押之患地方何頼而各省提學憲臣亦效尤弔考諸牛一二三百里外為貧士大病以後廵按御史入境務遍歴所屬郡邑問民疾苦勿踵陋規逺弔赴考塞責庶所至奸豪警惕而幽遐之情亦可上達提學憲臣有弔考諸生於百里外者巡按御史㕘究御史有仍前慢事巡歴不周者俟囘道日以怠玩論伏乞聖裁一恤民隠民惟邦本本固邦寧今國家所恃以父母斯民為邦本計者唯有司耳今之有司何如也潔已奉公者固多而染指自汙者亦不少大率染指在罰贖在稅糧徴解之秤頭站銀工食之扣除而秤頭之弊為甚葢秤頭始於總收總解名曰下櫃以防侵費以便完解𦂳要倉口而免掛欠之累然不能無剰餘致庸者緣以為利而賢者槩受其疑其甚則重入輕出又使解者更派路費添補之苦今固有懲其弊而不失設櫃本意令經收各役自具一匣當官驗入封鎻以俟解發而官不與者不可倣而通行之耶合行撫按申飭盡革秤頭之弊使自封貯總櫃庶民不受累官不受疑為清朝一大美政而又嚴禁科罰扣除等弊亦恤民保邦一要規也伏乞聖裁一慎刑獄國家設三法司又使御史巡視五城為都城内外民雜訟繁而欲輕重得其平也輕則御史打斷即已重則送問然亦有重而輕輕而重者所謂重而輕以人命付兵馬是也夫郡縣之議重辟簡驗覆訊必正官猶或有失京師人命非自兵馬呈報則由兵馬簡驗此輩知闇識短即利啗勢惕皆可使之輕重其情至於覆訊則羅織愈宻問官益無從而辨豁之矣先是議驗於宛大二縣又議兵馬正官用科第竟不能久臣等竊以為宜如户部分司例専遣刑部司屬覆簡或順天通判推官及二縣知縣分任各城一經審鞫自免枉縱是重獄所當議者所謂輕而重以笞杖與重辟同評是也夫郡縣笞杖得自裁决民甚便之京師有訟繇通政司始送刑部刑部准理始行拘攝司審畢而後呈堂堂審畢而後送寺寺評畢而後歸司發落倘再駁再審再呈再議不免累日積月牽妻繫子賣産易衣以待筋骨㡬成灰矣大司㓂秩亦隆重一笞杖不能自裁何其輕也廷尉為天下之平平其重者耳一笞杖必經評允又何其𤨏也臣等以為笞杖徒罪宜自司呈堂發落免送寺可也如以舊制不可廢彚名月報亦可也若犯在笞杖徒而與重辟同起仍同評於大理是輕刑所當議者合行各城御史各務詳審喧犯據實打斷速令寧家重則送法司勿令乆繫尤勿輕付兵馬滋擾其前項重輕二刑容臣等咨刑部大理寺再議請㫖遵行庶輦轂之民困少蘇亦欽恤之一端也伏乞聖裁一禁酷濫伏覩憲綱内一欵風憲之官當存心忠厚其于刑獄尤須詳慎若行酷虐動輙箠人至死禍及身家雖悔無及又條例一欵酷刑官員不論情罪輕重輙用各項酷刑但傷人者降級調用至死者俱發為民諭戒森嚴永宜遵守邇來有司往往任情喜怒以嚴酷作威既用拶指夾棍復用腦篐烙鐵竹簽以拷未成獄之民慘毒備極傷和召災皆坐於此今後御史出巡先須以身率下毋得擅動慘刻刑具凡有司等官有用酷刑打死無辜者查訪得實指名特䟽㕘奏至于司道體統係一方觀望非重情不准理非府正佐及州縣正官不批問乃邇來有不然者雖戸婚田土債利亦准雖府衛首領州縣佐二亦批上行下效何以責兹輩之不擅受也是在撫按嚴禁若御史自行酷虐及縱庇酷濫不行㕘提考察日以不職論伏乞聖裁一重彈壓詩埀未雨之防易謹衣袽之戒言事貴豫恐患至欲圖之不及也况今星隕雷擊亢旱枯槁與所在征求搶劫會聚一時如鼎已沸而益之以薪火已燃而益之以膏也欲求無事得乎然在撫按不可不預為之圖矣圖之柰何無事其力倡司道郡縣多煦沬小民使其民知在地方猶有不忍害民之官或不即從惡少無頼為掲竿横行之事然整飭兵壮固守倉庫則不可一日忘于懐萬一有事禍起與其議撫議勦于後日不如設法解散于日前葢有欲勦而反使之不得不合者亦有似不勦而反使之不得不散者惟在寛脇從與否昔年劉六劉七輩正坐不知所以散之而反使之合禍遂蔓延半天下雖旋就撲滅然而民受荼毒㡬于瓦解今之時又非昔比昔當列聖休養之後閭閻殷富今家家懸磬人人如在水火而又促之使斃迫之使亂故臣等為不得已之計特切望於撫按諸臣之及時以彈壓之也伏乞聖裁臺臣急缺勢難久待懇乞俯允就近先選以濟目前差用䟽總憲近該吏部以臺省缺人具䟽上請将在内中行博士在外推知等官資俸及期者照例諮訪取選等因荷䝉皇上特賜俞允該部節奉綸音會同臣等重加諮訪将推官方大鎮等知縣熊鳴夏等題奉欽依行取一時中外臣工莫不欣欣舉手稱慶仰誦我皇上用人圖治至意顧臣等伏思之推知等官雖已行取各有經手錢糧刑名事務稽查候代須多時而道里逺者如閩廣楚蜀相距數千里非數月不能遽到若直待到齊同選計期必至三四月間比及試職實授而後題差為期益更逺矣目今六科及南京科道缺人臣姑無論即如臣衙門十三道御史員缺本多近奉欽降及考察見任共去御史六員即今見任一員兼署數道内外侍班僅一二員至于五城厰庫等差尤屬輦轂要地錢糧重務乃僅以二人巡視兼管力何能辦矧各省按差中差懸缺如真順應天廣西兩淮甘肅等處俱無人代萬一邉境有事失于糾發臣等安所逃罪日夜思維竊念中行博士推知等官均為應選之人與其久候類選不免稽遲悮事孰若就近先選通融接濟之為得乎且兩次選授近不苦於匱乏後可免于壅塞而中行等官員數不多才品易别又必不至以輕率匪人濫充其間也查得萬歴十九年亦因臺省乏人疏請奉㫖中行等官先行考選推知等官續至另選此例即可倣行况其時尤未若今日急缺之甚乎用是乃敢懇請伏乞勅下該部查照近例容令先将在京中行博士等官原擬資俸及期併原取推知等官在部者會同各衙門再訪的確酌量才品議擬列名上請併具履歴考語聴候皇上欽㸃南北科道各數員務擇老成端練體國奉公之臣以充其選如有不宜言路者仍補别衙門則不惟額可漸充且目前差用有濟臣等亦得藉手以少逭悮事之罪矣逺臣被逮遭難可矜懇乞寛宥以光聖徳併乞亟停礦稅以保治安疏總憲臣等竊惟國家事有當婉詞曲陳以冀下情易達者有當苦口盡言以求天聴蚤囘者今事勢景象日急一日臣等敢不盡言伏自皇上礦稅兼行旋以中官李道訐奏逮問南康知府吳寳秀星子知縣吳一元一時人心錯愕臣等雖身任言責止從九卿陳乞不再為疏煩凟竊以為舉朝之言公言也必䝉皇上埀聴又恃皇上不許擾害地方之㫖各官役或不敢違若嵗事豐登官民相安縱有意外之慮知皇上必暫為而旋即已之也今據李道一訐吳寶秀等遂令秀之妻上怖天威下懼夫難脫簮以佐路費不及四金旋即自盡死别遺一㓜子呱呱就寄夫寳秀固國家一亷吏也臣等於京察時訪其官大理茹苦有聲今任南康甫十六日偶與李道齟齬輙遭䧟以鄰境竒禍且於桎梏中傷妻不可復生念㓜未必復見祗畏嚴命且泣且行而又重以長途䟦渉之艱緹騎繫緤之苦不啻隆冬而遇霜雪之交加也此等情状南康士民痛惜道路逺近悲憐我皇上聞而知之未有不惻然動念者也臣等聞其體甚羸弱倘付詔獄加以箠楚萬一不支或死杖下縱不即死傳之天下後世将謂皇上以中官争利之故而致方靣亷吏妻死身危不輕重失倫且非朝廷為民設官之意乎况今異星東墜明屬兵兆徐鳯以北旱二千里麥苗無望民雜草葉以食即如皇上初年布衣祈禱以囘天意發倉賑貸以救民窮猶恐無濟于時而礦稅官役方且交錯滿道有掘之地不得則以一條鞭法索之民而民不能堪者有本地棍徒通同官吏指某屋某塚有壙而詐銀入已者有一物而四五稅或稅及於囊資者有搶奪成風官役倡之市棍又假官役以效之利則歸衆名則歸皇上者遍天下皇皇然相欺相争相仇不至于竭澤殃民不已也不至於召釁起亂不已也即今輦轂之下商旅罕至况其逺乎郊關之外搶奪公行况其逺乎近儀真太監暨禄又報上新河民蜂擁萬餘㡬成大變矣而會徐鳯以北大旱淮揚鹽法阻滯竈丁罷煎徐鳯固從來掲竿聚衆之藪淮揚鹽課尤年例邉餉取給之地也各省稅銀舊所資以充邉餉者亦少半充内帑大半充各官役之囊矣無論軍士枵腹不待脫巾乃見切恐不軌之民與失意失利之民並起所謂失意之民林章輩是也所謂失利之民上新河之蜂擁與竈丁是也所謂不軌之民我朝之劉六齊彦名師尚詔輩是也然而不軌之民又因失意失利之民而起縱能撲滅将安所資餉于庫藏匱竭之時即取原奏各官民而盡置之法亦何濟矣葢天下所最可患者有可修省之時而以為不足畏則可畏者至而修省無及有可挽回之計而以為不足慮則所慮者至而挽囘無及臣等誠願我皇上之及時以挽之也及時則不過片紙温綸而風行雷動立見四海臣民仰頌我皇上即堯舜禹湯文武不過且其為力甚易不然則其難有萬倍於今日者臣等職在守法竊有感于吳寳秀等之逮而恐天下之夫不能有其妻父不能保其子者不獨一寳秀也又恐今日聚利之禍不獨在官民也故敢以苦口之言進伏乞皇上特霽天顔俯察臣等所言原非過計臣等所慮原出閭閻迫苦真情倘荷天恩憐吳寳秀之亷而矜其苦渙發徳音放囘令復原職臣等之上願也如以業有成命仍乞聖慈于拿到之日勅下刑部併知縣吳一元從公審實請㫖發落俾得保其殘生因停礦稅收回原差各省中官及各官役以收人心以弭禍兆以保治安之休于無疆宗社幸甚天下臣民幸甚臺臣久缺懇乞聖明蚤俞考選以肅朝綱以振風紀疏總憲頃據管河南道山西道御史徐兆魁等呈稱各道御史員缺日久侍班乏人乞准經歴司務等官暫輪同御史侍班又據巡按蘇松御史劉曰梧巡按福建御史何熊祥巡按兩淮御史馮從聘巡按宣大御史蕭重望等各呈稱差滿乞差御史更替又據帶管巡城御史方大美原差京通二倉兼帶中西北三城出巡在邇乞另差委御史管城等因各到院臣等竊惟御史侍班為糾失儀自來未有以經歴司務各官代之者緣侍班萬不容已姑令各官暫同二三掌道御史輪侍然於國體朝綱亦不肅矣其在外廵按廵鹽之久候者非他官可代而數月以來郊關之外搶奪成羣恐更聚為大盗欲令都城内外肅清以弭盗釁定當自重巡城始今巡五城止二御史又各有印馬巡倉正差見應出京城務何屬無怪數年以來兵馬等官得乗隙多肆閭閻寃抑竟覆盆莫伸即今無頼惡少出而搶奪逺近為行旅大害也葢六科與南京科道均稱缺人而臣等衙門各差尤關係甚重竊恐将來悮事釀盗之罪臣等亦不能辭幸值取到推官知縣與在内中書行人待選之時屢經吏部請定選期俱未奉㫖仰見聖心慎重無非為言路擇人計臣等亦竊謂今日此選為國體民瘼非為諸臣也况今應選諸臣積資累勞有至八九年者世味備嘗諸艱歴試意其人類多正直忠厚練達老成當無浮薄喜事輩㕘于其間且當考選之日臣等仍欲觀其言貌試其章疏矢公矢慎務核真實酌議上請必不使耳目之司授非其人萬萬無足煩聖慮者臣等甚苦今日侍班巡城之難其人又期早得諸臣而約束之以需中差大差為及今蓄艾以醫久病計實不徒以待選者仰望之殷候代者淹留之苦已也伏乞勅下該部會同臣等擇日查照舊例一併考選庶差委有人而臣等亦可免于曠官之罪矣臺差關係匪輕憲臣接代久匱懇乞聖明早允考選以復成規以肅風紀疏總憲臣等竊惟御史出巡名曰代巡職在宣徳達情貞憲肅僚伸寃理枉不專言責且有官守凡中外百司不敢盡肆奸宄不敢輙發憚御史耳肩是任者必諳典故識政體精刑名然後法易信令易行一舉一動可為風紀倚重然而各官之才識得之禀賦者常少得之練習者常多祖制新選御史必先試職數月凡巡視諸小差悉分委之令其聞見日廣才猷日練刑名章疏日習熟而後題准實授方與中差中差考核無過方准回道大差葢未有中差不效而遽大差者亦未有小差不試而遽中差者誠重之也故御史不待甚缺而後選選則必多其員無非欲儲材于試職以備中差大差不時之需也今四五年來則異是矣城差久苦兼攝試職全無一員大差缺或取未中差者代之今中差旋者有幾中差缺或取已大差者代之今大差旋者有幾有兼二中差而復攝四五小差者豈但獨力獨勞抑且顧此失彼即今城務更替不常已大不便于都民在各省直亦容有耳目不及周而法紀不甚振者葢今時事多虐人心思亂即有風力御史布滿中外猶恐禁戢之難况在差各御史半踰𤓰期企足望代民以為旦夕代矣誰其倚之戕民者亦以為旦夕代矣誰其憚之而代者又不可即得縱得代又不可即得老成練達之臣以分持憲紀消弭奸宄固結黎元恐其勢将不可收拾然及今考選猶可為也臣等叨任中臺以澄清中外為職掌日夜憂思萬不容已亟願皇上仰體祖宗建立御史本意及時蚤允考選使試職者獲從容時月久於練習事宜奉差者皆歴練老成不至踈曠職業其復祖制肅臺綱豈淺鮮哉不然而姑緩一日選期即少歴一日試職試職無多日是以中差嘗試矣中差非素練是以大差嘗試矣巡按何官可聴嘗試而漫為之耶伏乞皇上勅下吏部會同臣等如吏部前議将中外應選諸臣及蚤一併選用以充南北科道之缺異日新選諸臣萬一得當上意臣等亦與有榮而竊藉手以稱塞職掌于萬一矣詳陳臺臣缺乏之實懇乞聖明速俞考選以濟燃眉以保治安䟽總憲臣等伏遇皇上不以臣為不肖使居總憲之職蚤夜思維臣官以總憲為名必風紀肅然振舉而後不愧其官亦必御史濟濟多人而後觀風振紀之任各有所寄不至顧此失彼以為我皇上維持太平于勿替昨者屢疏塵凟意皇上念風憲乏人何難一舉成典乃臣等情詞愈迫天聴愈高豈以在道御史尚可那移而各差接替不妨延緩歟臣等請得而熟數之以小差言五城厰庫橋稅等差向令九員分管例也今趙之翰差屯田矣而帶巡青南城二差方大美差光禄矣而帶通倉東城二差則一員而三差矣巡鹽若佴祺仍兼中兵馬司銀庫蘆溝橋三差則一員而四差矣巡關李思孝仍兼十庫厰庫西北城四差則一員而五差矣夫中差而攝小差已非政體矧一人各攝數差能免衆務之叢脞乎是小差需人之急易見也以中差言兩淮馮從聘在差一年十月宣大蕭重望在差一年六月長蘆佴祺在差一年二月而巡關李思孝又報滿代之者誰也夫逾年尚無可代之人及今不選則諸臣更望何時得代乎是中差需人之急易見也以大差言淮揚安文璧河南崔邦亮各在差一年三月陜西唐一鵬在差一年五月而浙江雲南各處又即滿近差四川崔景榮又告病夫代大差者例取中差已滿御史今回道查無一人中差㮣不得息肩将令誰可啣命而出乎是大差需人之急又易見故論目前急缺之差則小差十一員中差四員大差四員合之凡少一十九員為從來所未有論舊例應用之人則必有小差而後可備中差有中差而後可備大差次序原不可紊要皆自今日考選而始然則考選之舉可緩乎不可緩乎倘更再緩将至廢皇上之任使隳國家之憲紀使奸貪有所恃而不恐閭閻無所倚而多寃臣等所稱總憲謂何忍依違坐視不為宗社計深逺乎是用備陳急迫缺乏之勢再凟宸聰伏乞皇上速賜俞允容臣等即日會同考選使各差在今日雖多乆候之苦在他日猶有可代之望則風紀不虚治安可保而臣等總憲之職亦藉以稱塞于萬一矣䑓差懸缺日多考選萬分難緩懇乞聖明蚤賜特允以重風紀䟽總憲臣等頃緣各道御史員缺差遣不敷䟽請皇上考選不厭頻數豈故輕凟宸聴良以御史入侍丹墀出按方岳輦轂頼以整肅寰宇頼以澄清所繫視各衙門尤重近不得已為那借為兼攝又任外差各官株守候代於事任似亦各有所責而其中實有大不便者蓋那借則以經歴等官代任御史糾劾之責為國家二百年來所未有事一不便也兼攝則以一人而攝數事欲監收放則誤問斷欲先城務則緩外巡或令官民伺候無時完結愆期二不便也候代則不得如徃嵗一年一更葢一年一更則舉劾宻而官吏懼耳目新而奸頑憚今則年半或踰二年猶不得代在本官則以為即去而不可更巡在地方則以為當去而不免玩愒三不便也縱皇上考選綸音旦夕即下俟選後試職實授屈指中差之期猶須半年之後倘更不選将於何時實授何時差遣乎且應選諸臣被徴書趨闕下豈不幸依日月之光欲展尺寸之技以求圖報於萬一乃今在諸臣則以有用之才而居無用之地在本院則當急用之時而無可用之人葢用則兩相濟而於國家之紀綱中外之利病裨益尤大不用則兩相滯而近則誤事於目前逺則叢弊於後日皇上何所疑而恡於㧞用若是此臣等所未解也臣等嘗讀詩至文王之什曰濟濟多士文王以寧及召康公之咏巻阿亦曰藹藹王多吉士維君子使媚于天子未嘗不嘆聖如文王猶賴多士賢如成王猶用吉士矧御史又為皇上耳目之士我皇上為國憐才之念豈遜周王柰何厭薄不用而使臣等有溺職之懼臣等誠願我皇上為文王成王故敢再以迫切萬不可已之情陳凟伏乞皇上深惟風憲重地俯鑒臣等微誠慨然勅下吏部會同臣等将内外應選諸臣刻期考選以備任使庶差委有人而臣等亦藉以少效維風之責矣綸命頒行已逺天心孚佑有徴懇乞聖明確行前諭以承穹眷以保聖躬以安宗社䟽總憲臣等始聞皇上違和不勝驚恐隨奉聖諭輔臣停止礦稅織造起用建言廢臣寛釋囹圄罪犯臣等不勝欣躍誦我皇上仁明獨斷何頼臣等喋喋謂昔列國之君尚有一發善言而災星退舍者况我皇上為天所屬望今善言不止一端必即仰荷天佑當捧聖諭入院即刻發行一時逺近臣民歡呼滿道次日即傳玉體清安益信天人感格不爽不意數日内忽聞皇上復有别議於時臣等從閣部諸臣深以聖躬為重方冀藥喜何暇言及時事連日幸聞玉體大安臣等又不勝欣躍方敢齋沐披瀝誠欵惟皇上俯垂聴焉葢皇上前諭若但有益於臣民而無益于皇上不必行也臣等今日所懇若為臣民計而不為皇上計皇上不必聴也皇上試思前諭一出有不徧及薄海内外而歡欣舞蹈乎歡欣舞蹈矣而可即令愁苦嗟嘆乎又思昨皇上疾中金寳堆積盈庫有分毫可救解聖躬萬分之一乎惟皇上力行前諭使前數年採㩁征辦為諸中官積棍所假竊肆虐以釀禍亂者一旦盡革則更生者在小民而頒解懸之恩在今日輪䑓之悔可以祈天而永命者歸皇上矣建言諸臣在獄各犯我皇上雨露之恩原未嘗有意終絶之也偶激人言復令禁錮固知皇上必念懲艾之久欲普一視之仁誠早仍前諭在諸臣不過與使過之列在各犯不過沾餘波之潤而頌乾坤覆載之量如書之野無遺賢如易之赦過宥罪者歸皇上矣况一諭而衆美咸備大恩也聖諭一出從古不復改易大信也若令出不行渙號反汗有同于戲恐海内愚民信停止之為真疑改移之非是蟻聚蜂起與中使抗不但如前楚中之閧在野者慨嵗月之易邁雖懐忠藎而漸迫桑榆在獄者苦拘係之有年将困幽欝而或登鬼録人君為天之子一言一念皆與天通惟天眷徳其應如響夫既以美言而獲佑豈可以既佑而遂改乎蓋天心所欲改者不美者也其所不欲改者至美者也諭非聖政之至美乎諭出未㡬旋即改為天心所欲乎不欲乎以其美者易不美以其所欲易所不欲豈以聖明在上而見不及此乎且精神戀其所不必戀而惡其所不必惡則或以有累聖明為念以人不樂從為苦以啓釁端拂天心為懼未免増慮動火亦非所以善静攝而期速效也伏望皇上堅持前諭永無改易則恩出如雨露令行如金石數日之間便成唐虞三代景象夀筭與山海永令名與天壤並而宗社萬萬年無疆之休端在是矣臣等不勝激切待命之至積奸隠弊蠧國損軍乞勅覆究以肅法紀以重邉儲䟽總憲掌山東道監察御史劉曰梧呈案照先該本院題覆遼東撫按官趙楫等各㕘奏納粟監生唐堯勲黨同百户王朝慰等假印偽填勘合虛出通關違例私兊軍餉尅减價值違法等情已經奉有欽依備劄巡按御史提問去後近接邸報又該撫臣趙楫并部科諸臣交論至稱唐堯勲等奉㫖勘問發廣寧左衛監候太監高淮索銀壹萬兩於本年肆月内差褚志羔等竟将衛監打開将唐堯勲等鎻去提牢官卒槩被打傷緣由覩聞之間不勝駭異夫國家倚重邉關故特嚴邉儲之禁而錢糧出入必有通關必稽印信堯勲等以神棍叢立詭名侵尅鹽糧價銀數逾二萬三千有竒其罪已不勝誅且私雕假印朦填勘合偽牌見在覆劾相同律例昭然其當大辟無疑業奉㫖提問此其干係重大淮豈不知之且律稱刼獄者皆斬淮豈不聞之乃敢受賄庇奸統衆劈開監門刼奪以去巨奸竟得漏網是使遼餉終無清理之日遼卒終無宿飽之望遼左終無振刷之期也恣睢䟦扈莫此為甚呈乞速行題請嚴究等因具呈到院臣等看得常人侵盗邉銀至二百兩者絞例也凡私造各衙門印信者斬律也國家設此律例以懲奸盗以重邉儲雖問官毫不敢縱而犯者猶徃徃接踵况唐堯勲等侵盗遼東鹽糧價銀至二萬三千有竒私雕假印偽填勘合已覆劾相同為臣本院題奉欽依究問人犯即坐大辟尚有餘辜高淮以受萬金之賄麾衆刼獄使得漏網是以臣而抗主也是以盗而奪盗也是窮邉枵腹之卒無復足食樂生之望也恐廢法紀而誨盗滋奸将墮軍實而釀亂起變委難輕縱合再題請除高淮逆惡多端已經科道撫按詳糾候聖明洞察所有唐堯勲等一干兇犯合候勅下臣院嚴行撫按官速提前巻有名各犯盡法究擬照依原限具奏完銷痛示懲創緣係積奸隠弊蠧國損軍乞勅覆究以肅法紀以重邉儲事理未敢擅便謹題請㫖敵人猖獗天討難容懇乞聖明亟定廟謨以肅法紀以固疆圉䟽總憲臣等近接川貴總督李化龍巡按趙標等掲帖内稱播酋楊應龍率領苗夷十萬餘犯我綦江又出偏師分犯南江江津合江東西千里丁壮婦女大遭屠戮流血成川積屍成邱綦江旦夕且破重慶孤危難保又遣其子楊朝棟領兵二萬徃犯貴州臣等伏讀至此不覺髪上指冠夫蠢爾夷酋受我國家二百年豢養之恩徃嵗讎殺五司戕害蜀兵干犯法紀荷皇上待以不死僅從薄罰即近日貴州撫臣江東之倖功謬舉自取敗辱激成今日必不可已之役方謂東之之罪終不可宥迺本酋遂敢大肆横行殺掠内地全盛之世豈容土酋䟦扈躑躅至此今即速正天討是補亡羊之牢已無益于地方之慘若仍築道旁之舍舉不定之棊恐非勝筭臣等不揣固陋謬為臆說條列如左倘可備千慮之一得臣等不勝大願計開一慎擇司道照得軍政總于督撫而所頼以調劑兵餉綜核将領者惟司道是頼必心計了達知兵或素歴行間而又實心任事不致僥倖嘗試者始克勝任今奉聖㫖允部議更調用兵處所司道各官臣等曷容再陳但各道或缺官帶管或已陞候代若待有缺方補非顧此失彼則緩不濟事查各處用兵多設監軍督餉各官乞勅吏部除就本省先行更調外于川貴二省各添設監軍督餉方靣官二員慎選其人以後如恐官多事權不一即以監軍兼分巡督餉兼分守庶㡬分部得人折衝有頼伏乞聖裁一蒐羅異才竊照漢唐以來徃徃下詔求跅弛非常之士而舉囚舉虜舉盗皆可以肩宏鉅而濟緩急今大江以北多俠客如劇孟郭解輩居常怏怏如鷹隼騠駃一息不忘飛揚奔驚之志先臣邱濬有云在中國則為盗賊主謀在外境則為夷狄効力皆此輩為之也合行各撫按官多方採訪果有善騎射多智謀或摧鋒敢死或足智曉兵不妨收養撫道標下待用或録名以聞兵部又加覈實不惜升斗之粟籠而取之咨送軍前有功一體叙用是國家有得人之利即萬一有猾黠狂逞之形亦可潜消而免為敵人所資伏候聖裁一簡收将領照得用兵之道呼吸即有成敗逺汲難濟近渇川貴之将敢謂得人縱得人未必即至以後有缺難保不取調于别省徃返道路緩急曷頼况劉鋌稱病可用與否當今日决斷督府既添中軍貴州亦宜均重查各處用兵有取調謀勇将官令赴督撫聴用有缺庶便就近委補無缺亦可集思廣益乞勅兵部裁酌蒐訪務求得人不使奸猾債帥㕘與其間庶将材不可勝用而小醜不足平矣伏候聖裁一厚集軍餉照得興師十萬日費千金軍需賞賫又復稱是黔中土瘠民貧居常仰人鼻息即巴蜀夙稱殷富然自採木用兵以來亦蕭然懸磬矣逆酋如黠䑕退處穴中則負險難施燻灌間出刼掠飄忽又無定時非聚兵數萬不可兵欲常聚餉恐不能常給餉不能常給而兵又不得不常聚卒有癸庚之呼為敵所乗柰何今須發金錢數十萬于軍前非不知今日財用十分缺乏而權國家之輕重自不得惜帑藏而忽隠禍也伏候聖裁一多練火器照得器械不利以卒予敵近來火器益精然莫如三眼鎗與連砲三眼鎗各鎮有之以左手㸃火為凖每萬人以八千人分畨叠打即得二萬四千之用是不増糧而増兵之筭也又于陣五十歩前層設連砲一發則十餘大将軍可齊徃先期每一連選軍士三十或四五十人分領齊練頃刻可布此萬人敵也乞勅兵部将前項三眼鎗及大将軍或於各鎮借用若干一靣委官製造庶攻戰有實具取勝威敵全在此伏候聖裁一廣懸重購照得兵家用間亦攻心之一筭也無論前朝即我明征討徃徃以此大收平定之績田州岑猛之倚岑璋至親也猛竟為璋擒而璋至今世守爵土寧夏劉東陽之倚周國柱至宻也東陽竟為國柱戮而國柱至今稱忠義為名将播雖土夷其左右夷苗豈無慕岑璋周國柱其人以自表見者乎誠懸極重陞賞如以楊應龍父子獻或斬以報者即以本酋家産充賞仍世襲宣慰若家已盡賞銀二萬兩願陞侯伯都督指揮者聴乞勅兵部同臣本院咨行督撫遵行伏候聖裁西蜀危急難支海内動揺可慮懇乞聖明亟停礦稅以固邦本以銷亂形䟽總憲臣等頃覩皇上慨然立停貴州稅使大小臣工誰不仰服聖心之虛聖慮之逺近諸臣因播酋楊應龍䦨出内犯闔䟽煩凟冀皇上觸事感悟必先罷西蜀礦稅以救倒懸不意天聴猶髙豈以滿朝諸臣之言皆不足信乎今又據報楊應龍親統大兵已破綦江殺戮我将士䖍劉我生靈全蜀震動此雖螳蜋怒臂不過自速虀粉然而本酋之根抵盤據原與各土司聲勢相倚其蠢動反側實足以兆中原之亂今中原有一種椎埋鼓鑄武斷豪横諸惡少居常憤憤不得逞每伺隙思動加以各省直之開採𣙜稅為之齮嚙山陜河南之旱蝗饑饉為之驅逐一旦聞蜀告變至破城夷邑而我不能支環視奮臂乗釁嚮應與酋為黨何異藉㓂資盗抱薪助火其流毒潰裂四出必非旦夕所能掃除臣等興言至此不覺痛哭流涕及今不即挽回恐人心益離天命難格異日雖罷礦罷稅亦何捄於宗社之安危哉矧蜀與貴州震鄰之警剥牀之災均屬危急而蜀之今日尤苦如在湯火中貴既罷矣蜀安得獨後縱不即罷中使雖至暴虐亦難於湯火中而行𣙜採之令不如斷自上裁恩出九重速罷蜀中之役使朝不保夕之民猶愛我不忍叛我而不為敵所用即有額稅仍聴量充彼中些須軍餉使嗷嗷待哺之卒不至内潰又因此而併罷各省直礦稅俾四方草澤之夫不得以中使群小輩之横征苛歛為兵端此所為以徳澤為戈矛以民情為金湯而攘外必先安内之大機括也伏願我皇上熟思禍亂之源亟圖消弭之術渙發徳音将欽遣四川礦稅中使先行取回再将各省直礦稅盡行停罷翻然與海内更始則播酋不足除西南不足慮而金甌無缺之鴻業将永永於不替矣臣等不勝激切懇祈之至考選未奉論音差委益苦缺乏懇乞聖明亟賜允行以通窮極以濟時艱䟽總憲臣等近查得内外應差御史懸缺至一十九員據實具䟽上陳固仰冀皇上察臣等不敢欺之心亮臣等不得已之情蚤選才賢以重風紀斯區區之上願也詎謂浹旬以來猶未欽奉明㫖夙夜思惟計無所出乃新差四川巡按崔景榮業與已報滿巡按唐一鵬又各以病告見行勘覆矣比來御史告病自非沉疴臣等徃徃强之視事不敢凟奏誠慮風憲缺人無以備我皇上之任使今二臣中有病真情迫勢不得不議令回籍調理苐景榮病則代四川巡按者又缺一御史矣一鵬回則差陜西巡按者又急於一鵬在任之時矣懸缺日甚一日當不止如前䟽所陳一十九員之缺需人日急一日舍考選将何以濟目前之乏臣等歴觀中外凡民生之休戚錢粮之稽查奸宄之糾發吏治淑慝之激揚與夫邊腹功罪之覈勘未有一事不於御史乎責成者矧今時何時也尤四方多故民情嗷嗷之會也微御史則中外之事誰其耳而目之将至奸弊叢滋吏道窳惰城社無所震慴閭閻無所托命關係夫豈細故而可更任其缺乏以為不足慮耶臣等不為諸臣候選苦淹計而為國家空虛計不為御史候代乆滯計而為宗社蒼生安危計是以詞已竭舌幾敝而不憚喋喋如斯伏乞皇上念御史為天朝必不可曠之官思考選為今日必不可廢之典亟勅吏部刻期會同考選臣等自當矢公矢慎為臺省擇賢以仰副皇上詢嘉納讜之盛心将上之而廣一人之聰明下之而通四方之幽隠逺之而紹祖宗之令典近之而救時事之艱危者惟在此一舉也臣等不勝激切待命之至臺臣員缺太多差用萬分不足懇乞聖明速賜考選以全國體䟽總憲臣等待罪中臺職司風憲所藉以為皇上澄清宇内振肅紀綱者惟十三道御史是倚使臺差尚可支吾臣等何敢數為煩凟顧事勢至今日有萬萬不可緩者查照官制十三道御史額設一百八員今共缺六十餘員如廣東貴州二道各額設七員今俱全缺而南臺不與焉以致有一差而候至一二年者有一人而兼至三四差者有未及復命而預擬别差者有先經大差而又差中差者見今陜西淮揚河南等處報缺日久並無一員可代而邉報日急誰其彈壓災荒日甚誰其賑濟况行役乆勞則意氣不無銷沮兼攝事煩則奔走或多不及臣等深懼悮事廢法其有關于國家非細今在外取到推官知縣及在内中書行人愽士等官資俸相應者亦僅僅可數若以分授南北科道則臺中所得者恐亦無多且以試職躭延未得即用况尚無選授之期乎伏乞勅下吏部作速會同臣等将前項各官從公考選銓補員缺并将吏部近題起補御史劉應龍李以唐張養志等三員亟賜允補庶臺臣彬彬在列而國體亦大有光矣吉典方新皇仁宜溥懇乞聖慈矜宥罪犯以萃和氣以培國脉䟽總憲臣等竊仰見我皇上至仁如天自臨御以來刑戮不施於覆盆矜憐常及於犴狴圜扉之夫徃徃得緩須㬰無死誰不祝聖夀於無疆頃臣等從九卿諸臣為罪臣曹學程請命非専為曹學程也實以我皇上二十七年未有戮諫臣之事今嵗行刑太蚤萬一曹學程不䝉矜宥恐後世信耳傳訛将謂我皇上不姑容一狂妄小臣以全其好生之心而使曹學程或得成因言而死之名昔人所謂諫官之禍大而名亦大又重失人心或啓大盗一兵端今曹學程已自悔罪求一啣環吐珠之路而恐不可復續此臣等所以不能不為今日惜且今日國家所不足者非殺戮也朝鮮川貴用兵死各數萬中原旱蝗餓殍迄無寧期所不足者和氣耳葢人之心和則天地之氣亦和而休徴畢應然所以萃人心之和者莫如議獄緩死去嵗停刑止及畿内各省向隅之囚未盡沾被人方悔其乞請太晚今去冬至尚逺猶可及也况朝廷每值吉典必有大貸以沛仁恩無非欲感格人心召致和氣今乾清坤寧兩宫巍然鼎新是天下共詠斯干之時也皇長子大婚候期成禮是天下共歌關雎之日也我皇上誠施浩蕩之恩令天下罪囚今嵗暫免行刑使曹學程亦得與于緩死之列則懽聲和氣暢于兩間而哀矜慈仁格于上帝齊天下百順之祥皆自皇上致之葢皇上體天地之心以全天地所生之民而天地亦以天下共祝之福歸之於皇上以和召和以順召順其所以光吉典荷休祥以培有道之長者寧有涯哉臣等不勝私願伏乞皇上為宸居萃大順為皇嗣溥湛恩慨然速下停刑明詔臣等曷勝激切祈懇之至臺差曲處無計各官苦候經年懇乞聖明速賜考選以濟急用以全國體䟽總憲臣等頃緣考選之屢請不報而各差員缺種種勢又不容乆待於是不得已姑為苟且權宜之計如各差不相兼攝專其任也近則以屯馬而兼鹽巡城而兼衆差不問専矣中差不管季差三差不復再差重其體也近則屯馬鹽關御史㮣管巡城等差三差已滿回道復議别差不問體矣甚至三巡按復責之巡關兩中差復責之巡城劉曰梧顧龍禎何熊祥馮應鳯以告病俱令力疾視事不問勞瘁矣葢臺規之紊亂至於今已極臣等之變通至於今已窮使其餘臺差尚不稱乏臣等猶恐将來承接之難乃今何如也論大差則河南雲南浙江已報滿矣論中差則長蘆河東遼東茶馬已報滿矣以目前而言雖巧婦不能為無米之炊以他日而言則臨渇何藉於掘井之力臣等輾轉思惟真莫知其計之所出也此實因考選之遲以至是耳夫皇上遲於考選本欲抑其少年狂銳之氣而大用之也非終棄之也顧自春徂秋覊棲不為不乆困心衡慮裁抑不為不深誠於此時慨然發徳音下明詔将行取及内外應選各官精加選擇務㧞其老成諳練之尤者置之臺省不使喜事沽名之輩濫竽其間豈惟諸臣荷㧞擢之恩益堅圖報之念即臣等亦收得人之用可免廢事之虞又何至議兼差議變規媮為一切苟且之政而壊祖宗三百年之憲體哉且皇上亦何過慮諸臣之濫進而為不必然之防也徃者奉有明㫖令該部及臣等慎選各官仍備開履歴考語恭候御筆㸃用則選之當與不當責在臣等而兼收并用與否自有聖天子獨斷之權在臣等安得干之皇上試熟思及此則知考選之舉誠不必過於慎重使風紀要任既苦無可用之人而鱗集各官又苦無展足之地臣等區區犬馬之愚不容不直陳於皇上惟聖明垂聴而亟行焉臣等不勝激切祈望之至温恭毅集巻五
