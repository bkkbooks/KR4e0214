body:
  text: 温恭毅集巻二十三明温純撰五言絶句老僧巗獨向中峰立洪荒直到今如何身不動爲悟石頭心其二色相空山裏無言亘古今嵩山面壁者還有去來心移居宣武街庭前有竒石四各題以名維益汝脩𢎞甫欣然賦詩余亦各得一首立禪僧止錫天䑓似天䑓有老僧巖石頭今已矣九年少室山面壁亦暫耳二華峰我有五畆園當簷二崋峙山靈似有情不約忽來此邀月巖云何安樂窩從窟手探月爲悟生生機天根于此發化石嶺寜知木匪石又知石匪心不二者誰子忘言亘古今浮光八詠浮光在信陽之東予甞歴其地戈山鬱嵂鄰嵩少仙人遺舊跡蒼翠薄青霄烟霞爛白石淮水東望長淮水宛如渭水清空明天一色亦可濯吾纓春申宅昔日春申宅今時絳節宫人事今時異風烟昔日同霸䑓蕭王古霸䑓野曠望何極月夜楚歌寒草木無顔色七里泉熒碧小龍湫鬱葱騰佳氣獨有洗心人一歃知清味五龍宫風俗存三户雩禜寄五龍有年書太史無事憶乾封劉墓叅軍玩世者醉徳不醉名天地餘杯土古今誦逹生聚仙閣小閣何岧嶤霏嵐如動色杖䇿問筌蹄丹梯不可即過吕公祠行役紅塵裏仙跡古道傍七年渾是夣不必問黄梁温恭毅集巻二十三
  hash: sha256:1a6e18845b592b613ff5fcb8fea459471c4c85646994d9dae968ef32a0e7b0fd
