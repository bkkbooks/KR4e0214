body:
  text: 溫恭毅集卷二十三明溫純撰五言絶句老僧巗獨向中峰立洪荒直到今如何身不動為悟石頭心其二色相空山裏無言亘古今嵩山面壁者還有去來心移居宣武街庭前有竒石四各題以名維益汝修𢎞甫欣然賦詩余亦各得一首立禪僧止錫天臺似天臺有老僧巖石頭今已矣九年少室山面壁亦暫耳二華峰我有五畝園當簷二華峙山靈似有情不約忽來此邀月巖云何安樂窩從窟手探月為悟生生機天根于此發化石嶺寧知木匪石又知石匪心不二者誰子忘言亘古今浮光八詠浮光在信陽之東豫嘗歷其地戈山鬱嵂鄰嵩少仙人遺舊迹蒼翠薄青霄煙霞爛白石淮水東望長淮水宛如渭水清空明天一色亦可濯吾纓春申宅昔日春申宅今時絳節宫人事今時異風煙昔日同霸臺蕭王古霸臺野曠望何極月夜楚歌寒草木無顔色七里泉熒碧小龍湫鬱蔥騰佳氣獨有洗心人一歃知清味五龍宫風俗存三户雩禜寄五龍有年書太史無事憶乾封劉墓參軍玩世者醉德不醉名天地餘杯土古今誦逹生聚仙閣小閣何岧嶤霏嵐如動色杖䇿問筌蹄丹梯不可即過吕公祠行役紅塵裏仙迹古道傍七年渾是夢不必問黃梁溫恭毅集卷二十三
  hash: sha256:a9b93e4dffecc74841c2ad8839e70fc27774dd1b272e43c9a97a81cc88dde0f5
