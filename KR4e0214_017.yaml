body:
  text: 溫恭毅集卷十七明溫純撰祭文祭中丞雒涇坡公文於傷哉兄竟舍我仙逰使煢煢純增聞笛之哀也耶追自乙丑吾兩人同廷尉趙君釋褐共旅食不知其姓異也轉盻三十年金蘭之契參商之隔幽明之感不能不以之而惱吾懷蓋釋褐未幾宦逰各天久之既同官臺省又未幾相繼忤時仕止各天又久之兄稍稍柄事撫蜀純亦撫越乃廷尉則捐館舍而棄吾儕當是時吾兩人哭廷尉不可作疇意不十年以哭廷尉者哭兄純既以孑影隻輪為吾慟私又以雙璧沉淵為國憐才兄碩德重望宜大顯不顯或挹而注之以夀又不夀此其故不可解徒令人疑有不可必之天故今哭兄不能不憑几而低佪頃純扶先淑人柩歸兄哭而逆之途又哭而臨之殯所且以家大夫髙年為解兄顧不少延輒先我而厭塵埃純宜從先淑人死不死兄不宜死而死純即用兄言自解何以解兄于泉臺兄直聲惠政彪炳中外且有子若孫步骨鯁之塵接雲程之武兄即死不死宜其屬纊之辰談笑瞑目以解天韜為幸而曰我將逰乎蓬萊純睹風木念吾母睹月梁念吾友兩念交橫慟固不能己兄逹者其嗒然以笑于無何有之鄉而以我為愚猶膠情于電閃萍逢之形骸也耶祭憲副楊崑洲先生文於戲先生沒已二十年所而純始為文以祭耶始先生以國士遇純純何能以國士報先生而二十年來純亦數仕數已顯晦靡定望蜀中真如天上每一念至悲感交橫客嵗始從墊江令以炙雞絮酒往而猶不及為文今會先生子峻蓁芬以太夫人志銘屬純不朽於戲純不能報先生又惡能銘太夫人耶然讀太夫人狀益以稔先生孝友不獨治行在周秦者種種未易述惟是純受知先生遂有不忍死先生之憾故今見先生子如見先生銘太夫人如銘先生蓋文章意氣有所合而匪獨以推轂榮進之媒德先生也初先生觀察吾秦時與部使者大比士先生得純卷輒喜而力推轂於部使者曰不首解額不舉于是純遂首解額然則先生真以國士遇純而純亦遂以先生有今日乃純謭陋竟無能表樹以報先生如先生何哉於戲豈惟表樹即二十年來先生之墓木已拱而純不能走墓所以慟知已之淪喪先生之太夫人享耄夀而純未能代先生及其存致一日之養先生之子若孫林立而純未能代先生存而課之學蚤令繼先生未竟之志甚矣純之負先生也純惟河南吳公治行第一以推轂賈生而人恨賈生能以治安䇿自顯而不能薦吳公於朝至令其名亦不聞於後世蔡公光烈典試建州得朱晦菴先生以為非尋常人其後晦菴先生以誠意正心之學為世名儒而因以為蔡公重於戲先生之賢何愧吳公蔡公純則安敢望賈生與晦菴先生今銘太夫人庶幾後世知有太夫人又知有先生天如假我以年尚砥礪以求不愧晦菴先生為先生重者而未敢必也先生有知亦有意默牖我使竟不負先生諸子若孫必有鸞翔鳯儀繼先生者先生其可嗒然於九原也已同祭憲大夫楊兩川公文嗟嗟兩川公生於秦官於蜀卒於燕朝縉紳無問識不識皆為悼惜矧執禮與公同偕計純與公同宦逰又俱同秦産蓋相得歡甚即生别猶難况死别乎初聞公齎捧信吾兩人相對喜謂公至可握手道故比至無何病矣吾兩人日詣公所計已之無能也又相對為公恐公談笑猶日念公家事不自謂不起然竟至此傷哉公蓋四方人也無論蚤嵗從其父直指公客楚客燕即舉進士環轍燕趙蜀晉申宛間且二十年身所歷道路奚啻萬里行且登康途為世大用乃溘然而逝徒令以郎署二千石藩臬大夫稱良於世哉公故喜為詩詩薄唐以後不為然中州稿獨思鄉悲苦毋亦反本故性乃日者謂公必得上壽顧竟不壽何與公屬纊時子侄在側故舊盈門仲氏制府公相去甚近即未面而弟事公意至篤藉令公在途或在蜀而遭此變又何以堪然天固不重為賢者困也公歸矣丹􅀈在前季子扶櫬大河嘉嶺之西直指公廬在公其永以為依若百年同盡以死為樂公固習聞之且有諸薦紳蒿里之歌焉不復為公告耆英社同祭學博馬冶溪兄文嗚呼公胡亦厭塵劫以歸豈二豎之為害也耶吾儕與公始而講業繼而結社可五十年即顯晦參商未嘗不目如成而神如邂當公以嵗薦振鐸中州遷韓府且挾瑟而往會吾儕聚里中又相與為真率之會花朝月夕以公為祭酒歡甚也詎三易嵗籥公輒仙逰于塵壒之外公故為博士言有聲不第而貢貢又僅受一命年踰耋自謂有壽徴難老乃竟晝而不能不晦完而不能不碎諸子五如季常兄弟宜有白眉可無憾而卒之前雖家窘會未嘗不握管賦詩以遣懷而寄慨即有逺適者輒寄所得句猶慮公以窘為念強笑語以為公解公今逰泉臺也恨不耄不期頥耳能不回首笑役于形者之苦而樂忘乎形者之大頃吾儕為公罷會或為位而哭于數千里之寓以致雞絮望拜蓋撫木則涕泗雙流聞訃則梁月增慨少選且強而會會則先為公舉一巵以酹形骸萍梗死生旦暮其究歸亡何有之鄉一也公今知之矣寧俟吾儕言而後喜如蟬斯蛻祭安五峯表兄文於戲純何以聞兄之卒哉純與兄骨肉戚也吾兩家以戚故又世交也夫以骨肉之戚重以世交純何以聞兄之卒哉初聞兄在床褥使使之沮上代問使來道兄不食已數日純與家大夫為兄慮然猶謂兄偉然之軀充然之氣官蜀晉厄于下位未究而仁心為質竟當起而享上壽寧蹴然有是乃無何而訃音至家大夫泣純亦泣蓋家大夫舊寓蜀會兄父為純稱伯者官溫江已又會兄官巴溫江伯弟視家大夫兄叔視家大夫於寓館至篤以故純自髫年執弟道于兄不啻同胞而兄諸子又復叔視純益篤夫骨肉戚世有之而歷世彌篤如吾兩家者無有也然則純何以聞兄之卒哉兄卒四月矣純以他羈今始走殯所痛哭以文併致家大夫意於戲兄為小官即不顯賢于不官壽近七帙即不享上壽亦幾古稀諸子服兄訓且錚錚然立兄即死何憾顧純於兄之疾之卒始而慮繼而泣今哭而痛者以吾兩人之戚非世所稱骨肉耳兄今從溫江伯地下其以純言告則吾兩家雖謂之死生交可也寧論其世祭張槐麓先生文於戲先生沒十年久矣而純始為文從仲子以吊耶初先生令吾邑無論茹蘖之操迎刃之才卓冠一時即較士以國士遇純純何能忘當是時純所為文與者半不與者半即先生數試數首純或有謂先生阿所好者先生不顧也其與淮海月溪二先生評秦士亦為純屈一指又意指鞭䇿純甚力既純與計偕謬居前人始服先生知人非阿所好而使純堅志直前免多岐之惑者先生力也何能忘既先生罷鞏昌政歸僅一通問先生於家而無報音久之會仲子為吏部選人相見長安邸舍始知先生已仙逰傷哉於戲世孰無知巳孰知已於窮居白屋如先生者耶何能忘先生故骯髒不可下官蠡官吾邑官太僕官戶部官鞏昌孤立行一意往往為人中甘心焉直道難行於先生見之純既以先生知位不為不顯而竟蹉跎嵗月無尺寸表樹以竟先生未展之志即愧赧汗下何益也仲子聞宜人訃純始為文以薄祭併修闕事於先生於戲宜人佐先生力官竟食報課仲子兄弟學且通籍不須臾少延以俟命也傷哉仲子今奔歸啓先生壙以宜人袝純於先生之生不數通聞問於其沒無繇以炙雞絮酒躬致墓所而徒嗚咽􅒣欷於數千里外甚矣純之負先生也天假我年使不先朝露尚求所以不負知已鞭䇿者先生有知亦默啓我使不更蹉跎無表樹也耶祭徴君王子德社兄文於戲兄胡亦惱苦海以歸抑膏盲之為害純與兄及子充交首講業至今四紀餘即升沉離合如石火電光乃金蘭之契管鮑之知未嘗不如一日雖千里如對當兄以嵗薦起家振鐸也始而曲沃既而西塞歸來可十餘年純亦謝中臺政與弟編相繼入里期溫盟調猿鶴于清峩續雒社之遺風詎意甫易裘葛兄輒逍遙于清虛之外兄故為博士家言可第乃不第而貢貢又僅為儒官宜注于壽壽又僅踰古稀豈天道乘除之數亦有時而昧仲子能文必大公門可無憾而卒之前雖手足不仁亦間肩輿為社中之會會輒口期期強為語不盡吐蓋其心有未展之懷而其情有無窮之慨純以初抵里多冗不數接膝謂未必即永訣獨慮重兄疾含淚強顔以為兄解兄今逰泉也能不回首笑七十年來之苦而喜無何有中解韜之快於戲知已凋落從古所悲故匠石廢斤于郢人伯牙輟絃于子期子充雖貢未仕又先兄而逝故今哭兄不能不及子充有胸如搗有淚如波寧俟聼鄰笛覩梁月而始增慨子充之子若侄已成名而後更未巳仲子即立第純當從臾俾早成兄未竟之槩然吾三人所相期許為不朽計者如昨日語而忽成畫餅純今亦多病惟皮骨存耳又何他望而空悲存沒之永隔與少壯之難再於戲督撫兩浙臨行祭祖塋文純今者奉命督撫兩浙蓋以我祖積慶故兹望浙中行道經桑梓念戀松楸恐久不與蒸嘗故今實切悽愴惟是薄肴在俎薄酒在尊泉臺有知其來享之又惟浙大邦以不肖純建節其地恐不勝此重寄又恐與水土不宜我祖考祖妣其默佑令所至安利又令厝注免於乖謬不失軍民之望以仰答聖天子推轂至意亦於我家聲有光哉祭王康僖公夫人文嗚呼夫人今歸而從康僖公于幽耶夫人以名家子作配康僖公無何而康僖公不留蓋康僖公捐館之年實純有生之辰于今六十春秋矣康僖公乘箕以歸而純甫生純身世已熟黃粱而夫人仙逰夫人之稱未亡人者久而閲歷人世之電光石火蓋不知幾千萬狀而今始休矣純歷官掖垣奉常數步康僖公後塵而追之不前然師相授受康僖公固純之子濯孺子也未嘗不仰衣鉢而遡源于流康僖公不及面授純而純得之于私淑純不及吊康僖公而吊夫人吊夫人如吊康僖公又不因康僖公而思端毅公之前修也耶嗚呼古今瞬息人生蜉蝣惟彼內則在翼孫謀夫人為王氏婦已即為母為王母為曽髙王母荻筆熊丸及其曽孫為箕裘矧康僖公學問宦業巳垂竹帛不朽而夫人之名亦不朽寧蜉蝣伍而享上壽又焉求耶純因葭莩以念舊追文獻之末繇故不能不為今昔之慨而泪淫淫不收祭涇陽李夫人文於戲夫人坤輿肇瑞婺彩凝祥金完婉娩玉韞青揚令德好逑嬪于鴻碩警蠅謝珥相庸佐績熊丸鳩哺翼翼肫肫瑟琴靜好壼有令人方贊殊勳震世山斗且沐寵綸冠翟珮玖胡天弗愸霜萎芳年蒼虬趣駕青雀歸玄蕙閣香消蘭堂聲閴蹙額夫君痛心肉骨矧惟夫君三歷斷絃悲思寡和鸞續悵然乂矧客邸肉骨異地太公驚趨撫棺雨淚純以葭莩夙稔淑貞知居甥館久依陪京倐遡隂風怛焉悽愴感念存歿揮涕相向有肴在俎有酒在觴矢詞為誄來格洋洋二媛在幽嗒然相逐幻境盡空能不瞑目晉南京吏部尚書臨行祭先妣文嗚呼母棄飬忽三周于今矣感時追慕烏容已於哽咽也耶兒往在疚雖不得聞吾母之聲覩吾母之容然瞻依松楸猶幸有仿佛者存今且望金陵行併松楸逺矣烏容已於哽咽也耶兒日者之齊之燕之越無不將吾母與吾父偕今母不可作矣吾父日衰亦不得將之而南蓋疇昔之官也樂今日之官也苦兒有大不堪於𠂻者烏容哽咽也耶始拜命兒以重違松楸且懼吾父逺行之難將終其身於丘壑乃一疏未允再疏竟格進有不可屢瀆之天聼退有不可終抑之私情時四方多虞吾父以大義迫之兒不得不治裝一往俟入春計事竣即請歸而留孫豫知代兒溫凊代兒蒸嘗興言至此哽咽又烏容已也兹陳忌祭並以情告惟乞吾母默佑令吾父寧於家兒輩寧於官兒不勝慟切之至溫恭毅集卷十七
