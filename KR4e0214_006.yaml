body:
  text: 溫恭毅集卷六明溫純撰疏大禮屆期舉行難緩懇乞聖斷及春允舉以昭大信疏總憲臣等竊惟今日國家之關繫最大而肇行最宜亟者惟册立冠婚三禮耳歷年文武諸臣合詞懇請自去冬至今臣等又從府部疏請再三冀綸音渙發盛典光昭可旦夕俟也詎意候旨日久未蒙批發今天時和暢人心歡豫臣等叨司風紀欣遘此風化之大且亟者安敢不再效欵欵之忱考之禮經冠而後服備服備而後容體正顔色齊辭令順故冠者禮之始也然在朝廷必册立而後冠必冠而後婚者禮之序也其冠率以十五婚率以十六册立率欲蚤豫教又率於春初舉行以禮時為大時莫如春而所為及時體元者於東宫尤切也皇長子睿齡十九皇上將責之正君臣親父子和長幼以重國本而猶聼其垂髫於壯年辭於何順下於何觀禮胡可訓也詩首關雎其言窈窕淑女求之既得即樂以鐘鼓友以琴瑟誠重之也今淑女入宫已數月矣異日將助理隂教而不修六禮於既得之日咏宜家於桃葉之辰情胡可已也漢文帝三代以下之令主也即位初即立太子啓時啓甫十嵗耳曰蚤建太子所以為宗廟社稷也今皇長子視啓長九嵗而前星久耀儲位尚虗上無以慰九廟祖宗之靈下無以繫四海臣庶之望國本所係又胡可輕也皇上不記二十六年詔告天下炳若日星而可反汗乎臣等追繹聖諭一則謂皇長子年巳過期體已充足該部便具選婚舊儀來看是婚禮之不可遲固皇上至情所獨切也一則謂册立並加冠禮少俟兩宫落成之日行是三禮同時並舉又皇上睿𠂻所獨斷也夫向也念其過期今期逾過而冠婚之命不頒向也猶有所俟今時不必俟而册立之典不舉竊謂皇上天性至情非變於初也何昔以為急而今以為緩如綸如綍之言依然在耳也何昔獨斷於宸𠂻而今延緩於二載然則天下疑皇上之心又何日釋哉矧聖人舉事不能違時天合至情不宜久鬱嵗事入春已浹兩旬皇上不於此時下明詔正儲位併舉冠婚使中外欣然慶震器之得人則所為重宗社大計反出漢丈下如萬世青史何臣等犬馬區區願皇上深惟國家萬不容已之禮併鑒臣等萬不得已之心亟乘春和舉行盛典將見天人協應嘉祉駢臻而億萬年無疆之慶在此一舉矣臣等無任激切祈懇之至亟勑正法以平衆怨以解阽危疏總憲臣等據廣東陜西雲南各省撫按揭稱各稅官激變事情已該兩京科道相繼參奏臣等亦同戶部等衙門叩闕上陳豈其得已竊謂皇上見之必惻然思急捕諸姦而置典刑也乃日蒿目以候未蒙允發豈以報者為虛聲而受者非實禍耶據臣等所聞其禍之烈更有出于奏報之外其安危關繫有若無傷而傷已甚若無奈何而在我有不暇謀不能挽回為諸臣所不忍言者臣等以言為責又安忍不言夫自礦稅肆害民間苦椘之狀皇上亦聞之數矣然騷驛內地魚肉閭閻已不堪未有潰而夷狄棄而君臣如廣東稅使李鳯所為者又有縱殺三命立斃縣官如陜西稅務梁永所謀者嶺南逺在極荒與倭奴僅隔一海即加意撫綏尚慮易搖難撫何李鳯張牙露爪藐視明旨朱筆題扁妄意興工內劫粵夷外鈎紅夷圖逞私胸輒開邉釁飛而食人甚于虎狼豈止欺孤虐寡積寶堆珍淫穢慘毒如按臣李時華所陳耶此而不問必待冠履倒置胡越交訌而後為之將無所及矣秦關僻在西壤與諸敵僅隔一墻年來軍餉數月不給礦稅織造一時並舉加意奠安猶懼軍閧于餒民散于擾何梁永敢招亡納叛貽害生靈置吏張官擅作威福殺無辜之三命死循良之縣官時聞三秦攘臂誓不共天又豈止渭南一縣髮指沖冠如撫臣賈待問所陳耶此而不問必待豪傑解體人心嚮應而後為之將無所及矣大率邉方之民竊隙易動乘變難弭窮則赴海越塞急則響導招呼靡所不至今廣南為東之極邉關陜為西之極邉相繼搏激寃慘莫控而萬里雲南騰越又見告矣蓋楊榮之凌官虐民不在李鳯梁永下也夫逺近瘡痍孰非皇上赤子平時剝脂膏以償稅使之欲非順稅使順皇上也而今以草菅視之民命殘而國家之邦本日薄郎官宰牧孰非皇上手足平時殫力以應稅使之求非屈稅使屈朝廷也而今以贅龎視之善類敗而國家之命脈日索總之稅使借皇上之威福以十計參隨又借稅使之聲勢為聲勢以百計土棍又借參隨之牙爪為牙爪以千萬計宇內生靈之困于賦稅困于水旱困于採辦造作轉運者方處處無樂生之心而能勝此千萬牙爪之吞噬搏擊否皇上不觀楚事乎楚在去年此日是何等景象在今年此日又是何等景象楚有一陳奉則全楚皆陳奉而楚事危楚去一陳奉則全楚無陳奉而楚事安才一更置楚民之倒懸漸蘇并礦稅盡行停止不知閭閻之歡呼而頌聖德者又何如伏乞皇上簡各省撫按之疏體各省亟救之情大奮乾剛毅然獨斷將李鳯嚴逮下理梁永楊榮革任回京嚴勘官民致死根繇拯四方湯火之民解一時矛戟之勢礦稅一遵前諭停止尚可緩須臾之變亂在皇上一轉移間耳不然恐一呼百呼一動百動天下之大事且去致他日追悔欲如今日之易稅不可得矣臣等即捐軀而效何益焉遵奉聖諭詳陳弭變切務懇祈聖明速停礦稅逮楚使釋被逮諸臣以遏亂萌疏總憲臣等目覩今天下第一殃民起釁貽君父不美之名者無如礦稅諸使今天下第一安民弭釁昭君父至美之名者無如罷礦稅諸使蓋諸使之害一而參隨之害百參隨之害百而參隨所引用土棍之害不啻千萬參隨以諸使為城社土棍又以參隨為城社諸使遍天下而狐鼠亦遍天下狐鼠遍天下而天下可保無事乎從古天下不難無事而豈必狐鼠如此之多乎况今諸惡非狐鼠實虎狼乎當楚變未成之先人已慮有今日而不敢盡言使閭閻寃鬱決裂以至此極至撫臣亦不能自保今中使所讐者撫臣楚民所怨者亦撫臣皇上所歸咎者亦撫臣然則撫臣將安從耶向使陳奉早聼撫臣與馮應京等言豫為收斂禍豈至此而不幸使撫臣與馮應京等言驗而益彰也竊念皇上明並日月威若雷霆雖一時誤信旋即洞燭其姦而痛恨其辱國損威更置撫臣革回惡竪陳奉中外臣民歡頌如雷以為太平可立致也所可惜者臣等爭之不力皇上覺之不早必待激變軍民而後焦思必待辱國損威而後切責計亦晚矣雖然猶可為也方今各省礦使縱肆殃民不獨一陳奉天下欲甘心礦稅之使者不獨一楚人楚未旱荒猶不堪此欲剚刃於陳奉今自黃河已北東極遼左西盡宣大方數千里麥苗已枯秋禾無望民之食樹皮者已無皮可食賣子女者已無人能買甚至有人相食之慘尚可謂楚雖變無傷天下雖有類楚者無能為民雖飢餓不足惜耶夫無傷也無能為也不足惜也皆邪臣媚子所為速禍釀亂之言而可信以為然習狃之耶伏讀聖諭內云務在宣布德意撫輯軍民文武官員不職的及地方應處事宜著不時議擬奏來新撫臣諒能仰體聖意第定變在於呼吸若俟撫臣已至其地始為條議恐有緩不及圖者故臣等切願皇上遣官較速逮陳奉免為亂民虀粉以全國體庶明威出自皇上而太阿不致倒持臣等又讀漢史見卜式有烹𢎞羊天乃雨之奏夫桑𢎞羊為漢興利不過使吏算舟車緡錢未嘗令計人墳墓不論人死亡併告訐羅織而一時盡為虐也卜式猶以為憂今何時也經年不雨聖心已警惕矣警惕之日但恐激於一旦警惕之實恐旋涉於虗文故臣切謂願皇上應天以實撫衆以仁盡撤各省礦稅諸使兼釋馮應京蔡如川吳應鳴華鈺何棟如甘學書王正志杜承芳王之翰車任重宋子受張國及舉人勞養魁等生員沈希孟等嘉與海內更新普天率土又誰不頌聖天子之英斷向者明旨所謂權宜之計今果旋行而旋輟也又誰不服聖天子之大信蓋一舉而中興之業成一日而太平之治就不然人人切齒於諸使則人人思亂在在不堪其困擾則在在效尤誠恐盡如楚而日且加甚以其加於提校者加於諸使縱惡長姦辱國損威且滋甚而乘釁致衆斬木揭竿之風有不忍言而不易戡定者毋謂臣等今日不言也然其機惟在皇上一轉移之而已皇上慨然下盈尺之詔俯諭臣等所請則既渙之人心復萃將離之天意可回眼前之亂孽即消萬䙫之鴻圖永固矣仰體聖明宥過至意懇乞恩憐被逮微臣以光聖德疏總憲臣等伏惟天地不以雷霆而廢雨露之恩仁之至也日月不以寸雲而損照臨之光明之至也我皇上量同天地明並日月其于臣下無不兼容而洞照即如南康知府吳寶秀星子知縣吳一元非為內臣李道訐奏逮繫者哉然方其逮繫而皇上竟憐之不以付詔獄令下司寇擬罪又竟寬之令革職為民是雷霆方施而雨露即繼寸雲無損而照臨自若天下孰不謂一時抽稅內臣雖李道效尤陳增而幸遇聖明在上竟不使九重威福為此輩盡竊今湖廣荆州府推官華鈺經歷車任重又以內臣陳奉效尤李道訐奏逮而至矣夫二官既奉𣙜稅明旨不能與陳奉協恭調停罪則何辭顧華鈺所司者刑名稅課原非其職或陳奉誤聼譛言交搆則有之若謂華鈺受人隂囑而潛令豪棍鼓譟嚴阻書算供役又怒裭委官吳應瑞等冠帶恐華鈺不敢若是悖也至于車任重么麼卑員不過惟陳奉所指麾已耳豈敢玩視違慢以取罪戾蓋其故繇陳奉被御史論劾疑華鈺不為隱諱因而遷怒故甚其詞以脫已罪以激皇上之怒即陳奉亦不意已之罪果免而華鈺等果被逮也據陳奉之訐華鈺與李道之訐吳寶秀等其情同按華鈺之見忤于陳奉與吳寶秀等之見忤于李道其事亦同况華鈺任止年餘事非職掌我皇上察寶秀之情于前必不忍獨重華鈺等之罪于今昔孟軻謂人主愛物一念推之可以保四海今我皇上以憐吳寶秀等之心而施之于華鈺等不過一推廣間耳臣等用是冒昧塵瀆天聼伏乞皇上大擴一體之仁俯察微臣之枉將華鈺等曲從寬宥或勑下法司從公審擬上請則皇上之仁與明真同天地日月而無知稅使不敢再作威福以傷國家平明之治矣臣等無任懇切待命之至天變非常不畏可駭聖恩倒施衆望益孤懇乞皇上亟推喜慶之恩力修挽回之政以收人心以保泰運疏總憲頃自陵樓橋樹之災臣子悲嘆相向謂不知何如修省乃可格天及睹燕趙內外城垣屋廬摧圯之狀又聞沉溺露居之衆家乏宿糧野無遺穗或質錢賣妻鬻子或挈家别井離鄊千里邦畿一旦落寞如掃而各省既久困𣙜採如齊魯亦苦水關東西又苦旱衆謂即蠲除亦無救於死亡而天下事不可為矣臣等謂聖恩如天苟沛德音猶可以聨既散之心而望來嵗收成之期注目聖壽大喜必念所懼求所謂當天心者先停礦稅併及用人釋獄諸務寧煩臣等再言昨接邸報見欽賞礦稅內使王虎陳增李敬髙淮楊榮等或蟒衣玉帶或內府騎馬或嵗加祿米若干大駭見聞蓋今日之天災人禍皆此輩擅作凶威無一處不被劫虐無一人不極怨恨而天方以非常之災警惕之也即取此輩甚者刑戮次者斥逐尚不知天心能回與否而以剝脂膏供孝順故冒此恩私或此輩中之有良心者亦苦與無賴同而耻受之也蓋往嵗無災行之已乖國典今日災甚沿之更忤天心可駭也可懼也誰其以苦藥進而速已今日之病也况平播將士血戰勳庸敘録已數年矣尚未得旨死者墓有宿草生者景逼桑榆既已灰豪傑報效之心沮驍雄陷陳之氣而獨於攘奪民財戕害民命之內使眷顧殷勤有加無已無乃賞姦而義罪乎天下傳之史册書之皆謂皇上薄於勞臣而厚於聚斂之臣天之所惡皇上反為之優崇民之所憤皇上反為之褒賞誓修實政之語果屬空言五內如灼之憂頓弛初念天下從此窺皇上之忘天下而皇上詔旨亦從此不信於天下良民無樂生之心姦民有喜亂之望瓦解鼎沸其為宗社之憂豈細故哉臣等深為此懼不忍不冒煩瀆力請伏願皇上無忘恐懼修省之心亟寢濫恩幸錫之命罷礦停稅用人釋獄速賜乾斷施行其於消災弭變之方當非小補臣等無任惓切待命之至慶典在即懇乞聖明寬逮繫併停礦稅以召和氣以延聖壽無疆疏總憲臣等竊念國家內設三法司外設撫按及按察司多官以刑罰關繫民命一不中則民無所措手足故祖宗朝重之未有以中使之言輕逮官民亦未有以𣙜採之故輕遣中使令其威挾撫按有司者又未有任中使之參隨棍役竊弄威權以漁獵小民者今漁獵日益甚而逮繫日益嚴蓋諸棍役為中使謀非多進以求皇上喜則有不奉命之禍而且無利欲禍免而得利即移禍於民不恤又非以阻撓之説激皇上怒則權不重而無大利欲權重而大得利即併禍官民亦不恤今皇上果喜果怒而利大半歸諸中使棍役矣不然劉有源之萬六千程守訓之數十萬從何自來而獨一劉有源一程守訓已耶夫皇上之喜怒皇上之威福也名雖竊於中使實則落於棍役內何有於法司外何有於撫按即撫按且數為齮齕不安於位而守令佐幕舉人逮矣生員逮至二三十名矣何論軍民或棄之江或毒以刑或掘其塜或折其臂或拶其乳或坐視羣姦如戲者不可勝數此何法也欲何為也無非為財貨也而財貨又大半入中使棍役也近棍役之外又爭請兵或徑招兵陳奉以千計髙淮陳增馬堂以百計合各省不下萬餘餉將安出倘未激變何以兵為既激變矣當罪激變者以其得已而不已也當寬為變者以其不得已而不已也則民服而變自消若但深求其不得已者寬縱其得已者是激之者不但中使棍役必待變成然後已若非大變亦不已是速之使變也况所招之兵類亡命無籍喜亂偷生始難於養終難於散始令之戕民終將以自戕至於自戕而其究豈臣子所可忍言蓋中使之始而得利也亦喜今而知有禍也則懼故不得不為招兵聚黨騎虎不下之計然虎豈可終不下而可一面獵貨一靣防禍耶亦愚矣方今邉塞有脫巾之兆司農無應發之錢誰不寒心而又使閭閻重足蹙額之地雜以狐假虎威之勢縱其魚肉屠戮之慘恐瓊林大盈之時亦未至此我皇上一聞此等景象宜不得待臣等之詞之畢然而天聼猶髙豈謂東倭西播不難平安何內地之足虞臣等竊聞有國家者非無賄之患無令名之難以今所聞閭閻業已盡如陷阱荆楚業已盡在水火縱其民甘心萬萬無虞然令素所戴我如父母者一旦為魚肉為灰燼不廣戾氣而傷和氣耶且令後世視我皇上為何如主臣等為何如臣臣等今見南北中外諸臣及四夷君長鱗集闕下欲以祝延聖壽竊以為天人相感以心不以文若第襲嵩呼舞蹈之儀而不以感召和氣祈天永命之道上陳則亦文耳故臣等伏乞皇上開霽天顔簡查臣等屢疏俯賜電覽將近逮知府蔡如川推官華鈺知縣韋國賢王尚志經歷車任重巡簡陳資鄊官吳應鴻舉人勞養魁生員張聚奎沈希孟等在內付臣等法司在外行撫按審究明實奏請定奪其礦稅各使及參隨官役盡行收回橫惡如程守訓先正刑章民有不舉首鼓腹以頌皇上如堯舜禹湯文武者臣不信也而天心可格上壽可臻愈於靡文祝禱萬萬矣况為堯舜禹湯文武也逸而臻上壽為瓊林大盈也勞而多隱禍昔之揭竿草澤以為人毆民為人乘亂者非內地之民以為無可虞者耶而國勢因之矣故曰可畏非民又曰民惟邦本本固邦寧臣等又聞壽者受也受天之佑也能必皇上以天下臣民之心為心可以受天之佑而後天之心亦為天下臣民而佑皇上以壽耳惟皇上垂聼臣等不勝延頸懇祈之至自陳不職乞賜罷斥以公考察疏已亥察典準吏部咨該本部題為遵舊例嚴考察以厲庶官事內開兩京官員六年一次考察四品以上及翰林院學士例該自陳其各衙門節年事例本部會同都察院并該衙門堂上官考察分别奏請定奪等因奉聖旨是這應該考察官員你部裡會同都察院從公甄别來説不必盡拘數目日期照二十一年例行欽此備咨到院臣例當自陳伏念臣猥以凡庸遭逄明盛蒙恩拔起冒躐今官有激濁揚清之心而力則靡逮有維風持紀之責而實則難酬况蒲栁之質望秋先零而夙昔之愆自知甚審兹當京察職宜品評誠恐鑑别不精去留失當不惟有辜任使何以風勵人心伏乞皇上慎重兹典先罷臣官别選才望以充斯任庶庸劣免塞賢路而斥陟公明矣奉聖旨卿職司總憲公正清肅宜益用心甄别庶僚以飭風紀不準辭吏部知道外臺關繫匪輕仰懇聖明亟點撫臣以奠封疆以資彈壓疏總憲竊惟國家建官於都察院外設巡撫皆帶院銜凡以為綱紀重也近復朝鮮定寧夏平播州皆以二三都御史之力然有臨事暫設者有各鎮額設者大率事至議設則力倍功半額設則事半功倍故巡撫或有升遷事故例必候代其候代不過閉門靜候即官屬不數延見即丈移不槩批行若既不留矣而又姑留有可用者而不即用是蓄疑於留不留用不用之間而不論事之濟不濟也即施之庶官庶政且不可而况開府重臣繫一方安危者乎臣等竊兄延綏士卒解體慮虜再犯遼左文武易志致虜益驕應天福建海波江濤急在防禦積逋重徴急在輯寧撫臣王見賔等既奉旨回籍矣猶然以解任之官寄疆埸之重求去難展布又難是奪其權而責之任也豈視天下無一可任之臣視地方無一將然之慮視外侮無一難了之患恐他日任之慮之患之晚而益難整理益滋隱禍不止事倍功半已也然與其疑而不用不若用而加愼今九卿推舉亦公矣惟皇上更擇其尤使司一方重寄蓋今之撫臣亦甚難我皇上鑑别諸臣似猶以舊日見聞疑臣等竊開古今名臣以屢挫抑而節操愈堅政體愈練者甚衆故一眚難槩終身使功不如使過內又有挫抑原非其罪者切願我皇上愼簡勿疑以難者畀之使地方早受彈壓之益即臣等溺職於內得撫臣舉職於外綱紀必大有禆而疆埸隱禍庶可望其潛消以固金甌於無疆之休矣懇乞聖明亟定國是以一衆志以保治安疏壬寅臣惟國家所最宜定者國是國是不定將上下日昡惑於似有似無之言使有過應劣處應外轉姦人得乘之以肆無稽之説而逐異已且使首相沈一貫不安於位久杜門而不出則今日之大可駭者臣辱言官之長不可不明言以剖羣疑而定國是孰應劣處御史于永清是也孰應外轉都給事中姚文蔚是也孰為異已吏部諸郎之不聼改科秦人多口之日非永清是也臣若仍默不言恐滿朝終不知國是終不定且永清之惡臣實縱之亦不能無罪蓋永清之按秦也禮遇臣特厚比其行臣且有言以贈惟臣出關道路多言永清之歸囊甚衆入京臣鄉人又爭言永清之括贖鍰至數萬會各道缺員亦望永清或改可免然永清則知而心畏之矣故當臣參廣東巡按顧龍禎即倡衆疏救實急急以相左之迹見庶幾臣避嫌而已亦可免各御史不知也時臣亦謂言官之體面當存即異同何妨既假子幼力却湖廣苦差臣亦準從今嵗又預謀兩京學差有勸臣姑令南以滿其欲而緩其毒者臣難之而永清益畏乘注順天差則力促馮應鳯參臣應鳯知其姦不應又向人曰馮御史欲參我止之矣向臣曰馮御史爭差不遂成疾矣應鳯肆差已滿應管京畿河南等道何嘗望差順天臣亦何嘗預許而橫肆鼓弄不惟臣苦應鳯亦苦矣又乘趙文炳推外則力激文炳曰目前還入年例致鬱而疾死文炳大有功於晉楚臣心器之止因代後發疏稍遲恐後御史效尤故量補副使副使豈陷人之穽而橫肆鼓弄不惟臣苦文炳亦苦矣又乘吏部尚書李戴引疾則肆言曰臣欲過吏部臣與戴為三十年莫逆友見戴疾且無後對臣妻子曽垂淚對科道田大益等曽力言戴不可去而忍幸災又乘劉九經疏有十月南山之語不過書生期望老成則與文蔚共肆言曰秦人欲擠首相正與臣過吏部之言同時出豈不寃哉臣與首相同舟同憂四年矣居常相約以調和人情為主首相嘗曰人苟可用雖夷類亦録臣實心服而忍聞鄉人有擠首相之言耶且擠之欲何為蓋二憾又有欲實擠之者矣在永清不過欲盡逐秦人之多口之能考察已者而會文蔚推外之後迫欲從吏科以轉京堂乃求之不遂遂兩相倚為一拳兩虎之謀使自相攻而坐收漁人之利此一網也打盡四司之長蓋不準改科者鄧光祚吳仁度也日非永清者趙邦清其一也而侯執躬則池魚之殃耳乃草蛇之驚又藉以撼倪斯蕙矣然未已也永清即以其計陽翼九經爭班而隂陷之九經不知也九經又從永清恨臣規切參董裕默以參臣是又誘秦人自相攻也又謂其疏出李應䇿手更有參首相語為九經所刪不將以莫須有之言為不可易之案乎頃又齮齕牛應元會推之議曽引九經疏中語為陷穽地此一網也將半及于秦人矣于時首相不知也吏部四司之受害者不知也衆言官不知也雖文蔚亦不知也蓋二憾以其術籠人而永清又以其術籠文蔚總之部郎交搆之釁則有之秦人多口之謬則有之而強以無罪為罪強以不貪為貪強以不參為參強以不黨為黨則二憾之為之也尤可惜者吳仁度未交搆又無口過亦入網無一人不為仁度屈亦無一人敢為仁度言則以二憾之故也惜哉今之天下將令一黨字禍之而臣深願首相自信勿疑速出視事以先國家之急其內外臣工之藏諸腹者諸臣不必深探苦逆中人以莫可解之罪但形之章疏見之施為有不公不法重則置以刑辟輕則斥之田里使人不得以空言而駕實禍參照福建道監察御史于永清據貪狠如狼如羊論閃爍若鬼若蜮行李滿道怨恨不止一方舞智濟私變幻久干公議紀綱重任豈可濫竽陵替頺風幾于掃地戶科都給事中姚文蔚營求力竭傾陷機深是非之清亂已多去留之關繫不淺于永清本當照祝御史例行提括贖與經過夫馬文卷重究念憲體姑與姚文蔚從輕量議示懲伏乞皇上宣諭閣臣沈一貫即出視事以圖化理大奮乾斷將于永清姚文蔚分别降調外任以為亂紀肆毒之戒勑下吏部併本院嚴飭各衙門虗心持已夫愼秉公縱有錯誤不妨如趙文炳昔年改正竟完令名若結黨陷人及以黨字網錮泄忿或有為人報復聼臣等及科道官據實迹參究庶國是可定而天下治平矣乞處貪橫併乞賜歸以重風紀疏總憲臣於本月二十三二十五日兩疏參于永清姚文蔚未蒙皇上允行不意二臣辨疏一上即蒙允行是臣言不足信二臣之言足信也在姚文蔚以糾姦為橫以自已為忠臣義士以他人東征之功為已力時臣尚未起家與今日事何干臣不必更言惟是于永清以御史為臣糾乃敢肆言反噬可駭也疏謂趙文炳之死繇臣趙文炳升副使于永清雖激之使鬱然其死亦數也不然何近科道如張鳯翔王夔龍亦客死亦激而鬱耶趙文炳聞升即死聞糾當何如耶又謂注差徇情蓋按安文壁袁九臯之順天皆徇尚書李戴請臣已問戴吾輩曽言此否相視一笑惟于永清之拒楚差戀京差則譎言內顧不得不徇而即以之律人耶二臣皆謂臣謀求吏部則臣前言不為虛矣吏部有缺必推多員即推必請皇上欽點而可謀耶求耶乂謂爭班為是臣言為非今班已定矣臣竊念御史古稱班心今御史不近陛居首而部郎反近陛居首部郎不近廊居尾而御史反近廊居尾年來皇上不視朝科道無多員猶可以後皇上視朝科道偹員恐各御史將恨今日之爭而思臣言或不謬耳其他如陳應春已即革役何乃仍為報怨趙思職原非臣親里人知之于永清不記革職時曽稟臣臣批但力執法為民六字即皆不當與鬪口惟嘆孔子為政七日即誅少正卯止為其聚羣飾邪未至如永清之閃爍又每差歸多扛薦過文武官非百金不謝為清亷有司官苦之甚也且不免誅而于永清素行為同鄉程給事等恥與之伍恥與之談至今同類不可攻他人不敢言臣言之皇上又不肯信可駭也亦可畏也臣不畏于永清之難去而畏朝廷之紀綱法度自此日澌滅盡也臣又嘆近來科道所糾么魔耳撫按所刺狐狸耳于永清豺狼也去百么魔狐狸不如去一豺狼又嘆宋臣蘇洵能辨王安石之姦于未用今滿朝不能辨于永清之姦于久縱臣辨矣而又嘆無誅少正卯之法無誅少正卯之法猶可無蘇洵辨姦之論則不可故申言之又念臣身司風紀為御史侮且火攻痰發目眩耳鳴肉消骨立病不能支矣臣當去不去是猶望吏部也伏乞皇上賜臣歸田以延殘喘特奮乾斷姑降于永清外任以彰法紀姚文蔚原議分别亦乞皇上量懲勑吏部從公酌議請旨定奪施行即臣去而法紀猶存矣奉聖旨都御史總持臺憲整肅百僚有所見聞不時糾彈自其職掌何乃於倡疑搖動各官爭忿之時方行劾奏致生疑惑曲直莫分于永清既經總憲官指摘著調外任用姚文蔚䇿勵供職方今時事可虞大小臣工正宜和𠂻同心共圖消弭如有懷私觀望淆亂國是的科道官據實參來處治卿總憲以來公平正大心迹自明何必抗疏求退還宜仰體朝廷任用忠賢照舊安心供職不允所辭該部院知道衰疾難勝重任再懇聖恩俯允歸籍疏壬寅十一月臣頃參論御史于永清等已奉聖旨處分仰見皇上日月之明使紀綱不致盡廢又荷寵以溫綸亮臣心迹促臣安心供職臣非草木何忍言去時臣又為吏科給事中陳治則指議雖陳治則未信臣心然所言皆於臣有益其期臣言臣當視為參茋以資補禆其疑臣言臣亦視為硝黃以資蕩滌又何忍言去惟是臣年已近七十桑榆有幾止足宜知十年南北三考臣皆與聞有共事臣以此成疾者况臣衰疾轉瞬又當計吏安望再承兼以年來災異頻仍閭閻愁苦軍儲缺乏府庫空虛有不可却杞人之憂臣本院職業又極苦難稱御史升外原於曲成中稍示裁抑非優厚也久不蒙允致上下相疑相猜或修怨反噬暫且不可况嵗嵗皆然此臣之所大苦一也御史晨星數員兼攝且難何暇責備即有放肆如今日所糾者亦不得不姑留以免滋匱乃差滿不得代者怨臣有疾不得告者怨臣臣一身方為怨府雖不得已行令兼攝或暫管以未領勑印甚難行事又有不可兼不可暫者此臣之所大苦二也憂苦交加寢食半廢衰頺之狀人所共見首丘之念日不能忘况在朝在野之臣賢於臣者何限若更貪戀隱忍不知在得之戒亦非所以崇恬退而廣風厲也臺紀之謂何伏乞皇上憐臣衰疾實非虗假察臣情詞亦於風化有關將臣放歸原籍以便調理别選名賢以重憲職庶臣可免曠廢之咎而國家亦可望有振肅之風矣奉聖旨卿總持臺憲卓有風裁允稱紀綱之司已有旨俞留何又有此奏邇緣臺省乏人年例外轉多所優容各差御史候代日久另議更替有何苦難卿宜遵奉前旨即出供職所辭不允吏部知道衰疾日增臺務日曠懇乞聖明亟賜允歸疏壬寅十一月臣頃疏請歸籍實以憂苦交集又慮及甲辰外計在轉瞬間不可以衰病之身既妨賢路又誤國家三年大典致臨期追悔無及也然幸年來猶有僉都御史陳薦同心分理即臣伏枕猶倚代辦今陳薦亦聞訃當歸左右俱缺臣益孤苦臺署日空文案日閣兼會久雪盛寒觸風則嗽喘不止服熱則痰火又增簡方問醫謂衰年人最忌苦勞而貴靜攝臣如諱疾戀位不思謝事引身一旦風燭難保不其枉皇上不棄帷蓋之恩而重微臣不知止足之誚也耶况臺司非養病之區憲務非力疾可辦去一衰病進一壯健去一不足有無之臣遴一所可倚賴之賢不庶幾令臣之責或可稍釋臣之疾或可暫瘳而臣之去亦於國家不為無益也耶伏乞皇上憐察早渙恩綸允臣歸籍以便調理别選名賢以振風紀臣不勝延頸懇切之至衰病增劇懇乞聖恩早允歸籍疏壬寅十二月臣近三具疏以衰病懇乞天聼俱未蒙允臣竊自念鄙俚之詞不足陳悃愚昧之情不足動天繇臣人微望輕雖至衰殘委頓不得已以骸骨請而亦不可遂也臣但自愧自尤念臣通籍三十八年歷官十有八任雖鐵石未有不穿且碎者而敢自諱以為不衰臣之心跳耳鳴脅痛膈痞人雖不及見而鬚髮盡皤肌膚全消皮骨僅存之狀有不可得而掩者人孰不見亦孰不駭而敢自諱以為不病大略臣之衰如頺波東逝不可復西臣之病如敗葉遭風不可復榮所仰賴者皇上用臣于未衰未病之前固春夏生長𢎞恩也放臣于既衰既病之後亦秋冬收藏之完澤也臣有此萬不獲已之情不得不再瀆于君父之前伏乞皇上憐允使臣早遂生還臣曷勝仰戴激切之至奉聖旨卿前疏求去朕已有旨眷留如何又頻章固請非人臣急公之義宜善加調理稍可即出供職毋得再有陳辭吏部知道衰病難瘳五懇聖恩早允歸籍疏士寅十二月臣頃屢乞骸骨未蒙諭允仰戴皇上俯憐老馬不遽棄之田野又念臣一家四世蒙恩臣一身竊祿三朝四蒙皇上拔於廢棄即捐糜難報萬一寧忍數瀆天聼以求必退顧臣衰病之實已詳屢疏近乂兩目昏花不辨文書細字臣亦粗通醫藥再與醫官朱宗吉等議投藥餌頻試不效反增他症益信衰朽非藥力可扶猶之燭然委之風所立見消滅移之靜室尚可徐盡况臣又垂燼之燭耳即移靜室能延幾時若懼瀆主之擾託戀闕之名以難保之軀妨賢者之路為竊位之計則臣真無耻無識不忠不義之尤矣臣有此萬不可愈之病萬不可已之情不得不更懇瀆于君父之前伏乞皇上垂憐早頒綸音即放臣歸以便調理臣曷勝迫切瞻仰之至久病曠職六懇聖恩賜允歸籍疏癸卯正月臣自去嵗十一月以至嵗終屢疏衰病之實上瀆天聼俱未蒙允仰戴皇上俯憐犬馬舊勞不即棄置臣非草木能不感激私自籌度圖所以畢竭餘力上副宸𠂻若倍加調理或可仍出就列乃今習靜服藥又將一月前者屢遇節慶以兩目紅腫雖于臣寓焚香祝延聖壽而方寸踧踖有萬萬不能安者以是火益上炎目益欲盲又會臣院副僉二都御史一時俱缺不得已于臣寓閉目勉強簽判公移往往失格且致風紀森嚴之地將三月無一入院振揚之人皆繇臣不早退讓所致臣惶悚益甚疾勢益增諸臣有就臣寓親見臣之目病知臣之心跳形枯非一時可瘳者若不及今力懇于君父之前恐目前陽氣盡泄肝木日盛將令臣之目益不可醫臣之心火益不可降昔有因心蕩而知其不永者臣今安敢更諱而不重首邱之思又安敢虗據臺銜而不為風紀得人之計伏乞皇上垂憐臣病實非矯飾蚤渙綸音準臣回籍調理以延殘喘勑下吏部推舉名賢以代併查列原推堪任副僉二都御史諸臣姓名上請欽點令其到任佐理庶臺綱不致盡費而臣罪亦可少逭矣久病遵例陳情七懇聖恩賜允歸籍併乞允辭印俸疏癸卯二月臣屢疏衰病上瀆天聼俱蒙皇上垂憐不即棄置臣感戴渥恩竊恨目益昏花心猶搖曵不即稍痊以效犬馬臣之數也末可奈何念自去冬十一月初一日注籍至今月初一日已滿三月例應住止俸薪臣曷敢違再念本院印務關繫國紀副僉兩缺代署無人臣於此有曠官塞賢路之羞又有皮盡毛安附之懼不得不冒煩瀆再瀝懇於君父之前伏乞皇上憐臣病久情鬱準臣回籍以便調理勑下該部推舉名賢以代或先擬部臣一員兼攝院事將臣俸薪照例扣日住止併查列原推堪任副僉二都御史諸臣姓名上請欽點令各到任管事庶臺綱不致盡廢而臣心亦可少安矣病曠日久濫冒非宜乞允歸籍併允辭印俸疏癸卯二月臣頃懇辭印俸上瀆天聼蒙皇上不即垂允臣仰戴皇上俯憐老馬或識故途姑令伏櫪以肉餘骨臣夙荷三朝如天之澤豈無一念戀主之懷念國家舊例凡大小諸臣患病三月必辭俸薪固所以别授事詔祿之典亦欲使抱疾杜門者不得貪昧竊據以成亷讓之風二百年來未之改也况臣痊可無期曠廢更久臺務實難卧理代署不可無人故不得不更冒煩瀆之罪以瀝請於君父之前伏乞皇上垂憐準臣回籍以便調理勑下該部推舉名賢以代先擬部臣兼攝院事將臣俸薪照例以本月初一日住止併查列原推堪任副僉二都御史諸臣姓名上請欽點令各到任管事庶臺綱不致盡廢而臣罪亦可少逭矣久病曠職懇乞聖明俯允歸籍併乞允辭印俸疏癸卯三月臣頃遵例兩辭印俸乞歸俱蒙皇上不即憐允臣仰荷聖恩又念代署無人院事不宜久閣不得不力疾蒿目強為宣逹然空署已肆閲月矣以彈壓庶僚之司令一五日京兆之身姑取事不盡廢謂風紀何蓋臣以堂官糾御史不能免其反噬數自循省雖無病或病而即愈亦不宜厚顔復入公署以辱朝廷設官肅僚之體况臣病日益增劇目日益赤腫先後與臣患病如禮部尚書馮琦已卒臣年視琦尤長十有八嵗若不懇乞速歸則亦琦之續耳欲正首邱難矣伏乞皇上垂憐準臣回籍勑下該部推舉有望以代先擬部臣攝印將臣俸薪照例以二月初一日住止併查列原推堪任副僉二都御史諸臣職名上請欽點令各到任管事庶臺綱猶可復振而臣罪亦可少逭矣病劇難痊十懇聖明俯允歸籍疏癸卯三月臣屢以久病乞歸併遵例辭印辭俸俱蒙皇上未允臣仰感聖恩豈不如犬馬戀主又值副僉兩缺苟可力疾而出何惜捐糜念都察院何地朝廷風紀之地也都御史何官朝廷風紀之官也諱病戀官則辱已又辱朝廷因病去官則雖未必全已實可望皇上别簡更新而全國家維風振紀之體蓋臣之力不能舉職者已知自懼自愧而又心日益搖曵如旌目日益昏花若盲近感尚書馮琦侍郎敖文禎之變益知延風燭之計盡而正首邱之望難人情迫則呼天疾亟則呼父母皇上臣之天也父母也故再瀝迫切之情以瀆天聼伏乞皇上垂憐準臣回籍調理勑下該部推舉有望以代或先擬部臣攝院將臣俸薪照例以二月初一日住止併查列原推副僉二都御史諸臣職名上請欽點令各到任管事庶臺綱不致久廢而臣罪亦可少逭矣病廢曠官日久十一懇祈聖恩憐允歸籍疏癸卯四月臣屢乞骸骨併遵例辭印辭俸未蒙皇上賜允臣仰感聖恩懼瀆天聼強自倍攝冀仍勉出以畢犬馬未盡之力今自前月陳乞以來已踰三旬延醫簡方日投二三劑不意目赤腫愈甚心搖曵愈急搖曵之苦雖難以示人赤腫之狀實人所共見蓋衰病之人非藥力可回如木已枯剝落或有遲速而未有竟不剝落者臣已心安之惟是一息尚存不能不抱曠官之懼况官以風紀為名可使歷三時經半載無復振刷整飭之期實以臣不速解任之故也臣罪何辭而心何安與其職日益廢而生日益促使官與人兩病不如罷旦暮之人以重紀綱之任使人不為官病而官亦不因人廢臣縱去而即填溝壑庶幾代臣早一日有人則早一日有更新之望也故再披瀝于君父之前伏乞皇上垂憐準臣回籍調理以延殘喘或正首邱庶臺綱不致久廢而臣罪亦可少逭矣久病曠廢十二懇祈聖恩憐允歸田疏癸卯五月臣屢乞骸骨未蒙皇上賜允臣仰感聖恩素以分義自朂安敢不冀苟延力疾以圖補報萬一惟念臣以桑榆已暮之景又當心目交病之時今即蒙恩而歸能保林泉可免速化實恨狼狽之狀既難復振而以臣一人之故使臺憲風紀之司歷六七月虗無人焉安望澄清安望國脈不病誰承人乏甘心腆顔而借戀主之名以成持祿之態臣實羞且懼焉臣不懼衰謝懼臺臣失職使綱紀陵替自臣始也臣去則陵替於前者或免陵替於後不去則失職之中又失職矣故不能不懼然幸聖明燭照於上縱不為臣計而必為朝廷之法紀計也故再控此𠂻曲以瀆天聼伏乞皇上垂憐準臣回籍調理以延殘喘或正首邱庶臺綱不致久廢而臣懼亦可少釋矣久病久曠十三懇祈聖恩憐準解任疏癸卯六月臣惟國家所恃以風勵中外者法度也藉各御史以司澄清藉都御史以司振飭如網有紀而又有綱縱各御史得人而非有望及無病者為都御史亦難齊一衆志而使法令必行臣病七閲月矣近心益如鹿撞目益如霧翳而又兩耳時如蚊聚時如雷轟甚則如火烘烈有聲而出此豈久於人世者而猶責之伏枕力疾苟承缺乏姑無廢內外公移而止以待病日入膏育如諸臣之以匶歸亦臣子委質宜然然遲一日則曠廢一日國家紀綱之謂何而可令其曠廢徒滋之懼而益其疾又以塞賢路而使南北朝野之賢於臣少於臣而無病者又日嘆馮唐之老而積汲黯之薪且將誤目前大計尤臣之所大懼也臣有此迫切不容已之情安敢不瀝血以陳而無言待斃以處於此伏乞皇上垂憐蚤解臣任使速回籍以正首邱庶風紀不致久廢倘臣因謝事可以苟延殘喘則臣不死之日皆皇上再造之恩而臣犬馬未盡之誠將效銜結之報於異世矣久病久曠十四懇祈聖恩憐準解任疏癸卯六月臣久蒙皇上如天之恩雖衰病猶不即擯斥雖以廢紀綱誤大計請猶不即憐允臣于此宜如犬馬戀主以報皇上深恩惟臣之言衰病者私也言廢紀綱誤大計者公也臣子在官沒身為榮不可言私使在官而少有補禆不至于廢不至于誤亦不可言私今所廢者紀綱將誤者大計而大計期又迫矣縱及今更置猶宜就近恐逺者未必即至終歸于誤是臣不早力請之故也罪將何贖然在今日則猶可及也臣為此萬分惶悚每草疏輒汗下魂飛故不敢不冒煩數之罪再瀆天聼伏乞皇上垂憐蚤解臣任使速回籍以正首邱庶紀綱不致終廢大計可免竟誤倘臣因謝事可以苟延殘喘則臣不死之日皆皇上再造之恩而臣犬馬未盡之誠將效銜結之報于異世矣久病久曠十五懇祈聖恩憐準解任疏癸卯七月臣頃十四疏以衰病懇請皇上憐允歸籍恐誤大計蒙聖旨都察院綱紀百司堂上缺官憲務孰舉卿久調攝安痊豈得頻章求去宜即出視事不必再辭吏部知道欽此欽遵臣待命七月忽奉溫綸如馬已老而猶給之芻菽草已枯而猶潤以雨露臣即景迫桑榆病迫狼狽何忍復懷歸志不委此身於官惟念當此踰六望七之年火動心跳已十年今又日甚目昏霧翳已二年今又日甚更醫試劑無一可效實臣受福太過晚命乖蹇一至於此前懼將誤大計非故誑言臣自審自量即尋常公移且簡閲之難况欲合各省直數千里外數千萬人之妍者媸者一一評品令佐吏部而求去留之當以風吏治必不能矣今期已迫萬一臨時臣力不能強病不能起於其時不得不擇人以代是人已渴而方掘井已溺而方覔舟其能及乎罪將誰諉臣是以再三惶悚再三籌度與其誤事於後不如懇請于今伏乞皇上垂憐準臣回籍調理庶紀綱不致終廢大計可免竟誤倘臣因謝事可以苟延殘喘則臣不死之日皆皇上再造之恩而犬馬未盡之誠將效銜結之報于異世矣病篤難更強支十六懇祈聖恩憐準歸籍疏癸卯八月臣頃十五疏以病曠懇請皇上憐允解任蒙聖旨憲務久虛前諭卿即出視事勿得再辭如何又有此奏宜遵承勉出不必復以疾辭吏部知道欽此欽遵臣聞命感泣念聖恩如天之髙如地之厚生平既蒙鴻造有疾更荷春㴠雖匍匐而出實臣之心雖捐糜以圖亦臣之願惟臣自六月初旬以來前疾未愈又感風寒遍身如火不得不用解散之劑既解皮踈裏虛汗下不止者旬餘以致頭眩氣餒舉足欲倒又不得不用補益之劑既補火益上炎目益昏花蓋衰殘之人解之不可補之亦不可屢延醫官朱宗吉髙崇孝屢投劑不效皆謂必謝事靜攝方可少延臣不意福薄災深竟狼狽至此矧臣衙門關繫紀綱最重若以病勢阽危之軀乘衙門匱乏之秋為腆顔尸位之計而不顧憲體之有損與否不求亟卸重任豈惟生還難望實為風紀之羞殊甚伏乞皇上垂憐準臣回籍調理庶紀綱不致終廢倘臣因謝事可以苟延殘喘則臣不死之日皆皇上再造之恩而犬馬未盡之誠將效銜結之報於異世矣奉聖旨卿秉憲肅紀輿望所歸調攝已痊豈得固求謝事宜即出供職不準辭吏部知道屢奉聖諭惶悚不寧久苦劇疾調理不效懇乞聖恩憐允休致以便生還疏總憲臣頃乞骸伏蒙聖旨紀綱重地朕眷留老成未嘗不切屢疏乞歸殊負朕意副僉二都御史自當朕簡用卿既求去何又瀆請市恩還遵屢旨即出供職吏部知道欽此欽遵臣跪誦綸音且感且泣不但自願畢此餘力以報且當倡率庶僚力戒市恩以效矢公為國大義故自聞命以來倍醫力調以冀稍痊即出奈自省自愧昏憒無倫即一二引躬之疏尚多錯謬况風紀之責有萬分難于此者安望稱職連夜不眠數思數恐火益日炎頭日益暈目日益赤腫欲疏請則深懼復負聖恩欲輿疾而強朝參力疾而強治簿書則又犯瀕死不知止足之戒且誤臺紀而損國體又臣之所大懼也兩念交橫不得于心又復心口自度與其誤臺紀損國體致大臣中有瀕死不知止足之人不如仍吐真情自哀懇于君父之前猶可望天顔開霽施雨露于將枯之草木也伏乞皇上矜憐允臣休致使遂生還臣感皇上始終成全之恩生當歌詠太平死當銜結無已臣不勝懇切祈望之至奉聖旨臺佐缺人考察咨訪勢期迫近卿屢疏求退俱已眷留如何又有此奏遵旨即出供職勿得再辭吏部知道奏為病劇目昏十八懇祈聖明憐允歸籍以息風波以全風紀疏癸卯七月臣頃為科臣鍾兆斗指摘內稱輦轂之下曲直尚淆臣於夲月十二日具疏懇祈皇上放歸又不得不詳臣所以先糾于永清未盡言其貪狀為存言官之體今欲别曲直而核是非之實則十餘萬之贓不可不嚴提括贖文卷以正法紀迄今候命未蒙皇上允行竊念風憲何地豈有疾所能卧治都御史與御史相臨何體參一御史竟不能動而為其侮為其多方搖惑以為復原官之計臣於斯時雖無病亦當避其鋒而退况臣病已深目已將盲火炎心跳欲出諸口更醫投劑毫無效而證隨投隨增臣竊自危以得入函谷關為幸而先是諸臣仍有以悻悻責臣者臣猶苦之今鍾兆斗慮及大計非臣一人徒寄空名所能秉衡正與臣所苦所不敢當之初意合是臣生還而得正首邱之幸也惟是臣去之後萬一臣之前言竟不蒙採納則二百餘年之紀綱法度自今日廢昔人不患身病而患脈病不患國家不治而患無紀綱良有以也不可為今日慨也耶蓋臣初意欲合四海九州之英賢以效共惟帝臣之願而竟不能欲如大易之渙小羣以成大羣噬嗑之齧其間以為合而亦不能以孔孟自反自責之言勸勉素所相信以為銷融挽回之計雖幸相信而欲他人信亦不能而會病不可醫人言又不能免則臣之力竭臣之情苦始則但憂臣職未盡今則不能不憂生而恐首邱終難正耳伏乞皇上矜憐早放臣歸以便調理而免於風浪之險再乞皇上為國總攬乾剛簡臣十二日前疏勑下吏部法司施行庶是非不致終淆而風紀亦可復振矣病勢阽危十九懇乞聖恩憐允歸籍以冀萬一生還疏癸卯八月臣近十八具疏以病懇瀆天聼俱未蒙允臣感聖恩如天雖人言再至猶有不忍去之心惟是臣先患心跳目痛今其目日益赤腫諸臣有就臣榻而見者非可假也近又於二十四日因起稍早感冒風寒致遍身發熱如火迄今卧牀不能飲食者五日矣令醫診脈云數動止醫書最忌脈病臣脈病矣風燭之滅冬葉之落可立而待此身不保安敢毫有他冀若必待死而令以襯歸亦皇上之所矜也故倚枕不能成文以狼狽之狀直陳於君父之前伏乞皇上憐允使臣早歸萬一得正首邱即皇上始終成全之恩也曷勝仰戴激切之至久病屢犯屢篤二十懇乞聖恩憐允歸籍疏癸卯九月臣近十九具疏乞骸未蒙皇上允放臣感戴聖恩如雨露不遺衰草朽木雖狼狽猶當力疾強出曷忍數言去惟是各衙門事有煩簡職有間劇簡而間雖有疾不難卧治煩而劇雖無疾猶恐不稱都察院何地目前激揚甄别有萬萬不可草率而姑了事者臣之壯也無病也尚不如人今衰矣病矣自審不能辦此久矣近於七月二十四日感冒風寒幾不能生調理旬餘稍起牀褥又於今月十二日內外兩感益難調理補則頭增眩暈宣則氣日消耗如風燭而人復撲之冬葉而霜復催之自保不暇遑恤其他若不自揣而仍畏煩瀆之擾強據憲職至拾越月致使衙門鞠為茂草紀綱幾於盡廢將謂臣不力求去而罪何以委臣有此不得已求正首邱之私又有此不得已恐誤風紀之慮故不得不哀懇於君父之前伏乞皇上憐允使臣早遂生還因免盡廢風紀臣感皇上始終成全之恩當永永無已再乞皇上將臣本院印信先委部臣一員兼管容臣調理數日登途勑下吏部查原推副僉二都御史列名上請欽點各一員使速到任風紀幸甚奏為乞恩辭免特陟以安愚分疏甲辰四月頃吏部以臣二品六年考滿復職題請加恩仰奉聖旨溫紀資深勞多特加太子太保給與應得誥命欽此臣聞命自天措躬無地伏念臣行能淺薄才識踈庸猥荷聖明誤蒙拔擢前叨南省已濫鴻私兹總臺綱尤慚蚊負忽再考績幸免黜幽臣方重自兢惶勉圖驅䇿詎意帝心之簡注更蒙錫命之駢臨寵以資深勞多之褒加以春宫太保之陟恩頒曠典遇際非常臣惟綸音貤纍世之親不能不感且喜又揣分量有踰涯之驟不能不懼且慚蓋皇上以不測之恩為振紀作忠之勸而臣愚將何修以報兹折足覆餗之虞此臣所以不得不懇切控辭以仰瀆於君父者也伏望皇上鑒臣知足之心矜臣在得之戒收還成渙容守舊銜庶不致有維鵜之譏而亦可免負乘之辱矣奉聖旨卿端肅精敏積有年勞加秩已有成命宜承恩眷不準辭吏部知道天心仁愛有加聖諭虔誠特至懇乞乾斷亟圖急務以保泰運疏總憲頃聞雷火焚燬長陵明樓不勝驚懼旋奉聖旨有誓修實政之語仰見我皇上痛栗精誠視前此遇災而修省者萬分倍切蓋緣先是日食地震山裂河竭與夫宫殿陵社樹木之災已惕于心今又災及于定鼎創始之陵視往嵗孝陵之火皇陵之氷雹風雷尤為迫切而與皇陵又同五月二十三日尤可駭異是天心無日不厚望我皇上轉移故昭示頻數無已如父母之訓愛子我皇上一聞此災遂翻然震警求所為消弭者至以誓為言此其一念已上通于天不啻桑林之禱輪臺之悔而災未有不可弭者臣等叨列憲司責在獻納若猶贊襄不力有所見聞不速上聞是負皇上亦負天而竊計目前所最應停而不可姑待者莫如礦稅蓋礦稅之初興也夲為大工未成不忍加𣲖為不得已權宜之計耳未幾即奉不日停止之旨蓋皇上亦已知不可久謂操縱繇我果變生直操之耳豈期聖心不忍加𣲖乃其貽害萬倍加𣲖竊恐事機一過雖欲操之無及假使礦稅果有禆于工作臣等猶為司空計左而况工作原不賴此且始猶開採繼則民力竭包陪矣始則中使稱快致正稅耗減而司農司空之計窘繼則中使之計亦窘而復駕漏稅漏礦之説以漁獵無辜者又將盡非相率斃人則人恨不即斃之耳而瓦解之勢成矣當此之時上度天意下度民情中度內使之恣橫悔之則已晚而停之猶恐後矣若猶泄泄謂諸臣言害而害未即至言亂而亂未即成是必待變生而後操之也變生而操是猶肉垂斃之骨而生未可必變未生而操是真畏未忘豫之天而怒猶可解不然何昔商髙宗一畏民碞而即消雊雉之災周宣王一憂民瘼而即回彗星之變我皇上又何一步禱而時雨大澍一建元良而日和星輝一發善念而聖躬即汗即康寧我皇上試取前日事與今日默思併觀然則天人之相通與否不待臣等之言之畢而憬然警悟軫念首陵大變必非偶然先收礦稅官役以解閭閻之困再勑該部祭告郊廟各陳職掌或舉朝講之禮或補中外之員或釋囹圄久繫而止不急之工或諭大小臣工各遵德意而實心供職毋襲修省虛文則上下交警而天變可弭宗社靈長之慶在皇上一感格之耳臣等無任隕越待命之至國禍日亟天聼日髙謹合疏力懇銷弭疏臣等聞之子莫不願其父之慈故不辭斥撻以進規臣莫不願其君之聖故不避刀鋸以極諫夫豈不知斥撻之足羞刀鋸之可懼誠見夫君親失道而家與天下隨之身亦隨之有大不忍于坐視者迫其𠂻也邇來災變日甚一日大小臣工章數上而皇上槩置之或取無礙吾欲者間行一二使前日誓修實政之言盡虛臣等亦知煩數無益乃猶瀝膽披肝刺刺不休又豈好為是激聒以速皇上厭惡念臣等世受國恩視皇上如父母未有諌父母不從而遂已者自古帝王之有天下非為可恣睢為也謂天下安則海內受太平之福而已亦永有令名延及後世不安則萬姓有亂離之苦而已亦先受其難誰與共保富貴為子孫利况今天下乃太祖百創艱難列聖憂勤惕厲以貽皇上今才傳二百年餘祚尚未久也頓令天意人心怨怒交結皇上猶泛泛悠悠恬不為怪即皇上等天下于鴻毛奈何以祖宗纍世之創垂而坐隳于一旦也何忍不言易曰履霜堅氷至防其漸也夫漸猶當防况今礦稅之徒始猶橫徴橫斂今且強搶強劫始猶殺人死人而撫按不敢問今殺於人死於人撫按與中涓懼其激而禍益大也亦不敢問中涓奉皇上之命而出儼然一使臣也薄海內外方側目欲剚創其腹以圖一逞而甘心焉必待甘心則國事去而不可為矣京城水災且蒙賑恤各省直數千萬里之民在水火者特皇上未之見耳若因見不見而恩有及不及則民之陷溺何時已而不知此堂下之澤即可以克當天心否又何忍不言天下大勢如人之身身有一節壅則身病天下有一事之壅則天下病今處處缺官處處有遺逸之嘆事事掣肘事事無整頓之期蓋腹心肢體無一不病雖倉公扁鵲不知能治否而但仰屋竊嘆付之無可奈何是臣等不能匡救不能積誠以動皇上所致其罪大矣又何忍不言昔鄒衍盡忠事燕惠王為左右譛而繫之五月為之飛霜今在獄諸臣非拮據勤勞為皇上盡忠者哉祗信橫璫私訐而禁錮囹圄纍年覆盆籲天慟地經月宿雨上漏下濕至詔獄不能容奚但一衍又何怪天雨之淚涕致淹沒之害遍畿郡且異雹異風及於漢兖陵災城陷大駭觀聼又何忍不言古惟宋神宗君臣謂天變不足畏人言不足恤祖宗不足法而青苗手實所斂猶藉以充軍國之用乃竟釀禍宋室以利端一開而吕惠卿童貫輩中外小人引類接踵以中人主之欲以至于亡而今不可寒心耶况天已明示而警之矣明示而警愛豫之天也若不知警而轉為忘豫之天一旦禍起即罄內藏以求撲滅其能及乎又何忍不言自昔君天下者貴執極皇上視諸臣章疏無一當者而獨力執所見然執極不變則為聖為明不然則為執迷今我皇上所執者極耶迷耶試一垂思當不俟臣等之言之畢而燭照之矣臣等靦顔為中外臣民交責又何忍不言凡此非燭之難非克之難在皇上一念轉移間耳能悟而轉移則太平立復而遺國家無窮之福如仍執而不轉移則瓦解立至而成國家無窮之禍其致福也惟皇上其致禍也亦惟皇上皇上又何牽何制而憚不為欲待何時臣等亦知言之輕矣然寧自處于輕而不忍坐視天人之輕皇上亦知皇上聼之怒矣然寧皇上之怒臣等而不忍坐視天人之怒皇上實以休戚安危上下共之有大不忍者迫其𠂻也臣等又聞治病者緩則治本急則治標今天下之病已在喘息呼吸之間急甚矣臣等無竒方祕訣以治標之説進惟皇上米擇而奮乾斷行之或者其有瘳乎伏願皇上亟亟改圖自為宗社計而無以泛常忽之幸甚慶典舉行在即侍從憲臣乏人懇祈聖明裁酌點用以光大典疏總憲臣等竊惟國家之典莫大于册立重國夲也亦莫大于分封重天潢也自古逮今上下數千年二典併行茂膺全福者寥寥實皇上念皇長子體貌充實皇諸子年齡漸長獨裁獨斷明旨渙頒册立分封一時肇舉無論在廷臣工躬逄其盛者咸喁喁手額大聖人之作為真出尋常萬萬即薄海中外愚夫愚婦白叟黃童亦誰不慶主器之有人藩屏之衆建歡欣踴躍更祝願我皇上萬壽無疆實億萬人如一口也竊窺皇上年來凝神大典時勑內外執事官員即一物一儀必協協焉慎重至詳至備臣等叨列法臺仰承聖意凡有事關典禮儀難缺略者亦安敢不殫心稽考期佐萬一備查大明會典及風憲事宜諸書內開册立東宫傳制糾儀御史殿上四員丹墀十二員奉天午門外各二員班次人數載在舊章總之非二十其人不可而隨班拜舞者不與焉目今臺臣落落不過數人湊東缺西顧左失右萬萬不足分𣲖又未可知各差别務姑令兼攝代庖且逆想是日也冠裳簮紱充牣龍墀獨令是豸冠鐵面糾繩肅儀之臣缺而不備倘其間有失儀不恪法當究問者誰其彈究當此大禮需人正值各官待次蓋行取諸臣從數千里而來已三年已考有定序矣與其責效于後不若使其觀光于今仰思皇上前此之不點用非故置之良有待也而今其時矣臣等謬膺總憲職掌攸關故不得不再三疏請伏望皇上俯簡臣等部院考過應授御史及南北科臣酌量點除以充目前侍從且備後日差委大典幸甚臣等幸甚恭陳慎刑始末伏乞聖明鑒察以重刑辟疏臣等三法司近奉旨會問徐州妖犯趙一平等即於九月二十一日共赴京畿道審問已明具招間忽接浙江撫按劉元霖等奏揭稱問完陳天寵等已將天寵等解京臣等以為天寵與趙一平等一事也若到即對審同招尤便候月餘陳天寵始解到而先期臣等相議問刑須協衆論臣等因念南京三法司會問率自下會問而後堂官會審奏請以故獄成多無後議遂與刑部蕭大亨等共為從衆會問之疏尋因未奉俞旨又即約於本月二十七日併陳天寵再審方恨天寵到遲恐係延緩今據御史李以唐揭稱刑部推諉情繇臣等思前議原自臣衙門始本欲得久練刑名者共成祥刑之典以唐見疏出刑部推諉亦無他意竊懼皇上勵精誰敢推諉萬一蕭大亨等之心迹不能明是臣等始從臾之而後又故諉之也將何顔以見大亨况時事多虞雖别衙門事猶當贊成猶當商確若于三法司中反分町畦反自規避正臣等所深戒者除已如期會問具招外其候審具疏始末之概不敢不直陳于君父之前伏乞聖明俯賜鑒察臣等無任惶悚之至申嚴舉刺之典以警官邪以飭吏治疏總憲臣等竊謂吏治之臧否關民生之休戚查得往時大計以來撫按復命或半年後不刺一有司或一年後不刺一方面比及計期實多挂議雖經議處豈偶遺與續縱乎今嵗獨浙江真定各追論一令之前議未定而今方敗露者謂各省直所留盡循良無一可議誰信之乎竊恐海宇至廣臨民之官至衆賢者固有而不賢者未必不冒似是之名才者固多不才者未必不遺所斥之外雖甚稽察猶不能無法外遺姦况可任其姑息以博長厚之名在昔漢吏稱循良實以綜核之嚴綜核嚴矣而王成猶以偽增蒙賞噫吏治亦難言哉臣等職總風紀切慮閭閻小民日困一日不得不望有司倍加撫摩欲望有司撫摩不得不責撫按倍加嚴核蓋撫按舉刺惟憑藩臬道府藩臬道府豈盡人人可憑或牽愛憎或徇毁譽或慮反噬其大姦巨猾又巧於逄迎工於結納彼藩臬道府一為所蔽方且倚任不疑揄揚不置為撫按者將何所據以申三尺哉今何時也考察已逾半載若仍借口前例有舉無刺標榜成風蒙蔽成習彼貪墨之吏又何所顧忌而不剝膏脂充囊槖也故責成撫按當先責成藩臬道府要在首重節愛以訓亷為先次取才華者苟無守亦棄稽民情之向背定吏治之妍媸有一貪也悉發其枉濫之贓有一酷也直指其刑斃之命設若明知不報比眤不言抑或先自濫取贖鍰責望餽遺則藩臬道府之不職可知也撫按先露章以聞該部必盡法以處使方靣大吏咸凛凛知法紀難犯而為撫按者又豈敢以私心廢公議哉倘蒙勑下臣等行各撫按諸臣嚴訪察於課吏之先不致挂一而漏萬廣咨詢於因任之後恐其易轍而改絃限以年嵗仍兼論劾若有舉無刺容臣等及科道指名參紏庶撫按之法行而藩臬道府不復甘心於欺蔽亦核吏治之一端也臣等又謂舉刺當嚴而撫按之權尤宜重連嵗撫臣或官已遷而經年候代或身已病而纍月杜門吏固沿為因循事亦不免廢弛至於御史一差而攝三四任事是越爼以代庖人一身而制數千里遙雖鞭長而不及馬腹即今在道止七八人外踰二三載巡行不密體察難周欲其清吏治以安民生也抑又難矣聖明在上加意元元故撫臣缺必推推則望其必點按臣有差必題題則望其必下此又臣等惓惓跂仰之夙心也惟我皇上俯賜嘉納臣等幸甚天下幸甚為衰病懼隳憲紀祈恩憐允歸籍疏甲辰十一月臣一介草茅叨蒙三聖作養屢蒙皇上拔擢令總憲司又以再考增秩錫命至一品至四世臣感戴鴻恩非天不足比髙非海不足比深自揣自矢何功何能縱衰殘即委此質於官猶懼難酬萬分之一何忍言去故自入秋以來雖屢感寒屢嘔吐致骨立如柴為諸臣共見以時方多虞又值九列匱乏之秋一息既存又何忍言去以是且醫且力疾或掖而入朝或掖而入院傴僂應酬即中外御史日有稟白率不能曲徇於下而煩瀆於上猶自解或可備數循行乃於本月初二日大感寒邪列夤如刺如折雖掖之亦不能行因而減食益藥脾日以虛形日以縮往時目翳心搖之證又日以增實臣福量有限如欹器宜平稍增且滿即傾覆而猶以不可保之身戀不可幸之位為風紀病尤臣之所大懼也臣為此日夜心口自忖自語諱病強留而無病于風紀猶可言也既已為風紀病而仍不忍去則不忍去為託詞病風紀為實罪不可言也方今在朝在野無病及賢于臣者何限庶幾臣去有代臣者為風紀重則臣心亦安臣病或可稍延以歸自今以往臣感戴皇上成全之仁與天地並而銜結之報無已時矣故不得已披瀝以控陳于君父之前伏乞皇上憐臣非矯飾準臣回籍調理庶臺綱不致久隳而臣曠職之罪亦可少逭矣為久病屢醫不效懇乞憐允歸籍疏甲辰十一月臣近以衰病狼狽之實懇恩乞骨未蒙憐允臣感皇上不棄敝屣尤念素沐如天之澤報未萬一自計倍攝倘可少瘳即強出視事自初旬以來日藥數劑遍腰敷膏猶未和舒返增嘔吐實臣數十年來所未嘗之苦衰朽值此豈能久於人世又念臣衙門關繫國家紀綱如人身血脈臣一身血脈尚不能通况能仰承皇上使國家紀綱之脈流通中外即今衙門文移俱賴同僚二臣代辦臺司何地而容養病鬼録且登而仍曠官愈苦愈病愈病愈懼不得不急切哀懇于君父之前伏乞皇上垂憐臣病難望復痊蚤賜矜允歸籍以遂首邱臣一日不死猶扶杖頌禱聖夀於畎畝即死亦效昔人銜結之報於地下臣不勝懇祈仰望之至為病勢日篤臺紀日隳懇祈聖恩憐允歸籍疏甲辰十二月臣前二疏詳陳臣世受皇上優渥異常之恩甘死于官而有不能強支不容不去之情俱不蒙恩矜允臣非草木曷敢數數再瀆天聼恨自注籍以來已月餘理脾敷膏攻之愈急别證愈增迄今腰膂直挺如枯木食減形縮但有皮骨諸臣有就臣寓者無不驚憐曷忽至此蓋衰病之人如秋木易稿安望復榮况計期日迫即強有力尚恐難勝如臣今嵗正月外計之初臣已委頓擁掖而入吏部咫尺不能登堂比及次日方扶疾抱羞強完其事人誰不知今縱不即死而可又扶疾抱羞以與國家多賢豈其無人而姑令一衰病但不大曠廢即止然曠廢國家二百餘年之紀已極實自今日始又自臣始故臣自懼自揣以為留不如去雖生亦不如死蓋留與生有無限難稱之職又有無限不知止足之誚去與死則難稱者有所歸而所誚不知止足者可免也故不得不再披瀝于君父之前伏乞皇上垂憐準臣回籍以延殘喘亟選名賢以司風紀庶臺綱不致久廢而臣罪亦可少逭矣奉聖旨臺務殷繁京察又邇正資老成肅理卿何數請告歸宜即出供職不準辭吏部知道京察自陳疏乙巳準吏部咨該本部題為遵舊例嚴考察以勵庶官事內開兩京官員六年一次考察四品以上及翰林院學士例該自陳其各衙門堂上五品及所屬五品以下等官合照節年事例本部會同都察院并該衙門堂上官考察分别奏請定奪其考察日期或于二月初二日或于正月二十八日等因奉聖旨京察著于本月二十八日行欽此欽遵備咨到院臣例當自陳伏念臣品望碌庸器能窳陋久叨烏府愧振紀之未能再冒宫銜益負乘之是懼將責人而恕已豈容承乏之時既多病而且衰正合投間之例雖時迫不宜推諉恐鑑塵難别妍媸深惟當局則暗旁觀則明矧久當局不知止足暗其能免又惟德則無有怨將誰任矧久任怨無俾勸懲任亦奚為故臣前此屢陳正為今日倘蒙就近速簡猶可得人臣有此積歉積懼之懷不得不為乞身乞代之懇伏乞皇上預慎兹典先罷臣官别選重臣以充斯任庶庸劣無濫竽之誚而去留免嘉穀之傷矣奉聖旨卿總憲有年公清端肅宜益用心評汰衆僚以飭風紀不準辭吏部知道衰病不職懇乞聖恩速賜罷歸疏臣年衰形耗近又腰膂硬痛不能屈伸念臣纍世受皇上如天之澤雖捐軀難報萬一雖即化為異物猶當結草銜環以報安敢言去又安敢遇事不任真任怨忽睹科臣錢夢臯攻臣疏詞不勝驚悚蓋自正月以來屢借楚事為自全為報復計耳臣惟當懇求解任不必嘵嘵置喙第疏中有附下罔上等語非臣子所忍萌者不可不略陳以白孤危之心臣之能附人否必蒙皇上洞照果欲附人而乃附一退居侍郎郭正域將何為逆宗所犯上不知有君父所戕巡撫趙可懷又臣之莫逆同年也不念君父不憐可懷之死于非命而以正域之故欲輕拯不道之宗犯臣豈喪良心而倒行至此今法已正原繫刑部主稿有加重語視撫按原奏未減分毫已奉皇上天威獨斷提入重犯一名極快輿情見聖明亦不以撫按原奏為太輕而會議時諸臣言當依原奏者甚多故三法司虛心從衆今於事定之後追而歸責于臣為枉上臣何敢當其無議單則諸臣以該省罪案既定單多不便入招耳會推撫臣臣始終言梁雲龍可用且謂巧遲不如拙速或諸臣盡聞之臣自議楚事無一字執楚王為假有文案在禮部不可信而信無稽之口語將何語不可信耶楊應文之議覆鍾兆斗之外轉凃宗濬之使楚皆非臣職掌而夢臯則宗濬之門人也何忍加以定謀之名非詳問臣且不知其隱語為誰而以意逆加於臣則如夢中語矣臣極孤極危而夢臯口口以黨字加臣恐所欲陷者尚有人臣寧速去不願當聖明在御而將有昔人一網打盡之計致遺禍無已時也臣今年迫七十衰殘已極人皆見之自甲辰外察幾不能與今嵗內察幾不能起人皆知之今又被人力攻臣竊自愧自懼上負皇上數十年寵顧隆恩實臣望輕行薄口拙言多所致安敢尤人若不即去恐難望其生還臣有此苦情不得不瀝血懇祈於君父之前除痛自罪責伏候嚴命不敢與議善後事外伏乞皇上垂憐速罷臣歸籍庶首邱之願可遂而風紀重地亦不致有忝竊之辱矣再乞休致疏乙巳四月臣頃因科臣錢夢臯以楚事中臣疏懇解任候命旬餘不宜急急陳瀆惟以孤苦之迹久在戈矛之中不但憂讒而且畏禍雖抱戀主恩不忍去之心而時則不可不去念臣管南北中外考察已五次經考科道以十計各司以百計各直省大小官以千計而更有處以貪酷不謹罷軟者皆奉皇上之嚴命採衆人之公議以完大典耳若人人效尤修怨則臣一身不足為衆射之的然射止於臣如去一鴻毛不足慮也壞國家二百餘年懲勸之典啓將來被考反噬之風使後之管考察者以臣為戒雖有大姦大惡不敢動自今日始可慮也然又皆自臣始皆以臣不去之故若臣今仍不去萬一中以楚事不得或别尋一題目而巧中以竒禍比其時恐慈母亦不能不投杼臣雖甘之謂國體何惟速去則紀綱之弛于前者猶可復整于後諸臣之氣平法紀清嚴之地少一畨鬪機即增一畨美景全在臣一去耳臣連年衰病侵尋乞身之疏已二十餘不蒙聖恩矜允自今嵗三月望後雖腰膂痛極杜門調攝將一月而口仍不敢言去今火炎痰熾前疾愈增又以總憲之臣而被人攻是臣正首邱之會也伏乞皇上憐臣求去非為自便蚤渙綸音準臣休致以延殘喘庶國體不致大傷而臣懼少釋亦得以遂歸骨之願矣人言再至義難姑留三乞聖恩早賜罷斥以杜禍端疏臣近因科臣錢夢臯參論兩乞休致候命間又聞科臣鍾兆斗亦有疏攻臣祕不發抄者久之近始有抄明臣當日呼名云當外轉此飛語也即有之亦部院評論官材常事豈以超升伍級之藩參為陷人地遽深信大恨橫詆臣為受賄為専擅為蒙蔽臣自反果如所言能自掩覆能逃法網今惟知力求皇上罷斥聼公論於萬耳萬目而已何容一一與辨但念臣守拙肆十餘年果不肖何至受賄兆斗果平心為國忠計言再及臣臣即引退何至肆辱劉際炎繫二品官生兩任四年方升署都事視徑選府都事者何如火房魏勛之父魏良佐之免役也原奉聖旨何待臣力黃曰謹張希仲趙思職皆經臣考察因梧曽考平常又謂升非所宜又考不謹受其賄者肯如是否臣陜西甲科最少京察自李應䇿外有李賦秀外察有知縣杜和中張綸音非甲科耶臣言梁雲龍可用閣部九卿科道盡聞而仍以為蒙蔽豈心知之而謂非此不足動皇上耶凡此皆有案册及大庭廣衆所不能掩者尚舉而盡反之以為臣罪然則甘心蒙蔽者誰耶人臣最忌専擅各部自有職掌范大淳果應重辟而得以臣言免乎今查大淳雖十金之債不能償而安得有五百金行賄趙彥得推巡撫蓋尚書蕭大亨舊督宣大知其才為宣府計耳何以賄為陳緯未升之前臣若有一言於兵部堂屬而今復強飾以為未言亦難以見兵部堂屬之靣矣臣弟溫編賢不肖難逃公論任定州遊擊數月耳先三月已告病軍士留之不得乃槩以武辨惡詈臣男溫豫知頗知砥礪遐邇共聞今亦波及朱騰擢與臣無親其任遼東為創火攻圖省兵餉果為地方害議斥何難而臣乃倚之通關節耶通判劉三畏京師人皆知其清苦臣重之延以教子今其家猶不免於飢寒而忍目為過付人耶其餘各衙門所共知及無蹤影之張三峯王學禮皆無庸臣喋喋惟云臣六年考滿不宜驟進宫銜實臣所極不安於心者臣初不意吏部覆請致蒙皇上特恩偶加於臣臣至今日抱負乘之羞而思循牆之避誠念受恩愈重圖報愈難雖微兆斗言臣已久謂忝竊已過止足宜知况兆斗一聞外轉即攻臣不遺餘力且毒且祕若含沙若剚創然而其計將不知所終者臣不速去禍立至矣豈但靦顔以桑榆之年值犬馬之病今日即去亦非勇退必待陷而墜之深淵不辱風紀而為廟堂羞也耶臣有此不得不憂不得不畏之懷故不恤煩瀆再控陳於君父之前伏乞皇上大奮乾斷速罷臣職以息傾陷之鋒庶臣正首邱之願可遂自此以往臣感戴皇上生成之恩與天地等生與野老歌詠聖澤沒為異物效銜結之報無已時矣臣不勝惶悚待命之至四乞罷斥疏乙巳四月臣頃數被人言三乞骸骨仰候綸音允歸者將一月矣念臣衰病乞歸之懇自前嵗已然非但今日今日叢怨招尤之苦既迫人言與尋常知止者不同若人言之而猶戀位是謂辱身以總憲之臣被人言而猶靦顔是謂辱國有此二辱豈可濡滯其行况臣衰病如燭將燼而風復撼之迄今腰膂不仁形神盡縮恐臺務日益叢挫而臣無復生還之望矣故再披瀝上請伏乞皇上察臣情非虛假早放回籍以便調理以延殘喘且以為任使不稱者戒臣不勝迫切懇祈之至五乞休致疏乙巳五月臣自四月以來四乞骸骨仰候乾斷罷斥以臣在世為垂盡之人苟延能幾在朝如已吐之核復用為難縱無病或無人言亦宜知足知止况屢被科臣論列近又增頭暈血逆之證能及未填溝壑一拜先人之壟而正首邱否尚未敢必而暇與諸臣較是非毁譽為名位計耶臣今卧床不支延醫官米宗吉等日投藥數劑血自口鼻溢者不止以此久病之軀當此盛暑之時而又增此難醫之病臣今惛憒已無復更生之望矣為此倚枕口授代書不能成文北望懇瀆天聼伏乞皇上察臣命薄情危早準休致以便生出國門且以為任使不稱者戒臣不勝迫切懇祈之至六乞休致併辭印務疏乙巳五月臣屢疏乞骸上瀆天聼自近日失血之後氣體益虛飲食益減迄今心神搖曵夜不成眠者為常皮欲盡矣毛將安附即先朝露而填溝壑其於國家多才之時如九牛拔一毛不足惜臣亦不以此為懼也惟都察院何地左都御史何官無論風紀所關非衰病及經指謫者可靦顔以居即目前題覆宣逹事務亦甚多雖有左副都御史詹沂左僉都御史趙士登代辦日行公文其一切章疏未奉署印之命不敢徑自題請臣實懼焉愈懼愈病愈病愈曠不得不冒煩數再疏懇瀆伏乞皇上憐臣病久職曠準臣休致以便生還再乞勑下左副都御史詹沂暫管本院印務以便題覆庶微臣可正首邱而臺務亦免久廢矣臣不勝迫切待命之至七懇罷斥併乞允委署印疏乙巳五月臣於本月二十二日為病勢日深臺務日廢力懇聖恩休致併乞允委左副都御史詹沂暫管印務未蒙憐允臣非草木豈不仰戀皇上髙厚鴻恩而故硜硜以求速退緣臣纍被科臣論列雖無病亦難復玷班行近睹錢夢臯兩疏凡他人有書有疏皆借以激皇上之怒是市虎之言已不止於三至雖皇上不即投杼臣已不幸在是非之中何暇尤人惟自反自訟以為素無忠信篤敬之驗求皇上即如夢臯所云一一為臣罪大加顯黜臣實甘之而又以得生入關門為幸也竊念戰國田光一俠士耳與人約而聞勿泄之言即以為人疑自愧遂自刎死臣今四見攻於夢臯疑豈足云而不即死已逺愧田光甚矣又不速退以重為國家風紀羞臣實惶悚無地局蹐無所况自失血以來病日以增形日以縮即欲靦顔竊位亦萬萬不能矣是臣命薄而災與之會也迄今臺務積有應題覆者甚多以未奉旨署印亦多停閣是臣不速退所致將益之病而促其斃也不得不冒煩數再瀆天聼伏乞皇上俯納錢夢臯所言蚤罷臣官以便生還再乞勑下左副都御史詹沂暫管本院印務以便題覆庶微臣可正首邱而臺務亦免久閣矣臣不勝迫切待命之至天心仁愛有加罪臣循省應罷八祈聖明大加挽回先斥臣歸以昭修省疏總憲臣頃疏懇聖恩罷斥併乞允委副都御史詹沂署印候旨間忽見太常寺題稱五月二十七日天壇雷火繫毁燈竿正祖陵合龍門安吻獸之時其時又見順天巡撫劉四科題稱旗竿火發雷移火炮臺下擊死牧放軍人數多而先是南北陵樓太廟樹木多罹災火日食兩見正陽之朔霖潦瘟疫自去秋至今猶未巳河沮盜發自徐沛至兖豫猶稱苦而㭍捌年來各省𣙜採處處賠掘處處剝削怨讟之詳有諸臣所不及知而言不能盡者臣雖亦從諸臣數有陳乞不蒙皇上允行今已甘罪待擯豈容更言惟臣一日不歸猶一日食皇上之祿一日食祿猶一日抱公家之憂當此主憂臣辱之時敢以杜門需命自解自古及今凡遇災異多免不職大臣以求回天臣衙門為皇上紀綱之役於諸曹事皆得與聞諸曹所司各一事耳臣所司不止一事一失職則紀綱之謂何而其隳亦不止一事矣况已衰殘多病且方取怨招尤亦足上干天和為今日修省計以仰答天心而激後之職總憲者益補臣愆而定國是宜無如以臣應之儻猶以為未足或蒙皇上穆然深思惕然憬悟逺追商髙宗周宣王之為中興令主皆因遇災而懼凡諸臣所言如郊廟朝講用舍縱釋之應行與土木𣙜採之應罷以及臺臣之應補應代者一切次第施行不過費皇上一咫尺之札將一舉而歡動朝野一言而感徹穹蒼閭閻有不如倒懸之解國勢有不如磐石之安者臣不信也如是則臣雖去猶未去雖去而死於道路猶未死也伏乞皇上俯賜鑒裁光罷臣官以示修省之端再乞勑下左副都御史詹沂暫管本院印務以便題覆庶應天不涉虛文而諸務亦免叢挫矣臣不勝惶悚待命之至感時悚懼濡滯非宜九懇聖恩蚤賜罷歸以安愚分疏總憲夲月初五日疏懇歸骨以應天變兼懇皇上遇災俯聼諸臣所言凡應行應罷及臺臣之應補應代者次第施行又懇委官署印恐猶未塵睿覽臣連日仰屋輾轉念將以罪而去何可更言時事臣去而印務自有所屬亦可勿慮惟近奉嚴旨正各衙門修省勵臣以仰承天心仁愛務圖消弭與尋常祭告素服以文應者不同臣衙門非養病之所臺務非卧埋可完以平日言御史及瓜無交承之期致鬱而病病而不起者有之其無病者再巡非體株守起玩耽延叢挫勢所不免內而侍班監禮僅輳一員兼攝庶務顧此失彼如城工費且數十萬役且歷嵗餘猶不得一御史監視候補有可用之人而無見用之望有蒙選已六七年而鬱且斃於寓者臣安能辭責以目前言臣以久衰久病之軀處於氷炭戈矛之會戀主則苦靦顔去遲猶涉于澤今氣血既耗皮骨僅存即蒙憐允猶不能無道路之虞而難望見邱壟之幸也况衆方竭蹶從事以代皇上警惕臣獨竊祿私寓上之不能有可信之素下之不能見幾勇退以免巖廊之羞誠生不如死死不如蚤之猶可以開賢路而冀更新也又可遲遲其行故再瀝血陳悃伏乞皇上念此修省之際先罷無用之人使臣生出國門生當與田父歌頌死當為異物銜環吐珠以報聖恩於萬一矣臣無任迫切懇祈之至罪臣濡滯增羞十懇聖恩亟賜罷歸以定國是疏總憲臣以考察被論纍疏乞骸仰祈皇上憐允臣寧以罪而行不欲嘵嘵自白以效商賈婦人之口即公論之明與不明國典之壞與不壞非臣責也臣惟杜門待罪而已顧時踰兩月天聼猶髙臣自失血氣竭形縮恐難生還會災異乞以臣應之以回天意而便歸骨實臣之願候命至今臣心日益搖曵目日益昏花病日益在膏肓輾轉局蹐將不知死所昨得吏部員外賀燦然揭請允放臣以全國體蓋臣所深望而不可得者倘蒙皇上嘉納尤臣之幸惟是揭內仍以挾權徇私責臣或偶未悉情實蓋今嵗考察之所以起紛紛議論者不過為一二臺省而已當考察時雖部院商確實據各衙門開册與各掌印官公同裁定其考科臣例憑吏科預擬考各道御史臣不得辭內于永清臣久知之纍糾多贓不首黜何以服各御史之應降者若以此為臣罪縱重罪臣以謝于永清臣亦甘之先是吏部堂屬與臣衙門所見多合今執科臣侯慶逺之辭而反其意謂果半私則御史七員中有三四員皆私矣然耶否耶所指者誰耶吏部堂屬俱在可質而槩以莫須有三字罪臣耶臣向來不欲盡言今不免略言以不如是恐國是終無時定耳故臣以此將去將死之身不忍竟默默不為我皇上粗陳梗槩以俟聖明徐察伏乞皇上蚤罷臣歸以延殘喘臣生當感頌皇上鴻恩死當效銜環之報于異世矣總憲歸田辭朝疏乙巳六月臣蒙聖恩準臣致仕已經具疏陳謝臣謹欽遵于夲月十六日扶掖起程回籍緣病軀狼狽不能叩首闕庭展轉倣徨戰兢無地念臣宿疴增劇省過日深即今感髙厚之恩雖濡滯尚以為速從此在巖泉之逺即夢寐其曷敢忘蓋草木欲報春暉而犬馬亦知戀主如臣雖老豈物不如自度此生莫知為報惟祝萬年之夀矢既野心更期五福之全永新天命臣無任感激瞻戀之至溫恭毅集卷六
