body:
  text: 温恭毅集巻二十八明温純撰尺牘與魏退菴純樸樕人也不自意有兩浙之役客嵗冬仲入疆受事第閭閻稍異舊聞織造需財甚急以不佞當之安能為無米粥以待餓者喜密邇臺端可數數質疑請益忽暏大疏請告又聞有萋菲者此其故末可究詰矣華嶽終南真所願從遊第當宁未竟求舊本意恐髙尚未即遂然切願為國囘此念也報王北軒聞督兵出禦先聲逺播烟消浪息固麾下力也僕緇衣心切不敢攘行間之勞以自多耳盧參戎疏請留任得更加銜於地方大賴家大人失調旋即幸平辱念又頒大餼極感與陸五臺太宰初聞雙旌指建康使使候焉已聞萋菲謂必於途中候命忽吕主政如四明云錦旋有日矣守土吏即難負弩亦可遣一力代之而竟不知無所短長之槩此亦其一端矣萋菲可勿論寡陋如純密通芳廬質疑請正一快也時海汛且畢旬日則入武林矣與董潯陽宗伯樸西鄙樸樕也不諳治理况秦越異宜風氣未習迺者叨役大方竊謂文獻名邦禮義所自出者甫至聞二變後人情譸張俗尚刁健大異曩時又恐積習之溺法令難以革心爰探時弊并采舊聞示之榜諭布之簡冊頒發已久民間息訟務本之效全未有得僕方以徒言無益表率未至為歉不意誤䝉推許温詞滿紙捧讀增慙惟翁三朝耆碩一代楷模一字之褒華衮匪榮而顧不棄菲劣豈真有所取也抑亦誘之而與其進耶不敢當仙府有司馬端明在望廬遵化功非小補矣貴省公私匱乏輸將煩苦即如織造上供二運經費甚艱漕糧偏累三郡折價太重雖曾以一二上聞䝉恩稍賜減免然尚未足以蘇其困也頃又洪水為災民困更甚諸凡事體艱大力小任重康濟無能惟祈翁出其緒餘以為指南使稍稍藉稱塞大幸與曹太始即如諭致書撫臺唐道矣頃不與入闈或為任淺不必過疑也仕途中知遇在人不可必惟一意守已愛民久之自無不獲上之理頃㑹詹養貞直指道公為理狀甚著葢民間固自有公論也報汪伯玉司馬燕中拜違無何純亦返初服里居者久之華札至始知翁先是有尊制而吊唁無從罪也曷贖純起家役浙幸密邇有道之廬謂庶幾以尺素往来可質疑請正乃受事且期月無能介紹一候聞翁有訪戴之行日望紫氣而恐未果領諭果然則負弩西湖以俟與顔沖宇頃以小刻附覽旋辱裁答如靣謦欬家慈初度武川翁過念而以金玉之章逺惠盥手三復燦然雲錦敬置座所為侑觴具且令世世寶焉獨秦風之厚惟古為然純則安能然不敢不佩服謹此附謝時操切如来諭安得以中正之道經世乎然不能不於大雅君子篤望焉報張見南别駕長安分袂且十年里居過半客嵗起家入都無何即来浙第數從仕籍披尋門下官何所不得疑之㑹張監司吕祠部又忘其即門下里中人也不一問葢劻勷中往往昏誤若此矣忽門者報順天故别駕公子謁見亟延入問門下則云先是以轉藩府歸矣則愀然比知公子舉壬午則忻然讀来札不啻靣承而所云附張君書不知張君為誰問之則監司也始知監司與祠部皆門下里中人而監司不以書投為相臨耳無他意也公子偉器文又蒼雅而經義更精必髙第無疑天葢以此補門下缺事矣與黄葵陽雙旌道武林一再晤如飲醇獨匆匆未盡欵為歉别後把閩録卒業即用諸生文然非大筆斤正寧有此葢珍藏佩服焉錦㳺計即北無能之祖道負弩以導敬此裁候與許敬菴督學頃辱翰貺率爾以尺牘附謝久之鱗鴻𣺌絶無能數數通問候悵如之何秦士沐春雨多興起者覩賢書濟濟敝邑舉者皆才子而来王二生又皆以學行聞真得人矣緬懐培植力一快不佞承乏大方無可為閭閻徳惟不靳指迷幸甚與孫南翁先生自從吾師淮海先生遊也習太師家學風度不啻身坐春風中然無有執鞭之幸謂吾師無恙且還朝可北靣以質即北靣太師也頃訃至則疑已知其信真則傷痛無已不知天何以厚賦吾師又何不令竟施若此也然斯文正脈有遺言則吾師在獨沐教卄年䇿之不前負吾師甚今死别無復立雪之期故傷痛無已敬使使以薄奠往幸命從者同去使告吾師位𠂻曲畧陳誄文中太師其為道珍重以慰吾師泉下師母何以享餘年念之後嗣得賢喆否國恩未請何也統希詳示有可為地者純當畢力圖之臨發西望涙如雨報馬定宇謬膺重寄幸接隣壁欲倚末照以圖補塞第民室罄懸米賤又為農累葢江浙異地皆如此而其故則自貴銀始又條鞭法一切徴銀亦大利中之一害也先是交際争用銀即賢者亦不能不藉贖鍰充餽贈而今可省矣然亦安能必人人如主上意也力役可給帖者令自取討則銀米皆可抵所謂補條鞭之未善者獨此耳翁以為何如與王元美司冦不佞自通籍知海内有元美先生者一代文士也慕之初任斟鄩過青社歴顔神而青社顔神人徳翁不置口又慕之然恨不及以屬吏受約束也既官宛拜太僕命㑹翁正位太僕謂庶幾納交識荆乃不佞甫去宛而翁則以撫宛行矣但有悵悵客嵗敬美丈過武林一再晤稔翁林居超詣之詳亦久之不以書候葢鞅掌簿書故數欲修問數已也敬美為不佞二十年石交因慕翁得翁片紙隻字未甞不珍藏今不為未同之言矣敬使使先以不腆之幣往所欲聞於翁者則次第請焉其二伯玉訪戴葢雙龍合矣翁亦有意結侣為西湖之遊乎得命則西湖之主且負弩以迎焉平生迫欲見古所傳急就章而翁所䟦者可容鄙俚人一寓目乎與隂月溪先生頃兩辱老師手翰敬聞命矣蔡白翁兩浙名賢業行縣存其後而後止一孫才數月聞鹿門字以孫女友道不愧古人可慰老師通家眷注之念豚寓白下屢屬老師推愛顧㓜穉何可當倘得公子諸兄以業相切磨大幸純役海角無能立雪為悵使使奉候台祉伏惟委照與王蓮洲左轄發都時辱大章眷戀鼎鼎于心山居聞問無從二兄同第且裒然先海内談世家與河東三鳳比况者宜母如闗中王氏矣弟多罪天奪我糟糠配傷痛中㑹壽光孟生兊至於其行附候生習春秋有名可立第顧久不第而為人中至削諸生藉寃矣寃矣幸一引手曲成焉與陳五岳圖使使專候未果疎節之罪安敢以冗溷觧惟丈旬宣望深意旦夕有重寄至八閩能久借徳星弟役浙二載秋毫無可為閭閻徳甚愧来諭奬借過矣閩浙與國戾狀應聞之左右素沐石交亦不惠我藥石乎而獨把玩佳刻以為文章指南也何日目成相與講業昔人云共君一夜話勝讀十年書弟誠於吾丈念之與衷洪溪共事地方實賴匡扶大計時不能為翁揄揚萬一乃當宁自以卓異見知即一日三遷亦未足以酧顧歸功於不佞何敢當翁行後遺澤愈渥去思益切見人心有公論向時同黨微嫌今無用囘顧矣江北旱荒江南米賤昔人招啇交易之説似亦可行如以萬金令百餘人結夥販易使利盡歸販者而更用兵快䕶之其米價未必不減惟翁裁之與汪伯玉司馬入浙咫尺長者之廬幸仙駕一再過追随湖山接膝飲醇忽漫又别别来拜大章之惠如獲拱璧且令勒之湖以識相逢然三年蹉跎不遑請業違始願矣不謂即去浙即臨岐西望悵悵何益也翁家食久矣惟旦夕起東山持衡握樞更為純蓍蔡大願頃元美書云受喻布衣傳收攝有門矣亦為翁盡道否荅趙麟陽承諭山隂湖中二鄉田糧宜均狀祗領苐其中有説二鄉之田不甚相逺人所知也其當均亦人所知也二鄉田舊各自有上中下等湖鄉田之下者可減而上者不可減也中鄉田之上者可增而下者不可增也兩鄉士論謂上等田相若不必均者私也見上等田當均而不顧逺鄉下等田不宜輕增者亦非通論也僕意欲兩鄉之上者為一則下者為一則或減湖鄉下者而增之中鄉上者是天理人情之所宜爾也是則壤成賦之規也若一切而行恐所見止拘於近城之田而逺鄉下田不暇計矣此豈為中鄉士夫計恐士夫多上田或有增而無減也而其減定在逺鄉小民僕絶無成心惟聽有司勘報如何果逺鄉小民不稱累使僕此心能過即允從矣與許益齋開府聞秦晉饑逺遊人側身桑梓無以為生死肉骨計昨幸得丈拯恤讀大疏腹欲飽體欲温而安得以其餘波及秦也擬遣一使候轅門未果惟是精神流注不知有渭樹江雲之異耳與王元美客嵗以不腆馳候辱裁荅如靣春風久之無能數數通問疏節之罪曷可以冗溷解先是從伯玉習翁容與東山狀即古稱逸民不過視世之終身鞅掌而不得一日林泉之樂者奚啻霄壤隔慕之慕之出浙入蘇圖博一良覿且請苴餘以往耳而不知翁能許我否也辱諭喻子出孫陽識黨必竒士也頃覔之不得敬此稱謝併以途繻往與馮修吾不及博一良覿為悵然東山容與之詳則習聞之矣辱温札奬與過情盥讀惟有感愧純與懐庭在齊相臨在楚共事在秦受㕓至莫逆也今死别獨二婺婦苦節行路且憐之况不佞純乎業建一坊題姑婦守節字以堅其志矣茲發蛟川望赤城行質對無從徒有神􅉨與張居来中丞初聞翁有萋菲即以札懇翁身任葢恐翁固辭使巖廊失䕫龍之佐疆吏失張仲之倚也已翁果固辭得請而南功成身退有餘快矣謂巖廊何謂疆吏何因嘆上谷急即移翁上谷武林急即移翁武林薊門急又移翁薊門比稍緩稍優遊巖廊之上輙不免於人言自古在事類如此然黒頭而還東山㸃簡圖書枕嗽泉石為宦海中所深願而不可遂者翁一旦遂之不亦大愉快乎哉不佞待罪武林步翁後塵在疆吏中荷督教尤深故於翁之去尤繫戀不置且不能不動終南之想翁何以教之與衷洪溪頃亡女柩西辱垂念深感雅意而嗣是又聞一守節弱息卒之家多罪人變故頻仍苦不可言北方久旱流離状不知何似而敝省特甚恐目前有意外之虞奈何滕少松留漕糧於臨徳之議未為不善即不能百萬或三五十萬則一斗可抵二三斗舊米如為京邊計則乞請光禄太僕銀二三十萬俟豐收給軍可令軍民兩利賴而部中直沮其説何也今少緩則無及矣天下事未甞不可處者患人不同心或無一體之念耳可嘆也其二役浙積戾待擯不謂即召還於心獨慚悚而以聞於門下不免為浮漚恐洗耳不暇乃從兩直指君領溢美之章又從兩尚書郎領籌國之教葢自純来東南無所得得此二璧耳第以敝鄉端毅先生見朂恐非其倫也而亦不敢自畫倘自是稍稍有立庶幾不負知已鞭䇿聞當塗物色翁甚篤有詔至恐不得即遂修真意也喻生數覔之不得云僅一靣陳敬老即往為其説不合也可恨失此良朋而袁坤儀則云所受與喻生同談之純甚有味乎其言也獨打圈之説恐屬火動今且於忙中偷閑試為之矣安得於金閶間一暏仙􅐾令聞所不聞寄從弟即文縣守舊洮州孤懸境外兵馬單弱城池未必鞏固如敵人窺伺宜慎隄防清野堅壁令彼空腹而囘熈河以勁兵臨之可以盡殱大約鼔畨謀敵連結岷營以為助翼是其䇿也願勉力為之其二連得吾弟華牘知在任之苦若為地方軍民計不論苦不苦也惟一意恤軍自然上信下孚其難處先自反自力未有不可化者此復與来小澗司馬頃幸聚晤稍快濶私分袂不得之郊闗為悵華牘至詢道體藥喜又快甚幸珍重眠食㳙人以盛徳臨之自當心服不必過責渠也京中投刺凡隣封但有𤓰葛皆用眷字吾兩家有世親不但𤓰葛泛用通家心久不安遂更之從厚意古道執事以為可否大小兒疾幸愈猶須調攝甚賴長兄主張用下藥始解極感呼之令入京或秋間至耳二犬子何勞垂愛令佩服不敢以穉名往再具賤刺代謝與来陽伯昨奉唁知至情過於哀痛然有道焉亦尊翁所深望於昆仲者千萬深思節情以全大孝凡事繁文可省者省之闗上人不必多帶無益也報来馭仲尊翁疾竟不可治至此一聞曷勝痛悼不知彼蒼何以生此髙賢又何以不令長年今末可如何已覔火牌令舍人前去家迎令兄此時惟當體尊翁慮賢伯仲過毁已以毁不滅性之説詳告令兄所謂滅性非為傷生為逐情而不知有性也必以道御情雖大悲不至迷性乃是道不然至於病至於令化者不瞑目九京去道逺矣幸自思自節想来還移柩来京城外以候秋涼為妥塗㳄行役或當如何再寄字来不難也温恭毅集巻二十八
