body:
  text: 温恭毅集巻十四明温純撰議中原議漢以來凡謀為不軌者半出徐沛芒碭間即平寜如徃嵗亦當獻曲突徙薪之計况一二年來一遭水旱便多冦盜昔劉六齊彦名輩止因隄防未預遂流劫半及中原當時若先為備兵説人未始不以為迂及賊勢猖獗而後添兵設官即撲滅然所過焚刼亦慘矣彼其時一劉六齊彦名耳山東淮揚之鹽徒未熾也徐邳汝南之水旱未甚也江洋海濵之賊勢未成也邊鄙廣賊之横肆未若斯極也堂堂中原不能當一二妖魔今之時視彼時何如而可不預為一處耶愚不諳國家大計顧見徐邳之盜山東不能治山東之盜河南不能治驅於東則西驅於南則北而守土官又若治水者以鄰國為壑但幸其出吾境已矣盜如之何不熾流刼之禍如之何其可已耶故為中原計徐邳最急河南山東次之前謂曹濮兵備不宜革者為曹濮計耳非一曹濮道即可控制中原也寄軍務於河道設㕘将於徐州臨清曹濮徐沂睢陳諸兵備又河道所素轄者既非取各省之官以與此而各道兵壮不下數千稍有㓂萌移一檄而所在知備㓂即迯於此不能迯於彼矣况一彈壓間又有不待發而自可潜消者乎或以徐州添設㕘将則增軍之費又無所出不知各道各衛原有軍兵即少添補費亦無幾如或不然取諸近省之㕘将或守備而移之三省適中之地其視偏守一隅者相去殆萬萬矣撫治鄖陽議鄖陽撫治之置自都御史吳道宏始蓋鄖陽介秦楚唐鄧間山谷阨塞林箐蒙宻元至正時流賊據其地終元祚不能制國朝始剿除于鄧愈再驅逐于白圭又平定于項忠然尋叛無寜日成化中賴都御史原傑奉憲宗皇帝命至如祭酒周洪謨流民說籍流民置郡縣遂以大理少卿吳道宏為都御史代傑撫治得兼治三省其後妖人假王子嘯聚且三年許撫臣王學夔一皷成擒夫未開府之前屢討之而不靖既開府之後歴百年而無虞撫治之不可以已也明矣第既都縣其地似無流移作梗之患且本鎮嵗費以千計秦楚各道官民徃返路至千五百餘里牒移僅以文應注措實專省撫按焉是聴今議革而加守道以兵權亦省費節財便計顧汝南襄鄧故多大盜秦自商雒以南廣長千餘里内多礦不但亡命嘯聚即山中老户亦徃徃稱雄一方蓋惟知有撫治耳先是何勉執梃一起輙待剿于邊兵腹心虛弱識者且謂非居内制外之勢是鄖陽之有撫治猶若此不然則延蔓猖獗之盜不知又何如矣且禦盜者彈壓於未萌與剪除于己熾迥異故留此重權雖無事祗見其多然潜消黙化使奸人憚而不敢肆者皆其力也况今天下水旱荒歉所在而是兵威之不振未有甚於此時撫治本鎮如之何可革蓋各道事權終難於各省交錯之地而能使彼此帖服也獨湖省設一都司鄖陽練兵設一㕘将何用行都司多官為且㕘将類慎選其名號足以鼔衆都司之遷除在本兵則以為常員而待之矣易都司以㕘将其可也施瞿設官議施州衛當川湖萬山中孤懸險逺聯絡土司漢土軍民錯處負固自黄賊平後主事羅青霄建議設荆瞿兵備駐劄夷陵鎮壓邊鄙未㡬罷蓋以兩府而設四道罷之是矣顧覃酋乗虛擾亂至動調征今議復荆瞿兵備為施瞿兵備專住施州鎮壓應轄湖川有司亦一筴也不知施州以衛所比鄰土司終不可駐且令憲司日與土夷狎居久之必損威傷重况兩省有司詞訟兵糧既得分理使官民日徃來於險逺不可行之地可乎近施州改選撫民同知雖與通判事權不甚懸要在得人果因俗順治隨事處分不必純用漢法不必避嫌激變自可無虞分巡該道或駐荆州或徃來夷陵有事方臨該衛撫處可也至於瞿塘衛既在夔府夔府見有一道請勑兼制施瞿二衛凡二衛軍民詞搆與機宜調度聴與分巡上荆南道約㑹計處而行則鑿鑿乎其可行者制馭讐遂議瑞昌柯談吳黄咸以為昔年逋冦遺民計丁以萬計而柯實半焉其安業守分者雖未必盡無而徃徃恃強挾衆小則占田隠糧大則夥衆行刦興國各州縣受害久矣近稱兵㑹戰事雖漸斂然腹心之虞終可隠憂要在處置得宜而已蓋善禦盜者不以盜視盜而以民視盜猶以民視盜而可以盜視民乎今國家一統如三苗鬼方乃五帝三王之所不能化而臣者今皆傾心向化聲明文物至於中國人伍况此愚民皆吾赤子但居兩省之間或因爭田致成大變或因有司自分町畦以故東移西逋甘為強梗今之議者曰割地立里曰請勑互制曰設府官設守備曰借留都巡江遥制然惟立里為上請勑互制次之立館設官又次之何者瑞民雖強然侵掠之禍僅可加於興國而不敢加于瑞昌是在興國若為叛亂在瑞昌亦自服從今若以瑞昌之民住興國者編入興國圖甲興國之民住瑞昌者編入瑞昌圖甲則民有定主官有專責不惟錢糧易完而強横侵奪之禍自息但瑞昌之民僅一十三里而居興國者頗多一旦取彼與此在江省有司不能不聴一面之詞且強横之徒慣於躱避每欲以異省藉口遷延逋負故一涉移文則道傍之議終嵗難定然天下事要當權其大者苟利國家苟使兩省可以預消他日之虞則楚中事即江右事難以分民多寡之故而妨大計不然取瑞昌一縣盡屬楚而又取楚一縣補九江又何為不可如此則兼制之説不必再議自是而猶不帖服然後設府官設守備以為禦盜之計未晚也大要兼制之議徒滋紛擾竟落虛文設官之議苟不得人反激他變故立里之議實潜消黙化之計不可易者温恭毅集巻十四
