body:
  text: 溫恭毅集卷十三明溫純撰行略先曾祖父母行略先曽祖父纍贈光祿大夫先曽祖母纍贈一品夫人先曾大父諱勉家貧如洗隱處清峩之間安分不妄求性怛易無他腸無論異姓即族人有侮之者笑受不較生先大父大父蚤亡遺先父甫九月先世父九嵗當是時微先曽大父卵翼濡沫則先父與世父有轉之溝壑耳配先曽大母劉氏幽間貞靜終其身相敬如賔惜早逝遺四男子大父其叔也先祖父母行略先祖父纍贈光祿大夫先祖母纍贈一品夫人先祖諱淮處士也少窘會失其母劉竭力奉父及繼母即繼母數苛責曲意承之以孝聞居常無疾言厲色與鄉人處油油如也號為長者年四十卒配祖母曹氏洴澼纊食力奉舅姑既稱未亡人茹苦撫世父及先大夫成立蓋四十餘年如一日也性嗃嗃家以此振壽八十有四卒二親行略峕求戴愚齋撰承恩册敘家大夫别號筠岡山人生數月失先大父光祿公先伯父長公才十四五嵗家中落僦居稍長小賈其後往來蜀楚間成中賈家漸起云家大夫事大母以孝聞大母好禮神則徒步奉大母供香火五臺嵯峨諸山大母好恤孤婺則量力逆意周給以為常大母病足傷會家大夫客蜀心怦怦動輒促裝間道歸歸而大母在床褥相對泣蓋自是日視湯藥五年不外賈矣大母卒哀毁稍依古禮舉葬自卜兆清谷之陽後地理家過而指曰此必有後人以為孝感云家大夫有姊所生子女率為婚嫁姊子用資率與資然不較即併母錢無有亦置之矣長公無後子姊子顧音啞不能治生家大夫為娶已又為嫁其所生女又同居不異爨至今先伯母母申亦無後養於家竟老沒為棺衾葬焉其友愛篤至類如此當賈時同賈無論少長皆推家大夫為祭酒以家大夫信義足倚同賈者病疫竟與居為理湯藥少年或嗜酒不簡不憚曲喻戒之有泣下改而成立者蜀江中遇大盜數十人薄舟舟中人皆伏家大夫挺身手弓矢連中三人盜鳥獸散當是時微家大夫一舟人幾危家大夫即賈然喜儒故以純為儒純諸生時家大夫業罷賈稍治負郭田為農純拜壽光令遺書戒曰吾先世祖别駕公為壽光令有聲爾再令壽光令壽民戴爾若别駕公吾且見别駕公於爾矣不爾且隕家聲純之官稍勵亷隅大抵皆家大夫教也家大夫紫面微鬚寡言笑不輕交逰獨喜奕所善約與奕即奕有借一言縣道輒色怒不應絶之蓋生平不輕取亦不輕與其天性也故今里中有清封君之謡客至輒留飲飲少許輒面赤頭痛然竟未嘗不飲是家大夫之行也家淑人王適家大夫時會家稍起家大夫外賈家內外一切倚辦家淑人大母善怒孝養曲至竟得歡心日夜督責純學純之官誡勿嚴刑傷百姓謂純官以家世禮神故一意施濟嵗時持齋又分衣食衣食貧者自奉顧儉甚食不離脫粟即貴猶然肉食不強之食不食性嚴重御子婦及僕婢若官府門內肅然憚之里婦有不直懼聞之家淑人是家淑人之行也今年正月草日家大夫壽七十九月草四日家淑人壽六十有四先是會主上上兩宫徽號覃恩家大夫以封文林郎壽光縣知縣加中大夫光祿寺卿家淑人以封孺人加淑人制辭大略以忠信孝友端方簡素褒家大夫以孝恭嚴肅徙宅斷機褒家淑人云純今羇官逺逰當二親初度日無能奉巵酒膝下其蒿目而西望也有餘思焉然二親以純官為樂而純以不侍二親為苦純不得二親命又不敢輒歸以釋純之苦而違二親之樂業為册求諸縉紳先生言將亟致二親令純弟編代純侑觴於其側庶純得合諸縉紳先生言為二親壽而二親睹諸縉紳先生言亦因少緩逰子之念將自是于于休休增壽益算未可知也門下與純在同榜中有莫逆之雅每接膝念未嘗不及二親是一體相關視諸縉紳先生尤切乞敘册首令二親時時如見逰子又見逰子所與逰者之相為眷戀如此其喜可知此純所欲增壽而益算者也純不勝􅈤􅈤先母行略嗚呼不孝純死罪死罪忍述吾母行耶吾母欲純久於官強就越就京邸養五年且歸忽疾作言及家淚數行下而今以櫬歸矣純觸目劈踊恨無及死罪死罪忍述其行耶雖然純亦病恐一旦溘先朝露為終天恨且窆之期迫於是抆泪掇吾母事行以徼惠於下執事母出涇陽王氏父處士公琦母雒以正德丙子九月壬寅生母母長沈靜機頴不苟為笑語處士公竒之既家大夫廷尉公委禽王之族屬譁曰郎窘甚奈何豫女母既歸而家大夫目攝諸譁者不少遜譁益衆母于于然安之事先大母惟謹時家大夫賈蜀家一切倚辦母母拮據井臼組紉至龜手大母喜大母善怒母色養曲至又喜其姒亦善怒母以身下之兢兢惟懼重大母怒又喜大母老病足母奉甘毳供湯藥籲天請代家大夫曰吾三十年安于賈而母三十年安于養者吾淑人以也淑人蓋指吾母云當其家漸裕督課純與弟編學甚厲純宦逰或輦之偕居齊越誡勿苛居京邸誡守亷隅即以縠紵進不御養母雒與姒母申竟老沒俱為棺衾葬焉其養申即姒沒猶然撫姒子猶子卵翼諸孫不遺餘力又分衣食衣食家大夫之諸弟諸子與鄉戚之無告者僕婢衣往往出其手紉有犯必默戒而曲為解之時奉肅皇帝制封家大夫壽光知縣母孺人已又纍奉今上制封家大夫光祿大理卿母淑人矣既貴王氏業已廢母多方以振或以曩譁者言不應其譁者乃皆服曰曩廷尉不遜而目攝我固當子婦有過即貴輒面斥每晨興率以身為子婦僕婢先門內肅然其勤儉慈惠以嚴整教家類如此萬歷十七年九月庚戌以疾端坐卒得壽七十有四先是母謂純官以家世禮神故一意施濟持齋戒殺生以故卒之時神色不亂但誡兒孫勿慟豈母篤信天竺之説而有得耶既卒純以例請於上上命大宗伯豫之祭命大司空豫之葬又特命大司馬使純乘傳以櫬歸純感泣上渥恩如天即純異日死而化為異物代吾母銜環吐珠無以報而終慟吾母以純故不遂生還為不可贖之罪即純死而定省於泉下亦無以報惟立言長者不惜齒牙賜之志銘母死且不朽純不勝涕泣哀􅈤之至溫恭毅集卷十三
