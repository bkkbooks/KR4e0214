body:
  text: 溫恭毅集卷二十四明溫純撰七言絶句望溫嶺溫泉極目看山日望雲住山欲與白雲分老僧笑指東頭嶺原是溫名本屬君其二把酒探竒坐紫巗溫泉溫嶺望中兼二名偶合相傳久添我何妨共作三同官薑女遮騎山山靈亦為婦人哀半路能令追騎廽何似愚公長障塞免教骸骨盡成灰送逺卿之幕滇藩不辭小草向承明從臾多君過渭城渭樹江雲憐日莫忍看萬里又西行其二萬里風煙六詔生壯遊莫聼鷓鴣聲行行即見薇垣紫綵筆還看賦逺征郊望盡日奔忙半日間羞將塵眼對青山山頭似有棲雲室欲向山靈借半間山行冒雨登山望眼舒翠微山色擁征車只看足底煙雲合便是洪荒太古初題銅雀臺有感效陸放翁沈園之作漠漠煙籠銅雀臺幾年幽思若為裁臨流不敢開塵眼怕見波涵隻影哀送左金部夏伯之河西務花底青樽為爾擕相看薊北與河西不堪孤邸仍分袂醉聼驪歌月影低憶弟幾年作客向幽燕白日看雲學杜眠欲醉濁醪消旅况又逢一鴈過尊前送唐山人歸關中西風裊裊悵離情千里關山月獨明若到逰巖棲隱處當年泉石與誰盟靜業禪林寶地塵蹤結侣過青蓮白馬定如何開門忽見池中月説到圓空語亦多其二説法珠林對月華蒲團小坐即為家池邉賸有蓮千朵可似當年火裏花遁園觀物堂成終南為案華為屏雲滿踈林鶴滿汀物外不嫌出郭近劫來似是醉人醒初秋同社友集井園鬱蒸暑氣未全收虛聼蟬聲樹裏秋把酒仍為河朔飲醉餘𣪚髮更臨流宜君孟薑女冽泉匹婦何緣有冽泉只因一念徹蒼玄世人誰解綱常重流得芳名萬古傳説經臺别子成兼訂峨山之遊遊罷終南興未央憐君獨住逺公房嵯峨有約休相負恐惹山靈笑我忙溫恭毅集卷二十四
