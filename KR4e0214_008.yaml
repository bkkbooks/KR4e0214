body:
  text: 溫恭毅集卷八明溫純撰序送郡大夫楚石曹君遷督楚學序楚督學副使缺執秩以吾西安太守曹君請上曰可時秦與楚相繼急督學使秦得楚大夫楚得吾曹君士民謂執秩惡事分秦楚不少延即其地遷除而徒令苦行役又以失兩地士民借冦之望為蓋杏壇兼言富教即冉有親受面命猶然難之曰如其禮樂以俟君子而何望于挽近世謂督學職教守職治治不必得士教不必得民異地皆然安所望于簿書文具藉令督學而亦惟是點竄登黜為兢兢或操抑長拔幼心惡在非簿書文具也者士若民疇其思而欲迫得之君不薄西安甫下車召問父老疾苦風俗利弊狀慨然嘆曰民之失養士之未若于教守令使然立指日與二三長吏約所不同心以牧吾赤子者有如此日于是編保甲課農桑行條鞭舉鄉約復社學立大宗或進諸生談經義所裁省聘享十之五詞訟十之七入覲及它交際十之九贖鍰盡改折穀又令列城創立郡厫以􅀈兵荒所積穀稱石者以萬計徴輸驗封貯發絶額外羡平反酌情法催科寓撫字蓋西安額賦十七視列郡自君在事而背負載運相望於道長吏即以君為師人人爭淬勵如約教績教樹藝庶幾豐鎬之舊桑麻榆柳途相接也絃歌吾伊户相聞也先是長吏不勝刺今不勝舉君庶幾富而教之且教長吏豈君家近魯北面杏壇有日故恥謙讓禮樂不居如冉氏執秩知君以君為楚士師其有意使楚士被服禮樂教化如西安耶余故官楚轍幾遍楚疆場見蜿蜒自西南來而矗矗峙于楚之南稱嶽者衡山也蜿蜒自西北來而矗矗峙于襄之西視五嶽而稱大者太和山也而江漢二水為之滙合以結其雄為之宣泄以導其鬱稱二嶽二瀆歷古今往往鍾靈孕秀為一代名世之傑一盛于春秋再盛于我明春秋楚材晉且用之以成霸業我明肅皇帝湯沭在楚先後輔德宣力之臣如湘陰石首茶陵華容巴陵麻城皆默佐天子禮樂大化若與嶽瀆爭雄勝當其時誰為之師而令彪炳若此今天子棫朴薪槱之化翔洽宇內楚士之與計偕而對公車者類褎然先何有于湘陰石首茶陵華容巴陵麻城然膠庠白屋之士所吾伊者博士家言耳或不知有禮樂孔子曰文之以禮樂亦可以為成人矣禮樂固膠庠之士所不能廢也君兹行以教西安者教楚士以教西安長吏者教楚長吏又以其得之君者教天下長吏士是合西安楚長吏士以竟君之禮樂又合天下長吏士以竟西安楚長吏士之禮樂宜更有步武湘陰石首茶陵華容巴陵麻城為縣官用而冉氏所謙讓不敢居者君一旦收之甚易寧第點竄登黜抑長拔幼若它督學氏舍禮樂不講也余知君自司農始當其時有漢穎蕭君者與君比肩皆卿材也其後蕭君守寧國用德教師帥治行為天下第一已君守西安又用德教師帥治行亦為天下第一久之蕭君遷河南副使在告起西粵君遷楚俱督學執秩善用人哉知兩君所為治寧國西安狀而又俱遷督學用風勵余又喜今日禮樂之化不獨自吾西安與楚始矣蕭君亦楚人方有西粵之命宜未即行君其以余言趣之余日望兩君矣會西安諸長吏索余言贈君故次其所望君者如此送郡大夫印南楊君遷水部序今上用言官言召用故以直謫廢諸臣及吾郡丞楊君令為水部郎中蓋楊君以御史謫州倅歷邑令郡丞十年所而始有今命也時楊君攝吾邑事且行邑人御史趙君文宗與余謀贈楊君余戀之以吾三人同舉進士于四明余先生又相得歡甚也初舉時余視兩君自引以為不及下之有頃楊君入讀中祕書趙君令華陽去余令夀光去蓋合未幾而離且三載久矣既楊君趙君為御史余為給事中後先不相值又以使或遷官去蓋離者常而合者暫耳久之楊公以直為執政中倅州趙君以直為執政中免官余乃遷楚參政已又入厯卿寺即引分自廢然視兩君則懅甚汗下矣余既廢日從趙君為山林遊而先是楊君業已丞吾郡已又以丞攝吾邑政暇干旌未嘗不過吾兩人廬過廬坐未嘗不入丙夜語未嘗不罄底裏合矣忽執政敗趙君起編民中復為御史楊君有今命余既快兩君宦道如酌有挹有注又念余山林中得一良友為有力者引去得一賢大夫又為有力者引去故于楊君行戀之為楊君趙君今官同地趙君官久之且歸而與余同山林獨楊君則余不知後晤期也雖然易有之出處語默斷金如蘭楊君為御史以直聞趙君為御史亦以直聞焉弗合也楊君倅州為一州德令邑為一邑德丞郡為一郡德頃攝吾邑會嵗飢為食活餓者五千人士周于庠盜息于境即漢良吏奚加焉趙君令華陽郟華陽郟人德之亦如楊君焉弗合也今以往兩君且駸駸大用肩負且日益巨余今見兩君以恢廓博大為廟堂重不第以直聞不第如漢良吏又焉弗合也余亦為令為給事中安能若兩君而遷官過之余故􅀈甚汗下今將于山林間老矣無及矣兩君在事賢于余逺甚余實抵掌快焉庶幾哉出處語默斷金如蘭乎何必離何必不離不然皆廟堂孰其居山林皆山林孰其居廟堂兩君志不忘山林余故為此説慫慂之説成預以視趙君趙君曰吾儕贈楊君而半溢説我我奚有於是其更之余應之曰古者贈言有頌有規有寓規于頌規吾不能故頌頌楊君因以及君亦如蘭之言不能不爾爾君毋辭其説固不更遂書軸附楊君行李楊君行矣余即慫慂趙君行兩君入陛見己即出見余先生余先生新為執政其為致余言廟堂之事先生與兩君為政山林之事余小子純為政兩君相與聽然笑而别送陳侯入覲序蓋列泉陳侯之拜命令吾邑也實萬厯二年云時主上新即位首詔執秩為海內元元推擇長吏非屢考毋易已又詔諸長吏慎為我惠養元元久于職且褒錫且徴而顯用侯蓋主上首科登進士也以故令吾邑得五載得再修覲事云先是不佞官都下見中丞直指疏薦侯治行往往為秦中第一大都言侯遇事若刃恢恢有容若陽春節民財若寒士屹屹不嬋嫣媚時若中流砥柱余私喜中丞直指知侯然一時都下搢紳大夫業嘖嘖賢侯矣無何嵗丁丑侯入覲考居髙第還還三載諸疏薦侯治行者又與前中丞直指指合故事中丞直指疏上天子下執秩籍焉比入覲則各述職事上執秩執秩取中丞直指疏與所述參考合不為殿最明年庚辰侯又入覲聽天子考矣不佞以疾歸里居從諸士民詢中丞直指疏中語皆當實無溢美而諸士民又道侯優博士弟子恤貧拔俊禁違式服舍俗稍稍易矣塞市故倚辦吾邑為裁役需竟不令以國計故困民民貧者弱者無不獲伸之情以是即田父里婦無不德侯凡此皆中丞直指疏中難一一陳者即侯今述職事例得述錢穀刑獄大凡耳不佞竊恐諸士民言不盡達於闕廷然天子明見萬里侯既為中丞直指疏薦又搢紳大夫賢侯即不往且有詔召侯入而褒錫顯用矣况往哉侯兹往執秩以侯績上天子天子坐明堂目睹日所登進士果惠養元元有績效若此將益信長吏可久任自是海內日登於理則侯其嚆矢矣侯將行邑博士諸生請不佞言贈侯不佞有感於吏治故敘其事令世之長民者知焉贈陳侯之任户部序國家自久任之法廢吏治蓋卑卑不可稱數矣今天子即位詔執秩郡國長吏如舊制非再考毋易時吾邑陳侯始拜命來來三年而邑治又三年餘而邑大治遷為户部主事蓋自余耳目所覩記無有若侯者天子加惠元元竟收效如此藉令侯拜命薄縣令操淹速心即久于任而思去如在坑阱孰其取赤子而煦沫之至今民見其上如是且日望遷去更徼惠于來者故自久任行官稱不便者半民稱不便者半非虛語矣初侯來會余在里每接膝余察其意甚得從容問曰今入官率欲內薄外外又薄令公外矣令矣意得者何侯曰濟往讀史慕黃穎川魯中牟為人令其人在願為之執鞭不辭幸得當一邑又幸得久固吾意也余聞而為邑父老喜得良令無何侯下令禁靡麗以禮移易舊俗又畫經費不役一里役又平市價又以贖鍰積穀數萬石又進博士弟子授經義拔良家子弟為博士弟子百餘人即潁川中牟為漢循吏所為民畫便利狀孰與侯多侯又為余道濟遇民對簿一抶稍不當退而追訟者久之蓋侯為人明察英敏而其中深沉篤厚所居官務敦大不煩苛故愷悌宜民不負上久任初意而上竟召用如此先是侯治邑三年以入計行父老攀轅留恐不得借借矣又三年以入計行父老又攀轅留恐不得借又借矣乃一年所而竟召去侯兩借色未嘗不豫今召至色未嘗喜至與諸父老相對泣諸父老知不可再借猶攀轅留如往嵗當是時余蓋從諸父老祖侯境上云既别邑博士馮君曹君李君率諸弟子請余序其事余唯唯深念曰侯行矣孰為我入告天子欲海內治幸得如侯者而久任之不然稱不便者不在官則在民矣贈邑侯文溪張侯考績貤封序萬厯庚寅三原張侯三載政成監陜都御史御史疏聞上以下執秩執秩核實核如都御史御史疏且以例為侯請恩上曰可於是授侯階文林郎贈侯父徴君亦文林三原令母封太孺人妻孺人制詞輝煌褒侯治狀與巖穴閨閣懿行甚備時侯將太孺人在邸製冠帔手制詞進為夀太孺人喜三原薦紳亦喜而爭修詞賀侯蓋鄭人適館豳叟酌兕意也古人臣役于王事不遑將父母即陟岵陟屺何為往代任子無有以其子貴貴父若母者有之自我明始而德靖以前諸令長得以其貴貴父若母者百人而一上以仁孝風有位始久任賢令長為都御史御史疏聞如例得以其貴貴父若母者數十人而一賢令長貴其父若母及生前祿養免絶裾靡盬之懷者十人而一文林君積學齎志以其餘遺侯而即以侯赫顯泉壤太孺人鶴髮拜恩侯以官舍為子舍稱觴孺人亦冠翟冠佩霞帔進履使諸令長聞而思奮淵哉聖謨作忠勸孝超古帝王逺矣初侯之學也太孺人以文林君意斷機督之比輦而養於官又數以庶明寬肅朂故侯治三原時而懸魚時而觀火時而烹鮮時而拔薤稱三輔吏治必首侯而泝流窮源曰文林君與太孺人力也三十輹共一轂當其無有車之用文林君以之地道無成而代有終太孺人以之然非主上久任推恩侯治三原不三載而以徴去即侯不難俄頃奏功亦百人中之一人耳錫髏之謂何今海內吏治以久任爭奮乃閭閻多懸罄之室潢池半佩犢之夫欲盡如三原不能此何以解也侯瓜期且至且有詔徵侯入為銓衡臺諫銓衡臺諫故得陳海內利病幸為上言欲海內治宜莫如今令今令即久任推恩之謂也然為人之長者人人如侯胡懸罄佩犢之恤為山中人曰夜望之矣贈張侯臺奬序明自隆萬以來重奬勞蓋修漢宣帝故事云宣帝重吏治吏以治行聞者嵗以璽書勞勉增秩焉以故其治後世莫能及我莊皇帝與今上當受計數宴勞增秩計吏之以治行聞者即宣帝不過然宣帝嵗一再躬舉之耳今受計舉矣都御史御史又嵗以其檄勞焉第躬舉則人主嵗嵗而課其臣臣亦嵗嵗而課于人主而責成也専都御史御史數遷代人持己見即以檄例勞諸吏諸吏且謂一檄于我何加寧不可以書薦于天子而以檄耶夫以書與檄故而為治行宣帝時良吏必不爾爾矣宣帝良吏非尹東海龔渤海朱北海韓黃二潁川乎假令東海渤海北海潁川不遇宣帝即遇宣帝而不為太守亦有以自見不然當其時為令者不一人矣宣帝之增秩賜爵豈靳于令而無有若中牟之魯密縣之卓乃中牟之魯密縣之卓獨卓然自見元夀元始建初間此可以觀矣吾三原張侯廣平永年人以進士髙第為令蓋今上宴勞增秩時也居常慕中牟密縣之為人即下車無何然諸治行御史龔君檄能一一道焉御史不以書薦之天子而以檄勞以今例故今例吏自墨綬以上非終嵗即治行著不得以書聞侯治吾三原數月耳御史檄非例勞者即侯不謂一檄于我何加然侯質直寧以書與檄故而為治行不以書與檄故而為治行而又安事余野人之言為頃今上下諸掌故問故郡國吏之賢若不賢之列名宦者稱數吾三原舊令其賢者二百年得一二人其一二人者即不敢望漢吏然視世之為吏者逺矣侯自是以賢著聞是宣帝不可得之一代而得之侯我國家為三原僅得一二于二百年中而又得之侯則宴勞增秩侯者且于今上受計日見之若更問掌故郡國吏則野人之言亦不可無矣丞苗君簿李君請為文贈侯以其言付之其二野史氏曰余觀部使者之優其屬郡邑大夫即以禮也蓋因以知政體云郡太守同守州守則大夫屬也通守司理與邑令長則郎屬也大夫秩髙于部使者郎髙或等于部使者部使者無論秩髙與等于其良以章薦之朝又以尺一之檄下郡邑旌焉蓋天子意也天子使部使者代省方內故以薦與旌之權假手部使者使大夫郎不以上不獲為解始也勉而兾之旌旌又勉而兾之薦則政良而民福然薦則以嵗計旌則以月計張侯為令僅數月部使者龔君謂侯良先以檄旌待嵗薦則優屬之禮政體也然侯所以良則不坐是何也夫謂旌者豈非謂别之哉又豈非謂别而勸之哉然控馭之節以待凡足而飛黃名種固自千里耳張侯為人貞諒渾厚真實宏逺即畫一令決一事亦不競尺寸計旦夕也夫飾躐者易效逺大者易忘效乃取譽忘者無名侯豈不知哉而竟爾爾誠無意人之知而旌又寧以旌而勉于良哉藉令侯以旌而勉于良何不易逺大而飾躐以取聲譽而拳拳于不易效之為謂自計何若侯者蓋深于福民而不近名者也然不近名而部使者名之毋侯自以良為政而部使者亦自以檄為政乎蓋侯初至數過余相與談吏治余謂今之吏治惟守惟令守與古異古之守分民而治若今州然而今守則擁數十専城而提衡于上民或不知有守而令則猶古之令也故為守令于古異地皆可為守令于今寧為令耳侯聞余言而頷之無何部使者之檄至侯不喜曰吾為令無何欲取民而袵席之未能也而安事以檄重己丞簿兩君請余言贈侯余為舉漢宣帝奬勞二千石以下良吏及卓魯自奮于元夀元始建初間故事為侯稱説大率以待奬勞而興則為宣帝時良吏不待奬勞而興則為元夀元始建初間卓魯而公大喜造余謝曰吾今乃知寧為令之説益信夫不喜為民喜亦為民于侯之喜不喜而民之喜可知已異日嵗至侯政成部使者以章薦之朝而天子喜又可知己侯侍吏聞余言亦甚喜乃録而上之侯贈張侯入覲序今國制三載入覲蓋猶之古云古諸侯非五十里不自達于天子曰附庸今縣令視侯逺甚其所治猶故侯地故今令皆稱侯皆與其藩臬郡長吏入覲同自達于天子視古附庸不啻過之令當斯時可不謂竒遇哉明年癸未值入覲期吾邑令張侯以例行蓋與藩臬郡長吏同自達于天子者也夫所謂三載入覲者以藩臬郡縣吏受事既三載則風諳政習幽顯明彰可咨詢黜陟為也侯令吾邑一年所耳即治行卓犖稱明甚然例不得即陟事竣且還治吾邑故侯今第以例行耳且行余過侯謂侯曰今天子明聖計安海內元元且詢風考政剔幽陟明君侯即令一年所不即陟然秦中藩臬郡縣名夙諳政習者宜莫如侯即如天子問治原狀或又問秦邊郡狀宜如何對侯佇思久之曰即如承問治原狀即對曰臣抵原會嵗歉臣曰此閭閻一年計也懲竭澤而漁者以時征斂臣不敢嚴抶取盈以見能會均徭臣曰此閭閻二年計也懲張網駭鳥者增若減以漸臣不敢驟益户口以見能會核田臣曰此閭閻百年計也懲治絲而棼之者第取甚瘠與甚饒者相裒益臣不敢虛拓地額以見能其諸興學鞠訟止盜化頑一切用德教化服臣即未敢曰能然始願若此矣令臣得還治原臣且取原民而袵席之是臣所以治原者又如承問秦邊郡狀即又對曰臣暏秦飢饉亘酒泉張掖燉煌朔方北地上郡間米珠薪桂即秦伯乞糴之年不侵于此矣老稚相將破釡敝帚蔽野而南骨立自鬻甚則轉仆溝壑即鄭俠所圗移狀不囏于此矣秦中在事諸臣業已請蠲請聚然古有弛鹽禁入粟助邊者今不可暫通花馬鹽于三輔隴右令米鹽相貿易乎又不可開例其地令免半輸粟自內郡乎是可為秦邊郡者對以此奚若余聞之喜曰君侯入秦甫一載所為吾原計者如彼所為秦邊郡計者如此天子以其言下所司豈非竒遇哉君侯信自達于天子矣豈徒吾原幸秦邊郡且厚幸可但曰以例行也夫張侯以一載即為吾原幸又且為秦邊郡幸况三載乎况三載以往乎其竟以明而見陟于天子勿問可也邑博士諸生請余為文贈侯余故序之如此贈明府翀玄李侯述職入覲序先是宇內自戊戌以𣙜採髏中涓為政中涓又髏使諸狐鼠之憾者為政騷動不啻漁獵甚則中涓露章而中懸銅之吏以故民不堪命如鹿挺揭竿於楚焚璫于滇天下蓋脊脊多事矣乙巳冬主上宵旰憂之為罷採歸𣙜所司又迫求吏若曰獨不得龔卓輩為守若令何憂天下哉時秦民之不堪命者甚會監國大中丞吳江顧公力抑中涓已更以便宜繩諸憾屬守若令迹之不少貸而吾原則臨晉李侯為令未幾啇城張公亦奉命來為吾內史太守相與奉顧公約又甚力為閭閻德如解倒懸故一時吾秦頌顧公吾內史吾原頌吾太守吾侯若漢龔卓而又仰頌我主上聖明竟加惠元元云龔卓輩之在漢也會其時方重守令一切錢穀獄訟並得專治守若令治理效不愛璽書問勞增秩賜金又其時無𣙜採之政又無中涓狐鼠之憾故一時吏習如龔卓輩得彬彬稱盛于地節五鳳元始之間今閭閻所患者𣙜採也先𣙜採而為患者畝稅也𣙜採即盡罷而畝稅未蘇患寧有巳時蓋宇內州邑之費半取給於額內之羡不亦取償於額外之額民病之甚于𣙜以𣙜之額暫稅之額常𣙜之害在逐末稅之害在務本也吾邑費十而額不及二十者必不減二者必不敢增不得已為額外之額非例也侯深念力罷之而嚴約其收以杜羡即有微羡盡以償費又公聽斷明教化嚴保甲均徭役懲刁頑不負吾太守約時以迹憾滋名口亦不移怒於憾而嚴誡迹者曰母蔓及吾無辜以除害為害其識量益過人逺矣今將以入覲行余不敢以密限吾侯亦不敢以渤海限吾太守何也龔在渤海八年始以化盜勸農聞卓在密七年始以禮教保愛聞吾太守甫數月侯甫一年所耳藉令亦如渤海密之八年七年其勸化教愛又何啻龔卓今贈侯及吾太守又及吾中丞公為宇內郡國所急一中丞一太守一令耳藉令各郡國中丞守令盡得人世何有不治然吾秦吾內史吾原其嚆矢矣故入覲曰述職述不詳於余言疇其以余言聞之執秩又因聞之主上即璽書問勞增秩賜金先以及吾內史吾原必多應者獨余山中人陰受其賜又獨吾內史吾邑乎哉然于侯此行望之矣王氏三榜異數序余蓋與今精膳王君言卿同舉嘉靖乙丑進士云當是時精膳君才弱冠而先是辛酉舉於鄉則其年十有六耳乃後仲弟敬卿舉庚午與精膳君名第相若年相若異矣季弟命卿又舉丙子又年相若豈不尤異哉世稱王氏自琅琊太原而後二十餘望凡海內王姓皆出琅琊太原而今不可考矣即精膳君自敘家世但謂勝國時自昌平移華州耳夫王氏在華州有槐野太史以文章髙一代精膳君兄弟繼顯又英異若騏驥發軔爭途人以為琅琊三少更生也余考琅琊獨司空導稱晉仲父匡輔四世即三少獨右軍以書聞豈晉世人士髏豪曠難用故徒以名髙族顯為世慕云明興列聖以實行風海內海內士為縣官用亦以實無有若晉人然者毋論異姓亦無論海內即吾關中王氏若莊毅若端毅父子固精膳君兄弟所望塵而追躡者即琅琊諸王何可盡精膳君兄弟也精膳君敡厯中外業十五年猶未及古人強仕之期敬卿命卿皆千里器皆方以弱冠試南宫於一第何有余固知精膳君兄弟視鄉先達且饒為之矣精膳君與余以文事相切磨居常謂文不若秦漢詩不若漢魏盛唐不已蓋太史家學固如此余睹精膳君為令內黃以卓異聞為今官起草大宗伯署中聲藉甚竟所至寧獨以文章繩太史哉往太史為文章談國家大計若觀火令假以年得當事表竪庶幾鄉先達之風而僅以文章名非太史意也余持是説質精膳君精膳君曰然一日精膳君彚兄弟三科齒序為軸視余余題其額曰三榜異數而稍次前説為序又寄語敬卿命卿即登第從精膳君為國家大用若余前説則今以往指數海內王氏曰琅琊太原又曰華州安知余今日言非君家左劵也贈雷將軍三考承恩序世論將髏推轂秦中無論異代明興自故太師周將軍以敢戰顯功名雲中後二十年而有大將軍居上谷周將軍秦産大將軍亦秦産上谷雲中皆國家要害賴兩將軍無烽火之警各數嵗世遂以秦稱將藪不虛云今年大將軍合西夏上郡上谷為九年如故事疏請天子考大率言臣本秦塞下編民結髮待罪行間且三十年所日居西夏上郡會敵數冦邊以首獲功受上賞惟天子威靈臣何力兹居上谷會敵欵塞稱臣臣從市賞間修守禦計亦惟天子威靈臣何力臣今者遵令甲述職事惟黜與陟亦惟天子威靈臣又何敢他兾天子覽疏大喜以大將軍有功不伐社稷臣也詔進秩左都督貴倨矣於戲周將軍雲中功今人人能言之當其時袁州為政周將軍以不往袁州所故日兢兢如履虎尾賴肅皇帝明聖知周將軍不為中比袁州免始録周將軍功然亦危矣大將軍在事主上右武三事大夫力為疆埸主廟議大將軍所遭視周將軍何如哉然周將軍在雲中主力戰大將軍在上谷主固守時不同也假令敵以積弱故欵我養鋭頃之且復完且強又或以欵雲谷間為詞而逐東敵冦漁陽遼左冦漁陽遼左不獲利且復西而肆毒雲谷即不然猛虎在檻不忘噬人有事疆場者寧能晏然已乎余固知大將軍有以辦此矣何者先是大將軍征鎮羌所將卒力戰斬百餘人敵聚西夏上郡拒戰安定破之轉戰楊名又破之邀擊平敵白城敖忽洞俱鏖戰出塞搗敵穴遇戰疾力先後斬獲首敵千餘人莊皇帝嘉大將軍功馳金幣賜者屢矣兹居上谷三年中不得一當敵豈大將軍意哉大將軍及是時完城堡修戰具休士馬又不以市賞費為所將卒困久之所將卒且人人思戰而余又聞大將軍篤中不二御所將卒濟以威信有古名將風果爾敵即欵塞如故大將軍且以守為戰敵即飲馬南下大將軍且以戰為守何者用西夏上郡事卜也今世無有周將軍藉令周將軍在而當是時余不知方略視大將軍何如令大將軍當周將軍時其所斬馘詎謝周將軍下哉今以往指數上谷名將軍與周將軍並者則大將軍之謂矣贈周學詩偕計序學詩蓋太學生夀岡孔君髙弟子云日孔君寓都城謂余曰周生才士也以縣大夫陳君課諸生又獨目學詩曰周生才士也無何會大比士於鄉學詩果以易褎然魁關中余乃服陳君孔君知學詩云先是主上有詔詔諸督學憲臣釐文體為士習日去本質為孅巧實用謂何耳乃學詩文即質即不事孅巧一時較文諸君子業人人目學詩為大用器矣學詩輟晏歸造余余與語久之學詩起而問於余曰不佞南以易起家然於易未敢謂有得也易六十四卦卦以何為要與余應之曰其震乎學詩曰震為要南未之前聞也有説乎余應之曰孔子不云乎帝出乎震又曰萬物出乎震故乾之元大大以震也坤之元至至以震也何以明其然也震東方之卦于時為春于四德為元于五行為木于五性為仁在造化為生生之機在吾人為有生之理故舉震而乾之元坤之元統是矣舉乾坤而易之道統是矣學詩又曰不佞南既起家藉第令為天子用將奚以以震可乎余應之曰奚不可也今海內士習不以質而以文矣長民者不重牧民而重集事矣夫習愈文情愈漓事愈集民愈病有識者至欲望主上修土德木德為國家培養元氣然未有以其説聞之當寧者主上業以其意形之功令淵哉聖度即古堯舜不過矣君起家與時會又其文質若仰承主上鼓舞至意行即偕計續食上對公車為國家用無事他求即以其質牧民佐天子培養元氣饒為之矣且也今嵗在巳卯已中央土也卯居震東方木也四氣不能去土木而土斯為有用之木四德不能去信仁而信斯為有用之仁孔子論仁以木為近非以其木為質髏與主上當是時蓋有意乎以土德木德應焉吾黨出而奉奔走即受一命即主上未有詔且先意為之承矧上意所注嚮若此哉夫以震往奚不可也學詩又曰易莫如震固也天地之心何獨於復見之余曰夫復非合坤震二卦名與天地之心於震之一陽見耳震可以見天地之心而不可為世用耶君第以震往是善學易者也學詩敬諾而别有頃學詩所善近峰來君屬余為辭賀學詩余曰余不習為文其何以益學詩無已則余前與學詩所説易大旨即可云辭也贈辛君景虞鄉薦序今年萬厯壬午天下大比關中士如額舉六十五人祋祤辛君景虞與焉録出逺近喧傳關中士舉者獨今科最盛余手録喜之不置會客有屬余為文贈景虞者余惟國家文運若厯壬午而更盛自文皇帝受命為洪武三十五年壬午我國家文明之運於此焉再啓故諡文皇帝曰文其後睿皇帝壬午又六十年為肅皇帝壬午無論海內即關中士以文顯者可屈指而咸寧河州三原非起家文皇帝壬午而後者乎髙陵武功北地朝邑非起家睿皇帝壬午而後者乎華州平涼祋祤非起家肅皇帝壬午而後者乎蓋壬任養萬物午陰陽交午又位離則文明兆也世傳堯舜禹生值午故堯文思舜文明禹文命一時五臣俊乂後世莫加焉而何疑我列聖乎又何疑今日乎今主上乘午運不啻堯舜禹更生菁莪棫朴之化任養業十年所得人之盛蓋自今始耳顧堯舜禹所稱文思文明文命與其臣都俞吁咈俱在典謨中無多説也今國家文盛即罄南山竹不足以悉文士胸中之竒然宣力之效髏謝𢎞正以往諸先達不逮豈文士多伉直自髙抑終其身於論著則技單於此而於用世輒氷炭耶客曰若景虞者於用世何如余曰其可哉蓋景虞為諸生嘗有名於嘉隆間以不第故日從祋祤先達後左袒北地華州即博士家言亦典邃雅馴余與交有年習其人與文數自引以為不及下之蓋余有二癖一喜事而多嘗試一易事而歉沉毅二癖纒結於心力克之不能也故余不長於論著第其癖與伉直者髏乃所如氷炭坐此景虞無一於是余安能及即自是對大廷以文士為世大用上之北面五臣俊乂下之執鞭𢎞正以往諸先達其饒為之矣世有談主上任養之效一代文明之盛者不為吾景虞屈一指哉客曰微子言不知景虞之文之可為世用若此矣請以是贈景虞為他日左劵余曰其可哉言已景虞為其季子志諤娉余弱息余敬諾遂呵凍不恥不文書致之耋老社圗序初余為先大理公延里中年七十以上九十以下者倣雒中唐樂天韓潞諸公真率遊為社又其後萬厯丁酉余友多抽簪相繼歸韓府馬君甘泉雷君狄道孫君西蜀王君汾陽秦君余時伏在田間嵗貢馬君文學馬君孔君及余母弟編踵而步之為社於嵯峩二華之間樂天社九人韓潞諸公十二人十二人中獨韓公年七十九余會韓府甘泉二君俱八十有三蓋宦履不及而齒過之故名耋老社云初余與弟編及年甫六十以上者以齒辭衆曰不有狄監盧君司馬端明故事乎余謂無已則相與北面衛武公其可也武公年九十作抑詩自警曰母謂我老耋而交戒我韓潞諸公在宋寅亮三朝無愧武公何有於樂天然猶慕樂天如緇衣當樂天會時雖僧如璊亦與髙雅故足多也吾黨望樂天且拜下風况韓潞諸公又况武公雖然抑詩吾師也吾黨中年最長者視武公猶少宜交戒又何如今約會各舉前言往行之關切倫理風化大者相問難不知則罰以巨觥已則籍記以比藥石名曰聞所未聞庶幾從韓潞諸公以步樂天又從樂天以步武公即年未及其可也衆曰善時韓府君且望平涼行以不得久於社為念余又謂宋宣徽王公方留守北都聞雒中社以書謂潞公曰某亦家於雒者恨不得與願寓名其間君與矣又寓名以俟他日不可乎韓府君色喜如約久之行余會有總臺之命三辭不得且行諸子弟如雒中為軸圗形稱夀併以吾黨所賦詩書其下以備歌侑蓋雒中諸公圖僧舍兹各圗之家家各有子子多至六人五人時俱君亦致井硜政歸衆延入社且屬余序余入臺會時多虞久之未應也巳亥弟編以就武至申前屬於其旋書此附致亦慕宣徽公致潞公書之意也更為書且發西望諸君美景良辰入社幸為余各盡一卣又先以一卣東告二華一卣西告嵯峩曰余旦夕歸就社矣其勿移交以誚焉幸甚夀張居士六十序張居士者吾邑一良賈也有實行以是余與之善今年四月辛卯夀六十先是其子孝亷耀從余學而舉癸卯鄉試試南宫不利欲遄歸及懸弧之辰稱觴焉將發就余問所為夀者云何余故辱葭莩大有感時有張孝亷學曽者亦吾徒也亦試南宫畢歸夀其母余告以鄒魯之説庶幾顯揚以名夀而拘于韻語未竟也為語孝亷而歸而求之庭有餘師而寧俟余支離之説為無已則竟所為告學曽者而劵以而翁之行可乎而翁賈也而行則儒余慨世之儒名而賈行者夥也謂禮失宜求之野即不得魚鹽中之膠鬲得賈販中之弦髙牧竪中之卜式而友之幸甚而翁其人也故樂與之交且三紀而知之矣余初以而翁及而令學書庶幾以儒易賈而知之矣而以儒之實易賈之名可以賈之實襲儒之名不可而知之乎初而翁之賈也不二價不欺人有誤增其直以易而去者立追還之至再又嵗奉而大母碩人李步朝太和山者二十年人有急或嵗祲或修舉廢圮不難貸助葺補以為常以是張居士之名滿邑里及姑蘇以而翁之義之貨市于邑里及姑蘇而邑里姑蘇人信之也舉而時碩人夢有仙樂自空中導送以而翁故又以碩人故茹荼守節立孤宜得天而人已知而必貴也今果露頭角余喜宇宙中有必不爽報應之理故今告而夀而翁不能外而翁之行别為添籌獻桃荒唐之説亦不欲為文人支詞綺語強以必不能踐之約蓋支也綺也強也精神在唇吻間如畫餅如説鈴耳惟不二不欺是從肺腑中來太史公所云何知仁義而翁已默與符矣天已以而佑而翁矣而又行即對公車為縣官用不難光大此不二不欺為世信為善學鄒魯于庭毋寧謂賈末業也而辨髦其行庶幾見髙垂名千載式致位通侯以身顯而翁有而以子顯髙第以十二牛為鄭却敵式第輸家財半為漢助邊不知有義方之訓及子否既已身享其報澤易斬人也而天實限之而翁身自施豫及見信衆矣而異日代而翁又以儒施寧獨十二牛與家財半余見而翁與而且世積而世延之俾碩人亦因享榮名無巳時此其福若夀又寧可量天也而人實培之惟余宦遊而思求野亦不自知其何心而將離野為宦以遊其尚力學守故耳目于庭者以尋鄒魯之緒以慰余毋使他人如余慨而又思求野幸甚孝亷聞之喜形于色再拜而謝曰耀何幸得聞此藥石之言是名與實相孚儒與賈相通天與人相因家與國相延之道也敢不唯唯惟吾師次其説而文之耀將書紳服膺登軸張壁以代面命余不得辭遂書而追致之亦知孝亷質行大髏居士又力饒為之也且欲孝亷以此轉告之學曽其以為何如贈前溪楊仙客七帙序古今稱吾邑勝地曰龍陽宫龍陽宫得巋然獨存以楊仙客先是嘉靖中余以髫年讀書龍陽宫中時宫中羽士稱兄弟者三四人宫前垣去寥陽殿可八十步已以清谷崩圮垣三徙且薄殿基羽士飄零獨楊仙客存仙客弟子及孫曽又數輩當地震雨雹募緣修葺殿閣廓廡門室厨庫軒楹棟宇翬飛神像儼然一新當是時微仙客宫不知作何狀矣余家居一再過仙客所見仙客神清履健泉音霞步異之問仙客年曰七十又問曰七十人清神健履泉音霞步有得乎曰未也又問曰若故柱下史弟子亦去三尸食六氣茹芝練玉優遊物外大道從事以全其天年乎曰未也又固問仙客笑而應曰吾安知養吾生吾聞之師矣天地一瞬息也吾居宫六十年宫沒于水者半宫不能有宫天地不能有天地而况人乎吾飢而食爾已吾渴而飲爾已吾卧而卧爾已吾遊而遊爾已吾安知養吾生余曰若不知道乎然知矣於是取莊生逍遙遊篇為仙客辨説仙客再拜而謝曰敬諾逍遙遊詳莊生集而余所辨説則以鯤鵬之摶扶搖九萬里蜩與學鳩飛不過榆枋各適其適何小何大即仙客所言飲食卧遊亦無非道云省齋雒君三河梁君近峰來君輩以仙客修宫績甚偉索余言夀仙客余以所與仙客論説者書之軸庶幾仙客或有味乎余言矣仙客法名教迎前溪其號故有名道會張公志微王公道亨李公崇璇之𣲖也夀文學喬君七十序祋祤小丘有文學富齋喬君者余內子宋淑人母黨也君長余十嵗干支大同余幸通籍君謝諸生業為田舍翁無以解頃之小丘館其家越宿日夜談見君神王氣健不髏七十嵗人五子俱讀君書為州諸生者四家大起而先是事其母節婦王碩人以孝聞蓋君不見用于時而用之家又自嗇真葆和如此也嵗夏五辛亥實君懸弧之辰五子延客為君夀因所親材官朱君求余言為侑觴具余謂君家世力農自君逺祖東田公始而承先啓後為喬氏巨擘者君大父孝子公也繼孝子公以儒奉君從父觀察公教使家世不替詩書而拓東田公農業為今日巨擘者君也東田公五子孝子公五子君亦五子東田公南北治第五居五子君南北亦治第五居五子君五子又多孫占畢吾伊之聲里相聞也君入則授子若孫書或待問點竄經義出則北望石門南望嵯峩課耕穫災畬有時之清滸從漁父觴詠不知此身之外有蝸角槐國至樂也余夙有林泉之癖頃與君從弟銀臺君盟且之丘上結夏果爾則君所望與所觴詠者且不得專美蓋余黃梁熟矣回視三十年塵遊如膩而愧前日干支之説通籍田舍之詫何藐小將見笑于大方家自此從君明農不失吾豳岐間故業其可也蓋明農雖周公不辭余與君皆姬也又豳岐以東人也豳岐間黃茂秬秠穈芑嘉種未改也種之恆之以居以祀之遺教未沒也豳岐以東農莫如小丘小丘又莫如君君實吾田間之益友也余今知所以求實堅實好實穎實栗之道矣自此以居以祀以供公家賦少補軍需萬之一又以故家遺俗敦本重為邪之風為閭里倡亦為政山林之一也而君先我為之矣曷論詩書淵明詩不云乎田家豈不苦弗獲辭此難四體誠乃疲而無異患干余以是驗農夫之無異患干也往往多夀君季父太平公亦農也年幾百嵗余曽為松柏傲乾坤之聫以夀余既樂與君為田間友即以夀太平公者夀君君其從太平公以遡孝子公及東田公又以遡豳岐間風此其夀又何可年數論也夀之日銀臺君在焉相對解頤浮白以釂或亦有味乎余之言也夀段次君七十序余與涇陽栗庵段次君善蓋自與其兄涉縣君締姻始初弱息歸涉縣君伯子可成也君父及諸父五皆長軀偉貌髙年華髮濶步豪舉而先是世父參軍公尤以無害知名於時兄弟三從兄弟九又率長軀偉貌濶步豪舉一舉於鄉餘皆為名諸生或相與學晉人書為一邑望時君長余五年與其弟儒官君猶稱壯未艾蓋相得歡也君生嘉靖甲午後十三年丙午涉縣君舉又五十年餘為萬厯甲午君子孝亷可賢舉又十年君遂七十成翁為古人所稀儒官君亦六十有七余亦六十有五客嵗儒官君訪余于都相見驚喜道故問年語未嘗不及君父子又未嘗不及涉縣君及其仲子諸生可大也蓋自余與君家締交于今若旦暮耳自君生而長而成翁厯三午之竒若春華秋實耳獨君與儒官君巋然如魯靈光時君兄弟子又多為名諸生又多孫可大可賢又與吾兒豫知善豫目及君家已四世斯文相切磨已二世故今癸卯三月己巳逢君初度不勝今昔無窮之感君不嘗師事大司馬魏公乎大司馬亦嘉靖丙午舉者昻然如孤鶴之在雞羣世爭慕之亦爭忌之顧所慕不勝其所忌而世變士風可知矣然有忌之者而後信慕之者不為比於大司馬無損是豫之所尤感也古有云千里而得一士是比肩而立也百年而得一賢是接踵而行也大司馬於學無所不窺而持身用世尤以信志立誠為主其旁亦及規中鴻寶之祕君今年向耄耋期頥以不試貌澤體健壯夫莫及雖稟賦特厚而所得于大司馬內外奧密之傳亦已多矣君以其奧密自夀以其持身用世者教可賢計兩午相距數十年接踵不出數里之外為慕之者不為忌之者實師友父子遞相授受竒甚而君之世行不獨以豪舉聞君之夀又何可年數計也或以激可大又以及吾兒豫知使余與涉縣君亦與有榮而君所及益又廣矣君毋讓焉余神憊遊倦已力請歸田庶幾旦暮蒙允而西猶及從儒官君稱萬年之觴于君更問君規中鴻寶奧密以駐吾顔而課吾兒然先為此説以應可大可賢之請以豫所感不獨吾兩家斯文之契合松柏絲蘿之依附己也余即歸而面夀君為侑觴具亦不過如此萬一余歸期猶逺其先為我進一巵贈雷公偕夀序人有為不佞談吾友博士雷公教臨潁甘泉狀者曰兄弟視二三僚儕子視二三弟子也去而臨潁甘泉人供帳祖道欷歔嘆息為晚近世所未有其去甘泉則以倦遊力請始遂云夫今海內博士溺其職矣而安得如雷公者遍置膠庠為士林重也雷公年今丑月乙酉夀七十有三明日丙戌配馮孺人亦夀六十有七仲子龍從不佞遊問所為夀公與馮孺人者於不佞不佞先是蓋兩受仲子之問以有事燕越間未有以應也無已則目仲子前而告之曰而欲夀而翁而媪乎古今人享上夀一得之頤養蓋世有山澤癯叟優遊煙霞相羊泉石然卒稿頂黃馘無所資一割以取寵數於人世亦有際奇履昌薰灼翕赫而持滿忘馘見險不止又或卑棲小試雜吏卒疲精神不少休猶不得上之人一盻而奚以易青氊之快與夫觴咏偃仰之為適乃青氊者流髏壟斷宫牆有不得於二三弟子曰此二三弟子之過也怒且尤或因以焚和速謗而翁有一於是乎而翁歸來居一室列圗書課子弟與世休不因物忤拂意至若夏日之氷洧釋有時之田舍與樵子耕夫伍乃聰明有加步履若馭又善飯即百嵗不啻而矧與而媪偕宜夀一得之昌阜冀缺夫婦敬如賔不聞其子若何而翁有丈夫子四蛟以賈成家鳳力田鸞嗣小宗從而繩箕裘行且績學為名儒行且鵬摶為世用而翁而媪樂乎不樂乎宜夀仲子聞不佞言喜再拜謝曰微師言不知吾父吾母之宜夀若此然師意則在小子龍與鸞敢不敬諾苐以績學為夀有説乎又告之曰有學不從覺從子乎孝不從老從子乎教又不從孝從文乎而老之教與學不以孝者非也其説在孝經其詳在西銘是名儒之所為夀其親者識之仲子愈喜又再拜謝退而以其言言雷公馮孺人雷公馮孺人亦喜他日雷公過不佞亦再拜謝曰乾與大夫交可三十年不謂兒龍鸞辱大夫與進也又不謂偕內子老而辱大夫言以贈也蓋不佞故與雷公諸生時讀書僧舍中相與為忘年折節之交不佞官都下會雷公以貢待次執秩既望臨潁去郊别謂後晤不可知相視悵然久之乃今幸而同歸巖壑及為文以夀雷公則優遊煙霞相羊泉石庶幾免於薰灼持滿之戒在今日矣夀張碩人七十序張孝亷守約從余講業有日今年甲辰不利於南宫將歸子舍夀其母碩人左與其兄成都幕守謙乞言于余曰守約失吾父甫舞勺二伯甫有家二仲二叔一季甫弱冠或舞象非母鞠勞何以有今日伯若仲若季若叔為吏以文無害應幕郡衛者四為農者一為啇者一守約為儒幸與計偕非母督誨何以有今日母今六月戊戌年七十守約兄弟喜且懼謂一第庶幾及母康而榮之乃兩試南宫兩不利守約負吾母益懼願得吾師一言為侑觴具吾母聞之而喜可知余會臺務鞅掌欲握管以麾者數而未果也孝亷又因吾兒及其儕周子張子日從臾迫得之且與成都幕留都門不得不西也余不獲已撥冗與兒及二子圖如春秋宴會摘取古詩為賦以夀碩人吾兒曰華封之祝多男是期詩稱穀似同胞其誰碩人樹萱于男也宜八索皆男亦有白眉孫枝繁衍樂末有涯胡不夀考其賦螽斯周子曰古今坤範與乾道侔徙宅化遐丸熊志酬碩人䌟績以佐薦羞嚴督均愛勞以箕裘心如結矣不振不休有齋儀一其賦采蘋與鳲鳩張子曰土沃茂穀澤廣長魚有周祥瑞洽及鄉閭我明列聖德覆堪輿世宗在御如春敷與碩人篤生太和之餘飲水思源其賦關睢語甫畢幕孝亷至即以其語語之幕孝亷甚喜再拜曰命之矣旦夕歸而過華下入其頂采十丈之蓮之藕又使使西而擷蟠山千年之桃併西京桑落之酒張筵延賔客進藕進桃進酒而以三子言侑庶幾使吾母顔丹瞳方從西王母與玉女遊幸甚不則益算延年繇之而耋而耄而期頥亦幸甚然得無加乎余應之曰有土沃而更糞之穀且滋茂澤廣而更麗之魚且滋長家以國興國亦以家昌諸幕行即有一命再三命之寄孝亷又且駕破萬里長風之航或各竟其蕭曹之業或逺追其鄒魯之緒而力窮乎二酉之藏將冠纓濟濟入則節儉正直以素絲委蛇聞出則分職憩棠遺勿剪勿伐之愛于一方庶幾太和元氣醖釀布濩且延國脈于靈長而獨積餘慶以待顯揚為一門之光吾即不獲與于稱觴之列亦為預賦甘棠與羔羊孝亷又喜與成都幕更再拜曰命之矣歸而更以吾師之言侑且佩服終身不敢忘余亦喜以幣附為碩人無疆夀胡春秋甲子之能限量吾兒名豫知周子名仕張子名素裕與孝亷同講業為鄒魯之學聞余言亦各有醒曰此周行也願各書之紳而更賦鹿鳴之首章幕孝亷遂用客以虞文懿公書書之軸襲而負之望華蟠間行而孝亷猶依依戀余不置余又從臾之曰行矣有諸賦在雖數千里猶几席也何有于參商夀武太孺人序先是海內偕計士射策不啻承蜩而當事則否夫以射策力事事安所不可見而必博一第重乎然不第謂終身不復可振振而竟老不官即官而衰沮者半矣主上用言官言有詔召諸偕計士即不第即及時為朕用朕能尊顯之時寧州武君以瑰琦士不第幡然曰今乃成委質時矣遂謁選拜太平令太平治已又以才移盧龍盧龍又治四年中部使者列令治行十上公車矣初令之拜太平也其母太孺人在里以書趣令之官意蓋甚力云今年太孺人夀六十會令以最績聞而太孺人則有今稱純不佞聞而私快曰破循資畫才賢故局令士及時殫力為國家惠養元元者主上也首奉主上詔以身為嚆矢稱縣令髙第者盧龍令也令其令一意力官毋白首呫嗶者太孺人也藉令令不第而歸杜門治古人土苴然不得言強而仕矣即第詎能有加于今日令以太孺人命而官官又褎然為時良令不佞固知有頃間且召令入而大用尊顯矣異日者令移所為治太平盧龍者治天下猶之秦越人之為醫然蓋秦越人之為醫也適秦以小兒醫聞適邯鄲以帶下醫聞適雒陽又以耳目痺醫聞以伎誠工隨俗為變無地不可耳令在太平有摘發振蠱聲在盧龍乃化骯髒為欵懇寓渾厚於精明蓋庶幾哉不剛不柔之政矣今天下病甚求所謂秦越人者宜莫如令太孺人不亦愈快乎哉而令又以書為不佞言成官太平得將吾母官盧龍又得將吾母吾母見成為民畫一便利事行輒色喜一不當于心輒目攝成必得當乃已成今稍稍自樹立蓋吾母力居多云不佞又私快曰古稱斷機丸熊亦不過是矣願為太孺人夀於是與故同令偕計者使使之盧龍奉巵酒太孺人前而以不佞言侑太孺人孺人色喜北面稽首而拜曰微主上詔兒不官矣未亡人何力之有夫即以其言為海內勸可也夀梁太孺人七十序萬厯庚辰仲冬草日梁太孺人李氏夀蓋七十云先是嘉靖中吾邑有梁居士者持齋好施豫身所施棺以千計事在喬觀察志中居士子隱君又好施豫於隆萬間太孺人則隱君配實上奉居士而左右隱君施豫無難色太孺人舉四丈夫子伯子仲子治博士家言聲籍甚謂立第為居士隱君太孺人施豫之報顧竟不第里中人有聞而轉相語以疑者曰天道無常惟豫善人若梁氏非善人耶伯子仲子宜第而竟不第彼不梁氏若者朝青襟而夕朱紱矣夫以居士隱君太孺人所施豫資入縣官補郎不竟有朱紱耶又有聞而轉相語以慶者曰鄙人有言何知仁義已嚮其利為有德梁氏誠有德然居士以耆夀為鄉飲賔隱君又以耆夀為鄉飲賔太孺人業七十有啖桃食丹之容即百嵗不啻諸子若孫芃芃然夫非天之所以報有德耶伯子仲子與二弟繪圗介所善唐君慎齋王君峨南屬余一言為太孺人夀有二説就溫子辨者溫子曰前所説謬説也後所説隘説也總之未知天道若不覩夫水與木乎根不深不茂深矣非旦夕茂也茂則不沖霄不己源不逺不長逺矣非旦夕長也長則不底海不已梁氏誠根深誠源逺諸子若孫行且沖霄底海太孺人且以鶴髮身與其子若孫享居士隱君之貽蓋天道也太孺人不亦愈快乎哉矧太孺人內行詳吾友胡太學所撰述者種種皆夀徴寧獨上奉居士左右隱君施豫一端已也伯子仲子即不第與二弟皆質朴有居士隱君風所為培根濬源者猶未巳豫故信天道於梁氏且驗唐君王君曰善初伯子仲子不第也太孺人不喜伯子仲子與二弟欲為太孺人夀也太孺人亦不喜且戒勿觴比唐君王君以余言言伯子仲子伯子仲子又以唐君王君之言言太孺人太孺人則大喜許伯子仲子與二弟治具延賔客歡填里中厯數日乃已唐君王君又曰賴子大夫言豈直為梁氏慶且令為二説者釋然知有天道請書此為異日報德之劵書之夀梁碩人序梁鴻臚至自廣陵為其母碩人李夀七十稱觴而先期因余友王生屬余修酌者之辭碩人蓋有祖姑馬太君風太君生子男三孫男女二十許相夫訓子起家萬金享耋夀余以交諸孫及見而夀之時太公業捐館舍里中人轉相語太君福人梁氏一靈光興梁氏者太君也繼太君有碩人碩人蓋太君孫婦子男五孫男女亦二十許相夫訓子起家十倍之而官鴻臚序班者一膺嵗薦者一膺鄉薦者一為諸生者六益濟濟時其夀躋古稀夫散官君亦捐館舍里中人又轉相語碩人福人又梁氏一靈光大興梁氏者碩人也今年未月甲辰實碩人初度之辰鴻臚率其弟若子以觴不許曰而忘而父觴我乎吾結髮而從而父至今日偕老之謂何而從而曹為堂上之歡也而父蒿目以望而曹力官力學以成令名意甚篤而食報不於其躬誰則種之誰則食之而吾忍從而曹為堂上之歡也吾力猶勝拮據門以內吾為政門以外而曹為政庶幾藉手以夀而父而觴何以鴻臚又率其弟若子請益力已乃云鄉大夫士業有成言不可已於是許焉遂觴其日鴻臚率其弟若子賦行葦末四句鄉大夫士賦既醉卒章或賦魚麗六章余則賦思齊卒章首二句賦已鴻臚率其弟若子以其賦為碩人解説已乃就鄉大夫士及余舉觴引滿再拜謝且請曰燁等欲夀吾母無已亦更有説乎余應之曰曩吾儕之夀太君未有加於今日也碩人起家與其嗣視太君不啻過之太君夀耋碩人繇古稀以至耋一瞬息間耳其繇耋而耄而期頤何難焉謂梁氏之靈光永永勿替且令散官君以名夀可也然諸賦其劵矣而諸君欲更夀碩人或竟無可加於余所賦之外也鴻臚等唯唯又再拜謝遂書夀從母太孺人六十有一序太孺人純從父文學少圃公之配也今夏四月巳酉夀六十有一仲子諸生文以先是壬寅當旬屬純修酌者之詞純以國事鞅掌未有以應也其年冬厯今春正純請告杜門候命兒子知為文申前説純因追念文學公及吾兩家故實與易暗合不可不使後人知于是即以易説為詞易首乾坤有六子而後為卦六十四以盡天下之用吾兩家先大父都憲公配大母贈夫人生吾世父及吾父都憲公二文學公孟津公配從大母康碩人生子七而存者四合之為六子吾父都憲公配母屢封贈夫人生純及都統弟編文學公配太孺人生儒官雅及諸生及萬夫長玉及璟四合之亦六子而吾兩家之乾坤六子肇矣兩家三世內外男女孫已六七十許後且無量幸多習文武業雖不敢謂盡天下之用然生生似續以衍螽斯之慶謂非從乾坤六子而來不可也易乾坤並重尤屬意陰教坤利牝馬之貞咸恆欲夫婦久於其道家人利女貞初間家三吉嗃嗃又戒嘻嘻上吉孚威大父都憲公家甚窘早世大母夫人拮據以嚴為政母夫人如之家遂起文學公之背孟津公也家亦甚窘且未婚從大母碩人拮據為取太孺人太孺人亦以嚴為政家亦起純非時見大母廪廪不敢嘻笑既登第通籍不敢惰行都統弟亦不敢失漢上軍民之望大率吾大母母夫人力居多大母夀八十有四母夫人七十有四太孺人今六十有一為夀始自此而七十如吾母夫人八十如吾大母夫人又九十如王右軍郗夫人猶為從子尚書令明談耳目關神明之旨以至期頤何難焉謂其非恆久之道不可也大母夫人為吾大父都憲公程嬰四十餘年太孺人為文學公程嬰已二十六年謂其非女貞之利不可也初太孺人之督儒官以商諸生以文萬夫長以武也不遺餘力即值宗族子姓有不秉軌則者亦必正色訓迪之其究儒官以積箸致資數千金諸生嫺博士家言可第萬夫長在原州司馬門以善騎射韜鈐為督府部使屢疏于朝且大用謂其非嗃嗃力不可也今士庶家率樂嘻嘻而厭嗃嗃矣獨聖天子以道化天下為純故屢頒製麻褒太母母夫人嚴政若令天下之為母者宜間宜嗃嗃不宜嘻嘻如易云前嵗辛丑聖天子建儲有詔婦守節年三十五以前苦者給羊酒扁以旌太孺人失文學公時年三十五又苦甚遂為縣大夫禮如詔聖天子若特為太孺人而覃此恩矣何吉如之雖然有家之初欲間欲嗃嗃母道也有家之終欲孚威子道所以成嗃嗃其説詳周孔大小二象曰反身曰言有物行有恆又詳子輿事親守身語中純日懼吾兩家之日嘻嘻也數引疾將歸為反身守身之學以畢事親正家之道庶幾如令明之見郗夫人於稱觴之日求所謂耳目神明之説以延吾年然未敢必也先為此詞示諸弟諸子姪使勿忘易又曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定余視諸弟有兄道諸子姪有父道不可不告諸弟諸子姪又各有父子兄弟夫婦之責倘喜聞吾言而為有物之言有恆之行以守身反身以事親正家則孚且威何文武之業不可為縣官倚重於天下乎何有即轉嗃嗃為融融亦坤之貞也恆之久也家人之吉且利也獨可藉手為太孺人夀也與哉豫知聞之亦甚喜唯唯為書致之家致之原州又致之漢上溫恭毅集卷八
