body:
  text: 溫恭毅集卷二十一明溫純撰五言律詩同子成遊説經臺為結煙霞侣因過尹喜門停車逄白鶴揮麈聼玄言瑶草經春長琪花冒雨繁真源如可問待月坐黃昏其二從君探世業道德五千存紫氣煙雲合丹崖日月屯有無觀妙徼恍惚盡乾坤似得真常脈先天可細論送辛四景虞應癸未試持憲神羊著參軍草檄名景虞之世父父白眉憐馬季綵筆笑江生風入鵬南翼雲蒸冀北程黃金臺望逺萬里正含情內丘曉行秋色撲帷清侵晨傍桞行衣牽朝露濕花映曉霞明拙病憐吾道江湖寄此生華峯雲日近欣慰倚門情過邯鄲驅車出北平暮向邯鄲行秋在風前樹波連雨後萍三千矜趙客十二傲秦城此日哀陳迹平原草木生邯鄲李希聖明府枉過小坐旅病憐秋色相逢一解頥看君花滿縣愧我鬢如絲把酒還聼鳥開襟且論詩黃粱今已熟那計夢回遲武陵城樓送李少參之關中登樓愁望逺把袂又逢秋共訝謫仙去誰憐落葉稠魂飛崡谷道月滿洞庭州相見知何日桃源好駐舟送李懋推放歸拜夕憐青瑣飛霜獨犯顔長留忠膽在不惜壯心間聖主恩波渥逐臣鄴下還賜環應有日那得戀東山過武關關塞空秦漢風塵感嵗華猿啼惟鳥道犬吠有人家孤嶂天疑近窮途日易斜啇山知不逺吾欲了生涯夏日同裴太僕泛西湖剛憐簮乍盍却恐袂仍分槎入六橋桞杯浮二嶺雲雨餘荷欲長風送磬常聞半日跏趺坐相將譯梵文又同登萬松嶺攬勝對髙㫪銜杯俯萬松人疑乘鳯舞亭似藉雲封湖海當簷盡山林引興濃願言婚嫁畢同此醉芙蓉豐樂亭赴成君迪太僕宴集久别成萍梗相逢盡日停論心憐玉署把酒續廬陵雨霽青疑染花開爛若蒸豐年仍可樂千載共兹亭春日詹直指招飲胡太守園亭榭倚危岑登臨愜賞心山疑浮海市人似到雲林花氣撲簾入歌聲雜鳥吟相看春意足底用出郊尋望壠絶恨風人癡忍為九我詩呼天親罔極愛日我何知想像松楸裏瞻依夢寐時重將萊彩舞泉路以為期海潮庵古寺碧雲邉登臨息萬緣法堂留月照衣鉢付燈傳近水花饒笑開簾鶴欲前相逢天竺客説破野狐禪初夏同雷健夫馬子充遊子德園雨霽夏猶春班荆白首新名花香入座幽鳥語依人絳帳經誰授豐城劒有神相從三博士星聚恐驚荀社集弟居景色倍晴和相逢鬢盡皤簷荆花疊錦風樹鳥成歌結社春連夏開尊酒似河不知禽慶侣何處戀青蘿郃陽曉發侵晨出郭門蕭瑟望朝暾霜逼秋禾熟日烘野馬奔兵戈連塞徼耕鑿幾煙村撫景臨岐路凄然欲斷魂園中望先塋感愴用百嵗吾偕汝句無情花自發底事鳥如歌本為逍遙適翻令感愴多望雲封若斧滴酒泪成波百嵗吾偕汝那堪誦蓼莪過夷門有懷西亭宗正傳經憐帝子垂淚過夷門幾載詩筒廢千秋藜杖存鶴歸疑見汝草緑正傷魂在笥文仍富相思夢裏論寓天寧寺蘭上人房寶塔何年創相傳自盛唐一燈留法界片月照迷方山斂浮雲盡風翻貝葉香無生如可學吾欲泛慈航送袁微之赴漁陽劉公幕從來䨥燕頷肯作一書生投筆辭南國揮戈向北平亦知龍射斗常有燭籠旌欲樹封侯績羞稱任俠名胡子芳移居為余比鄰何意離群友相逢更比鄰醉歌吾潦倒岸幘爾情真寶劍光騰斗春林花傍人子虛如有賦早晚獻楓宸題馮仲元園豈厭紛華擾而從此結廬峰連樓蘸水月送塔翻除改席花疑鬪題詩竹可書歸來吾羡汝不歎食無魚喜馬子儀至得二親信簷雀噪曽頻乍逢問二親喜聞顔似玉應是壽長春桃熟蟠山近蓮開玉女鄰思歸扶杖屨對景可全真送子儀歸用何仲默先生韻去住應難别賡歌欲暫留捲簾還對月繞檻復栽榴雨霽看行鴈煙開憶釣舟知君歸里日芳草傍清流寄弟吾仲幾傳書飛騰興欲舒看雲愁見鴈彈鋏嘆無魚經學三冬足鵬摶萬里餘雪霜亦雨露努力愛居諸慶成宴恭述時萬歷丙子純以太僕少卿侍殿中子夜南郊薦寅賔北極臨陽生飛琯應樂奏慶雲沉魚藻君臣樂簷梅天地心玉音親命酒既醉荷恩深其二九重欣晝接三祝慶良辰寒鍵初陽啓和顔七日親歌諧魚出聼舞遍鶴來馴喜起瞻前代皇仁自近臣上元同劉敬甫送弟從戎海內風塵滿憂時可奈何暗香梅自發積雪鬢全皤任俠揮長劍銘勳望伏波佇看麟閣畫握手醉煙蘿其二三五團圓夕留連離别時還從薑氏被預想謝家詩春入池塘草路分南北岐吹毛刀可贈萬里以為期長安會館赴同鄉公宴鶯燕驕春永芬芳得閏偏上林花易發旅邸月同圓簮遇青睛盍杯從緑樹傳感恩爭報主周歷萬年延送子儀還里折桞送君時銜杯動客思青春堪作侣好景且留詩隴月千山隔鄉心一鴈知髙堂問消息休道鬢如絲季夏同家弟邀妙上人園遊會大雨河漲底事驟清涼開襟共此堂正逢甲子雨况是水雲鄉説法風帆定無機魚鳥忘一身天地小吾亦愛吾狂溫恭毅集卷二十一
