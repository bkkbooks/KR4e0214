body:
  text: 溫恭毅集卷二明溫純撰疏仰遵成命糾正冒襲以彰法紀疏兵科本月初九等日臣等接到兵部題覆雲南巡撫陳大賓巡按劉翾各參原任黔國公沐朝弼疏其始謂朝弼既經勘明欲咨吏部議襲沐昌祚祖職其後又據撫按參劾謂朝弼欺隱正犯蔣旭等真為下愚不移欲待各事結的有悔悟畏法之意另請定奪其子沐昌祚匿比無良亦咨吏部待事結之日議擬施行隨已奉有欽依及二十三日又接到吏部題覆兵部前咨謂朝弼既經撫按勘明其子沐昌祚自應照例襲爵又䝉皇上俞允臣等待罪該科職司糾正不能不為我皇上之命令惜國家之法紀惜蓋自沐朝弼革職以來其子昌祚固難以父故而靳祖職然所以遲遲其襲者固以朝弼之罪一日未明則朝廷之法一日未正朝廷之法一日未正則昌祚之襲自難輕議且節年科部諸臣之所與該鎮爭者法耳豈特為彼母嫂莊田罪犯哉故三者而一涉含糊遷就則朝廷之法即蕩然矣今按朝弼母嫂雖願留滇莊田雖經處分至於罪犯蔣旭等乃係撫按緝獲則朝弼托抵之罪猶在蔣鑑既尚未獲則朝弼占吝之罪如故是朝弼不肯舍一二罪犯以尊王命朝廷乃輕授極品公爵以優昌祚蔣鑑之獲否雖不足為重輕而國家之法紀則關繫甚大况停襲之命甫下而准襲之典隨行臣不知兵部諸臣即咨吏部與同㑹議否也蓋當未覆之先臣純恐致冒濫已謬向侍郎曹亨謂既有前咨即應㑹議使移咨矣㑹議矣而又准令承襲其責在吏部無疑若不亟咨又不與㑹議其事則耽延遲緩之狀隱有成就該鎮冒襲之意其咎將孰與歸哉夫天下最可憂者莫大於使君父之命朝更而夕改始言之而終不能行命數改則法亂法不行則人玩且勳爵重典也違逆重罪也朝弼以罪而䝉恩成命既出而復反其所繫豈淺淺哉近該部題覆有一事而數變其說有一疏而自相矛盾如京營一議徒令人竊歎扼腕臣等不謂我聖明在上而令法紀不明命令不一若此也伏乞皇上念國紀不可不正思明命所在必行除沐朝弼聽彼處撫按刻期拿送蔣鑑正身另奏定奪外其昌祚襲替一節仍遵前㫖候該鎮事結之日方許酌議施行庶法典明而主勢尊命令信而國威振矣秋防屇期時事可慮乞賜大加振飭肅兵威以預圖安攘疏兵科臣等竊計敵人自元年東犯薊永西犯汾石之後獨去秋雖入雲中旋即引去一二年來在各鎮猶號寧謐此豈我之兵力果能震懾其心使不敢犯抑斂翼養威正諸酋不測之謀今春徂夏少有壓境之塵即便張皇坐困而况秋髙馬壯氣肅弓徑又不知何以應之故今嵗秋防臣等以為較往嵗尤不可不嚴蓋往者敵患獨陜西三邊為急宣大偏老次之薊鎮猶屬內地自庚戌以來急莫如薊是昔雖不能守在四夷而猶守在邊境今不能守在邊境而在守畿輔且所謂守者土兵既難補練敵臺又未報完此其積怯之勢一可慮也往所患者鄰邊居民或被搶掠今長驅深入甚則攻城破郡震搖京邑此其剝膚之虞二可慮也往邊塵一起猶賴天兵救援今營兵日見消耗無論逺征萬一敵騎近郊不知統兵出戰者何將隨將敢戰者何兵恐兵不識將將不識兵不惟不敢言戰雖令出都門堅守營壘亦難矣此其本枝俱弱之勢三可慮也宣大偏老近以敵騎蹂躪既失耕穫之利敵即不來亦恐坐困况偏老人心素無固志大同故套惟恃通賄今幸明正其罪蠢爾敵人必且以失利為恨非我猛將大振軍威將來事勢尚有不可知者至於陜西套虜遼東土蠻各懷報復之心此其無所不備無所不寡之勢四可慮也故臣等以為今嵗秋防較往嵗尤不可不嚴幸賴皇上軫念邊圉凡督撫將領業已更置戰守機宜業已申飭但臣等私憂過計竊據目前時事蓋有不可盡恃者一如薊鎮自談綸戚繼光練兵以來所費錢糧亦云不資若一旦以瓜期而去不惟盡棄諸臣前功使不得目覩其成以報天子而後之繼者萬一意見不同又另作一格局則今日安邊之計祇為國家耗財之地而邊事終不可為矣臣等以此謂各邊文武諸臣既擇焉而後用之果才矣不但今嵗秋防不得輕易雖不拘年限但求為國家坐鎮一方則就任升賞未有不可以酬其勞者如其不才則各路兵馬已分布矣即在論列凡罪犯深重者固難輕貸其應降調等項如督撫總兵則先就彼降罰參遊以下則先處以軍法通候秋防畢日另行議奪至於參遊守備果負勇略既難輒棄一為更置徒費往還豈若據其被論輕重即於本任降級懲戒嚴飭軍門勒令改圖如半年之內仍舊不悛徑奏問遣昔唐臣陸贄以庶官遷謫量移近地謂之橫移今邊臣之朝東暮西實與此類臣等願該部凡用邊臣慎勿橫移如贄所云也一京營練兵全藉二三副將計營將所著聞者焦澤與袁正耳當其充總兵也固以諸將之才皆出二將下今正雖老矣澤猶壯健乃置散地而諸副將中反多以怯懦者充之卒然應變何所恃賴且各營副將上既壓於提督下復同於參遊紀律不明未有甚於此者不知有警之時亦用其衝鋒破敵否乎如其必用是平居無統御之權臨時受折衝之寄以素不服習之卒而驅之使戰其不格明矣臣等謂自提督而視諸將則提督固為大將自副將而視諸將則副將即為大將似宜少伸其權以便節制至於各營之兵舊所謂戰兵家丁名色即係聽征之數即今是否精壯應否堪戰在提督諸臣當思操期在邇秋防在邇作何整頓務要兵識將意將識士情庶臨時不致倉皇又查各年防秋之始預取各處驍勇名將致之闕下以備緩急今其可已乎一賞不遺小則賞一人而千萬人勸昨者老營堡之獲保全朝廷之所賞賚者鎮巡耳臣等以為鎮巡之功誠不可泯使非哨探者先得其情則該堡之危尚未可知則此哨探者固曲突徙薪之見也夫近年以來各邊墩卒直作敵諜在大同大邊尤甚每賊欲入犯先遣精騎絶我哨探名曰巡邊以故賊已入境尚無煙火及有傳報如老營者又不䝉朝廷分寸之恩此何以勵人心而鼓諜者之氣今何不查前老營哨探官軍厚加賞賚以後各邊如哨探得實果符所言即於勘報疏內明敘其功以便升賞至於巡邊零賊作何撲滅大邊墩卒有無關繫在各該總督軍門隨宜裁酌施行亦伐敵謀審彼已之定計也一勘報邊臣功罪責在臺臣往有不待勘報先已題請賞罰及勘報至又多異同如舊嵗福建之事使王言既出而復返固非事體必候勘報乃又延至三五月或一二年而後核册到者又非賞不踰時罰不後事之義臣等謂以後各邊少有烽煙凡該巡按衙門即便移駐近地詳核各將進止虛實地方有無殘破俟賊既退限半月之內即便具實奏聞庶該部藉此以便題覆朝廷據此以行賞罰不惟欺隱之弊可革而有功即賞有罪即罰亦可以勵三軍而作勇敢之氣一興師十萬日費千金今户部之所計慮者各邊年例耳一或有犯凡行糧犒賞之類不可勝算且自去年以來水旱頻仍各省倉庫搜括殆盡雖不蠲免豈無拖缺即今嵗入之數安能常保如故凡此皆其所當寒心者合敕户部凡內而倉厰糧餉草料務廣儲蓄外而邊鎮如山西之偏老大同之左右等衛宣府之獨石懷來等城薊鎮之喜峯古北等口與陜遼諸鎮凡繫屯兵堵截要地一應芻糧務先時預備以使緩急足用更望皇上加意節省悉蠲不急之務幸毋以軍儲大計置度外也一聲東擊西猾酋故智敵如分道而南或以犯南山為名而直攻偏老或以犯山大為聲而直趨薊昌者各該總督鎮巡一失機宜則捉襟露肘勢可立見如昨老營遊擊劉滋方欲東援賊又西至比及掣回而賊已去矣合飭宣大薊遼等鎮諸臣凡一切應守應援事宜俱照節年條議遵行如賊西犯毋借口東援以失外防而棄山大如賊東犯須酌量緩急毋獨守一隅而置我兵於賊後至於薊遼昌保務據險堵截使匹馬不敢南下萬一深入其䇿應之責尤視各鎮為重陜西三邊自春以來套部亦往往擾我邊民責令彼處鎮巡宣力揚威毋貽國家西顧之憂一近時霪雨連旬都門之外陸地舟行閭閻舍墉十室九頺其在邊境城堡墻濠又不知狼狽何狀竊聞大同城堡類低薄特甚薊昌邊墻每依山湊砌即今坍倒誨冦不問可知合飭督撫諸臣亟為修補凡鹽菜銀兩從便權宜工完從實開具奏奪務使墻堡堅完以資戰守亦今日邊防之不容已者再照軍國大計凡據各邊傳報該部不時奏聞臣等不時糾正然呼吸之間安危所繫少有遲留坐失機務查得成祖之於閣臣彭時孝宗之於兵部尚書劉大夏等一聞警報不時召問我皇上前嵗一問石州之變而諸邊臣即有骨栗毛竦者况今日兵將不及二帝時逺甚我皇上肯默居深嚴而不為天下軍民計哉伏願查復御便殿舊規俟秋防有警之日容閣部諸臣面議方略諸臣中必有仰體聖心酌陳緊要事宜不敢以瑣屑細務瀆天聽者臣固知各邊諸臣必將曰我皇上之留意邊防如此其有不用命者乎伏惟聖明裁察臣等不勝祈望懇切之至鄙詐督臣餽送無名乞賜懲究以正頺風疏兵科昨本月十二日該原任兩廣總督劉燾寓書於臣臣開函見有禮帖一通內開金色假等物共代銀二十四兩臣不勝駭異蓋燾與臣既非同鄉又無交好臣叨任今職頗於督臣職掌相關燾在蒼梧經臣論列又在行勘之中其當逺别嫌疑燾豈不知夫燾既為臣不滿臣必為燾切恨無疑一旦改容加禮豈人情乎且銀至二十四兩禮乎賄乎况自科臣丘蕣參論方亷以來其各該督撫與臣等科道官不相通禮久矣燾乃以身作俑此其譎詐不情之狀固燾所習為而不顧者蓋燾官已踰分囊已不資聲色縱逸之欲日所耽娛苟得一論劾而去實其所甘心者以故假此無名之餽既欲汚臣以泄平日忿恨之氣又欲激臣論列以遂自已偷安之心臣於此非不知泯然麾郤不一宣騰則全渾厚大體若乃硜硜自全冒昧上聞不惟自涉矯激抑且墮彼巧術妨國家使過之仁臣之罪不可逃矣但臣言官也百司愆違尚當糾正贓貨逼身又復隱忍恐世之效尤者且將曰通賄如燾亦不見罪言官如臣亦不糾舉使天下士習日淪於貪鄙鑽刺而莫可救正者自臣與燾始矣故臣寧受冒昧之名而願仕路之清明寧受太刻之誚而願官常之肅整至於臣素無羔羊之節致來暮夜之金業已愧死入地矣除聽罷斥外伏乞皇上敕下吏部再加議擬將劉燾或據平生斥奪其官以清仕路或念秋防在邇據此一節重加降罰以杜私交倘從此可以滌士風而挽世道即臣之心不白於天下而謗怨罪謫交加於臣臣亦無憾矣敵人謀犯乞賜嚴飭內外當事諸臣大加防禦以保萬全疏兵科昨該宣大總督王崇古薊遼總督談綸各塘報西有俺答黃台吉把都兒東有土蠻欲犯古北冷口宣大洪蔚等處已該兵部題覆奉㫖嚴責將領諸臣其京城內外防守事宜又諭諸臣詳議來說臣等竊以為敵果入犯薊鎮則據險堵截責在本鎮就急赴援責在宣大山保昌遼鎮壓畿輔責在京營相機調度責在本兵臣等職司糾正其於諸臣一有功則請行賞一失機宜則請行罰似亦不必襲故套再行申明以滋紛議但俺答諸酋自秋以來結聚邊外蓄謀日久既稱欲搶糧路城子又稱欲犯古北等處在我當事諸臣自當萬分戒嚴竊見內而京營諸臣本以二三之見遂成掣肘之勢即目冦至尚且互相齟齬不聞一體相關之義古之人有先國家之急而後私讐者况無上事而相持相沮萬一胡馬近郊號令不一臣且不能為諸臣曲說矣外而薊鎮數年訓練之功全在此舉一試今虛聲已傳塞外而諸酋遲遲不發固欲厚集其勢以抗我師使我徒有虛聲而無實用則臨陳交鋒之際尚有不可必者伏乞嚴飭京營提督薊遼總督鎮巡諸臣務要嚴加防禦同心體國毋恃其不來恃吾有以待之其在京營務廣集衆思懷同舟共濟之念如立營於外則互相犄角或以我為正而以彼為奇或以彼為正而以我為奇其併力於彼非為彼也彼之營固則我之營益固正所謂輔車唇齒義也如未事而反面相濺臨事而觀望不顧縱幸免無虞而吳繼爵曹邦輔等之失不可掩也其在該鎮必多方哨探堅守所必攻之地預設所必勝之䇿果拒敵於外使匹馬不得南下則功當首論苟一入邊墻或設伏張疑或直衝其前或尾擊其後使進不敢震搖神京退不得飽欲完歸則功亦次論倘執一隅之見致有踈虞談綸戚繼光等之責不可委也京東諸郡縣收斂保守之責既在有司當茲秋成亟宜收斂各歸城堡使敵野無所獲則不得因糧於我自成坐困宜飭順天撫按速行各該郡縣如敵壓境果設方略堅守城堡俱依軍功升賞其怯懦無謀致有失陷者聽撫按據實參究至於有司入簾者公事畢宜令速回升遷者新官至方許離任不許因而推避自取罪責宣大山保諸臣已奉入援之命自當以京陵為重然敵既垂涎洪蔚則撫臣以下宜亦嚴加偵探毋令敵遂分道并擊之謀果敵止東犯使力能搗其巢穴聽便宜揚威以攻彼所必救至於今日急務尤莫切於賞罰二事然有師終之賞罰有臨時之賞罰師終之賞罰所以論既往之功罪臨時之賞罰足以鼓方張之鋭氣除師終賞罰聽臣等本科及各該巡按候事定之日分别查究外其臨時賞罰如各該督撫自宜便宜行事惟外而入援兵馬內而守城官軍宜於行糧之外多備犒賞銀兩在通州昌平者即令部臣計算在京城者另委官員收支庶重賞之下必有勇敢至於不用命者俱照軍法行事已䝉欽命在當事諸臣著實舉行之耳臣等不敢再贅邊報日急再陳防禦事宜以保萬全疏兵科本日臣等據薊遼總督談綸據石塘嶺參將陳勛揭據家丁楊大旺等報稱濳出白海子迤北瞭見大舉敵兵約長七八十里趕著牛羊祭了天於八月十二日起身往東北行走至十六日尾兒方才走盡本日有遊賊三騎向墩密說黃台吉俺答都往東北去了只近新月兒上來進裏邊去要搶馬蘭古北東西地方又一股圍色振兒搶獨石龍門就進黃花鎮往東一帶又說一股搶大東邊等因到臣臣等看得石塘嶺所報敵人欲一犯黃花一犯古北一犯馬蘭一犯大東邊先據東路節報土蠻亦欲分犯是東西二敵分為五道雖尚在邊外然深入之計已露情形而國家防禦之兵在薊鎮號一十三萬在京師號十萬其各援兵在宣大山西號二萬有餘在遼東保定山東河南號五萬有餘通訃不下三十餘萬而又我處其逸彼當其勞我環甲待戰彼越數千百里而來兼以賊黨之中半吾赤子苟申吾招降殺敵之令則彼之黨散苟在我將帥人人思奮則俺把諸酋之首且可繫而致之闕下此在我皇上布恩威與中外將帥鼓舞三軍何如耳臣等待罪該科但恐賊以必勝為主而來我以未見賊之兵而怯則固不能無杞人之憂者謹以防禦未盡事宜為皇上陳之幸俯賜采納焉一慎擇衆議以止搖亂近邊報來凡各臣子人人切齒纍上封章俱䝉皇上采納無非先事預防之意而各該官民即汹汹驚擾萬一冦至而甲可乙否上下震動一則使本兵茫無定見一則使官軍漫無定守甚非安內攘外之計伏望皇上明斷於上當事臣工詳加裁酌不得一槩取必以滋紛擾至於各城居民在巡城御史多方曉諭與其驚惶而失措不若安靜以併守之為得也一驗試器械以求實用朝錯云器械不利以其卒豫敵也竊惟京通二處合用弓箭盔甲神槍銃炮佛朗機火藥等項或朽壞不堪或日久未試即如火器臨時一不堪用則衆皆東手矣請飭該部及巡視盔甲科道官作速查驗前項器械應否堪用如不可恃務預先整理不得以費用之故而妨大計違者聽巡視并臣等指實參究一慎守要害以遏敵勢查得薊鎮自庚戌以來敵往來直侵內地獨昔年總督楊博拒敵於外本之探報已真以故隨其所守皆與賊相值則我之所守者約而賊之所犯者昧矣今諸酋分道之謀雖真僞未定苟非預得其真情則賊將攻其所不守而我守其所不攻矣請飭總督談綸等耳目雖借屬夷哨探尤貴多方如敵直犯一路自可併力堵截倘果分道而南則我雖涉於無所不備而彼之勢亦分矣務要酌量緩急同心防禦使敵騎不敢南下雖無擒斬自准奇功萬一縱賊深入其責將誰歸哉一預支月糧以鼓軍心伏覩皇上軫念薊鎮軍士發銀犒賞內外軍民亡有不感激泣下以為皇上優恤之恩如此則敵人不足平也今營軍犒賞之典除候臨時請行外至於月糧類過期支領此在無事則可即目併操既無繇别營生計一赴營壘不惟多內顧之私而數日行糧亦不能自辦矣請諭該部查各官軍於九月之糧即先放給則以所應得之物而給於所急用之時此蓋不加賞而自勸者一速傳的報以便防守蓋兵家之道耳目為先傳報不的非虛布軍馬以老我師則誤失機宜以致倉皇庚戌時薊州之信十日不得聞通州之信三日不得聞城外之信城內不得聞失在於探報之役差委未專耳請諭兵部凡薊鎮塘報與城外走報各令分𣲖的確使有專責少涉遲延致誤軍機置之法毋宥一彈壓草澤以消姦謀山東河南之兵既應赴援該省舊稱多盜乘機竊發本其故智先時防禦勢不容已請飭河道提督軍務都御史及該省司道郡縣官各照所部之地嚴行防範庶邪謀寢而內變不作至於二省撫臣已奉入援之命即宜提兵境上俟有的警星馳赴援不許逗遛自取罪責一併力重城以固外防臣等竊以京師惟重城難守蓋城本低薄內多曠地防守官兵又視重城為差異萬一難守關係非細請飭該部量添兵力壯丁仍乞蚤委文武大臣預先料理務使不可勝之勢在我而後京城之防守為益固凡此皆國家勝算之未技為諸臣條畫之所未暇及者臣等私憂過計偶有見聞不敢緘默伏惟裁酌施行幸甚營制屢更統帥不一懇乞聖明亟賜裁定以正事權疏兵科臣等竊惟京營之制始輔臣倡議意以為收兵權飭戎務在分營選將既其說不可行於是遷就焉為益三大將已又益三文臣合之為六提督時科道官固力爭之乃以秋期至遂姑置不講今邊聲漸緩將領無統紀臣不得不竟其說蓋營制之壞失在於不擇將而添將不增軍而增官不講訓練而講營制易有之師或輿尸凶宋程頥以為軍旅之事任不專一則覆敗立至今奈何以一輔臣故而用三大將以一勳臣故而用三侯伯又以三侯伯故而用三文臣假令此六人皆才且賢然十羊九牧之害臣等猶不能無慮况入秋以來一分布兵馬輒肆胸臆擇便利歷旬餘莫能定豈惟文與武不相為用而文臣中亦自相矛盾矣千把總號頭受參遊令倐焉而副將之令至又倐焉而文提督之令至又倐焉而武提督之令至多指亂視多言亂聽即無事且不可况欲以臨敵乎各衛所官軍雜置三營中則此六提督者能無各衛所公移乎有之則一官而往來六提督之門者紛紛矣其費可不問而知也且三營各三副將將將兵各五枝不可謂分乎分矣得其人則合之為三大營分之為六副將又合之為一總督一協理蓋祖用先帝之制而諸副將之分屬統領者又隆其權雖不用輔臣之言而分三為六合六為一者又於分數為甚明故臣等以為文武大統帥則莫如復先帝制便蓋今日所患者不在兵強而在兵弱不難於練三軍而難於將領得人昔人云有將則有兵今營將類庸懦昏昧與之談攻戰則口禁莫為應且行伍消耗視祖宗時不啻十之三四乃日建議日添將日取中㫖如兒戲者終嵗無成說其於兵政有分毫裨哉伏乞敕下兵部詳議上請毋拘成說毋循私見果大將太多即革去四員遵照先帝一文一武以司總協其諸副將各仍近議分統以後推用將臣不拘某類但求知兵老練者充之至於補伍練兵事宜俟議定更望皇上嚴飭當事臣工大破常套從實振舉使數十年積弱之勢轉而為強臣等不勝願望之至懇乞聖明遵祖制慎贈典以重名器疏兵科昨該禮部題覆司禮監太監陳洪乞恩疏䝉聖㫖是陳洪侍朕恭慎效有勤勞伊父准贈都督同知母一品夫人後不為例欽此臣等不勝駭異以為祖宗二百年贈官之制至今始變隨查大明㑹典凡武職有功封贈父母各照見授職事對品封贈無有贈內官父母為一品者先帝時太監溫祥得贈其母為一品夫人然越禮踰分已當議革而溫祥之父不得與封者以子為太監父無封太監例耳詎意太監陳洪即因溫祥贈母而求并贈其父已自無例可比矣而該部則曰贈官原比武職事例豈以所引滕祥廕弟侄為贈官例乎且都督同知與一品夫人皆極品爵也洪不過一五品內侍耳視對品封贈之例既不相協而內臣之於武職又何相干涉今天下武職多怠玩而不振者以爵賞不足為天下勸耳使都督同知既可以無軍功而得則人何必蹈湯火赴白刃視死如歸耶即有蹈湯火赴白刃視死如歸者陛下其何贈以加之耶夫贈軍功與無軍功者同則人且不勸况有軍功者尚為品級拘未盡可得都督同知耶陛下即以洪為恭慎為有勤勞然蟒衣玉帶陛下之所以寵之者亦極矣洪果知恭慎其何忍以私親故而壞國家二百年之制陛下又何忍以宦官故而施此二百年未有之恩耶且此典果出陛下意乎抑因洪曲請而後與乎又因閣臣票議而後與乎果出洪曲請陛下直以祖宗之制問彼自當無詞以對若出陛下意則閣臣當救正部臣當執奏今在廷諸臣皆知出閣臣票擬則其意不過以上下之情未通遂不得已為調和中外計耳夫陛下為天下臣民主不使閣臣直行其道而使不得已市恩中貴雖廢祖制壞名器而不顧臣等竊以為不可伏惟聖明裁察屢據邊報乞賜嚴飭邊臣大加逐勦以戒不虞并議處降人以全國體疏兵科據宣大總督王崇古揭報本月十二日敵酋黃台吉等率衆一萬餘騎自𢎞賜堡石彥莊溝進入隨調宣府總兵官趙岢自左衛馳赴䇿應督發原調宣府副總兵官劉國東路參將馬孔英西赴聚落探賊迎勦本日晚敵騎至城東二里東塘坡下營黃台吉遣一騎近城答話索要原降那吉等本日四更時原任總兵胡鎮督統參將葛奈遊擊朱浣兵馬二枝在城東關外下營見從南來敵人二騎當令胡天福等活捉前來審一名土乎赤係大同通事一名啞都雅係番人稱說是黃台吉家人差來往大同與把漢那吉說話未曽相見復問此來為何本番回稱止是要小官兒胡鎮等將本職連日傳示詞語若要那吉不當擁兵入犯見今調兵與你厮殺誰肯輕將那吉與你你若無禮就將那吉殺了與你看至五更時賊往東南行走胡鎮劉國馬孔英并參將原于天追襲趙岢自萬全左衛趨許家莊十四日各官追奔地名自造堡賊撲來各官督軍齊用神火奮敵打死敵人數多就陳奪獲鈎杆一十二根十五日賊俱在許家莊東南行走俱不開營又稱馬芳先西下朔州不及掣回胡鎮回防適與敵遇其劉國馬孔英之兵既與血戰胡鎮兵馬纍與連營聞賊終夜驚擾若敵十五日果犯該城地方趙岢已至自能追擊必回陽和天城大川北遁已調參將賈國忠楊爾干并標兵二枝及劉國馬孔英之兵在天城等處伺候邀截敵連日野無所掠人馬無食或可挫敵獲功其原遣立功官田世威帶通丁鮑宗德等赴威逺一帶據本官報稱老酋差人至邊答話世威備將朝廷恩威示各官收養伊孫之恩責令還搶虜人口執送許為奏請天恩不殺其孫容伊納欵議與放回即差鮑宗德同原番直入敵營親見俺答一一承許生死必欲見其孫子百凡俱當依從且死不甘心以伊孫買賣諸逆對天發誓若與我孫情願一統天下每年進馬三百匹永不犯邊又稱黃酋索降聞言啼哭其犬羊之情本圗乘虛搶掠二鎮兵馬雲集到處扼堵大遭挫折劉國一戰大炮打死敵兵人馬數多敵亦知懼即時起營且敵素強悍必使見兵遭挫方可折其驕氣堅其哀求又據宣府巡撫孟重塘報據總兵官趙岢報稱十五日馳至地名屣田堡與賊對敵斬獲首級四顆得獲敵馬敵器口袋不計其數賊即收營退遁等因到科臣等惟自那吉投降以來俺答屯結威平黃把深入內地一欲乘間搶掠一欲強索降人據稱我兵雲集大挫賊鋒果如所言則敵人強索之謀既寢其謂勢必北遁是矣但地方有無殺鹵未經勘核敵情叵測且又尚在境內萬一東西共犯或揚兵塞外使我軍東奔西馳無時休息或託言哀求使我緩備而隂為攻困之計其該鎮督撫將領自當乘勝振威嚴為意外之防一有踈虞其責不可辭矣至於俺答哀求納欵一節此中國威信之體外屬觀望之機俱在此一舉昨該兵部題覆處置降人事宜䝉㫖賜以官服且令該鎮官加意綏養候㫖另用臣等以為事在邊疆自當聽彼展布且敵方入冦豈容妄言豫奪以褻國威近聞邊臣亦自以堅執不與為非而又俺酋哀詞懇求則在我或豫或否自當詳議蓋中國之於外屬來則有備去則不追即諸酋之君長降亦不過厚加賞賚以遣其歸不惟不可用而亦無久養之理况那吉一小豎子彼舍之無關於盛衰我得之不足為有無在俺答則必欲生還在中國則必欲養用臣無論那吉久則必思揚去自是諸酋以索降來則彼之師反有詞而堂堂中夏得一酋即欣然以為奇貨而質之其自小也亦甚矣且強索而後與固示弱而失豫奪之權哀求而不與又不武而失廣大之體但敵既入邊須令收兵逺遁果情出哀懇不敢復犯邊疆然後宣布朝廷不殺之恩許令那吉生還其應否納欵應否責令執送叛人或盡殺叛人合行確議必使吾中國之體不失乃為可耳至曰每嵗獻馬三百則中國所重者信義耳又烏用彼馬為哉伏乞敕下兵部詳議上請嚴行宣大督撫鎮守等官賊未出邊務大奮軍威刻期逐勦以靖地方果彼哀求降人方許遵照欽依施行其敵過地方有無殺掠及各官功罪仍行彼處巡按御史嚴勘徑奏則邊方不擾而國體可全矣恪遵明㫖查正公用銀兩疏萬歷丁丑年時任光祿寺卿近該吏部㑹同户部題奉聖㫖這事情既查勘明白方揚方抗王廷卿都降一級調外任用王廷卿所奏雖出私訐然倉庫錢糧不奉欽依擅充私用是何理法以前且不查究今後兩京各衙門都著一一清查有相沿積弊著首舉釐正奏請定奪如怙終不行釐正及首舉不盡的著兩京科道官訪實劾奏欽此欽遵為照本寺供應上用膳羞及內外飯食筵宴除正項外一應雇覔搬運扛役及公堂㕔署費用查刷揭帖修補房竈等項頭緒甚多俱於庫貯麻連蒲包房租等銀內預赴科道掛號支用獨糟價及年久麯末與各署餘剩物料等銀向收㕔庫每年約二百兩不等陸續幫貼良醖署腳價器具及修補房竈等項相沿支用雖係公費未奉欽依終屬未安今䝉皇上諭各衙門首舉釐正臣等逐一清查盡數首正凡臣等先已革過及今次應存數目相應開立前件上請恭候命下本寺查照後開欵目置木牌懸于堂壁仍置立文簿二扇一存本寺掌印官備照一付典簿㕔查照遵行其糟價及剩各項銀兩不論多寡同麻連等銀俱收入堂庫凡應用銀兩悉照後開額數赴巡視科道掛號方准支用如有未盡入庫及額外冒支私用許巡視科道指實參劾伏乞聖裁計開一各署雇覔搬運扛役每年掛號用銀四百兩一查刷道書手工食每年掛號用銀五十兩四錢前件臣等查得扛役銀四百兩每年俱支庫貯麻連等銀今前項銀兩庫貯不多臣等自本年正月以來裁減冗役八十餘名又有禮部新補厨役足充搬運扛役今嵗已終俱未支銀雇覔似應立為定規以後不許再支庫銀致令難繼先據查刷本寺湖廣道唐御史手本開稱本道書手既係食糧厨役又相沿支領工食甚屬冗費所有公食銀五十兩四錢相應裁革以上二項應盡革銀四百五十兩四錢伏乞聖裁一本寺堂上官到任離任案衣公宴筆墨印硃習儀監宰陪祀供事上陵賃房擺飯及科道進寺收放錢糧擺飯各衙文移紙劄丁憂病故官吏奠儀棺木等項每年共掛號額支銀二百兩一㕔署官三十八員到任離任每年掛號支銀約六十兩一查刷道造御覽揭帖每月各役食用銀三兩寫帖工費及裝綾殼等項共掛號銀五兩八錢五分前件臣等本堂公費銀二百兩今嵗已終止用過一百五十兩尚餘五十兩相應量減四十兩每年議留銀一百六十兩㕔署官公費減去二十五兩止留三十五兩以充前項費用先據查刷本寺湖廣道唐御史手本開稱查刷進呈御覽工費每月八兩八錢五分相沿似多合每月工費減銀二兩五分每年共減銀二十四兩六錢以上三項共量減銀八十九兩六錢伏乞聖裁一每月成造進膳本匣鎖鑰等項并修補本寺房垣爐竈每年末掛號約用銀七十兩不等一良醖署米麯腳價及治辦造酒器具每年未掛號約用銀六十兩不等前件臣等查得本寺及器皿運柴各厰每遇大修俱題請行工部修理其各厰不時修補原赴科道掛號動支各照舊獨本寺各署及各倉房不時修補及每月膳本匣鎖及良醖署器具腳價委不容已相沿俱支糟價及餘剩料銀今議糟價等銀俱入堂庫掛號支用見今積餘銀一百四十七兩即交庫內以後續收前項銀責令典簿㕔置立號簿凡登號前銀每月即令各行赴庫上銀前項應用銀一百三十兩俱於科道掛號支用伏乞聖裁一行各衙文移并回部實收每年用湖廣呈文紙銀九兩六錢土地祠香燭年終封印門神鶴鹿食用銀八兩九錢本寺堂㕔署每年用刑具銀二兩八錢其卿少卿寺丞到任離任公宴案衣及雨具扇傘更換坐褥齊宿油燭燈籠難以預定以上各項每年共掛號額支銀二百兩清查供應器皿酌處成造以節財用疏光祿據大官等署署正林及祖方岱蘇大生楊鉉等申稱䝉本寺清查各庫器皿若干合行造辦若干逐一開報以憑酌處成造依奉㑹同管器皿庫署丞侯于魯張天相王堯相許成材查得四署年例兩京器皿共該一萬件今大官珍羞良醖三署各有餘積今㑹萬歷七年分器皿通應量減大官署見在器皿三千三十件合量㑹工部四百件南京一百件珍羞署見在器皿共四千五百二十四件合量㑹工部二千二百九十五件南京四百件良醖署見在器皿三千三百七十五件合量㑹工部四百件外擡酒扛架各四百五十條件掌醢署器皿供應獨多雖有見在二千六十四件仍應照舊造二千三百八十三件南京造一千件又查得黃絹袱除用過回銷汚壞不堪外見在一萬四千六百五十四條黃絲絨繩一萬六千四百一條黃綿繩七千六百四十條錫器見在及追回各處侵占共一萬九千六百八十八斤十兩遞年常例并續添等項供應每嵗約用黃絹袱黃絲繩各三千條今以庫貯見在并新收兩京年例之數計之可供六年之用其錫器內每年兩京成造隨卓錫湯鼓查歷年以來並無支用每遇茶飯筵宴合用器皿又將錫鼓改造用畢還庫徒糜原造工費又查得工部厰隨盒小袱又黃絨繩歷年以來亦無支用見今堆積相應酌處各等因具申到寺臣等查得萬歷七年分各項供應器皿既經各官量減其應用六千九百七十八件合照例成造至於工部厰隨盒小袱及黃絨繩與兩京隨卓錫湯鼓既不支用本寺以後㑹計俱免開造其黃絹袱黃絨繩見在既足六年之用合暫停止俟三年後如恐不敷預行題請錫器見在及追回各處侵占一萬九千斤有餘若嵗嵗清查即有折損能費幾何萬一數年之後果不足用再行㑹計錫料送寺隨宜成造應用器皿庶免重復工費或于財用未必無少省矣重宴賜以撫逺人疏光祿近該禮部題處給賜夷人奉聖㫖併及宴賞酒飯著臣等本寺選委署官清查管理臣等仰見皇上體念逺人恩至渥矣除即選委亷幹署官逐一清查凡筵宴下程務令鮮潔足數外但夷人嗜好不同內多不食猪米等物每給下程多求折價或求換給生羊臣等以未奉欽依不敢擅折間易以羊即色喜謂得實用而所得本色下程又託鋪户人等轉易别物既難望如原價又難保無侵漁雖有實費徒潤狡猾深于夷情未便合無比照近來賚豫改給衣物事例凡各夷到京令通事譯審應得下程除願本色照舊給送外其願折價或願生羊詳具手本送臣本寺照依時估改給至于午門外酒飯桌席治辦雖屬本寺收送卓席係各邊伴送員役及㑹同館館夫往往攘為已物非本寺所得禁治以后遇宴如各夷職官及跟隨人役願親收者不許各員役干預其餘如朝鮮等國職官每桌立一單票明開件數斤兩預令館夫報名填票交送如有剋減嚴加究治仍行錦衣衛責令護宴校尉驅逐間人不許擁觀乘機混搶庶朝廷恩禮不為虛文而夷情甚順將益動其來王之誠矣懇乞聖明勉留大臣以正人心以全國體疏甲申時任大理寺卿近該吏部尚書楊巍覆議御史丁此吕疏其詞稍激以致給事中王士性御史江東之等交章論巍且及輔臣申時行與巍纍疏求去輔臣許國侍郎陸光祖等亦有激求去一時在廷諸臣人人駭異幸賴皇上洞燭屢下溫㫖勉留二輔臣與巍及令光祖安心供職二輔臣素明臣子委身大義必不忍再萌去志諸臣聞之色喜謂我皇上知人之明真同日月獨巍求去之念未巳臣願皇上以大義留之蓋大臣與庶官不同庶官無大責任猶可輕去以報國之日長也大臣受國家數十年髙厚之恩其進退係賢不肖觀望其既退欲復報恩無繇而以一二少年之言為潔身自全之計非大臣所宜爾也巍之居家孝讓立朝公正皇上知之中外之臣知之即論巍者無他過可指亦心知之而必欲罷巍因使諸大臣不安其位將令言官受一網打盡之惡名亦非言官所宜爾也臣無論言官用意公私竊念吏部以進退百官為職掌請㫖調一御史而必求罷一尚書抵之投鼠不知忌器於國體士風關繫不淺况人才難得老成人尤難得臣不願當我皇上極聖至明之時而有輕棄老成令諸大臣解體之過舉也又不願使九州四夷聞之疑朝廷舉錯失當或嘆息或歸咎建言者之不忠也伏乞皇上再降溫㫖以大義勉留楊巍令與諸輔臣協心輔治庶人心可正國體可全臣無任懇切祈望之至自陳乞斥以弭天變疏大理近該廣西道試監察御史朱璉星變陳言該吏部都察院㑹題節奉聖㫖是四品以上京堂官俱著自陳欽此臣係四品例應自陳臣繇嘉靖四十四年進士歷知縣給事中左右給事中都給事中左右參政太僕寺少卿提督四夷館太常寺少卿升今職伏念臣質本庸愚才更踈淺官縣令愧無牧愛之聲叨省垣徒負建言之責兩參藩政旬宣無能三歷清班瘝曠是懼伏乞敕下該部將臣即議罷斥庶幸位者去而仕路以清其於天變或可少弭矣溫恭毅集卷二
