世務立志逈異庸流以上諸臣雖科貢異途均為教職之良俱堪六館有司之任者也伏乞敕下吏部再加查訪如果臣言不謬將劉良春等量升六館龍德謙等量升有司庶人材益勸而學政有裨矣薦舉佐二首領官員疏督撫先該臣查得佐領各官所管職務與民相關甚切貴在得人往因薦舉數少無以示勸已經題奉欽依但賢能不凡者類得疏薦多不妨盡舉其次咨部超敘見在遵行臣所屬佐領庶職以此頗多自奮除貪殘不肖者不時訪斥外今當升任所有賢能佐領相應遵例薦舉以廣示風勸臣訪得臨海縣縣丞屠以欽檢束身名不失儒雅疏通世務大得民心德清縣縣丞陳士秀誓守清亷綽優幹濟徴糧却例署印宜民海寧縣縣丞方澄徹爽練之才雅能集事清約之守即可長民龍泉縣縣丞劉先久諳吏治事事有條兩署縣符人人歸頌蕭山縣縣丞王箕性本誠篤才亦通明却例志堅築塘力懋上虞縣主簿周邦相青年鋭志潔守通才署篆得民司捕息盜永嘉縣主簿江桂馥潔已服人承委集事且勤民隱不類吏塗杭州前衛經歷劉世傑才優盤錯志恥紛華愈久愈亷隨試隨效觀海衛經歷吳潮幕衛稱良署邑不苟正值壯年大超流輩金華府知事李克昌律例素諳剖決中窽攝符節苦司捕民安以上諸臣皆一時佐領之良所當薦舉以備擢用者也伏乞敕下吏部再加查訪如果臣言不謬將屠以欽等分别擢用庶尺寸之材悉録而大小之職胥奮其於民生益有利賴矣舉劾武職官員以昭勸懲疏督撫臣惟浙為山海奧區倭夷礦盜竊發不常所需將材視各省尤急臣奉命提督軍務選將練兵其専職也兹叨升任例有舉劾謹以賢不肖者據實為皇上陳之臣訪得署分守杭嘉湖參將事遊擊金秉鉞望著恩威才兼文武統標兵旌旗頓改歷汛務險逺慣經標下左遊擊吳允忠負義氣盡革營弊防逺海無犯秋毫自負不凡衆樂為用浙江都司僉書李承勛才能應變志久絶甘論抱負武而知文製火器便而且利總捕都司鄭維藩年齡青茂才識圓融苦堅茹蘗之操巧擅穿楊之技以上四臣可備副參遊擊之選者也金盤備倭把總朱九經試射而發皆中鵠撫衆而恩深投醪忠義馳名水陸著績定海備倭把總徐九章叱吒驚人甘苦同衆涉險如履平地遇敵可使前驅總兵標下坐營把總林之杞謀堪運幄志切請纓稽簡衆士如歸督餉一塵不染以上三臣可備都司之選者也標下轅門把總紹興衛指揮僉事劉巨安英達不羣激昂自信學窮奇正之變才兼水陸之長東大營中軍把總杭州前衛指揮僉事李香開爽有謀訓練以律懲玩必先潔已恤兵所至服人西大營中軍把總紹興衛署所鎮撫湯大輅性資沉毅智識英明控弦搦管俱優條議施為允當東左營把總海寧所署鎮撫章應魁射稱百中之能謀負萬人之敵且敦孝義不愧儒紳西前營把總杭州前衛右所正千户陳九思武徴三捷才服兩營輕裘緩帶之風鳴劍抵掌之略軍營把總杭州前衛左所副千户王嘉錫才猷諳練技藝優長操縱兼用恩威籌䇿足資緩急杭州右衛署指揮使張劵始終自守清操僚屬敬憚飛挽不染夙例旗甲騰歡海寧衛指揮同知彭紹賢博古通今有為有守領兵士卒挾纊署印疲困生春海門衛指揮同知俞舜出自武流綽有士行視篆錙銖不染馭軍醪纊有恩臨山衛指揮使馬如錦早讀儒書博通將略守已恪遵禮法管操深得人心台州衛指揮僉事劉炳文丰神秀發識見爽明績屢著於轉漕才尤長於制敵寧波衛中所署正千户安如山魁梧之貌練達之猷督運飛挽獨先領兵行伍增重昌國衛右所副千户金繼超武捷已見韜鈐貧苦不厭氷蘗久歷絶島真可將兵以上十三臣可備把總守備之選者也又訪得分守寧紹參將某某此一臣者所當亟行革任回衛者也伏乞敕下兵部再加查訪如果臣言不謬將金秉鉞等循資擢用某某革任庶勸戒聿昭而兵政益肅矣溫恭毅集卷四
