body:
  text: 温恭毅集巻四明温純撰䟽仰承徳意敬進芻蕘懇乞聖明采納以隆泰運䟽督撫准工部咨南京湖廣道監察御史王學曽題前事該本部議得關稅皆係額設抽取原有定例近來各處有新立添設者有先年稅少而後増多者往往不一恭候命下移咨各巡撫衙門即将所屬地方關稅逐一清查酌議停當應裁應併徑自具奏禁革無得仍行重稅致困商民等因奉聖㫖是欽此欽遵備咨到臣准此就經案行浙江布政使司查議呈報去後今據該司呈稱依奉行准南關工部主事張喬松手本囘稱本關稅銀額設每年共一萬四千四百四十兩逐月發貯杭州府庫聴候清江厰取解又額泒杉板料銀四千七百八十二兩五錢此外皆為餘銀必至交代扣筭額銀之外方有的數各處小關悉照舊規原無増設承委吏胥一月一換以杜姦弊止抽竹木板枋其民間日用柴米蔬果等物竝不相干亦無重稅等因又准北關南京户部主事蒋瑞卿手本囘稱本關設自𢎞治七年稅料正額各止數千以後漸増迄今乃至四萬揆其所自皆當事者嫌於不及前任恐䝉不潔之名繇是筭無遺物稅及錙銖今查本關設有杭州府稅課等司局東新觀音等小關互為稽查一關納料各關放行一務給繇各務照過並無重稅亦非新添但查稅料則例中間有如經書本無稅而稅及巻軸五榖本無稅而稅及烘豆雞鵞猶稅其羽毛蚌蛤不遺其朽殻又若鬼臉寸鼔兒童之所戲者木偶泥人丐技之所攜者率皆稅之甚至厠中之堿爐底之灰掘山之白泥掃林之黄葉諸如此類事屬猥𤨏且皆小販貧民未可目以商人俱當議豁其餘有定額者未易更張等因各到司准此為查南關竹木板材稅銀原有定額額外扣有盈餘亦例應抽分難令議免其北關料物稅銀近至四萬比原額加増率皆稅及細渺之物今准囘稱如巻軸烘豆雞鵞毛蚌蛤殻鬼臉木偶泥人揺鼓糞堿爐底灰土白泥黄葉及念佛草珠䝉草醃菜乾孝窩頭孝篐席草砂紙馬鞍鞽黄麻子醤黄竹剔子膏藥丸藥蒲包藥渣雷公藤竹刷草套等物於例亦不應稅所稅不多相應議免其餘料物俱有定額似難更議及查二關所稅並無重抽各處小關亦非新添恐難裁併承委吏胥各關不時查訪委無刁難等弊呈乞本部院再加裁酌前開巻軸等項稅銀具題禁革等因到臣據此該臣看得古之關市譏而不征以廣惠商之仁今國家取諸山澤貨財之餘利以佐軍實工作之正供則立關抽稅誠不可廢然有定例初非期於盡利以病民也但當事者處脂膏之地嫌於自潤始人人思増稅額以博名髙於是有一切例外之征而為商民病矣夫浙省南北二關開設已久並非新立南關竹木板枋無分正額多餘俱應抽分難以議免其北關稅銀原額各止數千近乃増至四萬相去太逺使非苛取何以得此據開巻軸等三十欵其物甚微葢杭城貧民浮居無産業此貿易以為糊口計者是於例既不應稅即稅亦不甚多而在貧民實苦剝削難堪該司議呈禁革一節無非仰體皇上不盡民利之意相應准從除兩關例應抽分者難以議裁各處小關不係新添俱令照舊承委吏書雖稱並無刁難仍令嚴加訪禁外伏乞勅下該部再加查議覆請将前巻軸等三十欵稅銀准與禁革免其抽分永為遵守施行大臣病故䟽督撫據浙江布政使司呈稱奉臣批據嘉興府平湖縣申據本縣十七都里老劉越等呈稱本都郷宦原任南京刑部尚書孫植於萬歴十三年十二月初七日在家病故等情到縣申乞奏請等因奉批仰布政司查報隨該本司行據該府申據該縣申查得原任南京刑部尚書孫植繇嘉靖乙未進士初授南京刑部主事丁母憂起復補本部主事丁父憂起復補兵部主事陞光祿寺寺丞陞本寺少卿陞南京太僕寺少卿陞南京鴻臚寺卿陞南京光禄寺卿改光祿寺卿陞都察院右僉都御史陞南京大理寺卿陞南京工部右侍郎改刑部右侍郎陞本部左侍郎陞南京都察院右都御史陞南京刑部尚書六年考滿進階資徳大夫正治上卿隆慶三年囘籍萬歴十二年六月内該吏部會推起補南京工部尚書隨該本官累䟽乞休該吏部覆奉聖㫖孫植着以原職致仕欽此欽遵今本官於十三年十二月病故生年七十六嵗緣本官立朝居郷素著休聞申乞轉達請賜䘏典等因到府申覆到司該本司掌印右布政使余一龍看得已故南京刑部尚書孫植忠誠天篤亷介性生敭歴部院並攄寅亮之功南北轉遷咸留竒偉之績光膺寵命而特起司空為老辭榮而杜門養重勲勞夙隆於仕轍雅望允恊於郷評倐焉捐館遐邇興悲既經府縣勘明相應呈乞照例題請䘏典等因據此巻查先為申飭恩例以杜濫冐事准禮部咨開今後兩京大臣致仕養病給假在家病故於例應得䘏典者本處有司限三個月以裏即與具奏等因題奉欽依備咨通行欽遵在巻今據前因該臣會同巡按浙江監察御史王世揚議照已故原任南京刑部尚書孫植一代端人三朝碩望歴官南北所至懋著勲猷養重林泉竟老惟甘澹泊兹聞捐館嚢無餘資棺歛多假貸於郷人道路共傳頌其清節既經該司查呈前來臣等輒敢遵例備将履歴具陳伏乞勅下禮部再加查議照例上請優䘏庶死者有光於泉壤而生者激勸於将來矣欽奉聖諭并陳末議以廣徳意以消災沴䟽督撫准兵部咨開准户部咨傳奉聖㫖天時亢旱屢禱未應朕思民為邦本今小民困苦各災傷地方錢糧出辦艱難殊可憐憫朕心惻然户部便查各撫按官奏到災傷重大去處覆勘明實准蠲免本年分錢糧其先年拖欠帶徴難完者酌量具奏定奪以副朕軫恤民窮至意欽此隨該本部議将萬歴八年起至十一年止各項帶徴未完錢糧不分起運存留悉為查免兵工二部一體查明具奏等因題奉聖㫖朕軫念民窮屢行蠲恤乃各該有司不能奉宣徳意以致下人作弊将蠲免之數重復催併朝廷明㫖竟成虚文這應免錢糧俱依擬還着各該撫按官通行曉諭地方仍用心查革姦弊務使民霑實惠如有仍前故違的着都察院并科道指名叅奏重治欽此欽遵備咨到部合咨煩為備查所屬災旱州縣係于兵部節年帶徴未完錢糧作速遵照户部題奉欽依内事理查照酌議具題以憑覆請蠲免施行等因到臣准此就經案行浙江布政使司遵照查明造冊呈報去後今據該司呈稱依奉行委杭州等十一府同知等官姜竒方等将所屬帶徴兵部項下錢糧逐一清審分别侵欺拖欠各數目造冊到司該本司查得原奉案開自萬歴八年起至十一年止額徴本省驛傳站銀恊濟直省馬價等銀共三十七萬二千三百六十九兩九錢三分四釐零米四千一百九十六石内已完銀三十一萬五千八百二十一兩七錢四分二釐零米三千九百七十八石八斗未完銀五萬六千五百四十八兩一錢九分二釐零米二百一十七石二斗内侵欺銀一千二百一十三兩三錢七分三釐零内驛傳站銀九百二十三兩九錢三釐零恊濟直省馬價銀二百八十九兩四錢六分九釐零那移驛傳站銀三百三十一兩八分一釐零已解未獲批廻驛傳站銀六百九十四兩四錢六釐零仍應嚴追及併獲批收實計小民拖欠銀五萬四千三百九兩二錢二分九釐零米二百一十七石二斗内驛傳站銀二萬六千二百八十九兩二錢一釐零米二百一十七石二斗恊濟直省馬價銀二萬八千二十兩二分八釐零相應盡數蠲免呈乞會題施行等因併備造己未完侵欠各項錢糧數目文冊呈送到臣據此該臣會同廵按浙江監察御史王世揚議照兩浙財賦之郷一應徴輸較各省獨重兼以邇年織造繁累水旱頻仍以致閭閻日困逋負日多有司催徴見額錢糧尚難如期其於舊逋委難遵限完納臣等目擊艱苦正欲上請兹者仰荷皇上遇災省躬恤民軫念特頒蠲免之詔𢎞敷曠蕩之恩凡在烝黎莫不喜色相告共慶更生之有路矣臣等仰承徳意敢不悉心清查以期對揚萬一今據該司造冊呈送前來臣等覆加查覈俱已明悉無弊除将姦頑侵欺那移者盡法究追及已解未獲批廻者嚴併批收外相應具題伏乞勅下該部查議覆請将萬歴八年起至十一年止小民拖欠本省驛傳站銀恊濟直省馬價等銀共五萬四千三百九兩二錢二分九釐零米二百一十七石二斗盡行蠲免仍聴臣等通行各府州縣備将應免銀米細數花户姓名出示榜文張掛使逺邇窮民通知不致里書隠蔽滋弊庶我皇上天地覆載之深仁永令小民感戴於無疆矣淺船積缺數多地方米價甚賤懇乞天恩俯賜破格從輕暫改漕糧以濟國運以便民情䟽督撫據浙江布政使司呈稱奉臣批據本司督理糧儲漕務道右叅政王應乾呈前事該本司查得本省額運淺船一千九百九十九隻先年原係五年一造例於正造之外另有補造船隻以備事故不足之用是以歴年撥運無缺後因造船錢糧不敷議禁補造遇有漂壊通候應造年分併造續又定為七年一造今則十年一造矣造船之年限益逺則缺船之積數甚多雖經連年呈請打造新船共八百四十七隻毎隻該工料銀一百三兩共八萬七千二百餘兩本省嵗𣲖民七料銀止三萬一千三百餘兩各屬尤多拖欠支給不全况以前年分造船借支司庫銀十萬有竒甚難處補今該道呈開見在出運船一千三百五十隻本年冬實該打造減存在柵及運回年滿該造船共六百五十九隻合用工料銀六萬七千八百餘兩尚有修艌舊船料銀計嵗額數少拖欠不無司庫括借殆盡将何動支議呈改折誠非得已合無請乞本部院會議暫将今嵗漕糧特賜題請准行本省通融撥𣲖如杭州府屬海寧縣嘉興府屬嘉興等七縣湖州府屬歸烏長三縣全徴本色安吉徳清二州縣徴本色八分通共徴米五十四萬四千九百石二斗其仁錢富餘臨新於昌八縣武康一縣俱全改折安吉徳清二州縣改折二分通共折米八萬五千九十九石八斗計筭十分之内改折一分三釐五毫再照地方近來米賤每石價銀不過三錢上年折銀正兊七錢改兊六錢雖連席板輕齎脚耗在内民猶稱累相應破格從輕照京倉放糧每石折銀五錢并行糧盡免少蘇民困其積缺船隻限十四十五二年通行造完等因到臣據此巻查先為司農告匱年甚一年敬遵明詔陳末議以備採擇事該臣等具題萬歴十三年分本省漕糧改折三分八釐四毫并免改折行糧去後今據前因該臣會同巡按浙江監察御史王世揚議照浙省杭嘉湖三府嵗辦漕糧正兊六十萬石改兊三萬石每年全運額該淺船一千九百九十九隻近因料銀缺乏請折借支僅免誤事今計本年實該打造淺船六百五十九隻合用工料銀六萬七千八百餘兩年額民七銀止三萬一千三百兩零尚有拖欠未完其餘所缺銀數小民既難加𣲖官庫摉括無餘又無減存運軍月糧可抵實係難處所有量行改折委應准從但查近來地方米價每石不過值銀三錢上年本部題奉欽依通行改折五分正兊七錢改兊六錢連席板輕齎脚耗在内臣等因免行糧量行改折三分八釐四毫小民猶以折價太重稱累今若仍照前例恐民情終難樂從運船别無輳處據呈改折從輕一節揆之事勢誠非得已既經該司道議呈前來相應具題伏乞勅下該部查議覆請暫将今嵗漕糧准行通融𣲖撥除杭州府屬海寧縣嘉興府屬嘉興等七縣湖州府屬歸烏長三縣全徴本色安吉徳清二州縣徴本色八分外其仁錢富餘臨新於昌八縣武康一縣准全折安吉徳清二州縣准改折二分總計十分之内改折一分三釐五毫折銀照京倉放糧事例無分正改兊俱每石折銀五錢或正兊六錢改兊五錢連席板輕齎脚耗在内至於改折行糧亦照上年事例盡行免徴庶運務不致有誤而民困亦藉稍蘇矣恪遵恩詔改正虚糧懇乞聖明溥賜申飭以昭嚴威以宣實惠以固萬年邦本䟽督撫臣看得浙省田賦最稱浩繁而其地跨海濵江環山遶湖山水之開墾淹没既無常豪滑之侵隠詭寄又特甚以致小民受包賠之累而國賦多逋負之虞其為害非一日矣萬歴十年奉㫖丈量本欲平田賦清浮隠永貽民利至盛舉也但其時欽限太廹委官半多草率報完而書筭人役又乘機作弊或短縮歩弓偽増畆數或以田地空補山蕩或以山塘丈作田地與夫山坡墳屋積荒公占等項一槩丈實起徴遂致閭閻窮民反受増額之害仰荷聖明俯察民隠渙頒恩詔釐正虚糧既又特俞户部科道諸臣之請責令臣専理清查賜以璽書便宜行事此誠釐弊革姦惠民經國千載一時也臣敢不誓竭庸愚以圖報塞萬一嚴督各屬悉遵節奉部議或照舊從新或摘查覆丈惟以順民情宜土俗為主今據報到文冊臣細加簡閱俱已詳妥除杭州前右等衛所屯田先年丈量停妥覆查無弊俱應從新無容别議外查得萬歴十年丈出田地等項一萬六千一百一十二頃一十一畆有竒基地二萬九千七百五十五間有竒今次除豁改正田地等項一萬一千八十四頃七十一畆有竒新丈出併原額基地一十萬七千九百九十六間有竒清出欺隠併開墾田地等項二千三百五十九頃五十九畆有竒除補足原額外尚多餘田地等項七千三百八十六頃九十九畆有竒該徴稅糧應攤各州縣田地等項數内均𣲖減徴至於各屬田糧等則因地利順人情或為一則或為二則三則加至十五則不等劑量肥瘠酌擬輕重糧額既不至虚増等則尤不致混亂自此豪猾侵隠之弊盡革而小民均霑減徴之惠於民生國計未必無小補矣所有各官賢否功罪除原任紹興府通判楊荘委丈滋弊報冊多訛原任象山縣知縣唐師錫索例縱下田糧之欺隠獨多原任開化縣知縣王文昌𣲖則狥私閭閻之怨議尤甚已經臣與巡按御史先後論劾書筭姦豪林化孫潮等一百三十二名見在拏問遣配發落外其餘如布政使司左布政使今陞任𠂻貞吉右布政使今丁憂余一龍分守杭嘉湖道左叅政林喬相分守金衢嚴道右叅政李頥分守寧紹台道左叅議今陞任李一中按察司嘉湖兵巡道副使陳用賔巡視海道副使今陞任張孫繩金衢兵巡道副使林一材忠誠體國仁惠宜民或總田賦之司而僚屬受成賴約令之詳布或膺分部之寄而權度不爽致經界之分明杭州府知府余良樞嘉興府知府龔勉湖州府知府陳夢庚寧波府知府蔡貴易紹興府知府蕭良榦衢州府知府廖希元杭州府同知姜奇方衢州府同知李道先湖州府同知今降用王懋寧波府推官今行取秦大䕫嘉興府推官俞咨禹湖州府推官張肇金華府推官徐萬仞紹興府推官陳汝璧才猷敏達政體精明或專總理而姦弊剗革無遺或委督查而冊籍勾較殫力署餘姚縣印台州府同知周篤棐安吉州知州今陞任王貽徳嘉興縣知縣今陞任顧雲程仁和縣知縣程達錢塘縣知縣今行取孫珫上虞縣知縣今行取朱維藩臨海縣知縣周孔教徳清縣知縣陳效山隂縣知縣今行取張鶴鳴金華縣知縣今行取汪可受富陽縣知縣管九臯海鹽縣知縣蔡逢時武康縣知縣今陞任王懋中蕭山縣知縣劉會鄞縣知縣周之基慈谿縣知縣何偉歸安縣知縣黄洽中會稽縣知縣曹繼孝蘭谿縣知縣張應揚武義縣知縣熊秋芳象山縣知縣陳天祥才能集事智足燭姦或清浮漏之田數逾萬計而賦額惟均輿情胥恱或查欺詭之弊懲究多姦而分則允當衆志咸孚既各効勞均應紀録伏乞勅下該部再加查議覆請准将今次清查改正田糧文冊定為經制行臣督行各府州縣衙門一體遵奉仍将各官移咨吏部紀録施行邉海要郡懇乞聖明久任賢能府正官員以安民生䟽督撫該臣會同巡按浙江監察御史王世揚議照古稱庶民之所以安其田里而無怨嗟愁嘆之聲者惟良二千石况温州府跨海隣閩為倭夷首犯流賊出没之區兵防供餉措辦為難龍風水患嵗嵗有之撫摩為難苟非其守誠心殫力将視官守不啻郵舍而民亦惟恐去之不速矣昔年惟知府何文淵大著休聲即龔黄不過詢之則以文淵在任九年故也今知府衛承芳操心制行無愧古人臣等久心重之故於去嵗考滿則註以邃養虚襟誠心直道督僚屬而肝膈相示燭利弊而幽隠不遺之語然猶未敢遽信其得民何如也比臣等先後巡歴該府見其錢糧清田野闢閭閻安業則又重之而旋乃有父老百餘遮道求臣等為地方留此賢守雖承芳力禁阻之不能然亦未敢遽信出小民真意也宻行分守叅政胡緒兵巡副使蔡廷臣查訪則云自本官考滿入覲之時民已皇皇惟恐遷去失我慈母而又出不意審之該府解糧人役對簿人犯則稱本官守已之亷存心之正愛民之實處事之確率屬之端者人人無異詞乃知父老之情真矣守巡二道之言公矣臣等何能不為地方乞留使繼文淵之美以慰永嘉士民之望伏乞勅下該部查議覆請合無将知府衛承芳或先加服俸留任供職或俟再歴三年政績益著破格陞擢地方幸甚大臣病故䟽督撫據浙江布政使司呈據寧波府申據鄞縣申據援例光禄寺署丞范大沖呈稱故父范欽由嘉靖十一年進士授湖廣隨州知州歴陞工部員外郎郎中江西袁州府知府江西副使整飭九江兵備廣西叅政江西按察使調福建按察使陞雲南右布政使陜西左布政使丁憂起復補河南左布政使陞都察院右副都御史巡撫南贛汀漳等處地方提督軍務嘉靖三十九年九月内陞兵部右侍郎被論囘籍聴勘屢䝉撫按衙門先後勘明至萬歴二年七月二十六日題奉聖㫖范欽既勘明無干准致仕於萬歴十三年九月二十八日病故冲思父任三品京堂兼有南贛軍功例有䘏典呈乞轉達等情到縣據此就經行准府縣二學牒據廩増附生員毛大坤余暨等呈覆相同又據該縣里老隣佑陸倫等結勘無異申乞轉達等因到府覆查得本官原任侍郎實歴三品被論勘明奉㫖致仕素行况恊清議照例應得䘏典等因到司先該本司左布政使余一龍看得已故原任侍郎范欽生平無故出處甚明歴藩臬俱有聲稱任巡撫尤多勲績行誼允孚於郷曲著述見重於士林致仕奉有欽依被論委經勘結相應呈乞照例題請俯賜䘏典等因到臣據此案查先為申飭恩例以杜濫冐事該禮部題准今後兩京大臣致仕在家病故於例應得䘏典者本處有司限三箇月以裏即與具奏奏内止許直陳履歴聴候處分又為申定䘏典條例以一法守事該本部題奉欽依節開被劾致仕雖曽經指摘然既奉有成命則公論已明生前人品自可㮣見死後䘏恩理應給與等因俱經通行欽遵在巻今據前因該臣會同廵按浙江監察御史王世揚議照已故原任兵部右侍郎范欽學博而宦履有聲才練而公議無玷自州郡屢任藩臬惠愛宜民歴督撫晉貳夏卿安攘樹績雖經被論旋已勘明况奉特㫖致仕似與前例相合既經該司查明臣等輒敢遵例具陳履歴所有應得䘏典伏乞勅下禮部再加查議照例覆請定奪施行遵奉欽依奏報京堂官員病痊乞賜及時錄用䟽督撫據浙江布政使司呈稱奉臣批發紹興府餘姚縣知縣周子文申稱原任光祿寺卿孫鑨先於萬歴五年患病具奏囘籍調理痊可至十二年三月初三日丁母太夫人楊氏憂守制扣該十四年六月初二日服闋本官恪守官常歴成政績振紀綱而正色立朝忤權貴而拂衣歸里軫民瘼恒厪治世之憂居畎畝實切廊廟之念孝隆性植行紹前修於忠烈可稱繩祖之孫於文恪無忝克肖之子年力正强經綸益裕伏乞轉達等因奉批仰布政司查報該本司遵奉行據該府知府蕭良榦查得本官養病囘籍調理已痊適丁内艱兹當服闋覆經行籍勘結别無違礙相應轉呈等因到司據此巻查先為公務事承准吏部勘合考功司劄付照得養病官員光禄寺卿孫鑨萬歴五年十二月二十五日題准回籍調理痊可之日撫按官具奏起用備行到司已經轉行原籍知會在巻今奉批發前因該本司看得養病原任光祿寺卿孫鑨忠貞世篤孝友家傳憤志排姦凛乎烈丈夫之槩闔門養重卓有古君子之風即今病體久痊服制已闋呈乞會題起用等因到臣據此該臣會同巡按浙江監察御史王世揚議照原任光祿寺卿孫鑨忠孝承家清白傳世憤邪憂國節槩夙有祖風守静杜門行誼尤孚月旦恬退雖不欲出才猷實未竟施先是病痊會有母制以故未即奏聞即今服闋舊恙全愈允宜及時起用既經該司勘報前來臣等遵奉欽依上請伏乞勅下吏部查議将鑨亟為推用施行災異頻仍懇乞聖明敦政體飭武備以除隠憂以圖消弭䟽督撫准兵部咨該禮科給事中鍾羽正題會舉将材緣由本部覆議節該題行内外諸臣備查所屬各官某也堪為大帥某也堪備偏裨某也堪寄守提某也堪充戰陣以至求廢棄之士摉詿誤之人羅致材官儲養将品葢亦勤懇周至矣合無移文兩京九卿科道衙門加意諮訪公同䟽薦於凡賢否是非之中狥其名必責其實務使真贗弗淆擢用有據庶推舉出於至公而武備有所利頼等因題奉聖㫖将材難得非曽經戰陣試有成效的何繇識别只着各該總督撫按官加意訪求據實推薦果有異才許於例薦外特舉破格擢用各衙門會薦且罷其餘依擬欽此欽遵備咨到臣准此就經案行浙江布按二司并守巡海兵各道逐一查訪的確呈報去後今據開報前來該臣會同巡按浙江監察御史王世揚覆加查訪除見任叅遊都司衛所等官候例薦外照得浙省廢棄及陞任未久各将官真知其才可大用者謹據實上陳如原任廣東陽電叅将今養病陳典赳赳宏猷桓桓偉貌羅旁多斬馘之績浙省服折衝之謀原任廣東惠州叅将今聴調季金發跡武科揚威南服歴各省以英幹聞而自守且正在嶺表有籌算略而人攘其功原任直𨽻金山叅将吴顯忠品格無愧儒紳才畧足超武弁即今懲創已久大受允宜昔年萋菲無因終棄可惜浙江掌印都司今陞任熊世錦威名久著中原節槩近徴浙閫挽強弩中的不止百歩握勝算先聲可敵萬人此四臣者堪備大将之選者也原任漕運軍門中軍坐營遊擊今養病俞尚志雄偉有用之度通方不滯之才精神奮而詩書禮樂兼優閱歴久而擒斬調度素著原任標下中軍把總裁革聴用今補任王廷臣鷹揚壮志燕頷雄姿久負能文兼武之長綽有裹革敵愾之志此二臣者堪備偏裨之選者也原任川沙把總温州衛指揮同知劉懋功談吐風生精神驍勇哨逺洋雖蹈危地不避習海務即負氣岸何妨此一臣者堪備守提之選者也除将各官年甲籍貫履歴脚色造冊咨部查考外伏乞勅下兵部再加查訪如果臣等所言不謬将陳典等酌量推用庶将領得人緩急有頼其於戎政未必無小補矣海潮突變衝坍石塘懇乞及時修築以保安生靈䟽督撫據浙江按察司水利道僉事楊寅秋呈奉臣批發紹興府申據蕭山縣申開西興鎮坐臨海口潮汐異常風浪滔天一日雨至聲震如雷沙地洗蕩千餘丈房屋衝壊數百間悲號滿前流移載道人民十室九空岸地三不存一聞之寒心且去運河止隔丈餘萬一湧進為害叵測值候冬月風潮稍緩趂時修築等因又據該鎮居民張本滔等呈同前事俱奉批仰水利道勘報依奉行據該府知府蕭良榦申稱親詣該地方沿江踏勘即今西興堰口平地坍於滄海民居衝為洿池被坍者已無餘跡坍近者勢在傾危興工填築勢不容緩第思動費錢糧重大難處相應量度事勢便宜勘估行據該縣知縣劉會申稱躬徃西興鎮公同耆老糧里人等登舟於江中依舊塘基自潮神廟起至倉衕止一帶以竹排揷用繩丈量計長四百一十丈復登附岸陸路仍照起止去處用弓丈量計算三百三十丈比外量少八十丈併開三項修築估計工料文冊到府查得冊開工料數目如依舊基築砌該銀五萬九千七百四十一兩一錢依附岸築砌石塘該銀一萬六千一百六十八兩二分再依附岸止用樁箯修築該銀九百三十六兩六錢據查前塘舊基盡已坍深海底且隔内岸計有四十餘丈内外空虚不惟費石為多抑且填土無計費鉅何出豈能有成若依附岸止用樁箯修築工費亦近千金徒支目前無能耐久是又為虚費也惟是依附岸土新築石塘費用雖多較之舊塘已省數萬且土石填築為力尚易為利可久本職熟計惟此為宜但查堪動官銀該縣止有三百餘兩及查本府庫貯止有稅契等銀共七百餘兩其餘各縣共計不滿百金不敷應用其預備倉榖本府併八縣查共八萬一千石零此中地濕積久多至腐爛議将蕭山縣榖四千五百一十石六斗一合全借本府各縣量借一半合之可得榖四萬三千一百五十四石四斗四升徃時納榖價銀二錢五分今嵗豐榖賤每石僅可二錢本府八縣共得榖價八千六百三十兩八錢八分八釐四毫總計該縣與本府堪動前銀併各榖價約計銀九千七百二十兩零尚欠銀六千四百四十八兩零再行酌處恊濟借用倉榖候陸續處補備賑伏乞轉呈允行庶全大工等因到道該本道照得西興鎮為浙東咽喉枕臨錢塘巨浸潮汛衝擊異常一二年來東岸水沙漲滿潮勢愈轉而西西興受害為甚塘圮則鹹潮内淹即山會等縣内地均屬可虞若不及時填築将來為費愈鉅為功愈難而為害愈甚催據該府勘報分别三議前來其一為照依舊基砌築經費且幾六萬石既難採功不易成其一僅用樁箯修築工費不及千金雖云有限之費終填不測之壑暫支目前殊非久圖惟是依附土岸新築石塘外可以逺潮勢衝激内可以傍土岸堅固審度形勢計無出此苐計塘三百三十餘丈工費一萬六千兩零該府别難措處止存備賑倉榖堪以那借糶用據報府縣堪動官銀併倉榖量借一半可得銀九千七百二十兩尚欠銀六千四百四十八兩零行府再加酌議恊濟合候呈允動支委官採料興工務期捍禦永久等因到臣據此該臣會同巡按浙江監察御史傅好禮看得蕭山縣西興鎮坐枕錢塘大江去海僅數里係浙東咽喉之地先年築有石塘捍禦年來潮汛異常日夕衝撼震盪致塘基䧟没民居漂沉該鎮受害為甚失今不治則石塘盡圯鹹潮内侵将貽山會等縣内地之禍非止一鎮生靈流移失所已也關係國課民命誠難坐視所呈三議惟依附土岸新築石塘下有塘脚之固内有岸土之倚築砌之功易施般運之力少省外悍潮勢内衛民居誠一勞久逸百年永頼之利但估計工料該銀一萬六千一百兩有竒據議動支該府縣無礙銀一千兩有竒不敷欲於倉榖蕭山縣全借該府各縣量借一半榖價銀八千六百三十兩有竒共銀九千七百二十兩有竒餘欠行府再酌議恊濟一節查得該郡號為澤國非大水旱可以無賑而下濕之地貯蓄年久未免腐爛若通融變用誠為兩得况嗣後陸續處補各倉自漸充實别無他慮相應准從除批行一靣動支議委亷幹官二員管理刻期興工務要堅固永久工完之日該道親詣塘所一一勘騐明白将各委官匠作職名刻石立案如十年以裏坍損者官匠通行提究賠築以懲姦欺仍将用過工料銀兩行道併弔各項巻簿查盤有無姦弊造冊送臣稽覈自陳不職乞賜罷黜以公考察䟽督撫臣接得邸報該吏部題奉欽依舉行京官六年考察夫罷黜不肖所以登庸俊良甚盛典也臣例該自陳謹具疏上請伏念臣本一介草茅歴官卿寺往䝉予告竊伏田間仰荷皇上鴻慈特加起廢陟以兵貳之階畀之督撫之任臣受命以來感奮圖報犬馬愚𠂻日切兢惕顧浙居天下首藩内為國家財賦之奥區外為倭夷出入之重地邇年海氛雖少息而兵食調節則難嵗時雖稍收而征歛輸将則難於此而欲吏治清民生安愈難臣才識既庸精神不逮今入浙已二年有餘非苦於兵食則苦於輸将即以文移責成所屬約已愛民安能即令閭閻小民得所近恭誦皇上督責撫按天語驚懼自罪為臣子受事一方曠職無補至厪聖懐又可一日苟禄其地况遇大計臣自知頗真不敢掩覆罪惡以妨賢路伏望皇上将臣罷黜别選賢能以充任使則黜陟當而公道明仕途清而官常肅矣臣下情不勝惶恐待罪之至遵㫖奏報大臣病痊乞賜及時錄用䟽督撫據浙江布政使司呈稱奉臣批發嘉興府申據平湖縣申據通學廪増附生員趙邦程等呈稱原任南京工部尚書陸光祖學貫古今才優經濟朝野瞻依士民景式萬歴十三年患病三䟽懇奏囘籍調理今已病痊伏乞轉達等因到縣該本縣備訪本官前疾果瘳杜門著述元精炯炯累朝廊廟之忠理學淵淵一代山斗之望經濟正宜於大用屬望尤切於蒼生理應申達等因到府該本府知府龔勉查得本官今已病痊年力正强經綸素裕允宜及時起用等因奉批仰布政司查報奉此巻查先為養病官員事承准吏部勘合考功司劄付照得萬歴十三年七月内南京工部尚書陸光祖患病具奏奉聖㫖陸光祖素有清望簡任留卿兹屢以疾懇辭准回籍調理痊可之日撫按官具奏起用吏部知道欽此備行到司已經轉行原籍知會在巻今奉批發前因該本司看得養病原任南京工部尚書陸光祖天挺孤忠人推遺直徳業負三朝之重望風采為百辟之具瞻即今宿疾已瘳輿情共屬請乞遵㫖會題起用等因到臣據此該臣會同巡按浙江監察御史傅好禮議照原任南京工部尚書今養病陸光祖學有淵源才優經濟典銓以衡鑑品隲雅負真吏部之稱立朝有謇諤風猷不愧古遺直之烈其為徳於郷者不足盡其素行其見用於世者尚未竟其緒餘即今舊病既痊允宜及時起用既經該司勘報前來臣等遵奉明㫖上請伏乞勅下吏部查議将陸光祖亟為推用施行俯竭愚𠂻敬陳末議以求少裨治理䟽督撫将解任時萬厯丁亥年陞户部右侍郎隨陞户部左侍郎臣樸􅈪下材無可比數往伏田間甘與草木同朽仰荷皇上錄用畀以督撫浙江重任時浙江當兵民二變之後攝服化導為難今海内吏治日媮不獨浙也轉移鼓舞為難徴輸之繁機杼之費兵餉之苦獨倍他省且多係他省所未有者欲減免難而措辦催徴尤難况以臣薄徳庸才當之而在事又僅二年零七月即竭駑鈍何補萬一今䝉聖恩召還户部未幾又陟左銜臣感九重高厚之恩則莫知為報思數年曠廢之罪則無以自容晝省夜思有可以少裨治理為臣所不敢徑行者謹會同巡按浙江御史傅好禮列為七欵冐昧題請伏乞聖明俯賜採行臣不勝悚懼懇切之至計開一端好尚臣聞人之好尚自質而趨於文也易自文而反之質也難今天下吏治不振者文累之也即浙江諸臣儘多砥礪然三年中無論冗散小官其方靣有司以被論去者已三十餘員而半屬貪汚不謹者猶難謂無漏網人也亦有以貪名而囊實無長物者葢始入仕不稱貸者有幾既償貸又或見不定不能裁交際之費志不立不能脫身家之念而總之皆習尚侈也上侈則下效今吴越之民雖家無擔石之儲者亦衣帛不衣布即衣布人輒掩口笑矣此可駭也侈則好勝心詐偽心争奪心俱於此乎生一遇凶荒或事變稍處置失宜而禍起矣前嵗之兵民二變是也此可慮也比年大荒在秦晉趙魏齊魯耳若在吴越臣等不知其作何状矣欲移風易俗使民漸歸於質當自重淳朴務實之吏始欲禁尚侈之吏當自未仕之時始甲科甫通籍而費至於濫也今日為甚郷舉里居而尚請託或廣貸恣費以約償於官也亦今日為甚不可嚴禁以預成之乎臣所屬如原任布政司右布政使今陞山西左布政使王象坤亷明持正民依戀於離任之時原任武康縣知縣今陞潮州府同知王懋中節愛根心民懐思於久去之後正臣所謂淳朴務實吏也葢賢否之真去後始定在各省豈無若象坤懋中者可不精别顯㧞以示風勵乎管子曰善用本者若以身濟於大海觀其風之所起嚴禁顯㧞固所以風之也上風之則下必相效以務節用愛人之政而風俗文勝之弊有不漸返於質者臣不信也一併道務臣惟朝廷設官各有專職苟可兼攝不必備官况官已備自當從省浙省守巡海兵等道分駐各府分巡皆兼兵備每府不過二道臨之獨海道雖駐寧波而寧波分巡事又屬台州道葢寧波一府五縣而以三道臨之十羊九牧已無謂且自台至寧幾四百里盡高山峻嶺道府官民夫馬徃返甚艱視紹興雖屬三道而水路易達者逈異况寧波分巡事名雖屬台州道實久歸海道就近督理特分巡建設在先海道添設在後彼時止重海防未暇議及寧波分巡可帶管耳查得山東巡察海道駐劄登州整飭登萊青三府海防帶管登萊二府兵巡則本省巡視海道駐劄寧波兼管寧波分巡事體正與相同而簡便尤過之臣等行據布按二司覆議相同合無将寧紹台分巡裁去寧波專管紹台二府分巡巡視海道兼寧波分巡凡糾察官邪禁治豪右聴理詞訟均平賦役等事俱聴管理其寧紹兵備仍屬海道台州兵備仍屬巡道二道勅書均乞請賜換給以便欽遵行事庶事權歸一名實不舛不但道府官民省徃返之費已也一重守令臣惟民生之休戚係於守令守令得人則民安得人而久於任則民愈安浙自得龔勉久於嘉興衛承芳久於温州而兩郡之民翕然稱便矣然臣等又思之守固要矣令尤急焉古今稱朝發而夕可及于民者惟令然也臣所屬知縣如瑞安章有成之善體民情雲和王世守之善興民利武義熊秋芳之亷明並著武康王儼之平恕有聲而又皆以重農桑躬勸化為務皆可久任者在各官若能以卓魯自待則聲華重而官階可不必論獨國家假優恩以鼓人心則臣尚有說焉郡守六年得超陞縣令則否果其人賢而實俸已過五年六年即陞主事仍另優敘即選御史仍准實授可也守令往多加銜守或不便亦可加服加俸令則加州銜或服俸可也縣令必薦合格始給勅命若再考稱職曽經奏留亦無愧兩京之雜塗矣即予勅命使其有榮親之望而樂於為令可也今章有成王世守已過三年似應量加熊秋芳王儼将及三年似應候考滿定奪昔宋臣程頥常慨亷察之官無有應詔舉堪再任者葢避薦舉之嫌恐各官之難保其終為已累也自昔然矣臣以為既留之後或改節即今日留之明日去之亦無不可况未必盡改節乎臣稔見前官去而代者未必即賢徒令地方受數易之苦故為四縣留令而㮣以優恩上懇聖明為必如是而後久任之法可行也一正事權臣惟官有左右則左宜先右宜後獨臣標下先是設坐營都司兼管東營兵務西營兵務屬遊擊管理時遊擊固未有左右之分也自兵部議題浙兵更畨往衛薊鎮于是改坐營都司為右遊擊與左遊擊領兵更畨嗣後更畨之議息而兩遊擊之職掌未議遂相沿右遊擊管坐營與東營左遊擊管西營左西右東遇合營同操於體統已不順况坐營職務頗重凡標下及兩營機宜俱以坐營為主而左遊擊從之遇慶賀公座則左先於右遇謁臣入營則右先於左縱任事不在形迹然軍中亦宜有禮樂左右順序禮也序順而相和共濟樂也今各遊擊口不言而色多忸怩萬一有剛愎拘泥者必猜疑忿爭安望同心於營務關係不小臣愚欲改左遊擊管標下坐營兼東營右遊擊管西營原領勅書另請換給令其欽遵行事則事權與名分相副亦杜嫌隙肅營務之一端也一酌礦防臣惟浙故無防礦都司有之自嘉靖四十四年始其時江浙南直𨽻礦徒流賊四出劫掠而金衢嚴三府實當礦山連胍盗賊出没必繇之地被禍尤甚既討平先撫按諸臣題奉欽依特設總捕都司駐劄衢州督練營兵二總設名色把總二員遇秋末冬初水涸土堅即以二營官兵分布三府通礦産礦要害巡哨不惟二十年來礦盗絶跡即隣壤徽閩江西亦借彈壓誠不宜以一時無事遂議裁革但邇來該府告匱兵餉不敷臣已督行兵備道量裁二哨共減官兵二百餘員名計省餉銀二千餘兩糧餉已足兵心已安無容别議惟總捕都司止管官兵八百餘員名不及各區備倭把總之半兵數雖少而一應從役廪餼悉如四叅将規則且名列三司交際難已居是官者往往告困臣等嘗籌之将在能不在秩高兵貴精不貴數多今兵以餉足易練可望精矣若裁革都司改設欽依守備一員兼領前營兵務屯劄府城其名色把總在本營者裁革在左營者照舊以該道中軍官充之臨期屯劄開化華埠仍聴守備節制二總防礦事宜悉照原定哨道巡緝遇有礦賊就行恊捕本官上下相臨體統與從役廪餼俱照欽依備倭把總事例庶官名守備視都司費少易辦又裁名色把總一員嵗省官役餉銀四百餘兩無兵少官多之擾其見在都司鄭維藩免其赴部仍令管理候陞任即以守備代之是量事設官而又不廢彈壓亦上下兩利之一䇿也一惜将材臣惟将材難得招􅝘貴廣近奉㫖查革納級武職所以杜冐濫絶夤緣欲得真才以重登壇秉鉞之寄甚盛意也但就中亦有可議者巻查萬歴十年欽奉恩詔一欵沿邉沿海𦂳要多事重鎮委用各營名色千把總無實職者若係旗舍或係三科武舉果謀勇過人効有勞績聴總督撫按官指實奏薦量授署所鎮撫俟後更有勞績方准與實職官一體推用欽此欽遵夫馭将之道不拘一途若三科武舉効有勞績者其人其才自有可録明詔准量授署職欲假之資級以為進用地也臣所屬如原任分守杭嘉湖叅将王接武先中江西武舉三次兵部咨送南贛廣東軍門贊畫督征龍南叛賊頼清規等併勦惠州倭賊斬獲有功俱經撫臣類題陞賞正與恩例相合但接武未奉例已先納級謂已推用未再照例奏授署職耳本官為臣標下坐營遊擊尋又分守浙西叅将議併營哨嵗省餉銀七千餘兩一時處置頗中機宜官兵恱服餉足易練皆接武力也臣以為此在外可徑行者不敢奏聞以故兵部無從詳知槩以納級罷革况本官文武兼優才志逈異當離任時官兵泣留士民嗟嘆葢逺近所共聞者臣數年既頼其力又為國家惜此良将不忍不為上請伏乞勅下兵部查議将王接武照例録用授職仍通行各省直倘有如詔書所開或旗舍或三科武舉効有勞績才堪收録者一體推用若白丁無能夤緣冐進者仍嚴禁革使才勇皆收為我用或干城将材出焉以為緩急之頼未可知也一復關政臣惟國家設立關稅所以通商裕課重務也先該臣題免兩關商稅奉聖㫖責令臣稽查正餘銀兩因而與本省南關工部主事馬玉麟北關南京户部主事浦卿講究兩關利弊隨據二臣備言各關當嘉靖時節經題准稅銀俱選委府佐監收議無從生後盡委司府首領官卑志小難以盡倚於是部官始不得不親理然財貨叢集則嫌疑易生請託不行則怨謗輙起前官多以此受累雖知自愛者恐亦不能自白計惟有復府佐監收使職等止於騐票發单銀兩毫無干預庶㡬逺部臣之嫌而亦可全制使之體等因臣熟思之兩關部臣奉有專勅督理誠欲其興利去蠧惠商佐國責亦重矣而乃以委官不得人故使其褻體冐嫌誠未妥今二臣欲復府佐監收真潔已逺嫌革弊足國美意且查果係先年舊規相應題請伏乞勅下該部再議今後兩關商稅布政司每季仍委府通判一員監收凡遇一應船貨到關照則估計具单票送部臣驗發本官仍委縣佐或務局等官一員聴本官監督秤收銀兩寄貯府庫如二臣所言部官毫無干預每五日将收過貨物銀兩一報本府一報布政司一報臣撫按衙門遇季終将收過稅銀若干解過若干内正稅若干餘稅若干分别管收除在置立循環文簿送臣等稽查各部臣供用與府佐委官廪給紙劄人役工食俱查照舊規於餘稅銀内支給明白登簿以後除府佐等官聴臣等分别薦奨叅究外其部臣馬玉麟浦卿銳意振刷俟回部日查果有益關務紀録優叙則關政一新而國課自裕不獨全部臣之體已也懇乞俯憐民運繁苦議免關稅以蘓積困疏督撫據浙江布政使司呈稱奉臣批據嘉興府申據嘉興等縣糧運鄭成湯等呈稱萬歴十四年分本府𣲖徴北京供用庫等衙門白粳糯糧正米共三萬八千九百七石零内𣲖嘉興縣八千四十七石零該船一十五隻秀水縣六千七百二十五石零該船一十四隻嘉善縣七千八百四十一石零該船一十六隻海鹽縣四千三百四十九石零該船一十隻平湖縣四千五百七十六石零該船八隻崇徳縣三千九百二十七石零該船八隻桐郷縣三千四百四十石零該船六隻經過關津五處每船納鈔銀蘇州滸墅鈔關一兩六錢揚州鈔關一兩五錢淮安鈔關一兩六錢臨清鈔關一兩八錢帶磚二百四十塊領磚納磚銀七兩河西務鈔關一兩六錢該本府知府龔勉看得白糧係上用正供糧長押運勞費萬狀而過關等稅在各運夫車銀内扣與船户交納七邑糧船七十七隻共該納稅及帶磚銀一千一百六十二兩七錢民力奚堪乞賜議免於各縣夫車銀内減𣲖小民均被寛省等因又據湖州府申據歸安等縣糧運吴遴紹等呈稱萬歴十四年分本府𣲖徴北京供用庫等衙門白粳糯糧米共二萬三千六百九十二石零内𣲖歸安縣七千一百三石零該船一十四隻烏程縣八千六百八十四石零該船一十六隻長興縣三千三百二十六石零該船八隻徳清縣三千八百五十八石零該船八隻武康縣七百一十九石零該船二隻經過關津五處該納鈔銀蘇州滸墅鈔關一兩七錢揚州鈔關一兩六錢淮安鈔關一兩二錢臨清鈔關一兩二錢帶磚二百四十塊領磚納磚銀七両河西務鈔關九錢該本府知府陳夢庚看得白糧乃内府正賦輸輓上納繁苦難言而關稅及帶磚銀五邑糧船四十八隻共銀六百五十二兩八錢俱