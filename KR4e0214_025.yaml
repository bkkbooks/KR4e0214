body:
  text: 溫恭毅集卷二十五明溫純撰尺牘報陳行菴警報日急諸酋形情露矣整兵阻隘責在分守隨酋向往就急赴援則門下所習諳者蓋酋計不測既欲分我之力以故東西調援非臨時早得其情恐不免顧此失彼且受敵之處自四海冶至了角山相去遼渺旦夕之間定有真情拱聽教音再圖經畫寄李漸菴欲卧山中意最真既過雒以遣人繳節涉慢命故冒昧入京不謂遽有兵管之寄令不得告圖書衣裳又不在身所客居隻影安能鬱鬱久居此哉人便附候華山之約不遂得一俚語在别紙倘至蓮花玉井願為我寄山靈不必作移文也答方金湖雲中實京師右肩勢孤卒悍稱難守有日邇姦民盤據坂升患不在外敵下賴經略令北門有鎖鑰之固即目前虛警當無煩宵旰純濫寄兵管幸與邊計所藉以脫曠職之罪不淺矣答陳行菴節據塘報俺酋必入犯無疑馬帥卞懷仁相機應援誠得䇿而天城迤東平敵迤西在宣山二帥雖非本地倘臨時力可赴援不得襲故套坐視也郭帥駐劄寧武與偏老孰便幸裁之報郭總兵去嵗京中幸一靣未幾借晉中深為三關稱慶近邊報日急諸酋形情已露雖聲言擊大同恐犯偏老意更多所賴揚威樹勳不淺矣書中謙引大過僕嘗謂大將統三軍至令體貌與諸將等無怪乎紀律不可振也往周渭陽公鎮雲中不折節於人卒成名將僕以為得大將體者一渭陽耳願將軍效之報談二華總督節睹經略未嘗不嘆羡謂為天子守封疆皆得如門下北何有強敵南何有倭夷純不諳軍國大計顧見當事者襲套文則諧衆口實幹濟則多沮撓今篤中不欺視公家如私無有若門下者建臺之議即勞民可遺永利寬恤休養之計久欲進言於門下而門下已調停之矣諸酋近擾雲谷置薊遼不言此其計甚詭恐秋風至彼所垂涎不在彼而在此也報翁見海中原之地在食不在兵在吏不在將純竊以為確論故郡得一龔遂則渤海成賣劍之風即藩臬即撫按皆屬贅員惟襲套逄迎真有如來諭者以故地方一遭水旱即皇皇思亂緩急標本之計非兵權未可彈壓又參將改駐不繫增設兵果不足亦止取各道軍餘民壯耳是在今日不為聚而於他日亦無難散也往師劉二巨冦流劫中原燕趙驅則入齊魯齊魯驅則入徐鳳正苦各省直兵無統屬耳武德諸道即欲如來諭然須題明方可入勑書幸門下酌之報談二華論邊事承諭召募之難仰見當事苦心大都募兵之難難在本鎮入衛之難難在他鎮圖經久則客兵不若土兵論緩急則土兵之補練無期而客兵之見在足恃况計費又有如來諭者愚為此慮最久嘗謂入衛之兵可暫而不可常可罷而不可遽罷以故待罪以來未敢以此撓邊計豈不知各鎮亦以薊鎮所關繫尤重耳蒙教敢不仰成雅意力贊廟謨苐優恤寬假一切修築之勞得永免使薊鎮為客兵樂土何如報王鑑川中丞籌邊二疏諸薦紳無不嘆服至有恨宣大得門下晚者南山之議今且撤回入衛兵數千奈薊鎮補練無期勢難盡歸使山陜之兵日困一日不知作何終耳報殷石汀猺獞之酋蔓延於積習而養成於玩撫蓋撫在我剿亦在我則剿可也撫亦可也因其不能勝而為不得已之撫則撫以示弱雄悍逆賊以殺鹵蒙惠孱弱赤子竟寃抑莫伸賊如之何不愈肆以邀賞而東南之民何時就袵席也承諭剿撫並用而請餉振威又奪其氣自是相機運用以成底定之功在門下耳報王鑑川那吉之降視呼韓欵塞不同蓋呼韓以君長來那吉一小竪子耳於中國無輕重今既入雲中殺不武縱則示弱苟擒叛賊為我立功即效歸亦庶幾哉但續降者真偽未分倘率衆聲言那吉部落隂為內應計恐萬萬無容留理也其二俺酋既哀求那吉此機會不可失蓋彼酋棄而不顧則我不過得一囚耳但率然輕豫未免褻體必果有哀懇實情令彼殺諸逆為我立功則豫奪之權在我彼當亦自感服僕已疏請大端謂彼既哀求自當議處而尚有謂不可與者不知既哀求而不處假令彼以為哀求不可得發恨棄之而去不惟因一降重受其禍且令彼執索降之名擾我而我又兼此哀懇之機而失之矣幸早圖之報見松劉中丞默國事詳前書中臨安參將本以尾大故默寓防微之計頃議裁革真屬無謂讀大疏仰謀國忠懇所云五利令西南機宜宛在目前建議者蚤得聞此當無勞更張為也廟議一一如諭他日滇中軍民安享彈壓之休該鎮得免震主之嫌者在此舉耳與陸五臺太宰都下日接謦咳十餘年神交夢想者遽承公忘年之雅不知何所投於翁而翁即傾蓋如故若此也日公發都時追送不及無何純亦得告而歸蓋自分迂疏無補徒竊祿增懅又老父衰白多嗽幸歸來日娛膝前課子弟讀書耕田有時過漸菴丈所相與質對倘自此收斂精神不負心知之教庶歸來不為徒矣天象示變往吳越水旱驗矣今其驗當在何事乎有懷種種不能悉與李翼軒督學都下一再瞻對已即萍梗然得所論著及鍚類秦中章程不啻親承謦咳又獲珍萹奬借逾分蓋已心感髙義顧以李下之嫌未通名姓歸來苦途中迍邅至今月初始抵廬而先是承溫札豐廩豈迹未密而情若膠漆耶勒狀上謝書成得令弟飛騰信快之其二門下陶鑄秦士庶幾還周秦之舊矣意即內召啓沃燮理而猶以藩翰相煩聞分部嵩雒嵩雒固昔賢分陜地世所傳甘棠猶在何幸於門下再見且知以此為重用地耳頃勞干旄枉過蓬蓽以未致欵為歉答張澽濵中丞人自蜀中至者道門下鎮蜀無何即為蜀畫便利而以禮易舊俗尤卭筰諸國對症之劑即文翁化蜀曷多讓焉去嵗冬仲天奪我糟粳之配已又奪一壻蓋積愆一免官不足贖也純以此過痛心怦怦病矣與弟河兄來量與阿堵中物蓋吾家親支人少縱不才也當看顧今日雖有親疏此是祖宗骨血范文正公所謂自祖視之此一人之身也近世人於一家骨肉常分形骸欲望作官仁民愛物難矣我輩此處正當體會正是學問其二何達軒忽有此變使我未遂薦賢之心遂託按君給符以歸而賻儀則致之家耳天不佑善至此吾三疏不遂時將大計只得少緩此畨事體萬分掣肘只好於公中加一恕以求妥以保全善類而平生作對者不可不置之人情世態之難處如此其三家事心事俱詳書中矣吾弟家居守拙甘淡泊我心甚喜且吾弟居恆能亮我若他日令其子獨富而弟獨薄則天地間之最不孝人矣是視父之子不如已之子也朝家村水田覔十餘畞鑿一園久已無心仕路矣須近水可度日也其四吾弟拜命亦祖父餘廕所及所謂前種而今食之食之而又種之則後之食者將繩繩無已且戰任亦甚難須慎之又慎勿存一毫身家之念上為國家下為軍民始不負吾家世受國恩圖報夙心孫立山親家一推疏上上大喜即令守票速發行蓋數年未有之特恩也衆正大快皇上此舉會孫親家力勸登程為聖恩為時事不可專為已也其五吾弟想旦夕即發而入漢南矣百凡慎之又慎吾弟有識有量必不以此自足為國為民可也遣去賀文乃善造火器者吾弟善視之其六人道漢中軍民甚感吾弟吾甚喜須如此乃不負朝廷蓋今正小民在水火之時吾輩縉紳實心挽回安望天下無事若有事此身且不知何歸况其家乎今之不思恤軍愛民者真愚之甚矣望吾弟千萬堅持此心不但自成一美名且為子孫造無窮福澤也其七弟痰未愈須用定心之功凡去留遲速順之而已當不得意此心先亂若逄有大變將如之何張魏公有刺客至亦笑而聽其取首無非信命信數也二姪文各有致正好從此精進令看好文求英發也其八吾弟脅下疾何又發且甚也據弟書及來人皆言已好猶不敢信甚慮詢之京中無良醫止彰德髙醫官在此渠云可治遂給路費腳力令來家看脈從容調治想須久治方可大愈其九火器曾令朱騰淵來靣告亦盡其技否近阮州成功曾以宣鎮送來數件付宋大斌帶去其威逺炮一入巢衆即大驚而潰故我兵盡入此一效也或川中攘功或不肯歸阮州亦未必肯説出大斌耳然足以徴此技之可用矣利器解四册附致其十李瞻宇公祖至極稱弟才守當為干城苐一真不負朝廷不負期許方是宇宙間大丈夫也自携費用倘或不足我當助之惟愛恤軍士使一方感戴使去後有餘思即一時有相左者亦當愧於心也我事體外靣已大明有南部郎劉元珍一疏可為此局斷案不可謂世無人也錢子狂言至四殊可笑耳溫恭毅集卷二十五
