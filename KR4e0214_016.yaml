body:
  text: 溫恭毅集卷十六明溫純撰祭文祭冢宰陸五臺公文天祐皇明聖神聿起誕生哲人以輔天子於鑠我公鍾靈檇李其真諦西來之密付其家訓宣公之嫡㫖其論諫古人之遺直其文章天下之至理其溫如春其重如坻其虛如谷其靜如水蜚英騰茂敡歷三朝生輝暗沕流澤枯凋司空崇秩獨峻孤標恂恂迪道諤諤樹幖故相當國奪情起復或勸小貶鼠腐鵷嚇惟忠惟孝中嘗激烈拂衣引謝怡情緑野雖笑傲東山之墅猶壁立浙江之鐡慈航登岸公論丕昭皇眷耆彥銓衡簡超玉絃調宇六典計僚擎天之柱負海之鼇力請得謝冥冥髙鶱一區之宅五畝之園徙倚茂密掬㺯潺湲名臣欲盡一老僅存品其清節李固陳蕃計其細行管寧邴原共祈元老還佐神堯奈何川嶽暝色箕尾飛搖天胡不相於斯文而遽殞此堂堂之賢豪雖然我公結解漏盡本覺明妙千鏡同室普度互照公來現身公去振臂我有榮枯公無生滅捨之則藏死而後己公今在天其得之矣嗚呼公晚南歸吾儕西轅江雲渭樹間通寒溫追惟契合蘭臭之言始或氷炭竟若弟晜耳聞山頽淚如河翻瓣香千里庶幾招魂同祭冡宰陳心穀公文山頽木壞我心惸惸嗟我昊天不憗老成惟公碩德應運休明龍章鳯質蚤嵗蜚英振藻南國煜煜二京甲第奮跡白日髙名試政比秩凛如寒氷尋轉銓曹甄别惟精採華取實曰鑑之清疏滯黜幽曰衡之平有赫丰標胡墨不驚帝曰賢哉賴汝股肱晉之太常重談輸誠陟之柏臺萬里專城雷擊電迅殱于厥猩霧霽氛消掃于厥鯨帝曰賢哉用汝作羮留都召還四牡彭彭旋登太宰表率彤庭百僚師德八柱天擎三紀敡歷漠然宦情謝政賦歸鴻翥青冥鑑湖初涉緑野方營崇蘭結佩鸞鶴相迎軒車蹟逺葵藿心傾東山雲白北闕風馨云何一夢殞彼長庚國思耆老朝憶典型兼而有之死哀生榮金蘭結侣道義同盟思公之德無忝月評仰公之猷無愧歌賡追公之逝誰繼鳯鳴南望江國泣淚將零聊持桂酒逺進瑤觥靈几日夕繐帳風生池榭長寂泉户重扄隴岡凄凄雙舄雲旌祭宫保大司空葉龍潭公文於戲維公晥晥名世碩彥瓉玉流黃文武為憲當其䇿射金馬璞獻瑶琨附公驥籍如登龍門鳬飛花縣露覆江村邁戴星之宓父誇製錦之天孫計部含香蘭臺改玉攬驄馭以澄清盻中原而紆矚松哦􅀢􅀢李官頊頊郎署留都專城約束滇越臬憲暫借褰帷盧龍邊馬蹀躞雄飛膚功卓異帝眷蕩巍晉秩遷鶯絫陟中丞黔秦甘肅節鉞提衡鈴柝晝靜邉塵不驚則有寧夏之役孛酋縱橫公赫斯怒整旅提兵躬折衝乎千里震韜略于長城凱歌露布刁斗月明殱鯨鯢而授首繫跋扈以獻廷帝曰俞哉豫嘉乃績晉右司馬總制邊逖耿耿元勳尚書八座管樞水衡薦加宫保喉舌股肱國之元老方冀秉鈞儀型百辟天不憗遺商山對奕嗟南海之冥茫悼羅浮之空碧純也意氣同脆眷兹年譜疇撫三秦曰維翁祖聞訃涕零夢蝶蘧栩為國哭公生芻在簠毣毣兮方來洋洋兮如睹祭宫保中丞李漸菴公文嗚呼惟公學業德望識度操履應運而生為國之紀斯皆談在人口播於人耳今所叙者契知而已嗚呼言念生平求其友聲締結管鮑論世朱陳公息余嗣燕爾婚姻四海兄弟如公幾人伊余筮仕公在考功嶽峙淵澄有巨源風余亦硜硜喜直恥通他人則嗔乃公實喜以公特達忘我頑鄙莫逆之交實從兹始余忝瑣闥公職謄黃接影天衢休沐相將言相切磋韻擬笙簧庚午之秋余忤當路紛紛掉臂投石罔顧惟公急我誼髙千古及余遷楚尋同拂衣惠而好我攜手同車渭水洋洋可以樂饑無何壬申聮轡于征公撫齊越余歷寺卿地逺心邇方期憚力㑹又忤時嬰疾斂翼公歸自越余歸自燕相顧而笑並賦考槃嗚呼浩浩世途是非同軌齒牙相軋波瀾四起公獨靡他心如止水風雨如晦雞鳴不己以膠投漆如弧有矢所以綢繆見于生死甲申再起又忝同徴公督漕運余叨理卿復從公後出監於浙實塵是步罔敢踰越余兹執憲亦公是程明月之珠光照後乘嗚呼人生百年升沈聚散交情秋雲倐忽變幻乃余與公生同時居同里而又同志葭莩之親金蘭之誼四十年如一日而未始或易佛經云凡有業結無非因集與公緣㑹豈是偶然撫今追昔涕泣漣漣嗚呼知已凋落從古所悲故匠石廢斤於郢人伯牙輟弦於子期公老而吾里之稱前輩長者已落落若晨星公沒而所謂晨星者又將就日而益零未申之間司馬魏公南院胡公相繼長逝曾幾何時公訃又至嗚呼風妬喬柯霜摧暮莖老成云謝何資典型踽踽涼涼余何能為情嗚呼哀哉念余欲從魯鄒形色天性之㫖以遡虞廷精一之傳獨公解頥且從史余以必為庶幾不落於言筌而㑹太宰孫公枉過預訂他日歸來共質此學于二華之下于是遂開愁别之襟再息分岐之駕詎意短景未果良辰不借竟鬱結于深衷倐淹淪于大化嗚呼哀哉良友逝矣余亦華髮聞公之喪方食哽咽况目擊時事可喜者少而可悲者多痛賢人之長往感人事之蹉跎能不使余胸石搗而淚金波嗚呼在疾不省於亡不臨舉聲增慟哀有餘音語及公息泪益沾襟同年合祭司馬中丞趙寧宇公文嗚呼自古豪傑動關世運生為名臣死為上鬼樹掀揭于天壤夀芳馨於汗史斯固賢哲之厄而德仲抱真以亡愧嗚呼德仲西蜀人髦藝苑宗盟左袒月旦茂實蜚英鳴琴百里比部亷平殿上惠文秦粵福星八閩起神明之頌兩都崇鎖鑰之名八二虞工鼎望彌騰建牙特簡定難楚荆狐狸罔號鰌鱔不舞江漢澄清朝端推許考晉司馬且召還部詎意逆宗跋扈強掠上供人臣無將國法難容蜂擁威脅莫攖其鋒意欲開導理諭賊焰益播天星示變適丁陽九之禍嗚呼推心置腹自古所難利鈍禍福當事罔談豈乏明哲氣數攸關哀徹雲夢之澤泣斷瀟湘之湲奏牘上聞舉朝驚怖逆更鴟張天子震怒彼潢池之盜弄諒不渝時而就捕遐思宸濠不道孫許殫忠未及百年楚孽長鯨而正䝉難明夷艱貞惟帝念忠優恤殊勳前後輝映雖亡亦存身騎箕尾氣壯山河充塞宇宙耿耿不磨所稱名臣上鬼非耶嗚呼德仲能以精誠動天地而不能格叛逆之宗能以威望孚中外而不能弭猝至之變能信於列省之民廟祀尸祝而卒為楚事以殞其生蓋所能者天所不能者人情切年誼心懷國艱言之於邑􅍠鼻摧肝忠魂何在千秋容與望雲一奠神其格只祭大司空淮海孫丈恭先師文嗚呼哀哉樹伐需材大道貴夷津梁不作孰指我迷篤生先生為世真儒悟在象先拓我廣居追惟筮仕讀書中祕及拜夕郎抗直當世出按豫章奸墨辟易視學關中文章赤幟純時弱冠實侍絳幃不謂散樗國士被知歷遷蜀楚保釐聲施岷峨頌德雲夢繫思南北藩臬聲稱藉甚遂拜中丞撫治是任兩鎮鄖陽如木斯䕃今上拊髀召還中禁廷尉未幾進陟南宫侍講經筵教胄辟雍時有啓沃上為斂容乃戀親幃辭陛引躬上念老成典刑攸寄召起陪京司空是畀謂即登庸翺翔鼎司和羮鹽梅庶幾無愧天胡不憗遽殞其生訃聞之日中外動情閭里罷市縉紳涕零國有恤典士無師承嗚呼痛哉世豈乏才亦豈乏賢其根不沃光寧煜然先生學孔妙契言筌默識愼獨體仁遡源近世學派先生要矣聖人有作或弗易矣純也飲醇草年於此習氣為纍毫無踐履念于先生三沐芬芳青襟歲餘日侍門牆受約於鄖則部淯陽受教於京則官奉常昔在一堂猶多扞格今業死别安望聚樂即把遺言以求領略恐躡前踪欲追復却嗚呼痛哉梁木其壞兮喬嶽其頽斯文中墮兮圖書凌夷􅀈懷春風兮抱心孔悲鬱瞻南斗兮潸然涕洟萬里遣使兮生芻一束地不能縮兮悲不能贖含愁夜雨兮五內若斸山川間隔兮爰訴我曲合祭少宰盛公文嗚呼公故將家也代有干城至於公獨以文顯為華國侍從之賢初業麟經蓋從故相馬文莊公于二華之巔未幾先後登第又先後讀中祕書不啻如和凝衣鉢之傳既接武詞林以至少宰修史橫經疇不仰如椽之筆又疇不歸啓沃之益于講筵時文莊固嶽嶽于其前而公亦與之比肩世方以天速奪楊綰為文莊惜胡公又捐館舍于在疚之年譬彼二華俄兩頽焉吾西土相業首姬公歷漢唐宋殊多名筌其在我明二百年餘猶未有竟舟楫鹽梅之用者如公且旦夕爰立而又即僲今例爰立惟詞林吾西土詞林著者前乎公有髙陵綏德二文簡尤坎壈而俱不延豈天不欲吾西土踵故芳躅故使我詞林諸君子獨鬱抑而不宣抑山河百二之靈有所注故有所挹即文簡文莊及公猶不能勝未定之天所為公慰完名考終世珍良史而家富遺編國恩從特錫祭營封易名增秩與任子將哀與榮而兩全箕裘之託薦上國者二而讀父書與垂髫者亦玉比潤而芝比妍衡士二闈以人事君其得之公與公及門者如拔茅而以其茹連凡此皆可不朽所以亡而未當亡知公己嗒然含笑於九泉而獨純等方營莬裘于涇峨間冀公佐道化因令吾儕安臥忽訃至不能不追感今昔而繼之以涕漣蓋為國抱蒼生之嘆其不堪聞鄰笛而睹梁月也豈徒以年誼嫺婭之故而然合祭劉南嵐年伯文嗚呼河嶽育秀哲人誕生誕生維何咀華吐英爰逰藝苑早宴鹿鳴既屢試宗伯而竟落莫如函牛之鼎而以雞烹當其製錦于晉則以懸魚持已以烹鮮臨民庶幾追密縣之卓與中牟之魯逮晉别駕佐股肱郡而佩呂䖍之刀也僉謂今之王祥故任未滿考而即委潤于紫荆時肅皇帝篤親親之仁為諸侯王置相于崇以為非公不可而公之曳長裾于王門者三十有五年蓋已過穆生之不遇楚而視賈太傅之弔屈大夫于湘流也尤同官而異情即今王槐竇桂芬馥競爽既已接踵連第以世臣世家名或起草民部為德齊越或才藏武庫胸富甲兵世但云三葉同仕于公家僅見而不知公之治民與為相若曹平陽之相齊清靜不擾者實以致天道默佑于冥冥蓋平陽相齊九年而為漢相公相崇三十五年而僅增秩以故于公則若挹若除於子若孫則若注若埀宜其天錫純嘏齊喬松而未艾胡為乎鵩鳥之見夢亦星隕而山崩嗚呼無草不萎無木不傾莫壽于殤莫夭於彭矧福壽之攸同兼子孫之繩繩不朽者神委蛻者形至人不死大夢長醒記玉樓於天上騎白騾於地旁不則煉形太室吹簫緱嶺取牝牡於容成又不則御風鞭霆興雲致雨駕烏兔而長征彼寓形於宇內猶大海之浮漚也曾孰枯而孰榮論交令子墨榜同升嗟老成之永逝欲再覯而無慿嘆國相之難繼將疇依兮典刑炙雞絮酒永訣生平且以盈虛益損之數知公後有常虛常益之徴又以清靜不擾之政疑公逝有出世超𤣥之能公如不昧其嗒然以鑒繾綣之䖍誠祭司農郎雒陽翟先生文於乎哀哉先民有言無德不酬矧純荷先生之洪造蓋覆載之與侔何期萬一之未報而先生遽返乎蒿邱百年道義獨抱深憂慨念今昔涕泗交流嗚呼哀哉純學愧璜瑀識阻敦堥如尺澤之鯢榆枋之鳩乃曩嵗先生宰藍邑入棘闈而試驊騮秉精明藻鑑將網乎琛球神鑒之而托夢恍往哲之與逰先生謂示象之在兹謬於鼠臘而見收駑馬先騁乎康莊鹿鳴側耳於呦呦然且期之往哲進之大猷謂勳名之不朽庶無愧于前修純今尺寸未樹恐重貽門牆羞况乎崦嵫掩照泉壤悠悠悵函丈永隔嗟豫小子其安求嗚呼哀哉先生少負瑰奇探𤣥尋幽文華炳蔚絳螭翠虯出宰百里則龔黃卓魯之儔入司國計則崔狄裴劉之籌斯蓋沖和精淑之氣瀰漫乎中州育兹賢哲展淵抱而保金甌詎謂位不滿道德與命仇秩僅止於度支之郎曹年未抵乎七十之春秋嗚呼哀哉人生浮世譬之虛舟純嘗聞緒論齊得失一死生大類夢蝶之莊周矧賢郎之克肖誇雛鳯與棟牛據先生之夙抱竚看三槐之遺休此日歸仙諒先生之罔怨尤而純所以咨嗟痛悼如割如裂者身羇宦邸築室無繇荷子雲之雅誼愧侯芭之綢繆望千里以告哀慚九章之宋謳惟求來者之可聞庶幾不負知遇之獨優先生有靈其豫鑒不祭來望之職方君文嗚呼緬維凌霄靡䆒厥材繄是豐城躍而復埋疇俾其全竟嗇夜臺人之云亡憂從中來感時撫事能不興哀維君誕生嶽靈孕甫弱冠摛辭雕龍繡虎健翮摶風彯纓繫組出宰濠梁膠東步武行者思歸居者安堵尸祝在人口碑在路天子曰休戎事爾輔眷彼東陲海陬厄塞稅使鴟張沸脣虺螫爰蒞雙旌蠢爾脅息商悅於途士程於式溟渤波澄肅慎重譯遙睇雲山鬱葱改色刃甫發硎神理旋效萬石華鍾寸莛始掉屈指勳名黼黻廊廟芳訊甫聞倐焉訃告草木皆哀朝紳共悼維君家世蟬聯纍纍雙鳯齊鳴瑞世耀里逺步中丞伯氏直指嚴君吹箎二郡濟美維君妙才嶽嶽五鹿問學淵源談天炙轂乙未成名實踵故躅介石匪如獨振流俗余辱君交道義三世葭莩金蘭比鄰依倚余飽風塵君方繼起心儀常存君才罕儷三事同升余庶可已殞我良朋大厦斯圮嗚呼傷哉百年同盡有涯者生千秋為烈不朽者名雖恨厚施而僅薄食位不配才年未配德亦見顯設而底豐功謳吟迭應貌象無窮競爽象賢矧多令子大亢宗風君為不死君故達天聞言滋慰亦恃生平誦言如對靈爽不昧引滿一巵秦雲渺漠燕月凄其撫歎山河寧哭吾私祭劉太翁南嵐先生及李太夫人文於乎翁母不可作矣往純同諸年家子哭翁於邸謂翁相業大類曹平陽參然平陽將兵多殺戮比相齊始如蓋公教以獄市為寄何能如翁司訓得士心宰邑佐郡得民心相崇莊王及今王得上下心平陽之後窋奇時襄宗僅襲侯何能如翁子運使君孫武選君皆以進士起家與翁同官中外平陽相齊以戰功多而逺之也既以不擾聞始相漢疑信半矣何能如翁以身殉國受主知自未艾至耋卒而為之殮葬置祠祀春秋王曰安得愛君憂國如先生者知臣莫若君信矣蓋公坦夷簡靜本天性虛舟涉世且以身為寄故所至人歸之而在崇定儲功尤著宜崇之兩王眷倚優禮翁歷三十五年彌篤非世之曳裾王門者所敢望也翁今與運使母同歸窀穸定萬年之居焉母故少翁一歲其借光剪衣篤舊睦親及佐翁服官狀不一宜翁敡歷五十餘年無內顧色康神王若仙也純曩從公逰汝南見翁貌謂百歲不啻或同歸里而侍巾履於泉石有日乃今從運使君執紼歌薤露蒿里為幽明之隔耶純頃扶吾母柩過陽陵與運使君相向哭因哭翁母今哭翁母亦不能不哭吾母純葬吾母因葬其妻李與楊運使君今襄大事亦失凰侣兩地慟傷不待臨几酹酒而已涕泗交頥天何酷虐我兩人以至此極耶蓋純同運使君與計偕又同舉進士膠漆金蘭不知其姓異故於翁母始而頌繼而些以至於慟然翁母箕裘既盛福澤方來行有寵錫以光馬鬛乂以此為翁母慰翁母有知其弭節以鑒純之衷誠也耶祭大宗伯馮用韞公文嗚呼凡人有生疇不有死可死而不可以死者惟公而已公立朝典禮樂如夔侍講如正叔較士如永叔條議時事如子瞻有一如此皆可不朽而况兼之死烏乎不可而獨惜乎時方多故如風浪中之舟疇其作大楫而為宗社倚若公者何以死哉嗚呼天之降割于正類亦酷矣豈日者泰山之頽為公兆而遇此龍蛇之䜟預驗于公余不知天道何心豫之奇而令數僅止此豈造物忌才或玉樓成而需長吉為文以紀豈天未欲平治天下也乃為不雨之雲而令草靡豈公自喜逍遙也與南面王結侶而棲而厭塵滓嗚呼公之不可以死也中外咸惜更使余心愴而悲不能已蓋余之與公家世習也自令斟鄩始公登第目成即莫逆即參商未嘗不快公之翺翔千仞也庶幾即正師席而兼端揆辛丑大計余役西臺公實以儲相而佐銓曹矢殫厥心以扶亷植善心未嘗知有爾我語未嘗不罄底裏蓋余之病傷易而公之病過思余懼公思而易竭公亦懼余易而招尤雖公疾革余杜門未嘗不兩相藥而求萬一之濟其最關情者國事之日可虞而人心之日不可挽也公今已矣余亦將歸而西矣徒使公抱無窮之憂而余亦不知有何從出之涕嗚呼公卒之前余夢公容若步如昔即以慰公謂疾且起今若此始知前兆如鄭康成夢令起起云耳然公之精靈於昭于天也必凝而為日星為河嶽不然亦啓帝聰而納公之遺疏也庶幾登斯世于上理嗚呼余與公深矣夙昔心相期為靜定之學以求吾儒第一義而以憂時故謂相切磨有日也比公疾亦數以此言告而公亦數頷之然竟不延昔人所為終身之憂不敢以幽明間而輒相忘者此也而暇以他詞誄嗚呼哀哉祭王仲山年伯文嗟乎先生不可作矣純自髫年即聞海內有仲山先生已同先生子吏部君舉進士已又同官東土為莫逆交以是習先生林泉之樂即古稱達者不過謂得移宦而南一拜先生廬中而今以訃聞矣嗟乎世何有如先生者哉先生以通經博古之學守急流勇退之節當其在事藉令少抑與時俯仰即巖廊可立致顧一意枕潄泉石終其身于詩文書畫間世亦以是髙先生然先生風節令頑者亷懦者立即百世之下且聞而興起誠所重在此不在彼彼泉石詩文書畫蓋所託而寄焉者也昔人謂士貴士賤皆責在士今之士視昔何如安得若先生者而使士為世重也詎意世有先生而純生同其時又為通家猶子竟無從一見顔色也耶客嵗吏部君季子就試來持先生一畫一刻遺純純把玩先生手跡無異壯時及從季子問起居又知先生丰神完健謂必且上夀乃無何竟不起嗟乎世復何有如先生者哉純追念髙雅則為士類惜簡閲遺跡則為交情痛痛惜交橫假詞陳悃千里蒿目先生能鑒之不溫恭毅集卷十六
