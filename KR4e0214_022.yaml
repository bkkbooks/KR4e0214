body:
  text: 溫恭毅集卷二十二明溫純撰七言律詩遊青柯坪削成絶壁倚危梯剛到山腰眼界迷為近天門尋白帝故從鳥道拄青藜銜杯欲並峯蓮吸得句先擕玉女題正好乘風凌絶頂歸來恐作舊人啼其二徙倚探竒恣壯遊幾番回首憶秦州千年紫氣從關過九曲黃河入檻流舊國城連芳草合昔賢丘與野煙留山靈何處鍾豪俊為鞏長安億萬秋春日二園社集得餐字載酒尋春賦考槃不勞折簡罄交歡間依花徑班荆坐漫采園蔬作脯餐樹裏鳥鳴驚客到池中魚躍解人看醉餘散髮忘歸去笑擊空明把釣竿蜂房次逺卿韻午餘蟻國夢初醒間看蜂衙閙晚晴股帶花鬚香粉合口銜窗楮屋廬成振振休説螽斯羽肅肅如屯細桞營目擊從王齊殫力杞人何事但憂傾郾城三宗侯招飲王孫臺榭倚雲成落日銜杯聼囀鶯繞檻龍岡團月色當筵熊耳暗松聲桐分周葉推唐國雪似梁園賦宛城家學傳經劉向在燃藜夜夜燭長庚繡春臺宴集臺榭連雲載酒登相逢春色錦千層名花豈自雒陽得危檻還從樹杪憑坐對清峨頻徙倚杯浮星月欲鶱騰夜深留滯渾忘去回首東林日已升登黃鶴樓危樓髙聳捍荆襄不見當時鶴再翔跨鶴欲從仙侣去開尊疑對酒家狂金沙鸚鵡連芳樹二水三山帶夕陽笛裏梅花何處落一聲風送五雲傍中秋仲宣樓送秦藩伯之滇南蕭瑟登樓聼郢歌共憐王粲住征舸逢秋嶺月當簷勝戀客江花入檻多雲裏象人瞻日色天涯雞足待春波使君一去千山隔尺素遙看鴈影過同鄒秦二使君遊德山孤峯突兀俯群山遙望江湖碧一灣善卷池連青草合髙僧塔共野雲間聼經鶴去煙霞外采藥人來杳靄間一局殘棋鐘磬落招提盡掩不知還登嶽陽樓飛樓蘸水倚連岡悵望仙蹤竟渺茫龜鶴崚􅜤囊已盡江湖環繞帶仍長賈人逢笛龍噴浪巨蟒離池劔吐芒猶有梅花當面發不堪吹落洞庭傍同李杜二使君望太和山危樓縹眇倚雲成西望名山勢若平太液揚波晴亦雨天門返照夜還明相逢李杜饒新句幾遇金蘭感舊盟安得乘風凌絶頂紫霄長聼步虛聲又同飲李太史宅時太史尊人孝亷在坐郊行幾度駐江干江上多君賦考槃蒼翠松姿春不老蔚藍山色夏猶寒開尊重引探竒興投轄還兼舞綵歡共向隆中占象緯弓旌行指卧龍灘送方允治勳部應召隆中抱膝許尋盟紫詔俄傳出禁城畫省移官新主意草廬勸駕故人情逢春弱桞迎旌斾對月芳樽倚鑑衡照乘隋珠擕滿袖知君蚤晚獻承明登太嶽髙薄層霄禮上玄徘徊回首笑塵緣煙生萬壑疑無地雲散孤峰忽有天虎豹關開風送入丹鉛竈冷火迷傳榔梅似是真消息獨立蒼茫思渺然送王茂大之閩鹽運時李本寧偕行一麾十載浪難平此去安流萬里行盡日關心鹽鐡論幾時回首鳯皇城葵榴滿路風煙好李郭同舟藻思生九曲河流終到海飛騰蚤慰故人情江村夜渡休沐同遊江上村尋春徙倚到黃昏舟車逺望兼南北星月平臨互吐吞傍水花陰侵座入當簷山色伴雲屯相逢莫作乘桴嘆兀坐中流過海門題李太僕看雲池卷荆樹相看不記年耽詩共詠鶺鴒篇謝家得句饒春夢杜甫多懷但晝眠海上池連芳草畔天涯雲在夕陽前故園招隱馮誰賦難弟風流亦謫仙信陽道中阻雨次楊使君韻行春單騎出郊隄風雨更闌鳥道迷但使閭閻無犬吠何妨林野對雞棲賢山夢寐驚鍾斗溮水潺湲動鼓􅎏莫道隨車饒大澤主人餘潤自東西同趙汝存宿大關山洞借食僧家簇錦傳燈照眼明興來披豁總關情觀風轉向雲巖下得侣何妨鳥道行辟穀山中容我住采芝方外有僧迎逢人説盡金銀氣誰向空門問此生登金山寺特立中流瀾倒回振衣極目此徘徊尋源有意乘槎去對景渾疑跨鶴來雨霽龍宫行日月潮廽蜃氣接樓臺入瞻座上西來像為汲中泠供一杯其二蘭若飛懸龍象孤真成淨土一塵無天開寶地金生穴波湧祗林鏡作圖捨筏凌虛從葦渡離緣入定愛河枯珠宫容我棲禪室秋水空明片月俱其三水月澄空靜不流那分南北照神州皇圖鞏固天為塹湯沐瀠洄海似漚朝貢越裳航萬里車書吳會奠千秋觀濤誰著三都賦江上應標此柱留仲憂定海招寶山同王將軍張憲長觀水陸大操山河一統鞏皇圖拜命東南鎮海隅賈勇旌旄雄虎豹先登精鋭競蝥弧期標南國千年柱如渡西川五月瀘亦喜務農休士馬恐因忘戰啓憂虞其二紫電清霜武庫多轉輸誰是漢蕭何將軍不喜髀生肉甲士翻嫌海息波懸哨如籠麟谷鴿銜枚似趂蔡州鵝陳頭目極吳門練疑有驊騮傍水過遊靈谷寺出郊為訪志公林塔影還從靜室臨象外滌襟泉有德階前鼓掌地成音忽聞鳥韻驚迷性漫倚松濤試定心幽寂偏宜騶從去獨留明月伴謳吟王陽德大參伯仲邀飲墨池園池即右軍洗硯處謝氏夢草堂在側選勝名園傍斗城客來倒屣笑相迎欄成曲折花爭發坐倚芳菲鳥不驚生草塘餘靈運夢臨池家紹右軍聲主人且莫言投轄還欲重為結襪行虎跑泉寺同孫樞相王李二柱史宴集次蘇韻時王柱史將代林深地僻構禪堂雨霽風來襟袖涼花發滿原春未改燈傳列祖月同長清時且喜成三笑話别先愁各一方好景共遊難再得醉餘且覔虎泉嘗上已邀司馬汪公伯玉遊西湖乘時修禊向煙波為愛風流晉永和久别琴樽霜入鬢乍逢湖海酒如河移舟曲傍蘇堤桞躡蹬髙捫葛嶺蘿入夜論文真倚玉陽春誰和郢人歌雁山瀑布乘興尋幽到海涯懸泉千仭溜爭竒空傳如練玄暉語笑絶翻盆杜甫詩雲裏飛虹終想像風前瀑布亦參差千秋為汝標名字白玉生煙豈曼詞同胡藩參蔡憲使集永嘉江心寺紺宇空懸面面低觀風聊此一攀躋間橫雙眼扶桑盡細話三生弱水迷獨立潮頭天上下平臨塔影月東西經行處處堪垂泪敢道波澄靜鼓鼙其二異地金焦江上齊又如灔澦起招提水雲亂鎖青蓮合天地雙瞻北斗迷盡日皈依留幻境逢人耕斂問遺黎相看誰是東南柱謾向中流握管題同孫侍中王李二直指遊北髙峰次靈隱寺壁韻蠟屐登臨結侣行髙峰勝處還再更萬木扶踈欲填壑群山迤邐如環城當簷月到徙松影隔嶺風來聞潮聲秉燭同遊不盡興况逢秋色含别情送孫以德太史還朝西湖秋水映芙蓉不盡攀留别思濃已藉青藜空白屋共言江海得人龍金蓮寵錫仍歸第玉笋先班復聼鐘此去九重紓側席應多上賞及儒宗同胡奉常集燕子磯丹崖峭壁欲廽瀾直插中流作柱看影落江心疑燕度根連鍾嶺隱龍蟠逍遙盡日機全息花鳥逢春興未闌况是皇家豐芑地河山長鞏萬年安送劉中丞汝觀中丞直道去長安始信人間行路難滿目風塵多按劍知心天地幾彈冠論功自昔歸何晏平夏于今數范韓即向東山尋謝傅莫因一夢笑邯鄲重逰永嘉江心寺江心一柱障波流再入煙雲豁兩眸近海疑從天外望憑虛如向斗間逰乾坤萬里誰函蓋南北經年自去留泣血迸空憐杜甫杖藜不盡古今愁瓜步即事夕陽古渡問前朝北指璚花觀未遙京口尚連秦漢月海門不斷古今潮遺宫芳草沿江渚異代秋聲引玉簫醉卧欲消千載恨夢回猶記鶴相招遊禹穴同薑憲使商大理朱太僕王新建集舟中聼童子歌豫勸民詩謁帝因耽萬壑煙相逢如到畫圗前開簾席對花間月倚檻杯浮鏡裏天共醉良辰蘭曲酒肯廽深夜剡溪船此時豐稔仍歌咏猶恐春秋詫有年送少司農梁公北上便道省親司農拜命向長安滿目甘棠四野看楓陛行瞻曵履重椿堂先得舞衣歡旌搖王屋衝星曉酒盡蘇門對月寒為賦大東臨祖道憑君切直奏金鑾同子忠登牛首山探竒躡蹬歷危廊披霧乘風到上方醉向空中捫日月夢回雲裏聼笙篁即看紫氣連髙闕似遇青牛過故鄉美景况逢詞賦侣總非吾土亦相羊同胡子忠重逰燕子磯聞我兵復朝鮮寶閣重登酒半闌相逢春色映層瀾飛磯豈學銜泥燕近水常留折葦灘日送花隂侵座入夜耽棊局把杯彈東征忽報師全捷賭墅風流憶謝安答王元美兼懷敬美一代才名衆豈如幾年髙隱蚤懸車有時搦管揮文藻盡日耽玄味道書難弟金蘭交不淺元方夢寐迹仍踈且慿魚鴈訂歸計那得相逢海上漁夏日同逰李氏園亭子髙連睥睨齊相逢倒屣共君躋尊開北海慿溪轉坐對西山返照低金闕曉開雲外擁玉樓煙裊雨中迷清時休沐堪乘興刻燭新詩子夜題其二主人結屋帝城邉一徑斜通御桞煙翠色雨餘山吐月緑隂風淨水銜天芳樽對爾沿溪坐好景慿誰作賦傳醉後登樓還徙倚忽聞更漏不知旋再逰李氏園重憐幽寂再開筵信步乘風到斗邉竟日同為園際客百年君是酒中仙看山日落中原盡倚韻詩慚大歷前自笑支離歸去晚不妨盡日坐雲煙五日同使君謁子貢祠對酌舊宰祠堂背郭橫肩隨旅拜向簷楹千年墻室窺瞻好五日椒蘭感慨生拂坐薰風思解愠盈巵蒲酒對澄清執鞭豈為文章業所至長留奕奕名其二勝地相從引興長低佪盡日思望洋踈林隔水鶯相和細雨銜泥燕並翔風物天涯催鬢改駒陰時節憶年芳賜沾宫扇先朝事倣佛佳辰侍帝傍夏日邀徐君羽飲子由亭天漢風流見使星乾坤此地剩孤亭懷人汝上雲連蜀下榻尊前月滿櫺風雨聨床髮半緑江湖揮塵眼同青夏陽不盡相看思有約春深此更停邯鄲合族建追逺祠志喜憩邯幾住吕公軒何意支流派最繁接武箕裘多國器將文點竄為家門從知姬姓本同氣况乃唐封出太原譜志分明非漫合不妨兩地薦蘋蘩送蕭可發直指還朝皂囊欲奏建章前使者停驄尺五天莫論埋輪稱柱史已從攬轡向秦川澤覃涸轍全蘇鮒霜入穹廬欲淨煙結綬交情頻徙倚笑看父老擁離筵題新築尊經閣成泮宫髙閣切雲成藜杖將分太乙精滿架縹緗過二酉當簷奎壁引長庚筆從衆巘齊沖斗帶合雙流兩抱城柱史神君收地脈重看文獻在西京宿報國寺同僚胡劉諸君枉過次韻銜命停車傍帝城郊門况有故人迎一燈夜照祗林鶴四月春留上苑鶯紫氣欣瞻丹鳯入珮聲喜傍玉河行明朝伏陛承清問數馬還愁愧冏卿王言卿精膳還朝雪夜枉過有作次韻風塵荏苒二毛侵説劔虗憐許國心豈向延津龍竟合何如剡水棹空臨笑看松徑開精舍醉倚梅花賦上林康濟有人堪吏隱不妨青眼共浮沉其二賦就陽春雪滿林地分清切主恩深間曹亦是調羹侣小技終成奏缶音萬里乾坤眼欲盡百年意氣酒重斟只愁灞上仍如戲到處腥羶入塞侵立春前二日雪中謝賜元旦宴鈔時嵗庚子兩立春也屠蘇開宴舊時傳楮幣承恩此日偏六出花飛霑帝澤滿朝虎拜慶堯天靈臺已奏春如閏太史將書嵗有年况欲發藏憐逺戍佇看南北淨烽煙立春次日朝天宫習儀鞭鳴雞唱曉風寒樂奏臚傳慶履端玉帛趨蹌來萬國衣冠舞蹈集千官蓂開氣轉三陽節雪霽春回太乙壇聞道上方將進酒嵩呼齊祝萬年歡答沁水王次來韻桂樹别來幾見秋每慿雲樹憶并州一從碣石論文後誰向梁園授簡逰春色朱門芳草合天涯華髮旅魂愁開緘忽睹相思句倚韻詩成月色幽九日聖駕閲壽宫奉命同豐城李侯守崇文門時有綵羅之賜鵷班扈從出長楊魚鑰欽承被寵光鳯闕雲廽星拱極鑾輿霞映帝垂裳杯浮金菊開芳徑雪疊香羅出尚方佇目八荒登壽域歡歌遊豫頌君王其二九日天髙爽氣開五雲縹眇駕東廽為占萬代興龍地非戀千秋戲馬臺綺賜群工沾雨露香分御座近蓬萊披衣拜舞同居守挾纊還期遍九垓又同登觀象臺仗劍登臺欲躡雲不妨蕭瑟對斜曛平臨睥睨連山色危倚璣衡傍斗文天為宸逰開夕霽人因佳節坐宵分宣傳雨露寬秋賦動地歡聲處處聞南郊陪祀雪霽郊壇對越時恍疑朝拱萬靈知深宫栗栗應無斁上帝洋洋若有私運際貞元天地合節臨亥子斗杓移閉關已得扶陽力定有春輝遍海涯送元暗假歸湖上題詩袂久分那堪乍晤又離群歸心豈為三珠樹啓事常依五色雲驛路雪梅春的皪江城煙桞日氤氲晉公元繫蒼生望莫戀家園緑野醺謝賜慶成宴具後合請建儲畢婚用漢甫司寇韻入趨楓陛自郊壇咫尺天威欲報難推食幸從今醢署伏蒲豈學漢師丹龍顔日為前星霽燕翼春將少海團况有雎鳩相對喜關關水際傍金鑾閲蔡𢎞甫薛魯叔文德任試南宫之文喜賦杏花春色望中新賦就歡馮狗監陳鞭似祖生先競著璞如卞氏晚同珍已看劍氣沖牛斗豈為山靈誕甫申莫道禹門髙萬丈雷聲震處是通津送米仲詔之令銅梁米家書畫舊懸簰羡爾還兼諭蜀才春色滿林供客眺桃花百里向江開重飛故國雙鳬去再過關門紫氣廽公暇揮毫應盡興遍添珠玉在山隈送劉中丞希哲之鎮漁陽禮樂當朝老奉常恍如郤縠向漁陽逄時不為雞聲舞出塞行看劍氣長左輔瘡痍慿鵲起北門鎖鑰屬鷹揚但令欵塞仍依舊嵗嵗呼韓似越裳送來望之司馬出守山海關天門虎豹擁燕山不數崤函百二關留客著書占氣紫趨庭繞膝有萊斑行間擊柝金湯固枕上行師壁壘間起草首回司馬署去天咫尺豈違顔送李本寧左遷安豐久别含情思惘然寧知乍晤是離筵共憐大旱當堯日誰以薰風佐舜絃汲黯官階薪積後漢文宣室席虗前勸君莫唱搖紅燭鵬翼終看傍九天其二文雅官聨憶半千提衡不是縮楊禪舊栽桃李知時雨此去風流亦謫仙江上芍陂爭灌溉城南花塢任芊綿公餘把酒題應遍分付雙魚向北傳雪中謝賜藕少宰裴公元暗司寇謝公漢甫中丞郭公哲卿有作聊和雪裏陽春天地心特將碧藕代甘霖薦餘九廟歆精白賜及千官盡珮簮鳴世多懷饒郢曲許身欲報愧南金堂隅愁有號寒者廣庇還思萬厦深其二虎拜追隨鵷鷺行山公何意倦廽翔嘗新如荷絲綸重求舊難忘側陋揚况有清通為啓事正逢簡注坐垂裳題詩恐賦歸來去欲濟馮誰作大航五鳯樓前祝聖壽修十餘年曠典也時月望于十六日祝當其望云志慶歡逢曠典慶丹墀正是中秋月望時虎拜樓前新禮樂山呼階下舊威儀針從大寶金為鑑歌和長春酒進巵最喜連朝翻衮袖且傳逹孝萬方知先是奉命十七日早合內外諸臣于五鳯樓前祝釐次韻佳節巧連華渚辰詔傳五鳯聼雞人雲霄咫尺顔應喜玉帛趨蹌意總真即向彤庭歌既醉先從玉宇賦千春况聞指日收中貴念及遺黎處處貧秋日憶早朝當年朝拱斗星移飛鳥廽翔亦有期靜聼雞鳴金鑰動喧傳象過玉珂隨肅清秋色連宫闕咫尺天顔入夢思何日鼎新三殿後侍臣重睹漢官儀其二暑退年年侍講帷秋來日日想朝儀金流膠折非疇昔鵠立鵷聨正及時漏待千門花作侣煙開雙闕月應知忽聞少海恩波渥即向文華拜赤墀中秋前四日集維益朱榴館得殘字秋色愁腸夜乍寒偶從看月一憑欄海潮白擁江門雪榴纍朱懸洞府丹林野總霑新雨露閭閻仍苦舊凋殘爽鳩此日春將半何得餘波動地歡中秋集余望筠館時久坐方得月會逮稅使之橫于楚者又逢聖誕志喜分得山字坐看皎月出雲間豈為扶陽力不慳頃刻隂翳消宇內普天光照遍人寰正逢湯沐生春色想見宫闈霽聖顔自是大明千萬世將呼嵩嶽壽南山西臺滿考謝賜羊酒鈔錠朱衣使者降從天下拜歡承雨露偏楮幣何緣分內帑綸音似欲赦前愆委蛇愧乏羔羊節醉酒深慚飽德篇不是作霖逢大旱投醪漫想古人賢憂旱炎劉何意説乾封雩罷今看舞燕從豈向桑林躬六事爭歌雲漢念三農目前生意憐芳草海內多愁望赤松聞道吕梁洪盡陸軍儲此日又難供其二西郊雲起也縱橫不分星河夜夜明近水園林何處緑向陽葵藿幾時傾豈因東海寃猶結可是𢎞羊烈未烹却憶吾皇曽步禱隨車膏雨遍生成送萬伯修司馬之鎮薊遼異邦振旅九重知鎖鑰親提十萬師對奕先籌淝水捷請纓欲向幕南馳輔京列鎮金湯在屬國三韓保障宜只恐材官生髀肉翻嫌欵塞望羈縻聞谷中橋成先是以髙僧福登力建萬佛塔募緣致畢此工逺近賴之志喜懸空飛渡俯清流為倚慈航在上頭題柱不勞歌蜀道吹簫似已到揚州綵虹斜向雙龍挂紫氣髙連二華浮欲濟巨川思大楫應知明主夢相求送劉伯時之登州相逢把酒共登臺悵别銜情祖帳開已有甘棠留夢澤還須露冕向蓬萊郡齋間共仙人卧睥睨平臨蜃氣來渤海于今歌出牧佩刀誰不讓君才改豫知兒和袁生微之戊子下第所作時兒與生同試順天涉世何妨共陸沉聊從林壑惜分陰任他按劍臨明月羡爾懷珍有煉金江驛多梅春可寄池塘生草夢頻侵莫忘獻賦當年意狗監相逢聼好音送朱左使歸衡州雨雪青門供帳開千年疏傅兩賢哉即從山色憐花徑總是君恩到草萊灞上攀轅今日去衡陽歸鴈幾時來莫愁按劍風塵薄還為蒼生叱馭廽送周光祿册封晉藩歸省近臣持節渡滹沱捧册遙臨鷲嶺過故國重沾周雨露新恩偏到晉山河分桐帝子宗藩盛負弩諸侯保障多明主不忘驄馬舊莫因歸省戀煙蘿送祝將軍伯良之任吳淞并序伯良余同年宗伯尚書郎子敷子也少為名諸生廬墓友諸弟余往在浙聞而嘉之頃就武推總吳淞為賦七言律勉之承家綵筆雅能文仗劍東南欲竪勳郤縠詩書堪上將君陳孝友試中軍澄江波靜三吳月鎮海春回細桞雲燕頷登壇將萬里箕裘衛霍漢廷聞秋日同董維益司寇蔡𢎞甫內翰集朱汝修保御修竹館得開字杏林三徑雨餘開漫倚琅玕結伴來如向渭川成别業那逢燕市不銜杯黃庭經為籠鵝寫綵筆吟看過雁裁只恐瘡痍仍滿目人人都望長桑回次秋字瘡痍入夢起邉愁又值蕭蕭落木稠何處征人驚雁影誰家織婦望刀頭杯停河朔憂時日月照關山出戍秋為語請纓年少者風塵海上未曽休送秦給事使齊綸綍傳宣下掖垣逺持玉節過雲門夕郎暫輟芙蓉直公子遙霑雨露恩擁篲定餘從事醴攀條故倚帝城園淄青遺俗君應問何日函封上至尊送賈德修奉常使趙容臺清曉登征車千里漳河入望初本為景風持使節不同當日曳長裾韓陵山下還藏石紫陌宫中好購書帝子相逢應授簡賦成白雪寄雙魚寄懷雒陽翟座師清時何事拂衣廽咫尺門墻望眼開一自掄才稱國士遂令增價向金臺灌園戶外真羅雀結社花前共舉杯他日經過聞鯉對春風滿座尚徘徊張羽王言别得分字虔刀把贈倍殷勤暫合延津袂欲分休向風塵愁按劍且從杯酒細論文鶯花日下同為客韋孟風流已到君狗監若逢楊得意賦成蚤上漢廷聞送秦二使君之蜀一麾十載悵離群乍晤那堪落葉分重以神羊臨絶域幾呼緑蟻對斜曛草堂莫問悲秋賦劔閣應傳諭蜀文此日西南豺虎甚除苛萬里喜逢君寄題葵園沁園春色蓋傾初日涉因成趣有餘排闥青來山峍屼當軒碧擁樹扶踈忘機迹與鷗相狎衛足心仍藿共舒况是侯王同姓者何如藜杖夜讎書宜川謝劉伯明年兄賻吊晤其弟叔貞不忘髙義臭如蘭跋涉那知行路難座對西銘堪論道尊開北海且加餐知君有意摶鵬翮老我何妨戴鶡冠他日看花逰上苑佇逢春色滿長安其二從來意氣重金蘭投轄多情况二難乘興不因雪夜盡銜杯還併月華餐書成已貴雒陽紙賦就應彈貢禹冠伯仲總為廊廟器吾將垂釣老江干宜川謁劉太公墓有感逰燕杖屨趨承日過里低佪想像時我愧延陵將挂劍誰憐有道為題碑心灰杯㵼千行泪手澤腸廽一局棊極目松楸兩地隔不堪霜露繫吾思送辛甥省親兼示諸甥愛子趨庭共藁砧又逢佳節酒齊斟杯從河朔花爭燦腹坦琅琊月正臨敢謂家傳同鯉對蚤將文價重雞林老夫塵外消長晝爾輩窗前惜寸陰贈安肅鄭公興來曽泛剡溪航置驛何須羡鄭莊眼為金蘭青似染髮同海鶴白於霜看君合用安車召念我終將小草藏推轂未能羞獻納臨風先寄紫霞觴次汝修觀梅帝里梅花向日紅巡簷不與少陵同已分上苑枝頭月肯逐髙樓笛裡風醉後共憐西圃盛賦成誰似廣平工九重正想調羹手莫道商岩有傅公丙午上元西社觀燈登城樓次日橋上看龍燈同孔治甫暨薛龍阜胡含素梁君旭來陽伯馭仲家弟希孔得同字村社招邀少長同正逢皎月滿晴空欲從雉堞遊天外如暏鰲山在禁中不夜城連南北合長春花入綺羅叢橋成燦爛龍爭躍鼓鬛雙雙戲彩虹送李次溪制臺奉召入理京營仗鉞西征十二年歸朝丹詔降從天開疆勝略虗韓范繫頸威名紀簡編寵渥三朝沾鳯闕姓名萬里勒燕然猶龍即向滹沱渡還有函關紫氣連其二原是當朝矍鑠翁治兵今向帝城中新兼節制仍司馬舊領嫖姚盡總戎刁斗風清山海北旌旗日暖羽林東髙牙坐鎮烽煙息爭看麒麟苐一功其三十載旌麾獨鎮西論功不止魏公齊疆開千里生春色波及三秦淨鼓鼙延世緹騎星拱極荷天雨露鳯銜泥几几赤舄歸朝去無奈攀轅父老啼其四陛見勳臣至自西禁兵十萬許誰提中軍上佐兼南北一代元戎肅鼓鼙飛蓋首回二華逺登仙旌入五雲齊已知司馬屬人望應築長安拜相隄藩伯王道服張憲周枉過草廬老我歸來學種瓜干旄今到故人家剡溪不盡王猷興渭水何勞傳望槎久借甘棠臨緑墅相逢投轄對黃花欲為十日平原飲忽漫車塵望漸賖七夕同董惟益司寇蔡𢎞甫薛魯叔二太史集朱汝修保御修竹館分得身字烏鵲橋成玉露新雙星久雨阻通津河邉似作參商侣機上空憐寂寞春隨俗曝裩聊復爾穿針補衮是何人又聞思婦深閨語不及連枝嘆此身仲春陪祀先師太牢遣薦陋溪毛窺見宫墻數仭髙節歷中和方月魄樂成金玉儼雲璈獲麟千載傷吾道歌鳯當時入楚騷此日辟雍爭北面憂時何必目頻蒿過保定許貞甫侍御墓見其二子秋色蕭蕭向晚寒誰家吹笛傍征鞍子猷雪夜空乘興玄度風流也蓋棺野外月明驄馬第冡邉煙鎖釣魚灘相思十載平原飲此日松楸對二難送王將軍北征幾年坐鎮海波平忽聼驪歌送北征百隊熊羆攀祖帳一時笳吹動江城營前細桞那堪折匣底芙蓉若自鳴共説承家多節操佇看塞北請長纓贈張甥南臺舊業擅名流接武英賢欲奮修芹舍仰瞻墻數仭桂輪輝映月中秋即看綵筆追秦漢定有青萍射斗牛好共兒曹勤努力吾將簑笠狎群鷗送馬叔遇馬千里盧敬之周汝信張學曽李國柱王藎伯胡頥玄張聚五張孺充陳維則安曰儒諸孝亷偕計雪霽銜杯傍早梅誰能不羡百花魁上林已就相如賦駿骨將逢郭隗臺三䇿獻餘春宴渥五雲深處杏園開王褒即有賢臣頌鳯起丹山蟄起雷送文仲子應舉交遊三世似金蘭此日箕裘數二難衣鉢承家仍舊武鶺鴒比翼向長安逢時桃李花呈實奔月嫦娥桂遇丹上苑醉餘齊許國老夫不復夢邯鄲久陰芍藥不開望壠有感紅藥含芳慘不開况逢陰雨助人哀欲投綵筆詩全廢漫倚雕欄首重廽荒塜望為雲裏舍斑衣翻作夢中萊一尊倣佛承歡日又聼啼烏淚滿腮送來陽伯常修之薛允執髙大克石復朴偕計塔寺重新帶映虹題名曽報五人同秋深桂闕輪爭綵春暖桃花浪欲紅行見成龍為雲雨應歌鳴鳯集梧桐重令百二山河重肯負周王棫朴功溫恭毅集卷二十二
