body:
  text: 溫恭毅集巻十明溫純撰誌銘明户部郎中雒陽翟東岡先生暨元配安人孫氏繼配安人周氏合塟墓誌銘故户部郎中東岡翟先生圽二十有四載為萬厯庚子十二月一日周安人卒先是余過雒候安人兩嗣若孫方稱七袠之觴詎期斑筵甫歇而訃音踵至耶東岡先生宦履世系生卒詳劉憲使誌中元配孫安人婉淑有令儀生子任甫呱呱輙卒藁𦵏磁澗繼周安人周偃師聞家女也生而聰慧凝重解大義先生卜繼委禽焉歸從先生事二尊人時先生食貧安人脫簪珥以備滫瀡二尊人忘貧也撫任如已出任忘亡母先生亦忘亡孫也已又從先生宰藍田質明治事具餔矣昏輟具􅃵矣飾如故已又從先生為尚書郎督東庾國儲饒矣𣙜河稅闗政肅矣飾亦如故安人亦忘其夫為令為尚書郎也先生病安人時手一盂飲之不甞不潔不以進先生返初服尋卒安人督諸嗣喪𦵏如禮又襄所未竟先生有兩弟俱早死左右二娣諸鷇諸鷇翼矣安人力也安人齒雖齳然而墮動履規恢有上夀徴以二女相繼死淚侵尋承頰鬰結在脾形神耗矣遂不起當先生在莊皇帝時考績覃恩贈封兩安人有今稱而卒之前家無以為棺衾余為佐辦始成禮初先生以嘉靖甲子拔余于鄉余一再如藍田習先生所為宰藍田狀又習安人所為佐先生狀而今始慨世之如先生者百無一焉如安人者亦百無一焉乃仲子備所為狀亦云孫安人生正德壬午三月十八日卒嘉靖丙午十月九日享年十有周安人生嘉靖辛卯二月六日比卒年得夀十子男三孫出即任諸生取尤氏卒周出即備諸生取方氏儆諸生取吕氏女三適舉人何箎諸生陳思淑劉紹烈孫男十建中用中允中宏中守中美中慎中毅中敏中憲中女七曽孫男一許國女八備等卜以次年月日開先生之壙啟孫安人之櫬引周安人之柩合塟於城北瀍水之陰以狀因箎徵余銘余故諾任請為一言于先生墓上之石久之未有以踐也今且表先生大者安忍不銘安人然銘安人庶幾如銘先生云銘曰爰古國家興以婦吁嗟翟公大其户孫也伉儷如朝露周也錫寵福且夀二媛後先徳惟均宜爾子孫稱兟兟邙山之麓瀍水陰從一并栖璧同芬噫千秋萬􅑤式昌其門明奉直大夫莒州守來公暨配合塟墓誌銘嘉靖初闗中人以博士家言有聲者曰華州王祭酒允寧耀州喬按察景叔及吾邑故莒守來公云居亡何耀州偕計首觧又亡何公同華州偕計且以公首解㑹有以涇陽李汝承持者遂首涇陽而以經故寘公第六然闗中人亡不知公矣時嘉靖辛卯也其後華州耀州登苐論著益有聲公八上大宗伯不第第以莒守終焉惜哉公葢余邑中所稱碧澗先生也名賀字奉國碧澗其號嘉靖癸丑謁選拜山西太原通判通判駐代理兵約束訓練不遺餘力間預給月餉以新戰具都御史趙公才通判檄令參軍事㑹奏績當行又檄畱倚焉久之遷汾州知州未幾都御史閔公以知州故習代事奏調公代公至代日為民畫便利事行其釋亢生獄尤著亢生者巨富人也為人中且成獄矣以金嘗公公發其事然不以其故而重生獄而竟釋之又列守禦十二事上都御史多採行焉久之遷大同同知未幾以代故調莒莒下州也又盗藪公至懸賞格捕盗又立柵要衢防夜竊者莒人賴之蓋公為人和易溫坦不為城府所至殫力治辦以此有聲齊晉間而性孤意執事依法而行恥阿附參軍時都御史所將卒有盗人禾者先抵以法徐上狀焉在汾有以諸侯王及它顯貴人為城社者盡以法繩之都御史駐代議設傳檄馬選捕盗卒公力言其不可狀乃罷蔣序班者莒大猾也為囚闗說公不聽後以囚賂嘗公公怒寘之法人以此多公勞書薦書以十數然亦以此招忌為治鹽御史論罷先是御史行縣屬吏争迂道走謁公獨否會汾人有為監司者中公公遂免歸歸十餘年與其兄夀官公朝副使公聘日相聚甚讙已乃與家大夫光禄公為奕友副使公蓋與公同師事王康僖公又同偕計者先公歸又與夀官公先公卒公與家大夫奕或竟日里人欲借一言縣大夫為地道皆不應曰吾安敢以縣大夫權而為若徳久之里人欲借一言縣大夫為地道者則不復過兩家門矣公與夀官副使俱封御史時亷配贈孺人馮氏子封御史公以公為其兄長公時良後故公今父長公而母長公配孫長公父鏜鏜父肅肅父子春子春父景賢景賢父得甫國初有名都御史恭傳以為得甫弟云公生𢎞治十七年月日卒萬厯九年月日得夀七十有八配張氏側室有子者曰翟氏張氏翟氏俱先公卒子男一儼然娶王氏繼張氏女一許某孫男四復臨恒䝉張氏卒余為志翟氏卒公為志今啟而與公合焉葢用公所自卜兆云余惟今之偕計士率以試大宗伯故多沮于自効云公以髙第偕計於一第何有籍令當其時即第且大表竪然以久試不竟其才質徒令列郡稱良吏非始願也歸而以計然之策起家至巨富課其子若孫為文章有名蓋公施不竟於官而竟於家若此矣是為銘銘曰鹽車之駕嗟良驥也盤錯之不遇嗟利器也與家於官而可啖以利也寧官於家而以餘遺厥嗣也明處士馬公暨配碩人景氏墓誌銘先大理公有友曰處士馬公公有子曰東鄉薄守元先大理公兄事公東鄉君亦兄事余世相善也萬厯癸巳先大理公年八十四卒已公年八十八與其配碩人景氏相繼卒而景年七十五先淑人王卒亦七十四云東鄉君奔歸擗踊哭久之過余廬相向哭先大理公盡哀同以萬厯二十二年十二月十七日襄事余慟念先大理公與公意氣同偕老同而塟之日又同也先期東鄉君以狀乞銘義不得以在疚辭按狀公諱仲廸字徳騰别號鎮乾光禄馬先生理敘其族為漢伏波將軍援後有永昌者自扶風徙邑焦村又徙邑留坊里占籍焉其後有三三取茹氏生𤣥𤣥取安氏生貫貫取李氏生二子長次即公公豐軀多髯質實不苟為笑語初從故業力田已賈蜀務完物無飾價無敢居貴諸貿易至者知不知無不人人交懽公嘉靖乙卯闗輔間地震嵗饑公惻然以數百金易粟輸歸減其值以出且分給戚黨之無告者一時賴以活之者又無不人徳公長公卒遺幼孤守選公撫育成立為取室即分㸑猶顧而周之人不知其非公子也公即農賈然心慕儒故督東鄉君學博士家業其後東鄉君以鎮安諸生髙第應嵗薦授四川東鄉不改布素初東鄉君之赴蜀也且輦公偕公不許曰若奈何以我困東鄉父老為且田舎吾適也汝苐喣沫東鄉母若世丞簿然吾快之是若以東鄉父老奉我也而奈何以我困東鄉父老使從棧板間逆而西又返而東為東鄉君惟命力于官三年得東鄉父老心上官以為能且陟用而公溘焉逝矣碩人邑杜村義民髙之女也性貞慧甫笄歸公治内事拮据事舅姑以孝女以讓訓子若婦以勤處宗黨以恤睦舅姑大喜公曰吾賈蜀數千里外而父母不失養者吾婦以也刑家相夫公及碩人有之萬厯丙戌邑令以督學使許君檄賜公爵一級知公哉余以是嘆輓近世生則逸不知稼穡之艱難不聞啇賈之勞苦其不夀固宜若公及碩人指不可多屈矣公生正徳二年三月廿二日卒萬厯二十二年三月二十二日景生正徳十四年卒萬厯二十一年十一月初六日子男三長守達取權氏次即東鄉君守元取鎮安博士李君女繼王氏次守曽取王氏女一適秦廷琦孫男五邦足達出天麒天駿天麟元出邦餘曾出女一適秦師文一字余兒自知阡癸山丁向銘曰耄齡令終夀孰伉始農終賈脩業良希仁慕義惠厥鄉䘏孤糓似踵義方淑媛懃懃何躬蘉慶流奕葉源並長先公之丘清之陽南北斧如永相望明封文林郎昝公暨配合塟墓誌銘雍志載吾三原有昝生如心以學行聞余丱時猶及聞生扶其弟如思于鄉舉之後令務實學其後如思成嘉靖乙未進士為名御史而生之子成都君從御史學于馬谿田先生復博雅宜第不第以伯子濟南同知雲鶴貴封文林郎成都府推官配李封孺人而先是仲子雲鵬魁萬厯戊子鄉試女亦嫁為布政李君士達妻蓋其家以學行為耕以子姓貴顯為獲固如此君幼樸茂嘗痛父不禄早夜深思欲紹箕裘馬先生大器重之言於御史君曰咄此子類若父且大而宗哉補弟子員試輙前三試棘圍不偶賦卞璞以自况其辭悲壯若秋雨哀絃有時眺天齊陟峩嶺望仙人掌長指五華君作蘇門嘯曰登崑崙兮四望渺無垠兮蒼茫飡朝霞兮飲沆擥杜若兮紐芳衣青雲兮霓裳攬余轡兮髙翔適勾漏兮陵陽依彭咸兮頡頏聊逍遥兮浩蕩畢吾生兮徜徉于是書歸隠錄以明志築室西隅自號層樓處士日與二三友芒鞋藜杖漱石枕流每適意則信口吟詠人呼之飲不辭飲亦不至醉食貧二十載缾無儲粟或報絶糧笑不應為逐貧賦以自觧曰老去風煙聊自適閑來陶謝是吾師意訢訢如也督同知兄弟學甚厲已又誡同知于成都官舎懼有覆盆蓋忠信仁厚其天性又承家訓故散慮推心含垢藏瑕即遇三尺童子娓娓譚移日不去居常無疾聲厲色有犯不較獨日責子姪及鄉人不馴謹者不少貸晚喜施畦東陵𤓰以潤行道之渴者築墩砌橋不問寒暑人至今德之二弟癃殘撫其子如子所著有古村集昝氏春秋元配張贈孺人聰慧柔婉通周易大意蚤逝繼李氏封孺人初歸值家落拮据茹苦佐君奉母友弟不遺餘力人謂鹿輿同挽鮑袁著布衣操作梁孟似而後昌阜過之信然按狀昝氏在宋髙時世朝登鄉進士復鄧州亦越萬夀登理宗朝進士尚德王女為成都安撫使榮咸淳間貢士世居洪洞西鄉元初避亂遷三原樓底榮生雄飛雄飛尚義修樓闗王廟生温甫温甫生世福世福生興宗興宗生河曲幕恭恭生復禮復智復性復性號浮岩為邑文學雅量雍雍人化之有陳太丘風生如心號峩東及御史君君諱約字孟博號古村生正徳某年某月日卒萬厯某年月日壽七十有九張生嘉靖元年月日卒某年月日年二十有八李生嘉靖某年月日卒萬厯某年月日夀六十有六子男五一即雲鶴取楊氏贈孺人繼謝氏李氏封孺人一即雲鵬取雒氏繼崔氏一雲鸝取王氏繼劉氏楊氏一雲鴈取張氏卒一雲鶚諸生取張氏女三孫三女五曽孫女一雲鶴等將𦵏請余銘余惟土不積胡沃不沃胡獲以今觀于君家信世之欲啟後昆而大門閥固必有祖德世範以為沃土而後乃可大獲與是宜志而銘之銘曰疇以心為甫田疇遺其餘以俟後之象賢比翼翩翩爪瓞綿綿綸綍伊始永賁此阡明孝亷王季子暨配合𦵏墓誌銘嘉靖甲子陜西秋試撤闈有與余同袍共宴曲江而丰骨亭亭壁立僅弱冠者鄠縣王季子子价也余心折謂後大顯為吾榜白眉者必季子既余通籍再晤季子於省試時猶日望之後兩試不來矣問之則以困于試而病尋竟卒則萬厯甲辰八月丁未也乙已余返初服子諸生士苴杖手狀伏余前乞銘余重有傷焉其忍辭按狀季子諱維藩字子价别號价菴髙祖彦昭湖廣荆州知事有政聲彦昭生宏宏生崇文以徳隠不就耆賔之請崇文生語嵗貢亦隠督學薊門程君聞而義之以髙尚扁其門給儒官檄儒官君配魏氏生三子伯惟中萬泉令仲惟康戊午舉人次即季子季子神清姿偉脫襁即屬對作驚人語香河令張君見而避席禮之曰此千里駒也既長受書讀古文辭一過撤閫奥為博士家言括要㫖千言立就豐蔚傀偉一時學者皆自謂不及十七補博士弟子員時儒官君以五經設塾里中授仲子戴禮萬泉君暨季子俱葩經季子家貧苦無書書從友來即竟讀以還日或有徴逐歸而丙夜吾咿矣又善晉人書參政河南陳君為其子登求友首致季子所與交皆知名士比試每冠其儕而登以才善忌欲藩使更第藩使目攝之竟不更蓋季子名益籍甚藩臬間而諸知名士如小巫之見大巫咸咋指退矣二十三乃與余同舉鄉試云乙丑及隆慶戊辰萬厯丁丑皆不第時與伯仲久異産而家故貧又儒官君夫婦老矣乃治居奉二親安焉癸未下第儒官君棄養丙戌母魏亦棄養季子躃踊祭塟俱從伯仲如禮恒邑邑以不獲叨公家禄為一日甘毳至得從子舎省晨昏侍湯藥就養又未嘗不私心慰快也初儒官君弃養事母魏與伯仲以次上食及期則戒家人潔庭除安牀笫備供御物又躬舁之婦及孫男女侯入内則侍食飲接言笑得母魏喜然後己巳誡家人毋譁毋驚如是為常儒官君庭訓義方而季子端重嚴潔肖母魏故雖昕夕承歡一惰容不敢見也一嫚語不敢出也先是母魏病以一函遺其婦黄曰兹簪珥為若夫製其藏諸黄不敢違無何病間㑹黄以歸寧去而又道逺未即歸以獻也乃母魏語次及之季子即大怒曰若果乘亂命必出若既簡之笥封識如故而黄故孝謹又母魏力以己意觧乃己比後喪𦵏嫁取間嵗有作皆以拮据力成之而親故孤寒待火夥有以至膚靡侵綺口靡咽甘亡計已暇則開舘延雋課秇質難併課子士為名諸生片語啟之豁如也乙未戊戌學益茂皆可以第即季子亦自謂必第乃竟不第嗚呼命矣夫同舎生或從􅁷入官曰入官所以行道也其次為親親不待吾吾又老竟不第一見天子以獻五斗粟何加焉竟歸柴門脩恬為子弟講孝弟本源之道間飲雒社已復謝絶自是即縣大夫見亦罕矣居恒不輕然諾不比暱匪人苟非其欲雖千金之重三公之貴不能奪有奸以私輙面斥子弟及鄉人有不䫫見季子必匿走然以此得憚名至求所為光曄之行悃欵之懐月旦季子指不可再屈也參議太原延君之令鄠也稍持岸季子匿不復出參議君為改禮定莫逆交其見信如此又能須人之急見孤􅄔為人齮齕力為之翼以故於友戚多世好嘗曰吾惡夫世之以生死貴賤二其心者歸徳别駕魏君奉璋中表弟也雋而貧乃擕之共燈火三年舉於鄉至今官結婚姻云甥女張氏貧落左右之視諸女且二十年萬泉君在萬全以書招季子即手治裝往比其卒撫諸孤緩急之際不遺力又嘗欲搆祠堂拓塋址設義儲以贍族里竟以貧不副意庚子四月偶中風癎惛惛無所省第張目前指曰謝武安王母正氣感通有相依倚者耶乃藥之愈尋愈尋作猶能强飲食言動無所亂謂可以起矣乃忽不起嗚呼傷哉距生嘉靖壬寅四月甲申夀六十三病革時嘗譫語有曰日讀晏嬰傳馬遷欲執鞭春秋一霸佐事業且掀然我北面洙泗當如孟子傳披心對白日拂手摩青天此其志豈卑卑哉而今已矣嗚呼傷哉世恒言才難然才矣或阨于試如季子豈少乎以季子丰骨蚤與計偕志欲為孟不為晏又不欲以生死貴賤二其心藉令通籍寧無以自見顧終其身不離孝亷以孝友為政波但及於親故天胡畀之而胡靳之耶余故重有傷焉元配屈氏邑處士存一女育于叔存奠貞順明達善事舅姑而以其餘力織紉佐燈火季子之底於成多其力也生嘉靖乙已五月戊辰卒萬厯辛巳十一月丙戌得年三十七繼配黄氏長安縣學生梔女柔惠有大禮諳文義婦道母儀則於姻䣊至今人猶有思之而泣道者不幸卒于萬厯丁亥九月壬寅距生嘉靖乙丑九月庚子得年二十三繼配耿氏邑處士孟仁女貞慧慈敏子男四長即士屈出取長安薛庚應女次璣早卒次珙黄出取交城學諭陳孝思女次瑢耿出聘别駕魏君女女三一適運同趙君方立子舉人崡以詩文氣節著一早卒一字沂州守王君許子某孫男二永圖永嘉俱士出永圖聘杭州同知張紹芳子被女女一亦士出字邑學生屈必伸子某𦵏以今年十一月庚寅啟屈氏黄氏壙以季子合焉墓在六老庵祖塋之次銘曰彼玉而璞有桑弗縠繼世貢國墻東白屋亦既為政亦既式糓有嗣負薪曄曄如玉天且定只以視我銘于終南之曲段伯子暨配温氏壙誌銘段伯子曰可成字闕故涉縣令段君子溫氏曰仲姬則余女也涉縣君二子伯子第一余五女仲姬第二伯子生嘉靖壬戌四月二十六日仲姬生嘉靖甲子九月十日年相若余父大理公母太淑人種愛仲姬為擇配得伯子字焉則余官夀光時也既余官太常伯子自涉逆仲姬于京師㑹余方請告因以伯子仲姬歸過邯鄲屬余内子李淑人往送于涉甚懽既歸久之涉縣君亦歸歸無何為萬厯壬午正月十四日伯子卒其年十月十二日仲姬繼之已仲姬所乳女亦不育余與涉縣君數相向泣其後涉縣君亦卒涉縣君故瘁于涉家内外一切倚辦伯子伯子母王孺人持家嚴而仲姬躬烹飪承顔以事無少忤時伯子弟仲子諸生可大甫嵗故伯子仲姬卒而涉縣君日吁噫益瘁而卒當是時余㑹有李淑人之喪已又有伯姬叔姬之喪其後又有大理公太淑人之喪葢十七年所而余之泣無已有時之伯子家存王孺人與仲子相向含泣以語時王孺人念仲姬甚於前曰安得吾温氏婦復為吾婦初伯子讀涉縣君書輙了了涉縣君善書伯子亦喜書時時臨摹鍾王帖不去手雖疾革猶然然有心計多勞故因以耗氣傷神仲姬生之年冬即出痘痘又危不食苐以箸㸃水入口以延余守久之謂即死以南宫試廹為死别泣而行已有言不死者誑我然果非誑乃生十有九年而竟死矣伯子則二十有一耳死之日余俱在其所數延醫投劑俱不效既伯子屬纊目不瞑余與涉縣君約異日以仲子子後伯子乃瞑伯子王孺人出仲姬李淑人出伯子世系詳涉縣君志中壙在涉縣君墓之昭銘曰初如蘭茁繼如玉屑又如樸樕方長而折亦服勤只胡不哽咽生也共室死也同穴斯其為萬年之居以需而後也罔缺明中憲大夫四川按察司副使静菴孟君墓誌銘君諱學易字與時别號静菴靈臺之郡寨人也父紹先貢士以君貴贈戶部主事母安氏封太安人君初為府學生試輙冠儕偶督學副使金陵謝君署督學參政臨泃遲君竒之嘉靖戊午舉陜西鄉試第七乙丑進士除四川成都府推官丁戶部君憂庚午起復補山西潞安府辛未陞戶部貴州司主事尋陞署郎中丁太安人憂丁丑起補廣東司戊寅實授郎中庚辰陞河南開封府知府陞四川按察司副使云君貌樸口呐不得于心則赤面蹙額頓足咄咄焉此論可否成敗雖老于世故者不能過也成都多平反以楚蜀因勦成撫議擒黄中功人服其識潞安無何一如成都戶部管北新大軍二倉已監崇文門稅課已監河西務鈔闗已理上谷糧儲稽覈調劑不遺力當今上大婚時力持采珠之議曰逺采不如近易已竟如君言省費無􅄸大司農舉以訓屬或著為式開封當省㑹費劇民困為裁冗均田禱雨雨應捕蝗蝗息賑救饑疫饑疫多活擒儀封白蓮大盗釋株連千人不問又建奎文閣減祥符鄢陵扶溝驛役為士民德人至以故開封包孝肅歐文忠相比况為孝肅嚴文忠寛君嚴而濟以寛云四川治兵建昌建昌夷酋鴛鷔瞿紹良與部酋讐殺越嶲嶺夷亦亂君重用兵為好生歌撫定時㑹采木之役役踆計剿而監蜀都御史以隙刺君調瀘州遂歸家居手一編吾吚不營第産如寒士以亷名初歸自成都却劉生金于途崇文羨金悉入公帑開封征輸免重較即畀轉部者輸者率持羡金歸謡曰昔何不足今何贏天下亷者有孟公乃為人刺以不難於開封而難於建昌不難以因剿成撫論楚蜀功而難以先撫後剿定二三夷耶乃為人刺以歸而卒矣君生嘉靖十三年六月十四日卒萬厯二十二年十一月十九日享年六十有一配劉氏贈宜人卒繼室石氏封宜人子一養浩府學生側室李出取都御史趙公諱時春孫女女一劉出適鎮國中尉融􅀢孫男一昌祚女一幼以萬厯二十三年十一月十六日塟君崆峒左王相山之麓養浩以君治命持舉人王子沼狀乞余銘余故與君同舉進士又同為故閣學文敏余先生識㧞知君母如余余不獲直君于朝為君銘銘曰彼玉而璞彼蘖斯茹式于署歌于府有不朽者亦浮雲吾胡為乎猶而覼縷明封膳部員外郎平橋王公墓誌銘今華州王氏有三進士曰參政庭詩編修庭譔進士庭諭皆以弱冠舉皆以膳部公教故膳部公者三進士父也以參政令内黄封内黄令又以參政郎膳部封膳部員外郎故稱膳部公膳部公之教三進士也葢以其家故司成公為朂云司成者公族叔父即世所稱槐野先生也槐野先生故與公同為郡諸生公髙其文師事十年所不第槐野先生第矣公益力學攻文為督學使鳳泉王公文谷孔公器重亦不第乃課參政學誡曰吾之不為司成公也吾甚負吾志而力饒為之得見司成公於而願畢矣參政唯唯日夜學學成舉嘉靖乙丑又課編修進士學誡之如誡參政編修進士又唯唯日夜學學成同舉萬厯庚辰而編脩䇿當上指㧞置一甲第三所謂三進士以弱冠舉者而參政舉時公業以貢為吏部選人遂授教諭䘖歸不仕矣公既歸間為具從諸故舊遨遊華渭間名園連日夜不少倦即諸故舊脩社中髙㑹不得公輙不成歡如此者三十年乃卒時萬歴壬午十一月二日也先是參政以遷官歸編修以奉使歸進士以請告歸葢皆以念公故而參政固請就子舎不得乃單車往以配東宜人奉養公而公屬纊時則編修進士侍焉參政聞訃號泣奔歸與編脩進士以書與劉御史士忠狀徴余銘余故與參政同舉進士相友善又往來華下數侍公問公行履甚習葢公剛直明于忠孝大義與人謀必底於成乃已事大父母三十年如一日斂𦵏不以責諸父曰吾代吾父而子累封累誡參政力官曰而代而父而臣故塾師馮生鉞且貢有敗之者公為居間竟貢鉞公且貢其次薛生邦竒老而貧公讓邦竒先督學尚公竒而禮之又為席生勤講擇配請郡大夫助𦵏族叔善教東舉人承芳諸雅行不一而狀備矣莊皇帝與今上褒公制謂孝義之風義方之訓宜有令子信哉蓋公封内黄令則莊皇帝制封員外郎則今上制也世徒曰槐野先生以身顯公以子顯淺乎覩矣按狀公家世昌平人曰伯牙者河南按察司副使左遷華州稅課局大使因家焉大使生得得生徽真定令令生恕東平判判生義官朝臣配孫氏生善述配李氏以正徳庚午月日生公比卒年得夀七十三公名吉兆號平橋配楊氏封宜人生子男四孫男六女三義官公與孫氏即公大父母公父母早逝諸父有孺子公而齮齕者以大母孫力免而公之師馮生鉞也蓋自詣鉞所受書鉞弗拒比大母孫脫簪珥行脩鉞拒人至今兩賢之云𦵏得日為卒之明年十二月十八日其銘曰疇玉而璞疇璞而嗣則玉璞兮荆光千仞上燭玉兮連城之價相屬我銘山曲將萬年曰實録明刑科都給事中郭莊張公墓誌銘嘉靖時涇陽張都諌與世宗皇帝争可否以直聞往不佞侍禁中得都諫封事私以為都諫重乃都諌于嘉靖己酉九月八日卒矣卒二十三年為隆慶壬申公孤四維等舉塟事乃以狀謁不佞銘不佞故重公為依封事及狀筆其較著者按張氏國初占籍名和卿和卿生思忠思忠生琰琰生信信生鸚鸚生清泉公璲璲配王氏生公以公貴贈清泉公吏科左給事中封王太孺人公諱汝棟字伯隆號郭莊美姿和顔至當事又侃侃童時有逺志初受學塾師即侍問清泉公曰兒讀書何為清泉公黙竒之已令從諸生韓珮之學易學力至成怔疾嘉靖甲午與計偕戊戌舉進士授行人壬寅選為南京兵科給事中丙午起復改授吏科厯陞刑科吏科左右給事中刑科都給事中始公為行人嘗使周府謝餽遺不受又使秦晉㑹敵犯晉大毒荼公即奮筆上書言禦敵事逮拜給事命即深念曰吾生平所慕者陸宣公耳今幸為言官可自負耶乃毅然以正國是除權奸為己任己即劾罷尚書一人己上精延訪預㑹計一統馭三事已又上慎薦舉專器使嚴出巡抑貪汙四事已又劾罷都御史卿二人上之修大閣𤣥殿也公以刑科督工程乃劾奏司工内竪納賄狀置之法工成受賜獨優㑹恤刑公多平反又䝉上賜已又上抑詰奏嚴法令裁濫奏三事蓋公前後所䟽奏無慮數千言皆闗切時政上多採用時朝省倚重公而公卒矣先是公在留都與給事王樗菴􅂱相友善乃兩公言事效陸宣公以是縉紳推重必以兩公為稱首云公性孝初清泉公患疽疾王太孺人病目公籲天竟俱得異效清泉公卒白下公扶襯歸哀毁至動途人𦵏祭如禮當覃恩時痛清泉公不及見率兒若孫極意為王太孺人膝下之驩又公義甚髙生平所讓諸父産所施棺所修葺橋路所周給親故貧乏者不可枚舉然在公猶其細者公疾且革㑹𦵏莊敬皇太子猶扶病出送喪曰即一日不死猶臣子安可以病廢禮已首四維等前曰我命固若此矣所不瞑目者君恩未報老母在堂耳是在若曹言訖卒時朝士大夫臨祭者亡不傷悼山東鮑按察使象賢至罷宴泣數行下嗚呼此亦可以觀公矣向若天假以年得竟所欲為豈謝陸宣公耶惜乎甫强仕而遽不起也公生正徳庚午七月十三日比卒年僅四十嵗配陳氏封孺人生三男子長即四維廩生取王氏知縣輅女次四紀生員娶羅氏都御史廷繡女次四約生員娶仝氏彦吉女三女子一適趙參政孫生員光先一適生員王麟定亦輅子一適吕都給事中男生員淵孫男六光裕娶宋氏光啟娶李氏光被娶王氏光祚聘朱氏光祐光祜幼孫女六幼曾孫男二夢祥夢弼曾孫女一俱幼銘曰有棟中摧有珠俄隕國無昌言於都諫乎孰忍蓁蓁厥後以引以繩是曰公壽明奉直大夫山東青州府同知蟠山李君墓誌銘李生若桂至自涇訝其縞素則手其父青州君道充狀來也予涕兩頤已命席若桂起乞銘予益涕滛滛曰予今銘君耶往予偕君為如皋孫文恭先生㧞肄正學書院中實比舎予又與君同齒君貌木口呐呐不吐詞然舉趾循循毫不失尺度又以嘉靖甲子同與計偕君雖終窘禮官然以良牧著無愧古循良其後以病致仕歸予重有蒼生之恨今忍銘君隧耶聊括其槩俟史氏采焉君世涇州名發道充其字也曾大父明大父登仕郎釗父奉直君維馨予故銘其墓者也奉直君子二長即君次即墨令奎蓋君躬自課之使成立以奉其母懽者君初授太原博士謝諸生贄時為佳餉餉試者督學使聘主河汾書院諸生膺服焉擢判成都檄攝富順六旬以憂去人徳其亷能伐碑勒去思而黄臬副詩其隂有戴白垂髫擁去旌攀轅無計縂含情赤子何縁翻喜怒蒼天自是有虧盈之句起補武昌武昌枕江漢千艘萃止君督船料稅不染而稅倍於舊承委驗皇木以却例金與欽賞白金江善崩嵗嚙千家則以石堤其岸衺若干里瀕江民不復苦嚙肖像祀焉蔡督學檄勞謂百煉金千尋幹為知君云監司賢之檄攝江夏蒲圻皆如其判晉守道道有監稅糖稅故皆歸守君則盡以資供億小水靖西二營困於長幾變㑹君至自永有擐甲而譟者君立以法語抑之且白諸兵使者遂定監楚中丞邵公剡薦謂一言遏亂春踏田出倉儲以貸耒耜家而秋入之民欲倍輸弗内也倉糓故僅數百儋君以贖鍰入糓迄四期去滿三千焉道卑濕而僻民病無藥也君為局施藥其勤恤類此道茂叔先生里君大葺其祠渠渠枚枚賙其裔渥如置祭田俾為先生籩食供而又俸梓濓溪誌此其風亷立力亦殫矣葺學宫如周祠又贍衿裾之乏者大約敦實政其贗飾以賈時驩弗願也在道時蓋上論勞貴奉直君如其官母李稱宜人云以最晉貳青州矣而君已倦遊力謝命道民祠之如富順追慕庚迫矣既里棲㑹東宫之覃進階奉政大夫終始之節炳如也然亦可以風矣予讀史見龔黄卓魯為史氏談之津津即行也在清濁間為君所不爾亦名到于今稱之而黄次公躋九卿功名損于治郡亦不以故役潁川之聲藉令君繇青州而上之功名寧詎損若次公顧一解組沒齒不問蓋今之待孝亷為吏者類如此而漢治不可復追矣然所至遺思老而増秩亦可為為吏者師予故曰可以風矣獨予知君無能推轂君使大顯是予之罪而敢以例觧君取路氏贈宜人繼王氏楊氏子男三長即若桂取某氏王出次若楠次若楩楊出女三長適諸生髙錦標次聘史某次幼孫男一炳女一聘劉君蓋六十六嵗銘曰生嘉靖己亥四月四日卒萬厯甲辰十二月晦日厥藏天池葱葱鬱鬱負丙抱壬嗣氏其隲行道顧之曰此古循良李青州蟠山子之室何以永之清峩間野逸故人之筆明河南道監察御史郭君墓誌銘御史郭君秦之徽人也名莊字子莊以春秋舉嘉靖辛酉鄉試第三隆慶戊辰舉進士改翰林院庶吉士庚午授山東道監察御史巡西城辛未按吴萬厯癸酉按蜀丙子巡京營丁丑㑹大察管河南道事侍經筵監㑹試督吴中學較己卯以勞致衂血歸歸二年壬午三月十七日卒年五十三初君巡西城西城人憚之入吴吴豪右避匿有以私干者君不聽一切以惠文法治之日吾安敢以私廢三尺法而為人德入蜀㑹多盗君以計檄縣道曰安可當吾在事而使盗熾為民患盗竟息蜀府以事請閣久之君為請得允王以千金為夀君卻之曰吾豈以金故而為王役王益敬重君蜀故以贖鍰佐秦塞然無定額君贈至萬曰吾以鍰資稇載而歸者孰與衣食征戍又上書請祀禹劾罷一總兵一兵備副使又畫議肅官箴講水利度敵情清鹽禁慎侵漁革奸弊詳觀教錄中河南道主計天下吏君去留當人人心又郤諸計吏餽遺監㑹試獲懷挾士置之法簾内外肅然吴士多貴人子弟又多為書闗說君再入吴奉功令惟謹誡毋入闗說者書又為令二一令書肆焚所市纎巧經義一令諸生為經義一歸雅厚時經義以矯浮故争事纎巧而士氣亦因之君重有慨焉故為令如此蓋君為人伉直見世俗喔咿骪骳狀心惡之與人談國家大計侃侃罄底裏間義形於色初為庶吉士館師内江趙公厯城殷公以真秦人目君比為御史以面奏為莊皇帝注目以督學考最為今上褒嘉褒嘉語大都謂君督學執法為真御史下執秩籍記需顯庸蓋為天子執法在御史尤在督學御史君以御史執法推擇督學執法為上褒嘉其性使然余故習君于朝今君嗣師曾狀亦云而狀又稱君始自吴歸與大父僉憲君卒㑹繼自吴歸與父封御史君卒㑹兩塟祭如禮為君孝篤事季父立石舅劉繼與周人之室助人之喪直人之寃為君厚讀書精極子史二氏為文宗眉山與詩存若干巻為君學而苐以御史終可念也君家世華亭人宋紹興間有執中者官樞宻使以言事切直忤蔡京籍為元祐黨人斥居徽之同谷元末有帖木生典術守福守福生典術安安生典術政政生贈户部員外郎璣璣生四川按察僉事從道即僉憲君僉憲君生封御史繼桓為君父配贈孺人劉氏以嘉靖庚寅月日生君封贈皆以君貴君配石氏繼任氏子男五女三孫男四銘曰人而無忝于秦御史而名之曰真庶幾哉元祐黨之後人明段涉君墓誌銘隆萬間執政有為苛政者吏亦争以苛應之獨知涉縣段君用寛治曰虐民以媚人吾不忍也已遷唐府審理不赴遂觧綬歸故稱涉君云涉君諱愛民字子仁别號恕菴生而聰穎年舞勺從世父經如遼陽就師受毛詩歸同故大司馬魏公學曾師事故丹陵令康君渭以文行相切磨久之嘉靖癸卯為督學使宜陽王公識㧞為涇陽學髙弟子已又同大司馬舉丙午鄉試時大司馬以方嚴君以和欵為邑里重顧省試屢不第曰吾父厯艱辛教我今老矣吾與白首佔畢寧及吾父存奉甘毳耳遂以隆慶戊辰謁選除城武知縣階承事即㑹聞繼母張訃歸服闋起除郾城甫任疾作奏改休寧學教諭故事有疾令無改教者令以疾改教自君始無何復陞彭縣知縣過家㑹次公㣲恙君在子舎難其行以次公嚴命不得已留其配王供菽水以二蒼頭之彭無何有豈弟聲忽又聞次公訃乃仰而號曰天天吾為吾父而官乃今為官而不及含殮吾父烏用吾人子為天天遂奔歸歸而慟憊曲盡情禮甫闋起除涉縣涉民悍吏玩君至憂形于色以慈和喣沫時剔宿蠧戒吏胥毋驚吾民雞犬為民徳㑹有指謫君遷者故遷審理歸且營莬裘㑹長男可成與其婦相繼折遂日蹙蹙呻吟久之氣竭以萬厯丙戌二月十八日卒夀僅六十有四云君為人孝友又德厚大母朱年踰耋歌舞承歡惟命次公善飯繼母焦善怒曲為色養如孺子嬉笑其前厚撫其弟德民化民教令為諸生累舉親族喪𦵏與鄉人處雖㣲賤不異顯貴間投壺弈棋必盡興里中益以此多君初君學博士言俊爽旁及古文詩律人謂君立第第于鄉不第于省官十年餘不離令以免免又不壽總之以疾與喪故君聞訃呼天不置有以也人其如之何按狀君先世萬全人國初有伯政者占籍涇陽東里後有文賔文賔生祐祐生本本生惟玘以子經官留守經厯封如其官生五男子長即經為君所從如遼陽者次綸即君父次公配王氏以嘉靖癸未九月一日生君君六嵗王氏卒以繼母王氏撫乃成亦配王氏贈永寧知縣鵬漢女生子男二長即可成儒士取余女次可大諸生取劉氏女二一適監主韓子順一適評事雒于仁孫二鳳章金章孫女一可大出金章為可成嗣以丙申十月卄一日歸塟祖塋之坤而𦵏之前數月大司馬亦卒君子於是乎重有慨銘曰孔酌猛寛漢隆長者胡寛於邑中道時舎止或尼之人與天也又胡不愸年亦不假亦既孝友亦既瀟灑是亦為政安論朝野土沃殖豐有嗣文雅亦學為裘步趨良冶我女君婦從一地下臨文閣筆有淚盈把更感隣笛愬風並寫東望君冡西望司馬明夀官胡公墓誌銘隆慶三年己巳七月十九日夀山胡公卒先是戊辰公伯子太學君桂夢公謂吾仲為陰府理吾少選亦從仲之官去太學君驚覺以其言言余余未之信也明年公果以疾不起余愕然異焉公仲先公三年卒諱汝安故長沙二千石也公故謹事神捐貲修葺諸廟宇諸廟宇多公扁又嘗刋施真武垂訓倡衆修清谷橋延僧為湯施曹池凹側又見人擇塋地嘆曰塋地善孰與心地善㑹屠牛跪作咆哮聲輙易為耕作用比卒竟如夢異矣余與太學君善故以太學君狀銘公公諱汝寛字仁甫號夀山美丰儀居常豪放不覊言笑怡怡如也初在塾即能屬對已坐當户罷學就賈嘗典市交無論里中即晉人多倚公卒之亡不得利以去里俗出粟收息䫫與母捋公減息之半以是逺近人困者又多仰給公又公間寛期約即有以田蓄質者固辭不取然當出粟償者來不償者亦來竟人人如其願久之竟以此大其家故里中稱數以濟人饒積著者必曰胡某胡某云公既佐其仲學官長沙顯耀矣然折節遇鄉人鄉人有争數得公居間而觧以公平直能不枉曲直也公性又孝友初母李夫人逝也公才垂髫即哀毁不食已極意事大理公為膝下驩比卒塟祭如禮事繼母袁孔如事大理公云始公遊姑蘇夢宴賔侍其母李感泣而寤人以是卜公孝思時有為夢萱口號以咏者公兄弟四分製衣飾必先兄若弟夀官公及長沙公疾公為製藥視食不遺餘力既又撫其孤其後兩家門户猶倚太學君蓋公教云初公兄弟難子公三赴太和山代祈已各舉子比析著以太學君諸子中獨長争厚太學君産公曰桂小宗且諸子俱幼獨安忍厚其長者竟不從議光禄馬先生以闗西一夫稱公又以孝敬慈愛扁公居蓋重公云公即隠市賈然獨喜儒故以太學君為儒即又自督太學君學又暇則閱古圖書吟咏詩章對客談古今事類儒者當嵗時諸兄弟親故相與稱觴盡驩道故舊有白樂天風藩使髙其行榮以冠帶時賀客闐門乃未幾而公不起矣公疾革時太學君以方藥進公輙麾之曰而忘而夢中語也今且其時矣即醫之何為己第首太學兄弟前付以所彚持身保家書乃卒卒十四年太學君卒太學君余别有銘公上世故虹縣人勝國時有乾以武功為元功臣泰定間有大卿以貢為長樂丞值元兵變避地三原丞生天祥天祥生元亨元亨生邑庠生信信生鄉耆善善生夀官鰲鰲生彦昭即大理公以長沙公貴封評事配李贈孺人繼袁封孺人又繼孔李生四男子長汝寧亦夀官公次即長沙公次公次汝宏公生正德五年十二月二十四日比卒得夀六十公配王氏邑大姓經女生二男子長太學君取袁氏周府典膳汝述女側王氏周氏次林太醫院醫士取雒氏户部侍郎雒公子保徳吏目復亨女一女子適邑貢士孔有仁俱王出桂生一男子崇熤周出林生三男子崇煇取趙氏生員應芳女崇烺取袁氏吏目績女崇炳幼三女子一許騁王錫印一許聘來臨崇煇生二女子俱幼塟得日為萬厯十一年五月九日墓離山坎向銘曰為子而歡大理於家為弟而寛二千石於長沙信二千是從即不藥奚嗟胡伯子合塟墓誌銘太學胡伯子之為邑諸生也余與共筆硯久之余入官又久之繇諸生為太學生太學生亡何卒時萬厯十一年閏二月十四日也伯子名桂字子芳别號肖山初受易華亭教諭賈君已卒業長沙太守胡君官舎太守君伯子仲父也子視伯子伯子亦父視太守君故伯子從太守君如長沙云嘉靖戊申督學使顧君行縣入伯子諸生籍其後六應大比不第㑹太守君卒已又㑹其父夀官君卒兩家門户率以伯子為主辦時伯子亦厭薄博士家言曰我命業若此黄次公何如人哉猶然以貲進吾與敝精神呻佔寧為次公耳於是入貲赴太學在太學所友盡天下士然因以習聞國家大計居常抵掌譚說余率有味乎其言之也又心計故敏慧即主辦兩家門户人亡不服其能兩家臧獲與所任人賈者又亡不憚伯子以伯子視太守君家如家又旁伺一切如燭照人不能欺也伯子既厭薄博士家言不為為古篆文甚工間搜集邑故實里中有搆得伯子居間輙觧與人交無少長折節下之人以是多伯子謂伯子竟官竟不老一書生間乃卒卒之前一月始得子崇熤又前數年營夀官君𦵏兆卜得善地壙以石槨以栢誌銘屬余備矣且卒猶為其弟醫士林口夀官君𦵏事與事母王撫子崇熤不置伯子疾蓋以王疾侍卧起故即卒奚憾焉配袁氏故秦府典膳汝述女敏慧善為具奉夀官君與王數乳不育為伯子置媵王王不乳又為置周周乃乳崇熤賢矣先是伯子在都下以數乳不育問日者日者曰即乳即育又以禄問日者不應今果然豈非命哉夫以伯子才應大比不第不第矣而以貲上太學使假以年且拜官且以所譚說國家大計自見詎謝黄次公下第僅僅主辦兩家門户居間里中以古篆文名也命使然耳夀官君𦵏矣有崇熤謂伯子在可也袁孺人信賢然非伯子刑于能一姬不乳復一姬進哉伯子生嘉靖十三年閏二月卄八日比卒年得夀五十袁孺人生嘉靖十年四月九日卒萬厯十年正月十九日得夀五十有二子一即崇熤孫璉舉人瑋珽琯𦵏與夀官君同日銘曰孰外則璞孰中則玉玉而終以璞人乎天也璞而嗣則玉天乎人也明梁母周孺人墓誌銘嘉靖丙午虜南牧有司城縣北郭有任一隅躬畚鍤不俟期報成為衆倡而受巡撫中丞謝公請爵一級旌義其門者梁次君也有佐次君督饋餉令工作驩集者次君配周孺人也其後孺人有子選檟配永興王縣主選樟為太學生選桂從余學為郡諸生有名而檟子文燭文熙亦為縣諸生人率謂梁次君以城工得天云萬厯十三年十月二十七日孺人卒選桂自為狀走武林請余志其墓余知孺人督餉事不辭狀曰先孺人父諱哲嘉靖改元四月十一日生先孺人先孺人長則習女紅精烹飪莊嚴與他女異公先習知之㑹周氏母卒遂委禽焉葢先公初娶袁氏母袁卒娶周氏母周氏母即先孺人姊也先孺人歸先公即善事先大父母待妯娌無間言壼以内肅如故先君得専營什一不問家人事兄選楠選枕袁氏母出選槢周氏母出視與桂均兄選楠故維揚遺處子乃從先君䟦涉數千里以歸為厚奩嫁貟惟聰兄選檟配縣主有欲行返拜禮者先孺人愠曰媍拜舅姑禮也我但習家人禮已縣主竟以媍禮見族叔木隆卜兆桂地有陰為要利之說者先孺人曰要利非義矧吾夫族遂割地予之併其直不受木隆感徳謀以名人文誦義曰不受利受名名與利等耳亦謝寢嵗壬午疾革桂兄弟製新衣進乃目桂兄弟前而訓之曰吾居常起難之夜而寢鐘之天辛苦萬狀罔暴殄寸帛尺布今疾矣安用此為竟弗御惟吾師不惜齒牙令後有聞而狀述督饋餉尤詳吁巴媍清至動天子築懐清臺又得太史為傳以傳不朽豈重利哉借一媍以羞丈夫耳孺人甘辛苦罔暴殄寸帛尺布及激於義不難佐有司急且不令無處者以一錢得我至以禮約王孫前後無二子心即丈夫何加焉余始知梁次君之得天不獨以城工故太史公不可作矣余安得不為誌而銘之次君名一倉别號義莊事行詳王少宰志中孺人享年六十有四生三男子即選檟選樟選桂選檟配縣主故繼李氏選樟娶王氏繼雒氏選桂娶潘氏繼劉氏孫男十三人檟生七人文􅀈文燭文熈文文燧文烺文灼樟生四人文薰文炅文烜文焙桂生二人文明文萃孫女四𦵏得日為萬厯十五年十二月日銘曰土厚而豐孺人之宫芝蘭外藂蓀枝芃芃汝樂汝封亦既考終明張母李碩人墓誌銘碩人蓋余内子李淑人之兄之妻之母也以萬厯十九年六月六日卒卒二年為萬厯二十一年十二月十一日𦵏子孤獻科持狀詣余泣請銘余故知碩人奚辭按狀碩人出三原北張李氏父處士恕母劉生碩人甫長沉静機穎不苟笑語處士竒之㑹碩人姊適張次君者卒遂繼碩人事姑惟謹次君賈游蜀齊一往輙數載家一切倚辦碩人拮据茹苦事無巨細必禀命乃行姑喜曰此真佳婦有婦如此吾何憂間姑意稍拂即凛凛和愉顔色不得懽心不已無何次君捐舘舎時碩人方盛年獻科才八嵗有譁者曰孤穉家落其更事人乎碩人勃然變色厲聲呵曰惡譁者何也未亡人姑在堂且代吾夫而子孤在側且代吾夫而父不然從良人地下矣而譁者何也譁者慚退其後家益落碩人晨昏紡績易粟供姑恐子女分甘宻藏以進姑疾親嘗湯藥籲天請代比卒斂𦵏殫力獻科稍長為取婦謂曰我舉若至今日庶幾藉以報若父若何以報我朂諸獻科脩次君業而息之家漸起雍容循雅有鄉曲之譽碩人以也碩人晚篤信能仁持齋徒步禮太嶽者十餘年喜施予人多賴臧獲衣多出手紉有觸多寛假不問子婦罹過又未嘗不面切每晨興以身為家人先其誠惠慈嚴類如此當疾篤時神色不亂見家人啼哭不置戒曰人死生如浮漚耳胡慟為言竟趺坐如生狀豈其有得於能仁氏之教而然耶是可以瞑目矣次君諱翊先卒碩人生正徳丙寅十一月初五日比卒年得夀八十有六生子男一即獻科取常氏女二一適李應甲即李淑人兄一適雷㑹孫男一耀舉人取申氏女一適王士魁墓在祖塋之坤隅坐坎向離銘曰為姑也子為孤也父生禮名嶽化同西土衆美可書將為世矩清渭之間其封如斧明夀官王君暨配墓誌銘萬厯壬辰余為先大理公如耆英雒社故事延里中年七十以上者結社為九老㑹君與焉時君年七十有七明年癸巳先大理公卒又明年甲午六月二十六日君卒余蓋重傷之而恨其結社之晚也君子治家等將以丙申十一月十日𦵏君祖塋之壬以余徒梁生選桂状乞銘君從子治宰又余外孫壻也烏乎辭君諱一鶴字惟德别號龍北世三原人縣東原有宋元時墳有諱者配郭氏繼賀氏生淵淵配髙氏生四子長珊次登次璉次􅚻長公配馬氏生君君玉貌鶴形初為次公登後次公生仲一鴻季一鳴俱以家窘故不學而賈君以次公意篤於仲季仲季亦篤于君人不知非盡次公出也初賈時君以名貸子錢市布邑及吴越無間言貲日起猶共賈共居久之用鹽策淮揚亦無間言貲益大起里中人指數兄若弟友愛善起家者必首曰王某王某云君大父母與諸父母故權厝故所貸子錢未歸君謂仲季此兩者吾所急于是卜兆以塟歸子錢已又謂仲季及諸子張公藝九世同居九世後云何吾家指日繁其析箸于是舉所息八千金而中剖之戒相友愛如吾儕遂杜門静攝不復言賈事非社㑹不出蓋性和欵雅飭類儒生終身無疾言厲色里中人目為長者郡丞故御史楊君奉例授爵一級縣令郭君禮以鄉飲三賔故余謂大理公社中不可無君余見世之人雖親父子兄弟不能無二心徳色誶語同歸亡有未嘗不慨且笑其愚而追喜君家大起非偶也君子孫甚夥必有承君志者君瞑矣君生正徳十年十二月八日比卒年得夀七十有九配袁氏生嘉靖三年八月八日卒萬厯二年十月二十九日得夀五十有五有女徳佐君起家繼仇氏生嘉靖十二年八月十三日卒萬厯十一年三月十三日得壽五十有一袁氏生子男六長治安禮部儒士取李氏繼李氏卒次治家取馬氏次治寧取李氏早卒次治宇邑諸生早卒次治定取張氏繼秦氏次治賔取趙氏聘張氏女二一適儒官梁文炳一適太學生梁文炤孫男六銘新邑諸生治安出偡治家出仲治寜出佑健舉人治定出佐治賔出孫女一適諸生來廷對治家出銘曰史稱良賈曰雍容疇賈如君有儒風矧相友于成素封泉臺無愧報次公子孫振振羽之螽繩武有戒慶無窮溫恭毅集巻十
