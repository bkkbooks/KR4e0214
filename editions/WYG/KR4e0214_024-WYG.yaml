body:
  text: 温恭毅集巻二十四明温純撰七言絶句望温嶺温泉極目㸔山日望雲住山欲與白雲分老僧笑指東頭嶺原是温名本屬君其二把酒探竒坐紫巗温泉温嶺望中兼二名偶合相傳乆添我何妨共作三同官姜女遮騎山山靈亦爲婦人哀半路能令追騎廽何似愚公長障塞免教骸骨盡成灰送逺卿之幕滇藩不辭小草向承明從㬰多君過渭城渭樹江雲憐日莫忍㸔萬里又西行其二萬里風烟六詔生壯遊莫聼鷓鴣聲行行即見薇垣紫綵筆還㸔賦逺征郊望盡日奔忙半日閒羞將塵眼對青山山頭似有棲雲室欲向山靈借半間山行冐雨登山望眼舒翠㣲山色擁征車只㸔足底烟雲合便是洪荒太古初題銅雀䑓有感效陸放翁沈園之作漠漠烟籠銅雀䑓幾年幽思若爲裁臨流不敢開塵眼怕見波涵隻影哀送左金部夏伯之河西務花底青樽爲爾擕相㸔薊北與河西不堪孤邸仍分袂醉聼驪歌月影低憶弟幾年作客向幽燕白日㸔雲學杜眠欲醉濁醪消旅况又逢一鴈過尊前送唐山人歸關中西風裊裊悵離情千里關山月獨明若到逰巖棲隠處當年泉石與誰盟静業禪林寳地塵踪結侣過青蓮白馬定如何開門忽見池中月說到圓空語亦多其二說法珠林對月華蒲團小坐即爲家池邉賸有蓮千朶可似當年火裏花遁園觀物堂成終南爲案崋爲屏雲滿踈林鶴滿汀物外不嫌出郭近刼來似是醉人醒初秋同社友集井園鬱蒸暑氣未全収虚聼蟬聲樹裏秋把酒仍爲河朔飲醉餘􅄆髪更臨流宜君孟姜女冽泉匹婦何縁有冽泉只因一念徹蒼𤣥世人誰觧綱常重流得芳名萬古傳說經䑓别子成兼訂峨山之遊遊罷終南興未央憐君獨住逺公房嵯峨有約休相負恐惹山靈笑我忙温恭毅集巻二十四
