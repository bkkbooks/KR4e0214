body:
  text: 温恭毅集巻二十明温純撰七言古詩書董生玉几山房圖玉几去天纔尺五何縁聳立君之戸松檜爲垣草爲堂閒窺科蚪窮今古朅来嘯傲天之涯酒酣落筆走龍蛇彈鋏羞爲孟嘗客無魚甘自老京華七夕天上牛郎夜渡河河邉織女手停梭閭閻薄命妾不語獨宿孤房泪如雨登庾亮樓歌荆州綰轂地庾亮古今樓樓吞瀟湘洞庭水地控東西上下流蜀吳虎闘亦雄武不得荆州苦更苦湏臾勝敗一局棊三分事業㡬丘土何如乘月舒兩眸不淺興同㕘佐遊一入醉鄉我也無俯仰天地亦蜉蝤我今把酒酹明月雖有圓缺嵗嵗無休歇曽向樓中照酒人又照當時舳艫旌旗之搰搰瞥見君山雲霧横又見章華草木榮舜妃楚靈今何在愁聞江上鐡笛聲笛聲嘹喨特悽楚落盡梅花悶不語囬望簷頭月已西乃知千古陳迹僅如一瞬許孰得孰失孰存亡孰如江月尚流光此樓亦難盡滿遊人興胡不乘風鼓枻窮滄海而相羊醉餘學李白搥碎黄鶴爲狂客恐殺風景碍吾徒旋車吊古更于水滸徧覔庾信羅含宅峨山髙壽史生母七十峨山髙哉脉結崑崙矗不知其㡬千萬里山勢蜿蜒曲連荆山堯門而西顧兮如屏如揖中有清濁二水左滙而吞吐于涇渭兮如環如帶極汪洋之瀰瀰瑶池西圍仙掌東峙船藕蟠桃徃徃開十丈之花結千年之實玉女王母獨乘鸞而至止笙簫奏雲和瑶草滿階戺如隔塵寰遊洞天况逢秋月桂如綺憑誰覔藕更覔桃駐顔却老從今始覔藕覔桃亦荒唐不然且於山水之間延兒齒醸清爲聖濁爲賢日向花前進百兕但歌南山無勞陟屺竇氏桂花株株香田家荆樹色色紫稱觴孰與顯親多男兒有身不致青雲何以移忠報天子温恭毅集巻二十
