body:
  text: 温恭毅集巻二十九明温純撰尺牘與劉定宇兵備將官多不知兵惟務倖成全賴我約束指揮切戒逺追西寧兵素不慣戰以守為戰以逸待勞為今日上䇿劉西井火器絶妙可倣甘州所遺者多製又於陣前層設連砲或行或止無不利連砲以鐡為藏火之櫃其中左右通二孔以傳藥線後一孔以繩發火用二長竿接藥線線俱以藥末敷於鑿内不用紙使其行速每竿作五七孔與二號將軍相通葢一孔一將軍也一發則十餘將軍齊往先期選軍士分任合發頃刻可布為萬人敵惟足下以意廣而練之與本兵蕭嶽峯倭夷冬深正可進兵聞逺徙則火攻燒船必不可已昔年兀术燒韓世忠其明騐也此勝於十萬師但請皇上下諭萬巡撫專管燒船號招海上漁人及乖覺知水道者教以火箭以沙船為家以漁船為用行長清正且聞風而走或畏闗白之威降矣與曹楚石郡守聞簡命謂未即發發則使使候祖道忽貴屬長吏以贈言屬純方操筆再得温札追送不及悵然與二三大夫約為一文致不能忘意伺便附焉来教于其去猶若未盡来時意此至言也人人持此心誰肯蹉跎枉過以遺去時之悔然願後之来者有足下去時之心則西安永永治矣近朝無師師相譲之風繇士多凌節不遜之行士多凌節不遜之行繇上為抑長㧞幼之政此導之使争也詩曰成人有徳小子有造未甞舍大人而專重小子也又曰於論皷鍾於樂辟雍謂必樂於辟雍而後治化成也導之使争且仇其上且誤小子矣何徳與造之云又何樂之有故贈言望即以教西安者教楚以禮樂繇此可興也末及漢頴感念今昔緇衣之懐不能已有書問幸道惓惓寄濟川宗尉聞長安令得罪貴府賢宗詢之真出一時之錯既登縣堂泄忿又法司提人役責究亦可以已矣儻激怒國主形之奏牘人將以為過吾秦世為好賢樂善之國今國主即東平河間不過或不肯以法司所已歸究者而更甚其詞以深罪一少年錯誤之令也太率講和為上請啓貴府賢殿下轉啓國主海容仍達在事衆賢宗與其多事不如省事與其忿争不如息争且使吾秦二百年来賢聲不替為望與李景山總兵論平倭倭事以愚計之當水陸並攻往兀术尚能焚韓世忠船於大江而今不可焚倭船乎陸攻令我兵肉身附城一失也攻於陸而不能以火牽制於水二失也遼東宣大之兵不善用火器三失也觀李將軍一敗於碧蹄竟䘮於敵全以恃批擣不精火器故又觀甘肅近大勝全以劉西井所遺三眼鎗及大砲可見不論何敵皆當以火器勝然兵不在多聞麾下有鳥銃手六百若更為三眼鎗即得千八百之用敏捷又可敵三四千之用且可及逺力又大此暗增兵不費餉之一着也三眼鎗疊陳又連砲一發中數百千人若左右三四發其聲震天其中不可以數計賊亡不退若不退而更能来則吾之三眼鎗足恃矣鎗之外為深溝以逸待勞以火器對敵而不以身對敵萬全決勝無踰於此惟兾悉心推廣講究試於武塲方知鄙言非謬又記往年倭犯嘉興任同知盡徹鍋釡倭上岸無處煮飯餒甚遂致我兵有王江涇之㨗自是浙兵始敢戰萬一倭或入山東先焚於水次以前説火器待於岸又令絶食於村落則吾大收功之日也與劉兩峯中丞塞上機宜知有石畫然借欵以全生靈則可許欵而因忘戰則不可九邊惟榆林慣戰皷舞鋭氣在得戰之利耳既久講欵僕不知其詳云何獨將士之氣萬萬不可少挫也幸熟思之此闗繫不淺故不敢冐對彼中將官多習敵情不妨廣延問也荅曾景黙司空今日河工欲濟運又欲防陵分功於他處不若專力於故道欲塞傍口不可不先導下流其導之也濬不如蕩徐以西宜濬徐以東宜蕩蕩則取各省小魚舠五七百隻每舠兩邊用十杆入水五尺其末令尖以鐡褁又用一鐡蒺藜以索繫之長丈餘如混江龍之制而廣之每十舠或二十舠為一號令近兩㟁一自東而西一自西而東每日須行五六十里委官查騐則數百里之泥無時可停雖令二洪如舊不難也然事半功倍但水行處即可為力久則徐以東之泥既去徐以西之泥自解比其解又用舠或杆以活之則無不行矣惟酌而損益之或一助也與李漸菴談詩批杜律先付去孟子有説詩之言昨送行詩雖不工然其體亦有節奏首章起句暗用於姓事中四句前虚後實應首句西臺五六正攬轡事末即明應髙門以結且生後章送别之情然止離筵二字不詳説為再作後章也後章承離筵始盡其説又不可全抛使秦意故止云已囘饑渇秦中色其餘皆别情耳舊知又應首章首句末句應皇都句期望作二首三首詩之法也若前章可置之後後章可置之前則亂矣此法惟子美知之葢子美得之三百篇也與内閣諸公閲姚給事疏辯致恨之繇從撓東征而起東征及成功俱在戊戌之前不佞入朝則戊戌嘉平末也何恨又謂欲網東征有功之臣有功邢總督已去萬開府陳監軍俱物故將誰網乎主戰署部李侍郎與條議科道同無半級之陞又可網乎又謂為李通政也部議通政調南不知何為輕䖏與小䟽所云畧同豈吏部亦通政之鄉人耶且果無闗國是僅為一方計耶再閲不參之參轉部等語則前説信有之矣先是㑹推内閣有欲推部院者生謂吾輩推官不可互舉必欲存羊則及不與推者遂及家居孫立亭王繼津乃拒推閣而思改部乎且有缺知推誰即推知㸃誰乎而果逐臭悦羶不見信於人至此可愧也恥與後生交訟又懼凟宸聽故畧叙如此與沈仲化論班次承教班次論可久行必六科押一班以吏部郎尾之十三道押一班以户禮等部郎尾之為妥三十年来不論常朝大賀皆然止東西對立則科道相連耳近御史止以省中人少各部郎皆續其尾故争若後科有二三十員道有四五十員御史反居極東之尾豈所以重耳目而責糾肅儀郎所奏難令再議况新奉㫖又退就二字將又起争在吏部則似失而得在御史則似得而失非户禮以下所可以品論也似宜且遵近㫖以不失出令之體以暫伸䑓臣之氣待後科備員再改未晩也惟台裁寄兒予知李門繼嗣事當遵立山公議惟是李五兄子以次者繼之則可或在鄉或在城從便大率以天理人情為主族人或量給田産舊僕亦然尊經閣䂓度寧大毋小寧費毋省四壬寅不便用得太陽到山向可也閣柱湏七前後左右重柱二行自為一院明倫堂亦須宏鉅其費甚侈總當身任量取給衆人之助可也其二聞生三孫大喜汝雲野舅囘携硯二方一端溪一髙麗又鏡四葛布四寄四孫各一其三聞吾兒氣體比家中時健勝甚喜塲中用心盡一日夜之力亦不可過思用不必用字句此時雨甚特令有力二人扶送入塲或頭塲畢可遣一人囘也其四鄉親来京者如織或是見我年老恐一旦無常先急急了自已事汝舅求官甚難不如力學上進即不然做一好人亦無不可其餘有欲来者吾兒止之或寧助其貲可也此間每食有八九人致我公事亦不能清心專理屢疏乞歸苦皇上不肯輕放然人情難調又十倍於鄉親誰其為我分心使免此苦乎其五前寄平藥正好常用苐一見大心自泰凡一切家事人事但勿以留滯不化為精明也前聖躬偶爾違和旋即大愈礦税定求停止不止不能已於懇請也其六大父俎豆事聞闔邑諸生呈請此諸生雅誼但有此舉不必求行凡事須思到結果處方可開端大父既為啇萬一學道駁查以此為疵返覺不便馬谿田先生太翁雖未出身曾為訓師不可比例也與省中此舉難為四明相公鄙心大不安四明相公萬不可去去則歸徳相公亦去生亦去生去猶易尋代者四明相公深習國事雖二相公且賴之不可去也昨靣三相公皆以此直言皆相信但二相公不可以私意言言四明相公是為歸徳也言歸徳相公是為四明也惟中立不倚則奸人之計破而大公之道成惟生則待人有言方力求去庶不難為四明相公耳與沈仲化政府言不言在弟處不處不在弟幸可歸矣所謂異議乃朱老先生見示欲密告丈者何未告也幸再問之與沈肩吾政府昨承長公枉重因領台諭即應見朝以吏科既有言即不與辨仍當引退仍藉以陳居臺之苦為陞外不允則上下相臨不便實授不准則前之應陞應改調者以無代不得不留使賢愚同滯或厚顔仍司風紀或修怨以滋鼓㺯益不便或可望皇上一轉移之也亦望老先生幹旋尤感其二聞老先生為生掲催小疏甚感苐小疏中二大苦之言不意甚拂聖心自此觀望者將幸有可乗之機益紛紛多口矣黙念非勇退不足贖罪恃徳愛仍祈鼎力委曲再掲令生得速就道即鮑管之知不過歸里衘結豈足云報惟鑒原與沈肩吾沈仲化朱金亭三相國頃辱老先生枉顧不能踵謝今目欲肓心火益熾萬萬難出天實限之耳為疏力懇聖明倘䝉發票非老先生超格曲成安望生還或兩票以請上裁萬一不允實生懇求非老先生無意留生也生刻感與得歸同小掲奉覽與沈肩吾沈仲化生屢疏已䝉掲催又兩票温㫖雖未䝉允然委婉至情已無遺力非木石能不感刻惟念上意似憐衰朽欲放待一票而決耳小疏今日已入萬懇矜憐即票放歸以釋積苦自此以往生依丘隴死遂首丘有不感大恩而思衘結者非夫也不然亦望兩票以請上裁至懇與内閣沈肩吾謹凟小疏十七上情竭詞窮或聖慈憐允發票懇乞老先生上體宸衷兩票使生及春和登途少緩漸熱益不便於賤目惟垂亮其二謹凟小疏二十上詞竭情迫又感大宗伯益思首丘倘聖慈允發票懇乞上體宸衷即票允放或署印停俸以免再凟至懇與朱汝脩保御年来辱金蘭之契不但詩文商訂古道誠心毫無間隔以為得之晩猶幸數相過從傾倒罪歸時髙雅綢繆逺餞郊坰投詩以贈依依難别途間曾和佳咏不復記憶矣緬想維益有歸志𢎞甫受誣而去不佞逺居西鄙參商之望忽爾東西南北欲為前日之聚何可得惟精神意向雖千里猶靣談耳道體須倍攝為延嗣計不佞不敢不强飰以圖泉石之樂也此後長安書不再􅉨獨吾二三人則日一發不為多温恭毅集巻二十九
