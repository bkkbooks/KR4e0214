body:
  text: 温恭毅集巻二十二明温純撰七言律詩遊青柯坪削成絶壁倚危梯剛到山腰眼界迷爲近天門尋白帝故從鳥道拄青藜衘杯欲並峯蓮吸得句先擕玉女題正好乘風凌絶頂歸来恐作舊人啼其二徙倚探竒恣壮遊㡬番囬首憶秦州千年紫氣從闗過九曲黄河入檻流舊國城連芳草合昔賢丘與野烟留山靈何處鍾豪俊爲鞏長安億萬秋春日二園社集得餐字載酒尋春賦考槃不勞折簡罄交歡閒依花徑班荆坐漫采園蔬作脯餐樹裏鳥鳴驚客到池中魚躍觧人㸔醉餘㪚髪忘歸去笑擊空明把釣竿蜂房次逺卿韻午餘蟻國夣初醒閒㸔蜂衙閙晩晴股帶花鬚香粉合口衘窓楮屋廬成振振休説螽斯羽肅肅如屯細桞營目擊從王齊殫力杞人何事但憂傾郾城三宗侯招飲王孫䑓榭倚雲成落日衘杯聼囀鶯遶檻龍岡團月色當筵熊耳暗松聲桐分周葉推唐國雪似梁園賦宛城家學傳經劉向在燃藜夜夜燭長庚繡春䑓宴集䑓榭連雲載酒登相逢春色錦千層名花豈自雒陽得危檻還從樹杪凭坐對清峨頻徙倚杯浮星月欲鶱騰夜深留滯渾忘去囬首東林日已升登黄鶴樓危樓髙聳捍荆㐮不見當時鶴再翔跨鶴欲從仙侣去開尊疑對酒家狂金沙鸚鵡連芳樹二水三山帶夕陽笛裏梅花何處落一聲風送五雲傍中秋仲宣樓送秦藩伯之滇南蕭瑟登樓聼郢歌共憐王粲住征舸逢秋嶺月當簷勝戀客江花入檻多雲裏象人瞻日色天涯雞足待春波使君一去千山隔尺素遥㸔鴈影過同鄒秦二使君遊徳山孤峯突兀俯群山遥望江湖碧一灣善巻池連青草合髙僧塔共野雲閒聼經鶴去烟霞外采藥人来杳靄間一局殘棋鐘磬落招提盡掩不知還登岳陽樓飛樓蘸水倚連岡悵望仙踪竟𣺌茫龜鶴崚􅜤囊已盡江湖環遶帶仍長賈人逢篴龍噴浪巨蟒離池劔吐芒猶有梅花當面發不堪吹落洞庭傍同李杜二使君望太和山危樓縹緲倚雲成西望名山勢若平太液揚波晴亦雨天門返照夜還明相逢李杜饒新句㡬遇金蘭感舊盟安得乘風凌絶頂紫霄長聼歩虚聲又同飲李太史宅時太史尊人孝亷在坐郊行㡬度駐江干江上多君賦考槃蒼翠松姿春不老蔚藍山色夏猶寒開尊重引探竒興投轄還兼舞綵懽共向隆中占象緯弓旌行指卧龍灘送方允治勲部應召隆中抱膝許尋盟紫詔俄傳出禁城畫省移官新主意草廬勸駕故人情逢春弱桞迎旌斾對月芳樽倚鑑衡照乗隋珠擕滿袖知君蚤晩獻承明登太嶽髙薄層霄禮上𤣥徘徊囬首笑塵縁烟生萬壑疑無地雲散孤峰忽有天虎豹關開風送入丹鉛竈冷火迷傳榔梅似是真消息獨立蒼茫思𣺌然送王茂大之閩鹽運時李本寜偕行一麾十載浪難平此去安流萬里行盡日關心鹽鐡論㡬時囬首鳯皇城葵榴滿路風烟好李郭同舟藻思生九曲河流終到海飛騰蚤慰故人情江村夜渡休沐同遊江上村尋春徙倚到黄昏舟車逺望兼南北星月平臨互吐吞傍水花陰侵座入當簷山色伴雲屯相逢莫作乗桴嘆兀坐中流過海門題李太僕㸔雲池巻荆樹相㸔不記年躭詩共詠鶺鴒篇謝家得句饒春夣杜甫多懐但晝眠海上池連芳草畔天涯雲在夕陽前故園招隠馮誰賦難弟風流亦謫仙信陽道中阻雨次楊使君韻行春單騎出郊隄風雨更䦨鳥道迷但使閭閻無犬吠何妨林野對雞棲賢山夣寐驚鍾斗溮水潺湲動皷􅎏莫道随車饒大澤主人餘潤自東西同趙汝存宿大關山洞借食僧家簇錦傳燈照眼明興来披豁縂關情觀風轉向雲巖下得侣何妨鳥道行辟糓山中容我住采芝方外有僧迎逢人説盡金銀氣誰向空門問此生登金山寺特立中流瀾倒囬振衣極目此徘徊尋源有意乘槎去對景渾疑跨鶴来雨霽龍宫行日月潮廽蜃氣接樓䑓入瞻座上西來像爲汲中泠供一杯其二蘭若飛懸龍象孤真成净土一塵無天開寳地金生穴波湧祗林鏡作圖捨筏凌虚從葦渡離縁入定愛河枯珠宫容我棲禪室秋水空明片月俱其三水月澄空静不流那分南北照神州皇圖鞏固天爲塹湯沐瀠洄海似漚朝貢越裳航萬里車書吳㑹奠千秋觀濤誰著三都賦江上應標此柱留仲憂定海招寳山同王將軍張憲長觀水陸大操山河一綂鞏皇圖拜命東南鎮海隅賈勇旌旄雄虎豹先登精鋭競蝥弧期標南國千年柱如渡西川五月瀘亦喜務農休士馬恐因忘戰啓憂虞其二紫電清霜武庫多轉輸誰是漢蕭何將軍不喜髀生肉甲士翻嫌海息波懸哨如籠麟谷鴿衘枚似趂蔡州鵞陣頭目極吳門練疑有驊騮傍水過遊靈谷寺出郊爲訪誌公林塔影還從静室臨象外滌襟泉有徳階前鼔掌地成音忽聞鳥韻驚迷性漫倚松濤試定心幽寂偏宜騶從去獨留明月伴謳吟王陽徳大叅伯仲邀飲墨池園池即右軍洗硯䖏謝氏夣草堂在側選勝名園傍斗城客來倒屣笑相迎欄成曲折花争發坐倚芳菲鳥不驚生草塘餘靈運夣臨池家紹右軍聲主人且莫言投轄還欲重爲結襪行虎跑泉寺同孫樞相王李二柱史宴集次蘇韻時王柱史將代林深地僻構禪堂雨霽風來襟袖凉花發滿原春未改燈傳列祖月同長清時且喜成三笑話别先愁各一方好景共遊難再得醉餘且覔虎泉嘗上已邀司馬汪公伯玉遊西湖乘時脩禊向烟波爲愛風流晉永和乆别琴樽霜入髩乍逢湖海酒如河移舟曲傍蘇堤桞躡蹬髙捫葛嶺蘿入夜論文真倚玉陽春誰和郢人歌雁山瀑布乘興尋幽到海涯懸泉千仭溜争竒空傳如練𤣥暉語笑絶翻盆杜甫詩雲裏飛虹終想像風前瀑布亦參差千秋爲汝標名字白玉生烟豈曼詞同胡藩叅蔡憲使集永嘉江心寺紺宇空懸面面低觀風聊此一攀躋閒横雙眼扶桑盡細話三生弱水迷獨立潮頭天上下平臨塔影月東西經行處處堪垂泪敢道波澄静皷鼙其二異地金焦江上齊又如灔澦起招提水雲亂鎻青蓮合天地雙瞻北斗迷盡日皈依留幻境逢人耕歛問遺黎相㸔誰是東南柱謾向中流握管題同孫侍中王李二直指遊北髙峰次靈隠寺壁韻蠟屐登臨結侣行髙峰勝處還再更萬木扶踈欲填壑群山迤邐如環城當簷月到徙松影隔嶺風來聞潮聲秉燭同遊不盡興况逢秋色含别情送孫以徳太史還朝西湖秋水映芙蓉不盡攀留别思濃已藉青藜空白屋共言江海得人龍金蓮寵錫仍歸第玉笋先班復聼鐘此去九重紓側席應多上賞及儒宗同胡奉常集燕子磯丹崖峭壁欲廽瀾直挿中流作柱㸔影落江心疑燕度根連鍾嶺隠龍蟠逍遥盡日機全息花鳥逢春興未䦨况是皇家豊芑地河山長鞏萬年安送劉中丞汝觀中丞直道去長安始信人間行路難滿目風塵多按劍知心天地㡬弹冠論功自昔歸何晏平夏于今數范韓即向東山尋謝傅莫因一夣笑邯鄲重逰永嘉江心寺江心一柱障波流再入烟雲豁兩眸近海疑從天外望凭虚如向斗間逰乾坤萬里誰函盖南北經年自去留泣血迸空憐杜甫杖藜不盡古今愁𤓰歩即事夕陽古渡問前朝北指璚花觀未遥京口尚連秦漢月海門不㫁古今潮遺宫芳草沿江渚異代秋聲引玉簫醉卧欲消千載恨夣囬猶記鶴相招㳺禹穴同姜憲使商大理朱太僕王新建集舟中聼童子歌予勸民詩謁帝因躭萬壑烟相逢如到畵圗前開簾席對花間月倚檻杯浮鏡裏天共醉良辰蘭曲酒肯廽深夜剡溪船此時豊稔仍歌咏猶恐春秋詫有年送少司農梁公北上便道省親司農拜命向長安滿目甘棠四野㸔楓陛行瞻曵履重椿堂先得舞衣歡旌揺王屋衝星曉酒盡蘇門對月寒爲賦大東臨祖道憑君切直奏金鑾同子忠登牛首山探竒躡蹬歴危廊披霧乗風到上方醉向空中捫日月夣囬雲裏聼笙篁即㸔紫氣連髙闕似遇青牛過故鄉羙景况逢詞賦侣縂非吾土亦相羊同胡子忠重逰燕子磯聞我兵復朝鮮寳閣重登酒半䦨相逢春色映層瀾飛磯豈學衘泥燕近水常留折葦灘日送花隂侵座入夜躭棊局把杯彈東征忽報師全㨗賭墅風流憶謝安答王元羙兼懐敬羙一代才名衆豈如㡬年髙隠蚤懸車有時搦管揮文藻盡日躭𤣥味道書難弟金蘭交不淺元方夣寐跡仍踈且慿魚鴈訂歸計那得相逢海上漁夏日同逰李氏園亭子髙連睥睨齊相逢倒屣共君躋尊開北海慿溪轉坐對西山返照低金闕曉開雲外擁玉樓烟裊雨中迷清時休沐堪乗興刻燭新詩子夜題其二主人結屋帝城邉一徑斜通御桞烟翠色雨餘山吐月緑隂風净水衘天芳樽對爾沿溪坐好景慿誰作賦傳醉後登樓還徙倚忽聞更漏不知旋再逰李氏園重憐幽寂再開筵信歩乗風到斗邉竟日同爲園際客百年君是酒中仙㸔山日落中原盡倚韻詩慚大歴前自笑支離歸去晚不妨盡日坐雲烟五日同使君謁子貢祠對酌舊宰祠堂背郭横肩随旅拜向簷楹千年墻室窺瞻好五日椒蘭感慨生拂坐薫風思觧愠盈巵蒲酒對澄清執鞭豈爲文章業所至長留奕奕名其二勝地相從引興長低佪盡日思望洋踈林隔水鶯相和細雨衘泥燕並翔風物天涯催鬢改駒陰時節憶年芳賜沾宫扇先朝事彷彿佳辰侍帝傍夏日邀徐君羽飲子由亭天漢風流見使星乾坤此地剩孤亭懐人汝上雲連蜀下榻尊前月滿櫺風雨聨床髪半緑江湖揮塵眼同青夏陽不盡相㸔思有約春深此更停邯鄲合族建追逺祠志喜憇邯幾住吕公軒何意支流派最繁接武箕裘多國器將文㸃竄爲家門從知姬姓本同氣况乃唐封出太原譜志分明非漫合不妨兩地薦蘋蘩送蕭可發直指還朝皂囊欲奏建章前使者停驄尺五天莫論埋輪稱柱史已從攬轡向秦川澤覃涸轍全蘇鮒霜入穹廬欲净烟結綬交情頻徙倚笑㸔父老擁離筵題新築尊經閣成泮宫髙閣切雲成藜杖將分太乙精滿架縹緗過二酉當簷奎壁引長庚筆從衆巘齊冲斗帶合䨇流兩抱城柱史神君収地脉重㸔文獻在西京宿報國寺同僚胡劉諸君枉過次韻衘命停車傍帝城郊門况有故人迎一燈夜照祗林鶴四月春留上苑鶯紫氣忻瞻丹鳯入珮聲喜傍玉河行明朝㐲陛承清問數馬還愁愧冏卿王言卿精膳還朝雪夜枉過有作次韻風塵荏苒二毛侵説劔虗憐許國心豈向延津龍竟合何如剡水棹空臨笑㸔松徑開精舎醉倚梅花賦上林康濟有人堪吏隠不妨青眼共浮沉其二賦就陽春雪滿林地分清切主恩深閒曹亦是調􅃵侣小技終成奏缶音萬里乾坤眼欲盡百年意氣酒重斟只愁灞上仍如戯到䖏腥羶入塞侵立春前二日雪中謝賜元旦宴鈔時嵗庚子兩立春也屠蘇開宴舊時傳楮幣承恩此日偏六出花飛霑帝澤滿朝虎拜慶堯天靈䑓已奏春如閏太史將書嵗有年况欲發藏憐逺戍竚㸔南北净烽烟立春次日朝天宫習儀鞭鳴雞唱曉風寒樂奏臚傳慶履端玉帛趨蹌來萬國衣冠舞蹈集千官蓂開氣轉三陽節雪霽春囬太乙壇聞道上方將進酒嵩呼齊祝萬年懽答沁水王次來韻桂樹别來幾見秋毎慿雲樹憶并州一從碣石論文後誰向梁園授簡逰春色朱門芳草合天涯華髪旅魂愁開緘忽睹相思句倚韻詩成月色幽九日聖駕閲壽宫奉命同豐城李侯守崇文門時有綵羅之賜鵷班扈從出長楊魚鑰欽承被寵光鳯闕雲廽星拱極鑾輿霞映帝垂裳杯浮金菊開芳徑雪疊香羅出尚方竚目八荒登壽域歡歌㳺豫頌君王其二九日天髙爽氣開五雲縹緲駕東廽爲占萬代興龍地非戀千秋戯馬䑓綺賜群工沾雨露香分御座近蓬萊披衣拜舞同居守挾纊還期遍九垓又同登觀象䑓仗劍登䑓欲躡雲不妨蕭瑟對斜曛平臨睥睨連山色危倚璣衡傍斗文天爲宸逰開夕霽人因佳節坐宵分宣傳雨露寛秋賦動地歡聲䖏䖏聞南郊陪祀雪霽郊壇對越時恍疑朝拱萬靈知深宫慄慄應無斁上帝洋洋若有私運際貞元天地合節臨亥子斗杓移閉關已得扶陽力定有春輝徧海涯送元闇假歸湖上題詩袂乆分那堪乍晤又離群歸心豈爲三珠樹啟事常依五色雲驛路雪梅春的皪江城烟桞日氤氲晉公元繫蒼生望莫戀家園緑野醺謝賜慶成宴具後合請建儲畢婚用漢甫司㓂韻入趨楓陛自郊壇咫尺天威欲報難推食幸從今醢署㐲蒲豈學漢師丹龍顔日爲前星霽燕翼春將少海團况有雎鳩相對喜關關水際傍金鑾閲蔡𢎞甫薛魯叔文徳任試南宫之文喜賦杏花春色望中新賦就歡馮狗監陳鞭似祖生先競着璞如卞氏晚同珍已㸔劍氣冲牛斗豈爲山靈誕甫申莫道禹門髙萬丈雷聲震䖏是通津送米仲詔之令銅梁米家書畵舊懸簰羡爾還兼諭蜀才春色滿林供客眺桃花百里向江開重飛故國雙鳬去再過關門紫氣廽公暇揮毫應盡興徧添珠玉在山隈送劉中丞希哲之鎮漁陽禮樂當朝老奉常恍如郤縠向漁陽逄時不爲雞聲舞出塞行㸔劍氣長左輔瘡痍慿鵲起北門鎻鑰屬鷹揚但令欵塞仍依舊嵗嵗呼韓似越裳送來望之司馬出守山海關天門虎豹擁燕山不數崤函百二關留客著書占氣紫趨庭遶膝有萊斑行間撃柝金湯固枕上行師壁壘閒起草首囬司馬署去天咫尺豈違顔送李本寜左遷安豐乆别含情思惘然寜知乍晤是離筵共憐大旱當堯日誰以薫風佐舜絃汲黯官階薪積後漢文宣室席虗前勸君莫唱揺紅燭鵬翼終㸔傍九天其二文雅官聨憶半千提衡不是縮楊禪舊栽桃李知時雨此去風流亦謫仙江上芍陂争灌溉城南花塢任芊綿公餘把酒題應徧分付雙魚向北傳雪中謝賜藕少宰裴公元闇司㓂謝公漢甫中丞郭公哲卿有作聊和雪裏陽春天地心特將碧藕代甘霖薦餘九廟歆精白賜及千官盡珮簮鳴世多懐饒郢曲許身欲報愧南金堂隅愁有號寒者廣庇還思萬厦深其二虎拜追随鵷鷺行山公何意倦廽翔嘗新如荷絲綸重求舊難忘側陋揚况有清通爲啟事正逢簡注坐垂裳題詩恐賦歸来去欲濟馮誰作大航五鳯樓前祝聖壽修十餘年曠典也時月望于十六日祝當其望云志慶歡逢曠典慶丹墀正是中秋月望時虎拜樓前新禮樂山呼堦下舊威儀箴從大寳金爲鑑歌和長春酒進巵最喜連朝翻衮袖且傳逹孝萬方知先是奉命十七日早合内外諸臣于五鳯樓前祝釐次韻佳節巧連華渚辰詔傳五鳯聼雞人雲霄咫尺顔應喜玉帛趨蹌意縂真即向彤庭歌既醉先從玉宇賦千春况聞指日収中貴念及遺黎處處貧秋日憶早朝當年朝拱斗星移飛鳥廽翔亦有期静聼雞鳴金鑰動喧傳象過玉珂随肅清秋色連宫闕咫尺天顔入夣思何日鼎新三殿後侍臣重睹漢官儀其二暑退年年侍講帷秋來日日想朝儀金流膠折非疇昔鵠立鵷聨正及時漏待千門花作侣煙開雙闕月應知忽聞少海恩波渥即向文華拜赤墀中秋前四日集維益朱榴舘得殘字秋色愁腸夜乍寒偶從㸔月一凭欄海潮白擁江門雪榴纍朱懸洞府丹林野縂霑新雨露閭閻仍苦舊凋殘爽鳩此日春將半何得餘波動地歡中秋集余望筠館時乆坐方得月㑹逮税使之横于楚者又逢聖誕志喜分得山字坐㸔皎月出雲間豈爲扶陽力不慳頃刻隂翳消宇内普天光照徧人寰正逢湯沐生春色想見宫闈霽聖顔自是大明千萬世將呼嵩嶽壽南山西䑓滿考謝賜羊酒鈔錠朱衣使者降從天下拜懽承雨露偏楮幣何縁分内帑綸音似欲赦前愆委蛇愧乏羔羊節醉酒深慚飽徳篇不是作霖逢大旱投醪漫想古人賢憂旱炎劉何意説乾封雩罷今㸔舞燕從豈向桑林躬六事争歌雲漢念三農目前生意憐芳草海内多愁望赤松聞道吕梁洪盡陸軍儲此日又難供其二西郊雲起也縱横不分星河夜夜明近水園林何處緑向陽葵藿㡬時傾豈因東海寃猶結可是𢎞羊烈未烹却憶吾皇曽歩禱随車膏雨徧生成送萬伯修司馬之鎮薊遼異邦振旅九重知鎻鑰親提十萬師對奕先籌淝水㨗請纓欲向幕南馳輔京列鎮金湯在屬國三韓保障宜只恐材官生髀肉翻嫌欵塞望羈縻聞谷中橋成先是以髙僧福登力建萬佛塔募縁致畢此工逺近頼之志喜懸空飛渡俯清流爲倚慈航在上頭題柱不勞歌蜀道吹簫似已到揚州綵虹斜向雙龍掛紫氣髙連二華浮欲濟巨川思大楫應知明主夣相求送劉伯時之登州相逢把酒共登䑓悵别衘情祖帳開已有甘棠留夣澤還湏露冕向蓬萊郡齋閒共仙人卧睥睨平臨蜃氣來渤海于今歌出牧佩刀誰不譲君才改予知兒和袁生㣲之戊子下第所作時兒與生同試順天渉世何妨共陸沉聊從林壑惜分陰任他按劍臨明月羡爾懐珍有煉金江驛多梅春可寄池塘生草夣頻侵莫忘獻賦當年意狗監相逢聼好音送朱左使歸衡州雨雪青門供帳開千年䟽傅兩賢哉即從山色憐花徑縂是君恩到草萊㶚上攀轅今日去衡陽歸鴈幾時來莫愁按劍風塵薄還爲蒼生叱馭廽送周光禄冊封晉藩歸省近臣持節渡滹沱捧冊遥臨鷲嶺過故國重沾周雨露新恩偏到晉山河分桐帝子宗藩盛負弩諸侯保障多明主不忘驄馬舊莫因歸省戀烟蘿送祝將軍伯良之任吳淞并序伯良余同年宗伯尚書郎子敷子也少爲名諸生廬墓友諸弟余徃在浙聞而嘉之頃就武推縂吳淞爲賦七言律勉之承家綵筆雅能文仗劍東南欲竪勲郤縠詩書堪上將君陳孝友試中軍澄江波静三吳月鎮海春囬細桞雲燕頷登壇將萬里箕裘衞霍漢廷聞秋日同董維益司㓂蔡𢎞甫内翰集朱汝修保御脩竹館得開字杏林三徑雨餘開漫倚琅玕結伴來如向渭川成别業那逢燕市不衘杯黄庭經爲籠鵝冩綵筆吟㸔過雁裁只恐瘡痍仍滿目人人都望長桑囬次秋字瘡痍入夣起邉愁又值蕭蕭落木稠何處征人驚雁影誰家織婦望刀頭杯停河朔憂時日月照關山出戍秋爲語請纓年少者風塵海上未曽休送秦給事使齊綸綍傳宣下掖垣逺持玉節過雲門夕郎暫輟芙蓉直公子遥霑雨露恩擁篲定餘從事醴攀條故倚帝城園淄青遺俗君應問何日函封上至尊送賈徳脩奉常使趙容䑓清曉登征車千里漳河入望初本爲景風持使節不同當日曳長裾韓陵山下還藏石紫陌宫中好購書帝子相逢應授簡賦成白雪寄雙魚寄懐雒陽翟座師清時何事拂衣廽咫尺門墻望眼開一自掄才稱國士遂令増價向金䑓灌園戸外真羅雀結社花前共舉杯他日經過聞鯉對春風滿座尚徘徊張羽王言别得分字䖍刀把贈倍慇懃暫合延津袂欲分休向風塵愁按劍且從杯酒細論文鶯花日下同爲客韋孟風流已到君狗監若逢楊得意賦成蚤上漢廷聞送秦二使君之蜀一麾十載悵離群乍晤那堪落葉分重以神羊臨絶域幾呼緑蟻對斜曛草堂莫問悲秋賦劔閣應傳諭蜀文此日西南豺虎甚除苛萬里喜逢君寄題葵園沁園春色盖傾初日渉因成趣有餘排闥青來山峍屼當軒碧擁樹扶踈忘機迹與鷗相狎衞足心仍藿共舒况是侯王同姓者何如藜杖夜讎書宜川謝劉伯明年兄賻吊晤其弟叔貞不忘髙義臭如蘭䟦渉那知行路難座對西銘堪論道尊開北海且加飡知君有意摶鵬翮老我何妨戴鶡冠他日㸔花逰上苑佇逢春色滿長安其二從來意氣重金蘭投轄多情况二難乘興不因雪夜盡衘杯還併月華餐書成已貴雒陽紙賦就應弹貢禹冠伯仲縂爲廊廟噐吾將垂釣老江干宜川謁劉太公墓有感逰燕杖屨趨承日過里低佪想像時我愧延陵將掛劍誰憐有道爲題碑心灰盃㵼千行泪手澤腸廽一局棊極目松楸兩地隔不堪霜露繫吾思送辛甥省親兼示諸甥愛子趨庭共藁砧又逢佳節酒齊斟杯從河朔花争燦腹坦琅琊月正臨敢謂家傳同鯉對蚤將文價重雞林老夫塵外消長晝爾軰窓前惜寸陰贈安肅鄭公興來曽泛剡溪航置驛何湏羡鄭莊眼爲金蘭青似染髪同海鶴白於霜㸔君合用安車召念我終將小草藏推轂未能羞獻納臨風先寄紫霞觴次汝脩觀梅帝里梅花向日紅廵簷不與少陵同已分上苑枝頭月肯逐髙樓笛裡風醉後共憐西圃盛賦成誰似廣平工九重正想調􅃵手莫道商岩有傅公丙午上元西社觀燈登城樓次日橋上㸔龍燈同孔治甫暨薛龍阜胡含素梁君旭來陽伯馭仲家弟希孔得同字村社招邀少長同正逢皎月滿晴空欲從雉堞㳺天外如暏鰲山在禁中不夜城連南北合長春花入綺羅叢橋成燦爛龍争躍鼔鬛雙雙戯彩虹送李次溪制䑓奉召入理京營仗鉞西征十二年歸朝丹詔降從天開疆勝畧虗韓范繫頸威名紀簡編寵渥三朝沾鳯闕姓名萬里勒燕然猶龍即向滹沱渡還有函關紫氣連其二原是當朝矍鑠翁治兵今向帝城中新兼節制仍司馬舊領嫖姚盡縂戎刁斗風清山海北旌旗日煖羽林東髙牙坐鎮烽烟息争㸔麒麟苐一功其三十載旌麾獨鎮西論功不止魏公齊疆開千里生春色波及三秦净鼓鼙延世緹騎星拱極荷天雨露鳯衘泥几几赤舄歸朝去無奈攀轅父老啼其四陛見勲臣至自西禁兵十萬許誰提中軍上佐兼南北一代元戎肅鼓鼙飛盖首囬二華逺登仙旌入五雲齊已知司馬屬人望應築長安拜相隄藩伯王道服張憲周枉過草廬老我歸來學種𤓰干旄今到故人家剡溪不盡王猷興渭水何勞傳望槎乆借甘棠臨緑墅相逢投轄對黄花欲爲十日平原飲忽漫車塵望漸賖七夕同董惟益司㓂蔡𢎞甫薛魯叔二太史集朱汝脩保御脩竹館分得身字烏鵲橋成玉露新雙星乆雨阻通津河邉似作參商侣機上空憐寂寞春随俗曝裩聊復爾穿針補衮是何人又聞思婦深閨語不及連枝嘆此身仲春陪祀先師太牢遣薦陋溪毛窺見宫墻數仭髙節歴中和方月魄樂成金玉儼雲璈獲麟千載傷吾道歌鳯當時入楚騷此日辟雍争北面憂時何必目頻蒿過保定許貞甫侍御墓見其二子秋色蕭蕭向晚寒誰家吹笛傍征鞍子猷雪夜空乗興𤣥度風流也盖棺野外月明驄馬第冡邉烟鎻釣魚灘相思十載平原飲此日松楸對二難送王將軍北征幾年坐鎮海波平忽聼驪謌送北征百隊熊羆攀祖帳一時笳吹動江城營前細桞那堪折匣底芙蓉若自鳴共説承家多節操佇㸔塞北請長纓贈張甥南䑓舊業擅名流接武英賢欲奮脩芹舍仰瞻墻數仭桂輪輝映月中秋即㸔綵筆追秦漢定有青萍射斗牛好共兒曹勤努力吾將簑笠狎群鷗送馬叔遇馬千里盧敬之周汝信張學曽李國柱王藎伯胡頥𤣥張聚五張孺充陳維則安曰儒諸孝亷偕計雪霽衘杯傍早梅誰能不羡百花魁上林已就相如賦駿骨將逢郭隗䑓三䇿獻餘春宴渥五雲深處杏園開王褒即有賢臣頌鳯起丹山蟄起雷送文仲子應舉交㳺三世似金蘭此日箕裘數二難衣鉢承家仍舊武鶺鴒比翼向長安逢時桃李花呈實奔月嫦娥桂遇丹上苑醉餘齊許國老夫不復夣邯郸乆陰芍藥不開望壠有感紅藥含芳慘不開况逢陰雨助人哀欲投綵筆詩全廢漫倚雕欄首重廽荒塜望爲雲裏舍斑衣翻作夣中萊一尊彷彿承歡日又聼啼烏淚滿顋送來陽伯常脩之薛允執髙大克石復朴偕計塔寺重新帶映虹題名曽報五人同秋深桂闕輪争綵春暖桃花浪欲紅行見成龍爲雲雨應歌鳴鳯集梧桐重令百二山河重肯負周王棫樸功温恭毅集巻二十二
