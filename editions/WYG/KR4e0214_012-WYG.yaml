body:
  text: 温恭毅集巻十二明温純撰傳中憲大夫李君傳君諱復聘字叔徴别號秦麓家世詳君志中君父備贈監察御史取贈孺人楊氏生君甫九嵗楊氏卒繼封太孺人田氏君幼受尚書塾師年舞象贈御史公見背家旁落下帷力學籍名愽士嘉靖辛酉與計偕明年壬戌成進士除聞喜令聞喜賦重民貧苦催科君至延見父老問得其状曰赤子啼饑而奪之乳謂慈母何于是孳孳拊循俟既甦始為要徴期民輸如外府又繩奸吏捕黠盜編徭徭均禱雨雨應造士士興甲子論士得閣學山隂王公巻於同舍即曰此台輔器也力從㬰録之已果大拜其他遺愛載優政録三年召授南京廣東道監察御史御史一年所㑹穆廟改元覃恩得贈封君父母如例抗疏劾執政一勲貴一薦有望大臣衡水傅㑹輩十許發千户洪勲侵沒之詭一時風裁赫奕㑹有脩怨者出君四川按察司僉事時四川盜訌甚民岌岌失業君曰盜敢肆潢池以饑寒捄死故如更迫絶将堅反側者心是長亂也于是推誠安輯令易轍又飭組練嚴踐更恤困窮誅其怙終者盜乃皆伏散故事監司大務率受成于都御史御史君獨直陳當否一切簿書期㑹訟獄持大體不為毛舉久之陞江西布政司㕘議以與時左即移疾歸今上御歴言官薦遺佚君名列剡中不果用家食十四年甲申大司冦邱公薦君才可大用有召起君湖廣分部鄖襄兼司太嶽君蒿目決筴求所以安百姓者屬千里縣耜待哺亟發廩賑貸一時饑民賴之太嶽有中涓侵職蠧政君執令甲以裁竟令愧戢鄖令徐希進為守齮齕幾罷免君直令遂寝又注閼水溉澤鹵為機於舟運磑費亷工省楚至今稱利久之陞按察司副使治兵蘄州蘄故衡劇於鄖襄君為振武備儲軍興柝靜波澄聲大起言官薦君才堪禦敵㑹遼急調君開原已㑹京東急又調君永平永平任無何以疾卒矣君性亷謹先是還自白下有萬户徼惠于君者以百金贐君即叱去若不知故人矣終君之身無更以餽遺慁者每垂槖而入歸而一羸馬蹩躠人不知故監司也又尚氣節在聞喜有檄為所善豎綽楔者君僅給其直在四川藩王令諸司加禮君獨毅然以常禮見王亦尋悟且重君邱公狷介重許可獨推轂君可以知君矣而惜乎嚮用之晚也卒久之督學沈君檄所司祀學宫蓋從士論云子䝉訓䝉樸䝉顓䝉訓䝉樸讀父書為諸生論曰世恒言才難難於名實眩也余多君治行又知君居里自受書兢兢名實以孝友敦睦聞即不盡為世用名與實匪眩矣然不用與用而後時非才之罪也藉令用才者及時又盡人之才才何以云難哉余于李君重有感御史大夫胡公傳公諱嘉謨字子忠别號進菴後又號止吾涇陽人故贈右通政朝用子也家世詳馬文荘公所為通政公志中公貌偉山立髫年補涇陽學弟子員與邑縂憲李公同舉嘉靖壬子鄉試又同筆硯李公成丙辰進士公成壬戌進士公初授章邱令無何丁母憂服闋補南宫無何丁父憂服闋又補南宫鋤強誘善興學勵士不遺力時蝗不入境以是僅嵗餘召授吏部考功主事歴稽勲驗封考功文選員外郎中在考功㑹乙亥京察時江陵為政有為脩怨蔓及新鄭里人之賢者其有議通㕘某又為人庇公執不可部院大卿多庇其屬又執不可竟秉公從衆議一時肅然不讓己巳己巳蓋李公為考功郎亦秉公執而從衆議時謂數十年來僅有此兩考云司選則杜請謁絶賄賂人不敢以私干轉右通政提督謄黄歴太僕光禄卿操江右僉都御史南給事某江陵客也雖大卿争附公獨否為其嗛論列公即引疾歸㑹給事某又論故操江餘姚張君以贓坐連及公有㫖降調餘姚故劾江陵人以此益多公公自是絶意仕進寄興園林日與故舊飲奕者十年許余亦與焉㑹臺諫交薦起貴州左㕘議轉南太僕少卿公疏辭不得乃抵滁力脩冏政又周孤窮建社倉置義塜為滁民徳無何轉南光禄卿南太常卿時南中名流皆斂袵交公余㑹承乏南銓數與公共覽牛首燕磯諸勝而公益聲重兩都矣無何轉大理卿刑部右侍郎㑹尚書缺署部慎奏當無何轉户部左侍郎署太倉太倉弊蝟集公剔覈調停尋感疾兩疏乞歸䝉上温留復強視事㑹南都察院掌院右都御史缺以公推補命下辭朝行次涿鹿以疾卒嗚呼公起家三紀家食居半即官中外南北如歴傳舍獨久於郎署稍别利器然驥足未盡展也葢平生鎮定學韓忠獻忠直學王端毅林居好殖蓮與竹題以清香徹底直節到頭又戒囑託貨殖殺生㕘禪悟𤣥自謂有得誨其子璉璲寜拙毋巧寜鈍母銳而璉状又云公孝友以公車業造士捐金賑饑施棺贖族人于配白鄠縣某寃獄則為政於里者其久賁園林則以質直狷介忤時故在郎署銓叙獨推轂賢者雖同舎郎亦氷炭故一歸而拫却者衆歸既久日恢恢大也人始知公大受器且柄用而公已矣當公拜南臺命時李公方縂北臺人謂南北風紀非兩公不可然故布衣交也又俱從吏部郎通政起異之忽公有涿鹿之厄而無何李公亦解任歸與余為園林之逰每念公欲起公九原不可得蓋余與公居園林而李公在事余今與李公居園林而公仙逰寜能已于懐耶公配張氏累封恭人璉舉丙子鄉試方為東光令温子曰余與胡公交在南中尤深且有約云初公學務實雖小道亦殫力既從𤣥而禪而反歸於吾儒之虛以心不著一物窺格物㫖夫實而虛虛而實㡬矣易六十四卦獨孚以中名非謂其中分之則實合之則虛哉牛首燕磯約共䆒此學矣余不敢謂公果徃也矧對李公如對公温恭毅集巻十二
