  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0214_WYG_021-1a, image: WYG1288/WYG1288-0698a.png}
body:
  text: 温恭毅集巻二十一明温純撰五言律詩同子成遊說經䑓爲結烟霞侣因過尹喜門停車逄白鶴揮麈聼𤣥言瑶草經春長琪花冐雨繁真源如可問待月坐黄昏其二從君探世業道徳五千存紫氣烟雲合丹崖日月屯有無觀妙徼恍惚盡乾坤似得真常脉先天可細論送辛四景虞應癸未試持憲神羊著叅軍草檄名景虞之世父父白眉憐馬季綵筆笑江生風入鵬南翼雲蒸冀北程黄金䑓望逺萬里正含情内丘曉行秋色撲帷清侵晨傍桞行衣牽朝露濕花映曉霞明拙病憐吾道江湖寄此生華峯雲日近忻慰倚門情過邯鄲驅車出北平暮向邯鄲行秋在風前樹波連雨後萍三千矜趙客十二傲秦城此日哀陳迹平原草木生邯鄲李希聖明府枉過小坐旅病憐秋色相逢一觧頥㸔君花滿縣愧我鬂如絲把酒還聼鳥開襟且論詩黄粱今已熟那計夣囬遲武陵城樓送李少叅之闗中登樓愁望逺把袂又逢秋共訝謫仙去誰憐落葉稠魂飛崡谷道月滿洞庭州相見知何日桃源好駐舟送李懋推放歸拜夕憐青𤨏飛霜獨犯顔長留忠膽在不惜壯心閒聖主恩波渥逐臣鄴下還賜環應有日那得戀東山過武關關塞空秦漢風塵感嵗華猿啼惟鳥道犬吠有人家孤嶂天疑近窮途日易斜啇山知不逺吾欲了生涯夏日同裴太僕泛西湖剛憐簮乍盍却恐袂仍分槎入六橋桞盃浮二嶺雲雨餘荷欲長風送磬常聞半日跏趺坐相將譯梵文又同登萬松嶺攬勝對髙㫪衘盃俯萬松人疑乘鳯舞亭似藉雲封湖海當簷盡山林引興濃願言婚嫁畢同此醉芙蓉豊樂亭赴成君廸太僕宴集乆别成萍梗相逢盡日停論心憐玉署把酒續廬陵雨霽青疑染花開爛若蒸豊年仍可樂千載共兹亭春日詹直指招飲胡太守園亭榭倚危岑登臨惬賞心山疑浮海市人似到雲林花氣撲簾入歌聲雜鳥吟相㸔春意足底用出郊尋望壠絶恨風人痴忍爲九我詩呼天親㒺極愛日我何知想像松楸裏瞻依夣寐時重將莱彩舞泉路以爲期海潮庵古寺碧雲邉登臨息萬縁法堂留月照衣鉢付燈傳近水花饒笑開簾鶴欲前相逢天竺客說破野狐禪初夏同雷徤夫馬子充遊子徳園雨霽夏猶春班荆白首新名花香入座幽鳥語依人絳帳經誰授豐城劒有神相從三愽士星聚恐驚荀社集弟居景色倍晴和相逢鬂盡皤簷荆花疊錦風樹鳥成歌結社春連夏開尊酒似河不知禽慶侣何䖏戀青蘿郃陽曉發侵晨出郭門蕭瑟望朝暾霜逼秋禾熟日烘野馬奔兵戈連塞徼耕鑿㡬烟村撫景臨岐路凄然欲㫁魂園中望先塋感愴用百嵗吾偕汝句無情花自發底事鳥如歌本爲逍遥適翻令感愴多望雲封若斧滴酒泪成波百嵗吾偕汝那堪誦蓼莪過夷門有懐西亭宗正傳經憐帝子垂淚過夷門㡬載詩筩廢千秋藜杖存鶴歸疑見汝草緑正傷魂在笥文仍富相思夣裏論寓天寜寺蘭上人房寳塔何年剏相傳自盛唐一燈留法界片月照迷方山歛浮雲盡風翻貝葉香無生如可學吾欲泛慈航送袁㣲之赴漁陽劉公幕從来䨥燕頷肯作一書生投筆辭南國揮戈向北平亦知龍射斗常有燭籠旌欲樹封侯績羞稱任俠名胡子芳移居爲余比隣何意離群友相逢更比隣醉歌吾潦倒岸幘爾情真寳劍光騰斗春林花傍人子虚如有賦早晚獻楓宸題馮仲元園豈厭紛華擾而從此結廬峰連樓蘸水月送塔翻除改席花疑闘題詩竹可書歸来吾羡汝不歎食無魚喜馬子儀至得二親信簷雀噪曽頻乍逢問二親喜聞顔似玉應是壽長春桃熟蟠山近蓮開玉女隣思歸扶杖屨對景可全真送子儀歸用何仲黙先生韻去住應難别賡歌欲暫留捲簾還對月繞檻復栽榴雨霽㸔行鴈烟開憶釣舟知君歸里日芳草傍清流寄弟吾仲㡬傳書飛騰興欲舒㸔雲愁見鴈彈鋏嘆無魚經學三冬足鵬摶萬里餘雪霜亦雨露努力愛居諸慶成宴恭述時萬歴丙子純以太僕少卿侍殿中子夜南郊薦寅賔北極臨陽生飛琯應樂奏慶雲沉魚藻君臣樂簷梅天地心玉音親命酒既醉荷恩深其二九重欣晝接三祝慶良辰寒鍵初陽啟和顔七日親歌諧魚出聼舞徧鶴来馴喜起瞻前代皇仁自近臣上元同劉敬甫送弟從戎海内風塵滿憂時可奈何暗香梅自發積雪髩全皤任俠揮長劍銘勲望伏波竚㸔麟閣畫握手醉烟蘿其二三五團圓夕留連離别時還從姜氏被預想謝家詩春入池塘草路分南北岐吹毛刀可贈萬里以爲期長安㑹舘赴同鄉公宴鶯燕驕春永芬芳得閏偏上林花易發旅邸月同圓簮遇青睛盍杯從緑樹傳感恩争報主周歴萬年延送子儀還里折桞送君時衘杯動客思青春堪作侣好景且留詩隴月千山隔鄉心一鴈知髙堂問消息休道鬂如絲季夏同家弟邀妙上人園遊㑹大雨河漲底事驟清凉開襟共此堂正逢甲子雨况是水雲鄉説法風㠶定無機魚鳥忘一身天地小吾亦愛吾狂温恭毅集巻二十一
