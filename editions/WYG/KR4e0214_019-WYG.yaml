body:
  text: 温恭毅集巻十九明温純撰五言古詩紀懐并引壬寅冬仲余以紏弹乞休屢䟽未允伏枕待命歴月多閒因仰思三聖隆恩二親永逝中及骨肉師友存沒參商與夫轍迹所經國事綢繆之計精神所注生平趨歩之艱展轉于心不能己巳而歎初意可遂始願難酬于是改弧矢萬里之期爲山澤終身之課苟爲政于畎畆庶報禮于九重援筆得詩二十五首命名紀懐以志嵗月計偕試南宫遂上公車對時當世太平内外争盡瘁穆穆肅皇聖主静勤修内懐柔懾萬靈納言收中貴懲貪更訓亷信賞罰無貸嘉靖殷邦同乆道萬方頼至今思祖功父老猶垂泪其二筮仕令北海海上半凋瘵初至百憂叢視事忘向晦出入童穉眠徒爲簿書累亦慕卓魯名愧非學道愛别来三十年父老猶虗戴補過恨無繇此任不更再寄語爲令者毋如余徒慨其三三年頻于役凭軾臨滄海徙倚蓬莱間几席扶桑在始覺眼界寛西望極畏壘天浮日永浴鴈迷岸分彩歸泄無盈虚百川于此滙始作盧敖遊髙鳥慚意怠囬陟大澤山日觀峯未改呼吸圓䆸通應接汗流浼歸來爽自失蝸居從前悔其四西征将之濟延頸問闕里泰山髙萬仭龜䝉亦難儗有阜迂以曲沂濟文相似卦列少昊陵鍾靈自此始禱尼應如響頂圬生夫子匹夫祖堯舜千載崇廟祀荆棘故不生異木森且羙當時手植檜榮枯闗泰否呵䕶煩神明感通有至理低佪瞻拜餘一貫如面擬其五荘皇初踐祚首重言官路徴書羅四方召從諸彦後左掖拜夕郎白簡容敷奏一時頌恭黙納約無庸牖淵哉尼父言無爲真聖度升遐胡太蚤遺弓泣宇宙其六朱明景風至衘命之瀋代言陟天下眷歴晉出鴈塞上黨文物集朱門多風槩沁水主人竒論文出流軰踟蹰馬邑城追慨詐爲害雲中節至止帶礪盟千載邂逅趙将軍岢英聲無與佩接武渭陽周尚文出師敵輙北飬士周與䨇眼鎗名趙創屈指名僅再頼有劉都督承嗣三㨗威仍倍今爲連砲雷一發敵盡碎省卒更省餉不戰功尤最先聲屈人兵庶以威爲愛乃知禦侮䇿全勝在修内其七驅車之荆楚暫憇習家池西憶羊叔子山有堕淚碑言尋雲夣澤荒迷不可知江漢依然在皥皥濯于斯朝登黄鶴樓暮倚鸚鵡陂再過巴陵道不禁先憂思一著歸來賦逺謝叔子規夣濯纓與足如在江之涯仲尼不可尚千載是吾師其八歸泝漢水西言陟太和巔太和髙萬丈烏兎疑倒旋諸峯亦兒孫五嶽豈比肩中多學道侣相與證真詮真詮何可得依稀守丹田夜夣𤣥帝語鼓琴寜俟絃汝歸有餘師汝師言更𤣥無思與無爲斯言信不偏北面終鄒魯庻㡬永無愆其九繇鄖入商於驅車歴木末蜿蜒七百里天近海疑括崑崙於此終太華勢相奪坤厚信無疆鍾靈及遼濶姬歴八百年賢聖實超越歴代饒荃宰宇宙任旋斡晚近忽蕩潏絪緼氣疑脱鬱積端倪開地維竟軒豁君子期法坤厚徳以載物其十入里返初服垂涕拜親闈二親方耆壽偕隠共采薇春秋耕南畆不愁寒與饑弟童兒方丱挾冊亦愛暉嵗時延賔友懽讌願無違但憐姊與妹各棄扊扅歸觧鬱開春酒始幸早拂衣有甥跪羅列庶免永歔欷其十一壬申冬拜命乘春臨大河次且崤崡道踟蹰雒之涯黙思圗與書千載永不磨淵哉坎之一萬象已森羅五十數非闕載籍文何多南北滋路岐楊子泣奈何所以魯尼父無言欲囬波觀象登道岸守一更無他其十二迤邐臨熊耳從郟及申宛遵彼汝墳境追思王化逺言駐隆中軫問俗頻徃返恨無随車雨靦顔如餐飯有召及吾師孫公節再建銅隄竹馬迎云公來何晚當年羊叔子歩武尤蹇蹇余在約束中依舊炙經苑㑹有二三子蔡子𢎞甫朱子巽甫馬子長平因依共勤懇忽爲參與商囬首空繾綣其十三時值大淵獻冏命以緑綬入關過里門北征將父母伏陛瞻龍衮端拱臨星斗余從典屬國再歩廷尉後旋縂大官署六禮親奔走喜遇泰交成逺近懽盈口至今三十年乾坤同悠乆其十四禮樂容䑓司駿奔郊廟際有友趙柱史應元之楚正攬轡乆要故不忘相期秉忠義同歌蜀道難並失南郡意觧組先後歸遂初涇峨内潜修卒舊業力耕供賦税山林亦有責報恩明不倍目極日月邉如睹天顔霽其十五初宿邯郸署偶聞隣婦啼聲聲如有訴多云有所思不作䨇飛鳥却爲征夫妻征夫妻猶可邉塞苦誰知不愁衣帶緩但恐寄衣遲砧杵家家急賤妾心獨悲手紉衣未成衣成附阿誰其十六倚門有二親下車伏地拜拭淚轉開顔問訊疑夣寐乍聚忘逺遊囊空反増愛有羙弱冠弟青衿亦聪慧随行兼問字二親懽更倍東覔仙掌蓮西慕瑶池㑹蓮實猶可得桃熟難更再但醸清爲聖濁亦賢可待蓂開栢葉進菊綻桑落羙張筵聚賔從門巷填車盖余舞老萊斑弟詠南山對諸孫争進履椿榮萱樹背有召忽臨門承歡僅六載于今涕泪多不忍見松檜其十七涒灘爲帝理再侍講筵内未㡬拜命行捧勑臨東海二親猶及將扶侍供甘膬王事信靡盬不遑周仍隘采蓴更覔鯉奉飬敢云備明王隆孝思永言錫吾類遵海望天䑓偶與知己㑹戴汝誠手染二親容駐顔語仍在語及世上名洗耳有真態相期雁蕩遊撫景嘗至再歸署襟已豁如在塵寰外乃知乾坤裏形骸元無礙其十八吳山天然境天目于此㑹江海襟嘗合龍鳯結仍大鍾靈更毓秀都㑹千年在一水臨島夷所恃在武備余乏安攘䇿坐鎮渾無頼官聨幸同心但於簿書内民瘼尚未瘳何論滄溟外有時陟吳巔似與崑崙對我屋居其間視之僅如芥恐爲形迹拘俯仰慚函盖其十九視師鰲柱下尋登鰲柱上舉目溟渤盡樓船争用命共恨海不波髀肉生愈忼翻思武欲修文事宜先尚郤縠何人哉禮樂稱名將囬瞻孔廟頽鼎新如始剏郡士課文秇薛子魯叔神尤王令如石頭城御李敏肅兒共傍其師亦千之余愧申公望師已魁多士蔡𢎞甫薛魯叔文日暢辛丑同對庭文子徳任亦與伉又同讀秘書鹽梅吾已諒獨有兒予知挾冊猶惆悵盍簮兼麗澤相期仍無量其二十虎林戒行李返舟停霅水旋從姑蘓城一水逹都鄙中經江淮河西自楚豫起軍儲四百萬私運亦稱此平江陳公瑄信多勞宋公禮良比羙萬安朱公衡通夏鎮余亦從經紀至今三紀餘舳艫争邐迤飛輓古未有陵園亦寜只乃知故與利子輿言有以紛紛泇莱議拘曲終當已誰其濬二洪行險深見底水繇地中行陵運咸永倚徃来亦利渉朝貢疾如矢舍此談他途如車輕棄軌其二十一初從司農後旋領藏庾役金貯四百萬粟猶六年積人人懐􅄔恤已懼漁竭澤倐忽十年餘出多入不益粟乏兼嵗儲金萬不及百仰給人如麻嘖嘖朝與夕司農難以應仰屋憂難釋廣開鬻爵例銓路懼乖隔嚴督搜粟吏又爲閭閻惜食寡與用舒斯言誠藥石九重方明聖成命正於赫屢示寛恤期四海手加額其二十二己丑罪逆積殃及我慈闈黄泉不可從䘖䘏扶櫬歸䝉恩予槥地又䝉享以詞封樹遂成林麗牲遂有碑附以名人閣學許文穆公銘不朽當在兹親恩日欲報夣飜莱子衣皇恩報更難䘖結不敢辭其二十三捧詔領南銓始遂金陵遊仰瞻定鼎基王氣莾千秋龍盤連燕磯虎踞對牛頭孝陵鬱以葱都㑹今稱留百司常拱衞南北盛二周余辱百官長表率愧前修癸巳當計吏但知右名流追憶郟鄏卜極目望宸旒其二十四夏拜冬官命承恩就子舍入門睹吾翁故顔驚彫謝嘗藥僅三時亥晦忽長夜皇恩慈闈並感極涙長㵼嗚呼馬鬛封千年隣二華執秩富平孫公碑實録執憲涇陽李公銘匪假惟有㒺極思不如從翁化鬱鬯非無酒酹地空薦藉其二十五讀禮松楸間併讀論孟語始知精一脉乃在不踰矩所欲惟從心危㣲寜異睹形色性命合鄒孟真學魯直飬開一闗作聖如導瞽上逹在下學剛大豈襲取求一惟忠恕爲已當學古日用精義足黙識敢自沮不然内外岐空談竟何補題楊太宰桃花嶺茂叔獨愛蓮淵明獨愛菊蓮爲名君子菊爲供幽獨何如仙人桃花灼實亦馥古有木帝精蟠山三見熟主人海濵居種之滿山曲的皪陋河陽紛披成綺褥結實仍纍纍盡醉韶華足持以啖阿母百嵗顔如玉亦悟樹人理成蹊光前躅朅来厭紛囂夣寐山中屋託興在丹青開巻霞奪目不是避秦時寜問武陵澳金馬且陸沉神遊亦可掬再種菊與蓮時時春更簇他日賦歸来紉荷以爲服或餐英與實輕身掛仙籙不則延良友花間醉醽醁我亦倦遊人求羊或不辱欲鼓山陰棹開徑待趢趗送劉衍亨宗伯還朝裊裊琴中操離離沼間芷賞音以同芳飲醇忘其㫖與君結綢繆願言未有已膏車駕言邁讙讌方伊始顧聼嚶鳴聲何以贈吾子宛彼石頭城日夕生春水曉月媚仙舟清風拂中沚含情將訴誰扣舷鳴其裏翩翩颺雙翮雙翮横萬里簮笏歸承明禮樂唯君倚漢庭今側席正人在端揆東觀已然藜北省亦方軌瀛海神仙宅君恩去天咫承顔歸省畢調鼎報天子勿以明發心鍾情于岾屺至孝塞天地顯揚端在此閨思對月黙黙語清光應照君記得别時約相思但望雲月亦有圓缺雲亦有聚散散與缺猶可離愁尚减半忽見雲間月低頭憶逺人相思不相見空有泪沾巾君如失凰侣妾如寄生草桑末猶堪依誰念君懐抱孤棲霜露叢忽遇花落期花落無人掃凄凉兩地知温恭毅集巻十九
