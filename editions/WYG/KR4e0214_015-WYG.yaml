body:
  text: 温恭毅集巻十五明温純撰雜著脩橋募縁疏詩陳厲掲律重橋梁矧吾三原夙稱衝路兩城對峙一水中分每逢淫雨滔天南北若限雖有長年三老舵艣無功即觀風且駐驂以望洋孰出途不褰裳而懼溺幸值良牧力建輿梁于焉筮日以鳩工蓋欲一勞而永逸顧工力浩大非不日之可成而規度恢宏必衆焉乃始就迴首嘆徃事豈其填海如秦編竹活萬生尚其渡蟻若宋共結同心果危波變為安瀾咸發濟川心驚濤化為穏步且星輝月燦映臥波之龍而秀鍾干齡即鐫石鏤金表戴柱之螭而聲施百䙫彼希福利于㝠㝠無知之域即建梵宇築𤣥宫亦奚以為惟積功行於昭昭見在之途雖蠲一財出一力終有善報願以方便法同作坦行人救荒募縁疏伏以亢暘淫雨在昊天豈免常乖軫瘁恤災念達士諒同斯志慨兹邦之不幸乃黎民之見殃終嵗不登三農無賴致兹鄉聚多困饑寒迨彼流移尤成乞丐䝉袂輯屨率貿貿然而來鬻子抛妻将紛紛然奚徃久饑得食者欲死枵腹望門者日多雖鄭俠所繪之圖不苦於此即秦伯乞糶之嵗猶裕于今言之痛哉吁其極矣所幸天無盡戮厪邵父西土之憂人非常辜舉長孺淮南之䇿顧民衆難周於官帑而力襄可繼于私家士類起而作倡民庶詢之僉恊愽施濟衆實有感于孔言廣募隨縁不妨托乎佛㫖敬告十方大衆一代髙賢齊發好善心捨穀米或石或斗共成普濟願使老稚不壑不溝蓋人間百様皆空能保錢財為已有而眼底何人非我忍㸔路途有尸行與其遺所不知以作兒孫馬牛不如食所同胞以賛化工萬一為富不仁為仁不富将安處焉死而生之骨而肉之端有望矣樂進來先生賛先生之容温矣而肅先生之衷折矣而夷當來氏兩先生之崛起也如塤如箎先生讀父書為邑文學何難步青雲之逵乃竟以文學終嗟哉其數之竒追憶立雪之年先生與吾師雒先生實莫逆胡為乎面命之言猶在耳忽隔幽明而成今昔夫其終也自以數預決其期及整幘􅍤以俟而竟不爽人益信先生之前知於乎苦海無岸執幻成戀安得起先生九原而為世剖一定之算也乎峩東唐先生讃有引處士於余同邑里别號峩東賦性剛方言動以禮于親孝于弟友少習舉子業竟以孤廢後稍稍操觚為歌詩善晉宋帖又善論事里中有弗平者輙投牒當路不少遜避即里中人亦有不之官府而之處士平者蓋陳太邱之流也邑大夫谿田馬公山左趙公每嘉其為人余亦欣然羨慕之庶幾有隠君子之風焉碩人李氏端慤静淑足稱良配令子山人竒宰述厥行求讃於余余與山人善知處士迺為之讃並讃碩人於惟處士氣融神與少而儒名中焉賈處聳聳山立翹翹鶴舉以孝以友允文允理望之儼如飄然無侣於乎斯人也觀其行則方聞其風則起殆庶幾乎鄉之善士古之遺逸者乎記稱軻母史頌鴻妻温温碩人垂範中閨始相厥夫終成厥子令徳令儀鍾兹雙美瞻彼徽容金輝玉理懿哉淑媛可讃在此襄陵王季公墓表萬歴甲戌十一月丁亥襄陵豫齋王季公卒㕘政梁君綱銘其墓矣時仍故封稱文林郎安邱知縣居三年子陜西副使應吉以御史起草土還臺遇上嘉禮成上兩宫徽號覃恩始贈季公仍文林郎陜西道監察御史蓋又逾二紀而不佞純始表其隧上之石季公諱用中字道行豫齋其號徐訓導逹曹令瓛鄉飲賔天祥實季公曾大父大父父也世世衣冠冠襄陵士族季公生而頴異鶴形望之知其非庸衆人弱冠折節從塾師受毛詩日記數千百言籍襄陵諸生意猶不可諸生業去而工古文辭揮洒立就試輙冠諸生且二十年為督學使章君廖君遴八河汾書院即書院諸生亦屬目不啻小巫遇大巫遁矣既遍友晉知名士益自負㑹有日者髙譚人禄命頗騐獨不許季公嘉靖中例拔諸生貢成均季公以次當貢者再不就八試澤宫竟不利如日者言久之始應庚申貢授保定新城訓導新城諸生故不受約束季公至則飭躬砥行以示之趨又為規條令不得越越有罰諸生始駭疑既訓習安焉刺賢書者接踵居五年自都御史監司以逮郡邑長吏爭推轂無敢以名位加者既副使舉乙丑進士知安邱季公倦逰㑹遷博野教諭亦不就歸日從諸山人樵牧間蝸蠻腐䑕不入夢者久之先是副使苦安邱難圖歸季公移書誡曰兒第以烹鮮和民以冬煦待士以完璧持身它毋足慮者副使唯唯竟以安邱顯名入為禮部尚書郎尋改御史按畿南江北遷河南㕘議至今官而御史時則以季公暨母梁孺人養長安邸誡之如在安邱時故副使為御史歴藩臬名益顯而人歸誦季公不置其晚神益王五官之用等於少壮謂上壽不啻遽一疾不起距其生正徳丁卯八月己丑年六十八識不識咸欷歔流涕純獨以季公有不朽者曷憾蓋世甘宦若飴不惜垂老折腰覬倖不可必得乃季公心知檀雖馥不能逆風即日者誇嚴引為左劵與擁臯比寜解綬不做令副使做若景叔之望子明其氏同其世行亦同矣朽耶不朽耶曷憾純故與副使同舉進士同令東齊莫逆又同入計歸謁季公于新城學舎目撃季公以冬煦待新城士者蓋躬自有之而舉以誡副使也宜表矣建陜西㑹館祭告諸鄉賢辭易崇徃行詩重先民矧為國寳範我後人創祠京館永聚精神節届春秋牲醴敬陳髙山仰止期步後塵洋洋在上庶鑒精禋李氏慶餘圖賛有引李氏姑王婦温蓋吾邑所稱雙節者云王稱未亡人時年二十有八耳當其時伯子生甫八年仲子二年季子猶然在娠其後三子以王力竟成立而王亦以節著聞里中温蓋余再從姑也蚤失仲子獨撫其嵗餘子汝正亦成立嘉靖中督學某公檄縣旌王扁其楣然未有聞之當宁者蓋閭閻隠行不上聞類如此汝正舉孫所親各持牛酒為姑婦圖徃賀蓋曰汝正蚤舉孫皆姑婦餘慶云余為揚扢俟觀風者采焉賛曰惟古立孤曰趙宣客嬰為其難煜煜史䇿王實比徳家用阜昌有美三鳯奕葉芬芳仲婦曰温從一于李婦復依姑雙節並美嬰以丈夫興趙猶難矧兹閨閤鵠立雲端食報持劵充閭有慶耳孫繩引積徳之證豈天故奪二夫君令内行彰又故昌二夫君後令世知天道報應之常也耶共學編引余竊繹孔門直罔之辨孟氏養直無害之説考亭先生晚年謂天地生萬物聖人應萬事直而已矣云者而知直之一言實堯舜人心道心精一執中之流派也蓋執中之㫖不外率性而其功盡於直養總之集義則直則繇仁義行則喻義則一而性情内外天人毫無隔閼不集義而襲義則罔則行仁義則喻利則二而性情内外天人若分胡越故魯鄒立論為似是而非非為恣肆立隄防也世方力宗二氏弁髦魯鄒為無竒而或操戈甚則以恣肆而託之乎率性雖得二氏之㣲者亦厭鄙之宜魯鄒之門不道蓋有以似而掩非之實又有以非而襲似之名掩之不可襲之尤不可襲義不可襲似尤不可無他不直故也嵗辛丑得汝南蔡𢎞甫共學編葢家居時掲館𢎞道與門弟子約者類與余意若相發明𢎞甫聞余說亦謂不謬可為步趨魯鄒之梯屬余括其説為引於端固余意也時𢎞甫方讀中秘書與余比隣相與約從日用實地以融徹性靈從闇然隠處以周洽宇内又從㬰𢎞甫益廣其㫖而布之𢎞甫葢余故識於諸生中者兒予知又與𢎞甫共學成均莫逆𢎞甫兄頴倅聚甫亦知學以藩幕攝吾邑執禮于余甚恭葢父子兄弟若膠漆之投已卄年所而今方日相印證又欲以其帙寄聚甫於頴寄予知於秦及諸從逰者使異地無隔閼相與北面魯鄒而祖堯舜宜不出直之一言亦以求自竟吾學非專為諸共學者增蝥弧也刻齊民要書引孔子曰道之以徳齊之以禮有恥且格有味乎其言之也徳吾何有有先王之禮在學士家日誦說宜興起者衆窮鄉委巷黄童野叟以經曲禮道之難矣故遵聖諭衍通俗歌附諸賢闗風化詩文併世傳八行圖家禮節要庶幾易曉而以勸農桑終焉為民不富不可與教也儻亦有味吾言而恥且格者乎雖然遺厥本矣民即以徒言責我我何詞今以徃吾守吾禮而巳矣吾脩吾徳而已矣重刻陜西同年叙齒録跋徃吾儕偕計蓋六十有五人其年劉敬甫舉順天敬甫既秦人遂相與為同年交故今録偕敬甫為六十六人云録有古原月溪二先生叙叙告誡吾儕同心締結意甚具然嵗久萍梗獨三載入覲及就試南宫始一㑹㑹又不人人至即純十四年中僅一再與乃聞問慶弔不相及則大都然矣録刻秦中時布未遍故今或併其録無有特相與増正刻之都門遍布焉今以徃奉二先生言相質對使千里如面世世講好者其在斯録也與其在斯録也與懐淨土詩跋釋氏説淨土與吾儒誠意若相發蓋人之身有土意是也妄念起則穢矣烏乎淨彼以淨土為西方極樂國者託説也故心無穢焉徃非淨土何必西第西來意欲忘吾儒曰勿忘夫勿忘矣而又曰勿助則其效可逆睹矣中峰和尚懐淨土詩百八首蓋學淨而若忘者子昻書其要者於巻亦心手兩忘得山隂筆意武林人相傳以為二寶不虛夫學而不可不至乎忘者獨釋與書已耶命鐫之石温恭毅集巻十五
