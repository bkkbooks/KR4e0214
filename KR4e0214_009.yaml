body:
  text: 溫恭毅集卷九明溫純撰記陜西學田記萬歷甲午余建學一草堂與二三弟子相刮劘㑹吾秦督學使沈君操功令鑄士惟謹行縣過余一見傾蓋如故相與坐而論者久之首論學政次論性命沈君謂三代而上政出于一而治隆三代而下政出于二而治汚唐虞以五教屬司徒契及使勞來匡直輔翼振德周命司徒掌邦教以佐王安攘邦國無二政也今司徒不言教民教民之秀者屬吾督學使政二矣三代士有田以祭秦士家半徒四壁立何論祭學有糧官生之缺者虛焉余業請於兩臺檄諸守令以虛糧易田士稍稍有禆乎而敢曰政庶幾一余聞而頷之余謂政不一者學不一也一之說昉於虞廷而詳於鄒魯人心道心精一執中之㫖炳如日星矣洙泗授受不離食居欲惡尤特戒士之恥惡衣惡食者詎外人心以求道心所云祖述不虛其後論道在飲食夫婦論天性在口目耳鼻四體與父子君臣賔主賢聖之形色雖好貨好色亦可以盡性總之曰率性曰踐形曰一不然是二之也學不二則政不二矣沈君亦聞而頷之言未竟日髙舂乃别久之沈君以書與幣徴學田記余未有以應也無已則以吾兩人未竟之言為秦士朂可乎士今有田矣請說田田之制母如三代三代之田之制母如周周自后稷公劉首重田蓋教民力本務朴而重為邪云庠序學較曰明倫振德哉上焉者無之非教下焉者無之非學不然井田之民庠序學校未設也出入既相友矣守望既相助矣疾病既相扶持矣百姓既相親睦矣疇驅之而疇從之也漢都吾長安治近古不重孝弟力田乎秦士生長后稷公劉過化之地習聞漢代孝弟力田之風誦說唐虞精一執中之傳步趨鄒魯天命性道之訓宜興起無所俟田然有田則牲醴粢盛可備無田則澗水溪毛可薦今天下文靡甚即有意乎反本歸朴使重為邪宜自吾秦始秦士倘亦反本歸朴而重為邪乎士誠反本歸朴而重為邪何情非性何性非命何人心非道心田在是學亦在是飲食夫婦在是道亦在是口目耳鼻四肢父子君臣賔主賢聖在是性命亦在是沈君論政實論學豈其於禮義相先之地姑為口體衣食之計而所謂操功令鑄士者不在是必不其然藉今士必衣食足而後禮義興脫衣食未足而禮義可斯須已耶去學千里矣又田入學而攘焉爭焉不啻壟斷視之使人嘆以為有田如此不如亡有去學萬里矣秦士䫫椎朴寧爾爾矧沈君以身為鵠而以田為表耶余不敏欲學一焉未能也聞沈君言且喜與吾二三弟子生興起心而何疑于秦士秦士朂哉遂書以為記沈君名某號太素吳江人萬厯丁丑進士某處田若干詳碑陰海塘記在越紹興郡蕭山縣西十里許為西興鎮鎮被錢塘江江被海而起鎮以達於郡者運河也錢武肅王鏐故建塘其鎮海潮日再至嵗久寢决寢修丙戌大决民居漂數百家江且及河害且及郡郡蕭守良幹若邑劉令㑹上狀余下藩參朱君臬副令狐君議僉謂更為塘以障之便議大略言越蓋東南一都㑹也西興實其門户故名固陵以可守故越生聚教訓草年竟以沼吳以此鎮也漢買臣稱一夫守險千人不得上晉元帝稱浙今之關中亦以此鎮也無塘無鎮無鎮無越為塘而庶幾其有越乎利一江入河即蕭山西興以水不可居山陰㑹稽以滷不可田為塘而蕭山西興安於居山陰㑹稽安於田利二余於是同直指使者傅君李君請于上而各以贖鍰佐之發郡若邑倉粟半不足取于山陰㑹稽蕭山田畝不滿升量工授食以卜判鏜總領郡幕陳䇿縣丞王箕分任其事六閲月而工竣又復故鎮海樓余渡江中流而觀塘壁立樓峰峙而榜人則指中流謂余此錢氏故塘所也余悵然低佪嘆而不忍去者久之既登岸還武林署㑹有客過余言塘自武肅歷宋守吳芾氏而來畚鍤之役略可得而言洪武中髙皇帝遣尚書郎暨藩大夫治之而周文襄公功最著于宣德間沿至於今波流極矣石非因於故也而下木以為楗朝下則潮夕推之夕下則潮朝推之雖鞭之長不及馬腹毋論武肅舉一國力捐數百萬緡集强弩射潮即洪武之役取材他郡藉力他邑而文襄用便宜括贖鍰數莫可詰難矣主上神靈嶽瀆挾盻蠁而左右相之守祭潮潮退判令幕丞身橇㭺經營費不盈二萬工不及三時人力不至於此豈禹陵廟苖裔在越而陰以濬川刋木之烈導之耶何成之易也越自是有禆而公中流嘆者何余應之曰若謂越而有此塘乎胡不求錢氏塘以觀之也今天下大患在失時在諉事孔子曰使民以時其以農隙解者語時一端耳及時則事半功倍踰時則事倍功半不待知者而後知也而事半功倍或不以功名事倍功半則以其勞苦費多而功之矣漢曲突爛額之喻可鑒已今之守令無能名一錢費以萬計不效則有文法效則亦有唇吻以故事即不可已苟可緩目前即遺大費於後曰後之人之責也文法唇吻我無與今日之役蓋迫於江且及河害且及郡而為之也亦㑹今之守若令皆任事人也藉令江不及河害不及郡而守若令亦以狀上而身任之矣語曰蟻穴不塞將成江河夫人而不蟻穴忽也費或無事於萬而錢氏塘與西興數百家居在今以往有不蟻穴忽者而越庶幾其有此塘乎不然余恐後之視此塘亦猶今之視錢氏塘也而越奚禆余故不能不臨流而嘆客曰善㑹守索余言為記余故記此以告後之守令而因以自警事固有類此者其味孔子時使之言鑒失時諉事之弊察蟻穴江河之戒母若此役之迫於江且及河害且及郡而為之也塘為丈三百三十有竒所費金為兩萬七千有竒工興于十四年十月成于明年三月傅君名好禮固安人以按浙至李君名天麟武定人以按浙直至而藩參朱君名文科則分部其地臬副令狐君名一槐則以清戎攝水利者也效勞諸執事書碑陰卻金館記去栝蒼郡城稍東折而北可四十里許為卻金館前太保廣昌何公守東甌時屬入計取道栝蒼館焉而永嘉丞于建醵士民金即其館餽之曰士民習公之勵操也願以佐道里費公謝郤之後人追美其事因名其館曰卻金云丙戌夏余巡海上過東甌見公祠固己慨然伊人之懷比抵栝蒼憩館下徘徊不忍去時館稍稍就圮又規制陋不可以風分守與備兵使者暨其栝蒼守若麗水令俱公里人聚而謀所以新之不足復謀助於里人之在浙東西者余作而嘆曰是關吏治余實尸之矣於是斥羡金及庾之陳佐其費仍令恢其規制以示崇重蓋又三閲月而迄工前為大門門俯官道門之內為㕔事㕔事之後為堂窿然附於堂者為碑亭翼然起於左右者為廂房計地則廓然而增於舊者什之四計楹則斷而增於舊者什之伍計崇卑則聳而增於舊者什之三輪奐備美具瞻彌嚴憑軾結靷而過館下者不啻奉公儀刑而色動心怵矣分守與兵使兩君請記余謝曰是役也諸大夫之所以惓惓於其鄉先達也而余特藉手以鼓吹吏治耳何敢専諸大夫之美抑余文何足以辱公兩君請益固余不獲辭屬諸務鞅掌未有以應也余拜計二命候代苕溪始獲以餘暇記其始末緬惟章皇帝慮東南沿海諸劇郡數骫法難治詔推擇近臣之有聲者往守假之權於是御史大夫顧公佐以公與况公鍾九人應而公遂繇御史領東甌公在東甌六年諸所以喣嘔士民而登之祍席者不啻白圭之趨時亡遺算矣章皇帝又時時假渥典以激勵之當公詣闕便殿一見已屬稀濶而又賜之宴賜之詩以寵其行至賜璽書增秩寥寥千百年未有行者而亦自公得之卒用宗伯胡公薦起拜刑部侍郎以去嗟乎公生平卓卓即中材亦自凛凛鄉風又何難於却金世謂公卻金非暮夜與劉寵之不受一錢䫫信哉而寵之為民德不知視公何如也然微章皇帝與御史大夫知公即知公而任不以六年公雖能為德東甌東甌雖能德公寧遽若是余自被命填拊浙東西仰窺主上明聖鋭意吏治宛然章皇帝家法敢不夙夜兢兢罔失墜數分别郡吏為主上言之其為士民所習服而安焉者援公東甌故事令久於其地而不驟遷以竟其施主上幸過聽輒久假令他日諸郡吏有倣佛公者則余庶幾藉手報主上哉是今日修館意也分守君姓胡名緒兵使君姓蔡名庭臣守曰喻均前令曰吳思學後令曰鮑大觀其他在浙東西而有助者並勒之碑陰浙江平湖縣創建學宫文廟記平湖即古秀州入海鹽而分建縣則自我明宣德四年始縣有孔子廟儒學而建大成殿學宫則自縣人陸迪功圭始迪功故以孝友博學聞景泰中施穀種施棺瘞餓殍詔授迪功郎故稱迪功云初建縣㑹時詘力不及廟學迪功曰范文正何人哉以其宅為吳學矣士無廟胡瞻無學胡羣吾與以資待所不知何人寧佐公家急使士瞻且羣于斯耳於是捐資搆大成殿巍如也又同縣人沈某為學宫翼如也後嘉靖三十二年以海冦城城而東南缺焉迪功曽孫刑部主事杲復捐資如形家言為浮圖以當文筆聳如也士二百年瞻且羣于斯占畢簪紱翩翩矣而迪功後顯者有程鄉令鋹光祿卿淞少司空杰主事杲太宰光祖郎中夢韓督學使光祚而光祿與沈氏後某又俱首解為一方文獻之冠蓋先是廟學工甫訖縣令酹酒仰天為陸沈兩家祝願世世簪紱不絶已果然人謂縣令言若劵云萬厯十五年余監越諸士子金文輩思迪功不能忘請記余時及瓜代未有以應也無己則申其義以朂諸士子夫迪功為文正則文正矣文正志在憂樂何論顯晦藉苐令迪功當仕有官職寧遺餘力不為國家𥪡鴻巨之烈若文正而廟學焉急迪功家食即力不及廟學有任之者不難以越俎解而廟學焉急豈其不以資待所不知何人而復為所不知何人瞻且羣焉之地以媒進抑天子以迪功故登進其後使世世簪紱不絶以酬功勞必不然矣和氣融洽應若桴鼓故遺所不知以慶之餘而迪功不知為迪功陰酬其功於異世而天子不知治平之極通物我貫天人繇一隅以風天下士而天下士亦不知藉苐令士苐知占畢已爾又苐知簪紱已爾國家建廟學始願豈若此亦謝迪功識逺矣天子方隆棫朴之化廣厲功令視往代不啻過之士生其時亦厚幸且業已北面而事孔子宜遵何道哉子固曰一是皆以修身為本修身說詳大學經傳而總之曰格物格物云者通物我貫天人之謂也士思迪功不有其家之心以繹大學格物之訓寧不愓然求所以為此學重以無負天子作人之化乎遂書之使勒珉為記記成太宰拜今官方持衡以待士而天下之治平賴焉宜有以風士余企望之矣臨潼縣文廟學宫記臨潼文廟學創洪武初其詳具易長史謙記中士多起科貢科又多首解額嘉靖乙卯地震學圯士鮮舉者萬歷癸未劉令應聘至謁廟睹學喟然亟繕庀之役竣㑹周子道直趙子光裕武子之望相繼舉而武子仍首解額成進士士德令不置周子趙子與其士髙愈謙趙光逺走乞不佞為記夫臨潼周驪戎國也秦伐戎以其地為驪邑獻公徙治櫟陽猶不與中國諸侯㑹盟櫟陽即今臨潼也士生于斯上之有靈臺辟雍之化而驪密邇豐鎬不聞與江漢同風下之有洙泗杏壇之教服七十子而秦産獨壤駟赤秦祖何以故戎鄙夷之而秦纍世以攻戰阻閼之也漢唐繼秦混一建都其地興學得人我明太祖革命建學視周至成祖以秦地重俗悍簡畀特隆一時鴻士巨儒昭光振耀即臨潼亦有樹勳受知為一代禮樂之宗者今天子益隆薪槱之化盡海澨而江漢鄒魯之何論周秦此其盛際也繇斯以談謂周士貴自貴秦士賤自賤不盡然矣臨潼輔翊長安且三千年於今視秦在周合未幾而别乃數百嵗逺甚士當是時寧異沐有周孰黨膠庠時書嵗獻入使長出使治之澤也耶二三子其毋負時泮宫之頌本之乎敬德廣心慎儀克孝推之乎酒食囚馘徒御弓矢而極之乎假祖考憬裔夷來琛象此何以說焉挽近世大都號稱局幹浮慕絃歌色澤聲華苟以應功令又其甚傳舍官守視宫牆出琳宫梵宇下言化誨者溺其職矣而令所亟圗在此不在彼二三子其無負令相古達人不離耕築巳恢恢乎負經綸大業禹稷雖賢不加陋巷此豈宫牆繩束官師督趣風厲之哉既已繩束督趣風厲即褎然舉而用世有如芻狗生平失其所為貴而人賤之矣是孰使然耶二三子其毋自負紹明吾先師之業辨而志豁而見聞廓而性靈簡押而身心一旦雲蒸龍變惠洽而胞與民物為明世重使秦隅盡有周之哲是令修廟學意也役始於某年某月某日成於某年某月某日費不及民工不病農為殿為廡為門為堂為閣為舍為庖湢所葺凡四十楹創凡十楹先是令議且定請而得久則中丞某公直指某公藩臬某公某公而專董其事則丞某簿某尉某樂觀厥成則學博某某某令晉翼城人興廢舉墜甚夥廟學其大者今為臨洮太守所至有聲稱者也城隍廟豎綽楔記先是嘉靖壬戌豎綽楔縣城隍廟門事詳來憲使記今年壬午社民常受福等復豎綽楔神殿前縣大夫榜曰明靈奠佑蓋巍然煥然矣時余家居道士馬𤣥伸請記記之余惟城隍神故不載祀典吳蕪湖魏成都祀矣唐縉雲令李陽氷以禱雨有應祀矣然無有奉天子詔遍祀者奉天子詔遍祀則自我明始明興髙皇帝詔封天下城隍帝金陵者王開封臨濠太平滁和者公侯伯其府州縣者各以監察司民屬焉已詔毋人神嶽鎮海瀆城隍城隍稱曰神已又詔祭泰厲國厲郡厲邑厲鄉厲主以城隍已又詔頒祝詞儀注令官受事先謁城隍誓相表裏奠境內淵哉聖謨福善禍淫宜其不言而化以故二百年來所在官民北面而朝城隍者趾相錯也吾三原城隍初封顯祐伯今稱三原城隍之神而縣故關河間一都㑹四方啇販日雲集闤闠間其北面而朝城隍神者趾益相錯也蓋水旱疾疫則禱之神婚葬交易征行訟獄則問之神其對簿而直於官則已而神亦有時而寂不則朝爭直于官而夕爭直于神或夕爭直于官而朝爭直于神或不之官而之神又禱者問者爭直者與入而伏謁者疇望而不肅然改容以嚴事神即今豎楔者亦其一也豎楔者蓋曰吾儕小人也以神故不敢為不善以不敢為不善故往往為神祐惟是一楔以答神貺蓋民令其不為也難而令其不敢也易故有人於此與之談善不善即訟說先王者或反唇而掩口與之談禍福即里閈亡賴亦神竦而色變藉令髙皇帝日察察焉以賞罰為事將舉天下以賞其善者不足將舉天下以罰其不善者不給當其時惟以賞與罰之權託之乎神而已無為民以其不為不敢之心奉二百年遺令如一日而其究乃不歸之髙皇帝而歸之神而民不知無為則神不知則化微髙皇帝疇以神而為德於天下微神疇以髙皇帝而為德于吾縣余然後知髙皇帝神道設教又知神之格不可射令其民奉二百年遺令如一日至今也縣大夫姓張名大謨廣平永年人所謂與神誓而表裏奠境內者也下車與豎楔㑹首事勸懲自是境內民即欲為不善而不為善也又誰敢哉仁和錢塘二縣桑園記余讀豳風春日懿筐蠶月條桑鳴鵙載績獻朱孔陽而知有周厚風俗致王業八百年盡在是也蓋人務本則朴朴則易用易用則少私義少私義則公法立故財用蕃殖於是乎始敦龎純固於是乎成雖見竒麗紛華猶戎翟之與於越不相入矣當其時欲寡而事節財足而不爭太和在成周宇宙間有以也挽近世捨本逐末散朴成鄙於是商通難得之貨工作無用之器古先王重本之意失而民亦困嗟夫往余聞吳越地帶山海膏壤數千里人民多文采布帛冠帶衣履天下意阡陌間桑麻如林既奉璽書撫越憑軾問俗乃與所聞異西湖名園鱗次多茂林修竹花卉之饒方春士女遨遊連肩接袵富商大賈操竒贏逐利闤闠齊民一切刺繡文倚市門仰機利而食嗟夫俗蓋大侈靡哉賈子曰背本而趨末食者甚衆是天下之大殘也淫侈之俗日月以長是天下之大賊也先是兵民之變一夫嘯呼烏合之衆雲集豈獨其俗薄亦農桑之民少故也彼纘武功而急公上非七月之風乎即嗜義不下咽何敢頓刃以逆執事者之雁行故農桑之教越尤急於是為檄令有司罷一切煩苛專務農桑郡邑亦稍稍有應者已而杭州余守良樞仁和程令達錢塘孫令珫請曰郡故有養濟院院左有奸民以權利役屬侵剝之甚或集無賴以空名冒糧不遂則嗾之訌要衢此其漸不可長且羣千人一所嵗多疫武林附郭有隙地可移居居即令奸民建以除罪而以院基為桑園率民便余曰此政本也可以風矣乃檄陳判表度得地六十二畝故官㕔倉基勿移可桑凡五十四畝有竒分東西二園市女桑五千餘株令縣丞汪鈺督圃人任其事園為官㕔四楹東西翼房各一碑亭一㕔稍前為儀門又稍前為門樓園內外垣馮馮如也或曰齊魯千畝桑不能必民完短褐五十畝之園奚禆乎余曰不然聖人在上民不凍餒非能耕而食之織而衣之為開其衣食之本也管子曰善用本者若以身濟於大海觀其風之所起武林非浙郡邑之風之所從起哉風一倡宜多應者在今日自是闢名園而為阡陌易花卉而為桑麻末技游食之民轉而緣南畝西湖絲竹之音變而為豳風七月之歌庶幾哉輕剽之俗雅化為朴亦在今日故曰觀於鄉而知王道之易易也余故紀其事以告後之為守令者桑成給民詳檄中載在碑陰修真武廟記嵗壬辰富平真武廟成棟宇軒厰禋祀孔時丐余記記曰我國家惇敘三禮懷柔百神惟典祀為兢兢蓋甚毖也神何以祠富平何以祠神余聞之神於行為水於卦為坎於宿為虛於分野為朔方宜與三辰六氣五嶽四瀆並列典祀乃道家者流謂神净樂國王子也冲虛服道白日矯舉蓋實沈髙辛氏之胤也而為參神臺駘金天氏之裔也而為汾主神豈有異焉文皇帝龍躍燕邸靈旗助順於是作以𤣥嶽護以中使瓊宇紛披玉階森矗儼若宸居其嚴重若此下逮萬井之邑百廛之市愚夫竪子肖貌而尸祝之若其左右陟降洞洞如也翼翼如也遍海內上自王公下逮士庶爭北面嚴事惟素王所從來逺矣乃神幾與之埒吁亦盛矣哉今夫天下之形者形色者色生者生化者化與時相禪轉續無端者物之為也不形不色不生不化冲而徐盈動而不屈者神之為也神非物也而物所繇物充然被埏垓而無垠後天地而不老誠之為也如以物而已神之去今幾千百嵗而遙幾千萬里而荒而何有焉如以神也業已升為列仙扄榻八荒芻狗萬象視南面王樂猶敝屣也而我乃始􅀢㝔以居之竽瑟以愈之腥羶以將之雕薨華榱為飾而已祝矯史頌為佞而已豈其泰山不如林放而誰則享之有如為人父誠慈為人子誠孝為人兄若弟誠友祓志誠齊藻身誠潔敦俗誠任以恤臨事誠恪以䖍夙夜對越誠著誠察倘所謂明德以薦馨香其庶矣乎慎斯術也蘋藻可羞潢汙可酌數椽可宫幾千百嵗而逺可格可享非神之為神而人之誠之不能不神也故神之當祀與之祠之合於典與否余不論論所以事神者俾父老子弟勉旃庶幾不愧所以新神之祠云雖然若此則豈惟神雖以事孔子可也綜理助襄各姓氏列碑陰相天張君塋記昔有過漢董江都之墓而駐馬垂涕者何也其人賢矣百世後猶願執鞭而忍視一丘翳然榛莽哉相天張君卒業葬祖兆之次世行詳來郡丞志久之仲子永業以狀及世穴次與塋規請余記余故與仲子同學烏乎辭君少穎敏父竒之令學書為家世業醫又令學醫悉出故所籍方術授君君閉户遍讀業既成縣諸豪傑父老爭致君安車結駟于門君不執方多竒中喬按察景叔病頭痛不以風治以火治冦尚千病寒熱渴甚不以溫治以瘧治王大中病悸令誦警心語李芳病積憂腹塊令人謔于前俱愈古所稱竒痎非耶君於醫㫖中尤有味乎內外家言故神常王體常康間遘病曰吾養身以醫得亦以醫纍謬寄司命不能避風日慎眠食能定精服氣為其急人後已若此且市利不入于心報謝與否母論也藉報謝不及更接以愈色退而視劑母不精慎嘗施濟貧病母慮千人用是四方無不知醫有張君君性孝友父病亟思食鹿肝㑹祀先師畢君泣請得之學博士和羹上父父病立愈伯兄性嚴君于于與之和居父喪哀毁幾死殯葬如禮祖墓三拓地留坊里倣昭穆葬以母俾散佚宗盟益因以聫屬赴人之急如已私人有搆者幸君居間力解胡别駕為人中欲訟之官行金求直於君君笑而還之曰吾不利若金直若已竟力直其事胡敬禮君終身遇人喪葬婚嫁糜金錢助之以為常縣大夫多君年行舉鄉飲力辭隆慶改元賜爵一級冠服一御以拜嘉恩命已力麾士論益多君初君六十時罹危疾死而忽蘇曰頃雲霧間隱隱謂我而有活人功增夀二紀果二紀卒事甚異云君諱祕字子藴稱相天者以嘉靖甲寅邑疫甚得君活者甚衆馬光祿伯循謂君醫能贊化顔其門曰相天人以是稱之云嗟嗟君能活人且孝友惠恭不可謂於世無禆固當今之賢者而病而異夢增紀寧獨君相天天亦相君矣槃槃一丘固當與身後名同不朽哉不佞重違仲子請特記之繫牲之石俟有賢江都者賢之穴次塋規載碑陰溫恭毅集卷九
