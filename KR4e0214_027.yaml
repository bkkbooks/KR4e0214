body:
  text: 溫恭毅集卷二十七明溫純撰尺牘與魏確菴中丞初謂雙旌道敝邑得侍教大幸不然亦如髙陵道中候焉會賤軀病不能矣時暑途逺願為國珍重翁此行必拔亷必崇直社稷之賴也然不見亷以激不亷不見直以激不直默成漸移期於忠君古大臣在事類如此今巖廊不可一日無翁純故以此言進幸恕狂謬報王竹溪中丞自楚豫間一通赤牘於今且十載神交夢想似臭味有相投者不直以衣鉢同舍故惟是萍梗鴻渺一傾倒無從則悵悵然秦塞以節鉞令呼韓固欵即內地且受波及山中人安卧亦知其所從來矣札至如靣謦咳何日接膝以慰我積懷乎與蕭兑嵎中丞報至知簡移越中為足下喜為越人喜然借冦無從又不能不為秦人嘆也豈執秩分秦越抑為越急而秦緩乎越誠急果更無排難定紛之才而秦猶未熟所賴喣沫而拊循之者如病嬰之倚慈母乃奪此與彼謂秦人何秦越俱足下舊逰地輕車熟路又今之能排難定紛者無踰足下即以足下往耳嘉首聞已獲果真則得一鎮靜者即可令反側安矣恨不蚤得此信而令足下免此一行為秦人借也與成監吾往在都日從門下談塞上事謂門下異時秉政則為禁中頗牧乃坎坷久之徒令人有笯鳳之嘆今當塗拔淹採望故以門下為關中師關中師故多名賢然救時當國無踰楊文襄文襄為國重以遊關中故也門下不薄關中關中士今得師矣賴緒餘必有興者又關中之士之德也裁此稱慶報羅雲野太守初得兄東萊信快之以漢之稱良二千石者為其郡以人重不問其郡若何也東萊即濵海弟往為令其鄰望東萊堂亷甚逺而兄薄之耶弟今見良二千石於東萊矣詢盛使知有季父變失於修奠而春初弟繼室亦去世三年中苦楚如此天罰我極矣時關中大疫弟家更甚有懷不盡報栗瑞軒承奠唁即白之亡者且東向稽首以謝三年中家屬戚屬以死别者八而頃大疫諸屬半染遞病遞起久之始已蓋有生以來所未嘗者諺云清福難享信然然因以覷破死生大界真一毫著力不得矧功名乎夭夀不二修身以俟有味乎其言之也其二來札密示令弟聞所不聞使用人者得此說將竦然懼然不但用人者之命所繫更有繫之大者書云惟天純佑命則商實夫所謂實以有一德之元聖也不然即備官猶謂之空虛天不佑之矣用人者能進退人哉兄首資不遷蓋庶幾知我者希然當此競進之時有不遷不為人知者猶可言實也弟年來多變信命愈篤即此身且幻耳安論其他公奠本菴太夫人衆以奠文屬弟文成矣㑹漸老染疫今猶未愈以是遲遲然漸老愈即同發矣靣間再為道之報趙寧宇中丞弟役兩浙不異蚊負幸閩浙接壤可借光鄰壁獨吾丈鎮閩有日業已䕃稠澤沃旦夕徴拜能更借為閩且為弟乎弟至後入越獨藏庾以養兵故壁立即閭閻亦苦徴斂乃新增織造嵗可費六萬金加𣲖不可奏留不能不謂東南財賦之區窘而至此那輳樽節如窶人之宴大賔亦大費心力矣與李次溪制府今門下果以大中丞節鎮秦矣為秦父老篤望於門下者不虛聞入㑹城不從父老為竹馬之迎懼人以我為守山林而事干謁也秦當水旱大疫後閭閻中如饑思食如渴思飲如病嬰之望慈母今慈母至矣秦父老喜可知不直山中人賴宇覆得安卧已也與劉鶴峯己卯别後無何即歸苐三年中喪兩偶而一女兩壻又相繼折苦楚難堪蓋有主之者即憂患之來且不可辭况功名乎自是稍覷破人間幻妄將於清峩間枕漱泉石以畢此生有時與二三後進講說經義亦自愈快且老父日衰又苦痰嗽頻發豈能夢寐冠纓作出山之草哉先是聞改官不得其故翰至始詳知之然亦有主之者故相何與焉讀翰中負氣之說甚服雅度趙歷城業已破格起用株連者當自白蓋不為相知喜而為國是喜也與趙新盤熊車西來無論隴右誦德即鄰封且受波之惠漢稱良二千石何幸於門下見之㑹舍親趙生立書至道門下直立首貢意甚篤立蓋故有名岢嵐丘憲左山公孫也往陸文宗以立治禮經令為塞諸生前茅今且貢乃以客論非門下則立不寃乎然業已有搆即貢乃善不然且為懼受辱無已時矣報劉晉川督府接邸報漸老拜今命與丈共事一竒也運務惟周文襄稱絶倫以文襄破格調劑令國與民兩利賴今其法即難盡行然其意可倣也惟二丈破拘攣之見圖所以不病國不病民者則文襄在弟初歸為二親衰白不意再補時家嚴苦痰嗽聞之色喜不敢以私請幸間請不喜以是捧檄愛日兩念交橫今且次且膝前或不能不出出則春仲可登途而都門握吐有日矣龍潭兄相去不逺相聞不報張周田中丞惟翁天中人望海內儒宗提衡舊擬山公建節今同范老惠朔方使就祍席欵效呼韓為長城以壯山河知結明主且不遺夫故舊更加惠於山林純夙守汝南式廬懸切久欽山斗傾蓋無緣受㕓以來沐愛獨渥兹因推轂叨與賜環拜貺綢繆庋之何能報李損書巨麗匣焉藏以代金敬勒尺書附酬髙雅伏惟鑒照終惠德音報張澽濵户書純叨補與翁返初服㑹此與捨梁棟而收朴樕者奚異今國家不可謂無事然非并包如淵斷決如流負任如鼇足者不可而翁其人也純故於翁之歸謂非山中人而自審則惶悚甚承教札又奉二親命不敢不治裝然亦恃間曹易稱如古所謂祿仕云耳有頃且圖良覿求指南往焉報劉少嵐運使今言者以弟秦人家被邊或習邊故收之疏中無論邊相詎數千里且安可謂越人盡習舟代人盡習馬也往議市不用秦人言今以市故事日非而欲令二三秦人當之即知兵且難卒效矧冒昧者蓋言者借以為游揚耳弟今者不得不為親而捧檄出矣出則任禮樂之司是弟所習即奔走於俎豆間不難古祿仕者率服易稱職弟今乃似之矣而他非敢望也報田小亨頃過雒㑹長兄始知借鄭咫尺無繇一靣翰貺再臨如對然因以知江油萋菲之故今日宦履之詳慨念久之雅度如兄卓識如兄豈久居人下惟在我自信自力付升沉遲速於命數焉往不可矧清時推轂倅幕者甚衆近與李漸老話别及持已涉世之要毋如自反而不責人謂自反則可以正已亦可以化人責人則不足以服人反適以忤物今且為藥石而珍之矣兄以為如何弟起家出意外奉二親命捧檄次覃懷㑹弟婦火發醫久之始稍愈一二日登途焉報劉我滄刺史頃過華下沃承欵教因諗治行卓絶古稱龔黃何幸於門下親見之華下民故稱難治然不可强惟盡在我今既令行事就理矣望更節縮與閭閻相安於無事如何月終僕從朝坂渡渭倘再過華下更有請焉與詹養貞侍御燕市識荆業心傾邃養乃憂時維正之談一接膝即罄底裏古稱傾蓋如故不佞何幸於門下乃爾役浙匆匆出都忽天假以緣簡臨浙直寧獨國計民瘼仰賴碩畫即身心簡押亦藉夾持其間而喜可知長至後入疆受事知前茅且至敬使使奉迎與王古林名邦風景佳麗逺遊人心甚快之第下以賦重嚴徴為苦上以逋負那移為窘無米之粥即巧婦不能三年之艾豈旦夕可蓄前云奏留節費時徴真不容已然節費時徴在我可力為之奏留有主之者誰能保其必允蘇杭需財甚急門下策安出可令僕倣而行乎與張環中頃辱翰示㑹冗集不即修謝為罪諗主計若持衡令軍與民兩稱便利漕挽可計日北矣太倉米可支九年今以往更減價半折不獨便民亦可足國三五年後更全運本色未晚也不然米日益紅腐年且失百餘萬銀無謂之甚矣明公可轉白之司農不與許敬菴督學曩從漸菴仰止髙山以無繇識荆為悵幸奎壁西臨西土白屋自是有返周秦之望追憶秦師自邃菴虎谷漁石大復淮海諸老接踵迄今海內數稱文宗必曰關西乃又得門下為重則邃庵諸老在矣純朴樕逺役大方懼蚊負聞前茅且西目成無期敬使使往門下亦為桑梓決策令僕稍稍藉稱塞乎溫公毅集卷二十七
