body:
  text: 溫恭毅集目録别集類五明卷一疏十二首修實政圖治安疏懇乞聖明亟圖覽本顧問之要以隆泰交疏慎選將領以重營務疏定廟謨飭邊防疏賊勢猖獗據城殺虜官民乞賜究處失事官員并議勦滅事宜以逺布國威疏警報日急再乞亟敕邊臣嚴防禦以慎固疆圉疏邊腹多故亟處任人事宜以専責成疏將臣輕率失律撫臣謀慮太疏致損軍兵乞賜嚴究并圖善後事宜以振軍威疏敵人進邊乞嚴飭當事臣工亟圖防禦以保萬全疏敵患可憂營務久廢乞重事權以専責成疏看詳章奏廣賊滋蔓奏詞各異功罪欠明懇乞聖明大奮乾斷正法紀破欺罔以亟救逺方生靈疏將官賄敵出邊地方難保無虞乞賜究勘以懲玩弊振國威疏卷二疏十三首仰遵成命糾正冒襲以彰法紀疏秋防屆期時事可慮乞賜大加振飭肅兵威以預圖安攘疏鄙詐督臣餽送無名乞賜懲究以正頺風疏敵人謀犯乞賜嚴飭內外當事諸臣大加防禦以保萬全疏邊報日急再陳防禦事宜以保萬全疏營制屢更統帥不一懇乞聖明亟賜裁定以正事權疏懇乞聖明遵祖制慎贈典以重名器疏屢據邊報乞賜嚴飭邊臣大加逐勦以戒不虞并議處降人以全國體疏恪遵明旨查正公用銀兩疏清查供應器皿酌處成造以節財用疏重宴賜以撫逺人疏懇乞聖明勉留大臣以正人心以全國體疏自陳乞斥以弭夭變疏卷三疏十五首忠臣已褒外親未宥懇乞聖恩推廣明詔大慰忠靈以培聖代綱常疏議留緊要將官以重海防疏乞賜議處佐二首領官員以風厲吏治疏懇乞天恩俯賜議處漕糧以蘇運務以拯民困疏地方異常水災疏府官不簡物議昭彰乞賜議處以肅吏治疏縣官馭下太疏致招訐訟乞賜議處以飭吏治疏懇乞聖明久任賢能府正官員以安民生疏司農告匱年甚一年敬遵明詔陳末議以備採擇疏府佐貪穢究核已真懇乞聖明亟賜罷斥以肅吏治以阜民生疏假解限迫工料難湊乞賜議留例銀酌定限期以便織造疏酌議調補縣令以安民生疏地方異常災傷疏糾劾方面官員以備考察疏糾劾有司官員以備考察疏卷四疏二十首仰承德意敬進芻蕘懇乞聖明采納以隆泰運疏大臣病故疏欽奉聖諭并陳末議以廣德意以消災沴疏淺船積缺數多地方米價甚賤懇乞天恩俯賜破格從輕暫改漕糧以濟國運以便民情疏恪遵恩詔改正虛糧懇乞聖明溥賜申飭以昭嚴威以宣實惠以固萬年邦本疏邊海要郡懇乞聖明久任賢能府正官員以安民生疏大臣病故疏遵奉欽依奏報京堂官員病痊乞賜及時録用疏災異頻仍懇乞聖明敦政體飭武備以除隱憂以圖消弭疏海潮突變衝坍石塘懇乞及時修築以保安生靈疏自陳不職乞賜罷黜以公考察疏遵旨奏報大臣病痊乞賜及時録用疏俯竭愚衷敬陳末議以求少禆治理疏懇乞俯憐民運繁苦議免關稅以蘇積困疏薦舉方西官員疏舉劾有司官員以肅吏治疏薦舉地方人材以備録用疏薦舉教職官員疏薦舉佐二首領官員疏舉劾武職官員以昭勸懲疏卷五疏三十首乞恩辭免升任以安愚分疏請停新增供應疏糾監督主事疏因母久病驚悸成疾乞賜放歸以便侍養調理疏遵例陳情為母請乞恤典疏為親老身病乞恩賜免重任以便侍親調理疏再辭南吏部尚書疏考察已竣聞言自愧懇乞聖明罷斥以重大典疏乞宥督臣疏遵例懇乞天恩準令開壙以光泉壤疏庸病不堪重任懇乞天恩俯賜別簡以重風紀疏舊病未愈新疾復增再乞天恩準令在籍調理以免久虛重任疏中途疾劇趨命難前懇乞聖明準令回籍以延殘喘疏宸居鼎建願捐微俸以助大工疏礦稅釀禍已深重地用兵尤急懇乞聖明速允停止以遏亂萌以保鴻業疏遵聖諭循職掌摘陳修省要務懇乞聖明嚴敕中外憲臣實心舉行以回天意以保治安疏臺臣急缺勢難久待懇乞俯允就近先選以濟目前差用疏逺臣被逮遭難可矜懇乞寬宥以光聖德併乞亟停礦稅以保治安疏臺臣久缺懇乞聖明蚤俞考選以肅朝綱以振風紀疏臺差關係匪輕憲臣接代久匱懇乞聖明早允考選以復成規以肅風紀疏詳陳臺臣缺乏之實懇乞聖明速俞考選以濟燃眉以保治安疏臺差懸缺日多考選萬分難緩懇乞聖明蚤賜特允以重風紀疏綸命頒行已逺天心孚佑有徴懇乞聖明確行前諭以承穹眷以保聖躬以安宗社疏積姦隱弊蠧國損軍乞敕覆究以肅法紀以重邊儲疏敵人猖獗天討難容懇乞聖明亟定廟謨以肅法紀以固疆圉疏西蜀危急難支海內動搖可慮懇乞聖明亟停礦稅以固邦本以銷亂形疏考選未奉綸音差委益苦缺乏懇乞聖明亟賜允行以通窮極以濟時艱疏臺臣員缺太多差用萬分不足懇乞聖明速賜考選以全國體疏吉典方新皇仁宜漙懇乞聖慈矜宥罪犯以萃和氣以培國脈疏臺差曲處無計各官苦候經年懇乞聖明速賜考選以濟急用以全國體疏卷六疏五十首大禮屆期舉行難緩懇乞聖斷及春允舉以昭大信疏亟敕正法以平衆怨以解阽危疏遵奉聖諭詳陳弭變切務懇乞聖明速停礦稅逮楚使釋被逮諸臣以遏亂萌疏仰體聖明宥過至意懇乞恩憐被逮微臣以光聖德疏天變非常不畏可駭聖恩倒施衆望益孤懇乞皇上亟推喜慶之恩力修挽回之政以收人心以保泰運疏慶典在即懇乞聖明寬逮繫併停礦稅以召和氣以延聖夀無疆疏自陳不職乞賜罷斥以公考察疏外臺關繫匪輕仰懇聖明亟點撫臣以奠封疆以資彈壓疏懇乞聖明亟定國是以一衆志以保治安疏乞處貪橫併乞賜歸以重風紀疏衰疾難勝重任再懇聖恩俯允歸籍疏衰疾日增臺務日曠懇乞聖明亟賜允歸疏衰病增劇懇乞聖恩早允歸籍疏衰病難瘳五懇聖恩早允歸籍疏久病曠職六懇聖恩賜允歸籍疏久病遵例陳情七懇聖恩賜允歸籍併乞允辭印俸疏病曠日久濫冒非宜乞允歸籍併允辭印俸疏久病曠職懇乞聖明俯允歸籍併乞允辭印俸疏病劇難痊十懇聖明俯允歸籍疏病廢曠官日久十一懇祈聖恩憐允歸籍疏久病曠廢十二懇祈聖恩憐允歸田疏久病久曠十三懇祈聖恩憐準解任疏久病久嚝十四懇祈聖恩憐準解任疏久病久曠十五懇祈聖恩憐準解任疏病篤難更強支十六懇祈聖恩憐準歸籍疏屢奉聖諭惶悚不寧久苦劇疾調理不效懇乞聖恩憐允休致以便生還疏奏為病劇目昏十八懇祈聖明憐允歸籍以息風波以全風紀疏病勢阽危十九懇乞聖恩憐允歸籍以冀萬一生還疏久病屢犯屢篤二十懇乞聖恩憐允歸籍疏奏為乞恩辭免特陟以安愚分疏天心仁愛有加聖諭虔誠特至懇祈乾斷亟圖急務以保泰運疏國禍日亟天聼日髙謹合疏力懇銷弭疏慶典舉行在即侍從憲臣乏人懇祈聖明裁酌點用以光大典疏恭陳慎刑始末伏乞聖明鑒察以重刑辟疏申嚴舉刺之典以警官邪以飭吏治疏為衰病懼隳憲紀祈恩憐允歸籍疏為久病屢醫不效懇乞憐允歸籍疏為病勢日篤臺紀日隳懇祈聖恩憐允歸籍疏京察自陳疏衰病不職懇乞聖恩速賜罷歸疏再乞休致疏人言再至義難姑留三乞聖恩早賜罷斥以杜禍端疏四乞罷斥疏五乞休致疏六乞休致併辭印務疏七懇罷斥併乞允委署印疏天心仁愛有加罪臣循省應罷八祈聖明大加挽回先斥臣歸以昭修省疏感時悚懼濡滯非宜九懇聖恩蚤賜罷歸以安愚分疏罪臣濡滯增羞十懇聖恩亟賜罷歸以定國是疏總憲歸田辭朝疏卷七序十九首大婚禮彚紀序孝經序子史餘珍序詞致録序續文獻通考序乙丑世講録後序教秦總録序歸來漫興序來氏族譜序趙郟縣永思録序楊文忠公三録序送司馬中丞次溪李公奉召入理京營序贈大司馬徐公總督陜西三邊序送右司空又軒姚公還朝序送大中丞寧宇趙公還蜀序送大司空蒼南吕公還朝序送御史中丞蕭公之浙督撫序送直指使君史武麟奉命按楚序贈藩參馮公觀察貴州序卷八序二十四首送郡大夫楚石曹君遷督楚學序送郡大夫印南楊君遷水部序送陳侯入覲序贈陳侯之任户部序贈邑侯文溪張侯考績貤封序贈張侯臺奬序二首贈張侯入覲序贈明府翀玄李侯述職入覲序王氏三榜異數序贈雷將軍三考承恩序贈周學詩偕計序贈辛君景虞鄉薦序耋老社圖序夀張居士六十序贈前溪楊仙客七帙序壽文學喬君七十序夀假次君七十序贈雷公偕壽序夀張碩人七十序夀武太孺人序夀梁太孺人七十序夀梁碩人序夀從母太孺人六十有一序卷九記九首陜西學田記海塘記郤金館記浙江平湖縣創建學宫文廟記臨潼縣文廟學宫記城隍廟豎綽楔記仁和錢塘二縣桑園記修真武廟記相夭張君塋記卷十墓志銘十七首明戶部郎中雒陽翟東岡先生暨元配安人孫氏繼配安人周氏合葬墓志銘明奉直大夫莒州守來公暨配合葬墓志銘明處士馬公暨配碩人景氏墓志銘明封文林郎咱公暨配合葬墓志銘明孝廉王季子暨配合葬墓志銘假伯子暨配溫氏壙志銘明中憲大夫四川按察司副使靜菴孟君墓志銘明封膳部員外郎平橋王公墓志銘明刑科都給事中郭莊張公墓志銘明奉直大夫山東青州府同知蟠山李君墓志銘明河南道監察御史郭君墓志銘明假涉君墓志銘明夀官胡公墓志銘胡伯子合葬墓志銘明梁母周孺人墓志銘明張母李碩人墓志銘明夀官王君暨配墓志銘卷十一墓志銘十五首明永夀府輔國中尉友槐公墓志銘明文學雒先生墓志銘明文學馮季子墓志銘明陽陵鄭季子墓志銘明貢士孔仲子墓志銘明員伯子墓志銘明夀官峩東王君墓志銘明耆賔石君墓志銘明夀官師君墓志銘明眉州知州西峯郭君墓志銘明封夏太宜人墓志銘明封太孺人陳氏墓志銘明封孺人張氏墓志銘明誥贈淑人亡妻李氏暨楊氏墓志銘明誥封淑人亡妻宋氏墓志銘卷十二傳二首中憲大夫李君傳御史大夫胡公傳卷十三行略四首先曽祖父母行略先祖父母行略二親行略先母行略卷十四議四首中原議撫治鄖陽議施瞿設官議制馭讐遂議卷十五雜著十一首修橋募緣疏救荒募緣疏樂進來先生贊峩東唐先生讚有引襄陵王季公墓表建陜西會館祭告諸鄉賢辭李氏慶餘圖贊有引共學編引刻齊民要書引重刻陜西同年敘齒録跋懷淨土詩跋卷十六祭文十三首祭冡宰陸五臺公文同祭冡宰陳心穀公文祭宫保大司空葉龍潭公文祭宫保中丞李漸菴公文同年合祭司馬中丞趙寧宇公文祭大司空淮海孫文恭先師文合祭少宰盛公文合祭劉南嵐年伯文祭司農郎雒陽翟先生文祭來望之職方君文祭劉太翁南嵐先生及李太夫人文祭大宗伯馮用韞公文祭王仲山年伯文卷十七祭文十一首祭中丞雒涇坡公文祭憲副楊崑洲先生文同祭憲大夫揚兩川公文耆英社同祭學博馬冶溪兄文祭安五峯表兄文祭張槐麓先生文祭徵君王子德社兄文督撫兩浙臨行祭祖塋文祭王康僖公夫人文祭涇陽李夫人文晉南京吏部尚書臨行祭先妣文卷十八古樂府十三首艾如張戰城南五雜爼平西夏紀事昭君怨自君之出矣四首公無渡河卷十九五言古詩二十八首紀懷二十五首有引題楊太宰桃花嶺送劉衍亨宗伯還朝閨思卷二十七言古詩四首書董生玉几山房圖七夕登庾亮樓歌峨山髙夀史生母七十卷二十一五言律詩三十四首同子成遊説經臺二首送辛四景虞應癸未試內丘曉行過邯鄲邯鄲李希聖明府枉過小坐武陵城樓送李少參之關中送李懋推放歸過武關夏日同裴太僕泛西湖又同登萬松嶺豐樂亭赴成君迪太僕宴集春日詹直指招飲胡太守園望壠海潮菴初夏同雷健夫馬子充遊子德園社集弟居郃陽曉發園中望先塋感愴用百嵗吾偕汝