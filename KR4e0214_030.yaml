body:
  text: 溫恭毅集卷三十明溫純撰理學精不是判人心道心而二之也有以無雜解精者未盡是真見人心即道心觀中庸論天人未曾將人字作不好字孟子口之於味章形色天性章亦曽分性命分形色天性禮記人生而靜天之性也感於物而動性之欲也亦未曾分性與欲此正是精處一則不二凡人心即道心孔子之一貫孟子之踐形是也此心在大學則曰身心意知家國天下曰事物曰好惡而格致誠正慎獨潔矩則精而一之矣在中庸則曰性情曰飲食夫婦曰不願所求曰九經三重而率性修道慎獨致中和知仁勇誠明修凝如仲尼如至誠則精而一之矣孔孟大學中庸無非接此學胍若以人心為私心遂欲絶此人心而别求道心則二矣文公注人心二字曰人心易私而難公亦未嘗以人心即為私心也欲覷破大學中庸微旨先識人心道心而後可大學格致誠正修中庸擇善固執孔門博文約禮孟子博學詳説反約一也格致擇善博文博學詳説有行意誠正修固執約禮反約則篤行敦之崇之耳論語知及之仁不能守之不曰仁不能行而曰仁不能守中庸擇乎中庸得一善拳拳服膺勿失不曰行而曰勿失則以知及與擇即就行以言其智也知行如何可分必曰知先於行則初學發蒙耳陽明先生致良知之説本於孔孟大學言致知孟子言良知是已但大學言致知必曰格物孟子言良知良能必曰親親長長説得無內無外之學無滲漏昔人謂孟子稱孔子是道自已觀孔子為聖之時孟子學孔子之齊之梁之滕分明以時自處是道孔子所以自道耳便未可以忘已言也其未至聖人地位以此吾儒言心性佛氏亦言心性佛氏以心性為心性吾儒以天地萬物為心性天地萬物為心性無外我之心性不離天地萬物無內無外無內至矣易有太極之有視無極而太極之而無迹費而隱之而視太極本無極之本亦無迹寂然不動是常寂兼靜亦定動亦定有感則通而不動者自如矣敬以直內是常敬遇事則義以方耳而義方之心即敬也學問之道無他自反而已矣自反則力有餘責人則力不足自反則無我責人則有我自反則可以正已而人化責人則不足以服人而人怨陽明先生曰凡舉大事必順其情而使之因其勢而道之乘其機而動之及其時而興之是以為之但見其易而成之不見其難此天下之民隂受其庇而莫知其功之所自此只是一因字孟子稱禹行所無事孔子傳易寂然不動感而遂通天下之故正此意人好人非好其迎已者則好其似已者惡人非惡其攻已者則惡其異已者有一於此是知有我季札不當逃如其當逃則武王亦當以伯邑考之故而逃矣武王無我季札有我造化人事總之動靜二字盡之混沌靜也開闢動也不混沌何能開闢秋冬靜也春夏動也不秋冬何能春夏夜晦靜也晝朗動也不夜晦何能晝朗人夜息則氣清晝假寐亦氣清靜之不可以已也如是造化生生全在子子者滋也天開於子陽復於子日始於子而所以能開能復能始者根於亥也亥於卦為坤靜也故有道者時時靜時時有子時道家所謂活子時也一假寐生機便動况寧定乎人臨事不可無智聖人用之則為文理密察常人用之則為權謀術數而誠偽分焉誠則能動而可繼偽則縱能欺人於一時而後即以實心行人亦不信矣慎哉老成與少年所見多不合老成多惟恐僨事之心然亦有借之以戀位者少年多急於立名之心然亦有直攄所見以效忠者責人當於有過中求無過恐事雖錯迹雖可疑而心無他也自責當於無過中求有過恐心雖無他而意見稍偏將不止於過也魏幾道曰禹治水先冀次兖青徐揚荆豫梁雍順五行而治之固也余謂治水先下流則力省而勢順自兖而南先下流也况天下國家事有當因者乎上焉者化人其次容人不能容人而見容於人下矣寧我容人毋人容我寧人負我毋我負人此猶有以君子自處而置人於不足責意是豪傑事非聖人事聖人如之何曰至誠以感動之委曲以開悟之不至於並立並達不已推已及人可以已律人不可故曰以已度人則難為人以人人望人則賢者可知矣天下萬事萬物莫非一也圖書之一一也二則二一三則三一四則四一五則五一六則六一七則七一八則八一九則九一十則十一又一得之為一一合一為二一合二為三一合三為四一合四為五一合五為六一合六為七一合七為八一合八為九一合九為十一固所以貫圖書之全者也然不以一居中而以五與十居中何也一則含五與十之理而五與十則盡一之全一則虛五與十則實謂五與十居中即一居中可也聖學一貫本此圖書何以五居中五可以該之也無一之名有一無二之名有二無三之名有三無四之名有四五加一為六加二為七加三為八加四為九加五為十十亦可以該一十後天五先天也故河圖以五十居中雒書止以五居中天地間造化皆陽為之也隂不過成之耳河圖生成雖五竒五偶一六合二七合三八合四九合五十居中皆竒也而偶亦莫非竒二則一一四則一三六則一五三三八則一七三五十則一九三七五五耳陽之道大矣朱文公先生卒之前四日説西銘言為學之要惟事事審求其是決去其非積集久之心與理一自然所發皆無私曲聖人應萬事天地生萬物直而已矣此直字從孔子人之生也直孟子直養無害易靜專動直三直字來得執中率性之旨豈末年大有超悟而為是直截簡易之説耶久未經人拈出何也此常書紳人之求道惟求一直而已直非悻悻好剛之謂也孔子曰人之生也直孟子曰直養中庸之率性盡之觀真字從直德字從直慎字從直可見易曰先天語存主也曰後天語施為也顔子之乾道先天而天弗違也仲弓之坤道後天而奉天時也若聖人則先天後天一時事存主者即其施為者施為者即其存主者無內外與未發之中中節之和同易云體仁注言以仁為體最精猶云道體是以道為體程明道曰仁者以天地萬物為體識此體字則耳目口鼻四肢無非生意何形非性何外非內復其見天地之心邵子則衍之曰一動一靜之間天地人之至妙至妙者歟夫坤六隂至靜幾於滅息而一點生機不容已不可遏萬古如此是天地之至妙至妙也人心一日有一造化旦晝夜氣好惡幾希雖下愚亦有良心與天地生機何異大學言小人為不善見君子掩不善以著其善此著善之心亦生機也故曰誠於中必形於外孟子引孔子操存舍亡出入無時莫知其鄉注言心之神明不測操則存矣舍之即亡舍即亡矣一操即存蓋神明之心不容已不可遏者猶復存於既亡之後豈可測其出入與內外耶是雖既亡之心亦有生機造化生機於六隂之後見之人之生機於靜後見之雖不善與舍亡之後亦不能泯人之至妙至妙豈不信然有解者云舜事瞽瞍以和氣薰蒸不正其非瞽瞍遂底豫此不惟事父母當如是即處兄弟兒女亦未有不如此而能和諧者精思力行其效自見耿楚侗曰陽明先生拈出良知二字固是千古學脈亦是時節因緣春秋功利習熾人心大壞不復知有一體故孔子提出箇仁字求仁便是孔氏學脈孟子時楊墨道塞害人心尤甚不得不嚴為之防故孟子提出箇義字非義則仁之道不達集義便是孟氏學脈梁晉而下佛老淫於中國禮法蕩然故濓溪欲復古禮橫渠以禮為教執禮便是宋儒學脈禮非外飾人心之條理也流傳既久漸入支離至分心禮為兩事陽明先生提出良知以覺天下使知物理不外人是致知今日學脈其主持人心扶持世教未嘗異也信然然孔子之仁自包義禮智及信其義禮智信孔門已先專言之矣曰徙義曰喻義曰義之與比專言義也孟子宗之曰非禮勿視聽言動曰約之以禮曰敦厚以崇禮專言禮也宋儒宗之曰不可使知之曰知德者鮮曰致知格物專言智也陽明先生宗之今知之弊將流於虛而無實其濟之以信乎曰人而無信不可以行曰忠信所以進德曰修辭立誠曰胡不慥慥亦孔門所專言者實今日對症之劑要之舉一可以該其餘仁不待言矣曰義而仁禮智信存焉曰禮而仁義智信存焉曰智而仁義禮信存焉曰信而仁義禮智存焉辟之大造春夏秋冬之互相為用木而不能離水火土金火而不能離木水土金金而不能離木火水土土而不能離水火木金土又分旺四季信實可以成始成終惟率性繇中出則一不然則二故孔子告曾子子貢但曰一成名易無名難以道制欲易使欲皆道難以我體道易以道為體難以性御情易使情皆性難心欲小不欲隘欲大不欲蕩欲逸不欲怠欲泰不欲驕欲細不欲瑣欲勤不欲擾欲舒不欲肆欲虛不欲浮欲實不欲滯或謂若能於日用貨色上料理經綸時時以天則應之超脫得淨如明珠混泥沙而不汚然明珠與泥沙終是二物若學問透徹則形色莫非天性道心不離人心方是一寂然不動常也有感遂通而不動者自如敬以直內常也遇事則義以方而其直自如廓然大公常也物來則順應而廓然自如未發之中常也發則中節謂和而未發者自如凡橫逆之來不較者不受也較者受也不受者求已受者求人河圖順行以相生為主易知也雒書逆行以相尅為主難知也嘗以意測之相尅乃坎一之水尅離九之火火生二八中之土而乾六兑七之金生蓋金本生水此金以水生即玄家所謂虎向水中生也乾兑之金尅震三巽四之木木受尅而二八中之土生金亦生土矣離九之火尅乾兑之金金受尅而震巽之木生蓋木本生火此木以火生即玄家所謂龍從火裏出也震巽之木尅二八中之土土受尅而坎一之水生木亦生水矣總之水尅火而金生金尅木而土生火尅金而木生木尅土而水生皆制其傷我者而我乃生也是以尅之之道生之也而坎一急焉蓋相生以一始相尅亦以一始何者非一以貫之耶是曰是非曰非亦直也必是是非非之言一根於中心所真見方是孔孟之所謂直方是一不然猶其迹耳襲義耳况所云是未必是所云非未必非乎觀直養無害之説而從心所欲不踰矩之説始明觀從心所欲不踰矩之説而允執厥中繇仁義行之説始明故善學者求孟子所為學孔子與孔子所為祖述堯舜者而已矣孟子而後實難承接繇仁義行是繇𠂻曲出雖生疏不可舍所獨知者而行行仁義是從外粉飾雖習熟愈可觀而愈昧本心矣蓋吾人學問止有此二途從𠂻曲做是尋向上去君子之所以日逺於小人也從粉飾做是流汙下小人之所以日逺於君子也然從𠂻曲實逸從粉飾實勞所謂欲非止在軀殼上求便宜也若無實見縱苦躬苦節亦與學問無干古今為學便日要做聖人豈不是美然恐務名之根即在此惟戒慎恐懼常恐不盡已之性不盡已之分不盡已之道而已孔子祖述堯舜非欲為堯舜之名為精一執中不可不祖述耳孟子學孔子非欲為孔子之名為時中不可不學耳前輩多言盡心盡性盡分盡道盡職盡倫盡之義難言矣如人行路欲入燕入越必至燕越方可言入又如行百里而但止於九十九里即難言盡升堂而未入室踐迹而未入室襲義而不集義行仁義而非繇仁義行皆此類也盡之義難言矣然入室集義繇仁義行不過以公心平心順應而無必成必得之苦此其盡皆在我者似難而易不然費多少作為粉飾矯強功未必成利未必得何益此欲盡愈逺是取必於外者似易而難吾輩舍易而就難舍我而求外不思耳孟子言良能良知似分知能然其下不曰能愛能敬而曰知愛知敬是不外知以為能外能以為知矣達之天下非舍目前而逺及天下也親長包九族是在天下者親之長之是對境實愛實敬則仁矣義矣若指光景談玄解仁義實非我有從來官名多知學不似今人云如何為知如何為行也如文官曰參知政事曰知制誥曰知經筵曰知府曰同知知州知縣知事武官曰都督同知都指揮同知指揮同知其下曰知印果止知而已乎知此則行之不盡者不可名為知也通乎晝夜之道而知即復其見天地之心即一隂一陽之謂道即天根月窟間來往三十六宫都是春孔子言多聞多見而歸之慎言慎行欲於言行而慎之也孟子言頌詩讀書而繼以論世欲於古人行事而友之也蓋士人稍向學未有不求聞求見頌詩讀書惟慎言慎行如古人者難故孔孟切切望人體驗不然欲多何為而以博與約知與行平論非其旨矣人有自以為知者未必知也自以為不知則知矣有自以為是者未必是也自以為非是則是矣無他好勝與求實勝異求諸已與知有已異一部春秋全是求諸已三字此三字天德也王道也春秋列國辭令兩漢詔令近之雖小國但善其辭令未必繇中亦多免於侵伐况繇𠂻者耶後世論學以道德貨利並言孔孟惟以無心有心並言道德貨利之外尚有似是一等貨利者之機淺豈聖賢所慮故謂世上有善惡二途君子小人二等善是無心惡是有心孳孳為善是惟恐不盡道非為人也孳孳為利是為人心腸亦非為貨利也此二等人便是舜跖之徒之分若貨利人則不止於跖之徒矣觀楊龜山講之不熟見之不明未有不以利為義之言可見孔孟所云利是近於義者故惡鄉願惡朱紫惡穿窬惡色取惡襲義千言萬語止要直道而行率性而為但涉一毫矯揉造作即是利吾人安可不自反自力若無事亦念到此臨境當局不覺便入自私自利平日所云一毫用不去是顧目前不顧終身其究不但無益且或因以僨事喪德可懼也古語云此心要放得下平日所聞嘉言要使得上或云放得下方能使得上皆有味吾輩不可不時時體認答徐匡嶽重止修是探其要而包括之也其實單言一明字一止字一修字皆可了其詳必格致方滿誠意必慎獨方盡格致而止修與明明德之功完若謂格致是格致慎獨是慎獨豈傳明言慎獨工夫而經言誠意又另有格致工夫耶以身心體貼實難著力幸再見教答陳維則來教云讀陽明先生書宦情都淡已見脫塵向裏之趨蓋淡本是吾儒入學正脈恐即栽厭動求靜之根將遺物理人情即今日精求舉業亦是上達稍厭薄則二矣二則非仁矣吾易所謂自強不息者何謂抖擻精神正在今日有志者之作用不如有識者之作用有識者之作用不如有德者之作用有德者之作用不如有道者之作用至於有道則凡作用皆道之所為我無與焉亦無知焉至矣堯之克明峻德之明字舜之文明明物察倫之明察字文王之克明德之明字孔子之知德孟子之知言知性知天數知字皆悟也異乎後世之舍日用而求玄解矣唐彥思記伊川先生謂古人有言曰共君一夜話勝讀十年書若一日有所得何止勝讀十年書耶夫一夜話何話一日得何得可以勝讀十年書人固有終身讀而無得者何但十年論文及經傳各子史用意練格之妙論詩及言志有關係之妙論政事於清慎勤外如前輩所云更行一忍又或如孔子所云求諸已孟子所云三自反論學及堯舜孔孟之脈而得其所謂執中一貫之微真不止勝讀十年書然論學其要也猶恐止見得及而未必實有諸已必時時戒懼體認方免遇境錯亂故工夫正在對境所謂境大莫如死生次莫如得失能忘死生必能忘得失不能忘得失而曰能忘死生者未之有也得失二字於貧富猶易強制於貴賤升沉每多嬰情何可云一待不能嬰情而後止非止於道也止於力也人始學進難止易既學進易止難至於無進非止無止非進則化矣人始學知易行難既學行易知難至於無知非行無行非知則化矣學不得力外物物也形色物也雖心志亦物也學得力心志性也形色性也雖外物亦性也讀易當知但得中皆無凶讀詩當知有物必有則讀書當知人心有道心讀禮記當知天之性性之欲而其功全在反情和志讀春秋當知大道為公有志未逮合觀之真吾師我沉默人猶以懆妄來是我實未沉默也我虛平人猶以機械名是我實未虛平也我淡薄人猶以濃艷求是我實未淡薄也我安靜人猶以營求望是我實未安靜也我恭敬人猶以陵侮加是我實未恭敬也我公恕人猶以刻核責是我實未公恕也我修謹人猶以惰肆目是我實未修謹也我憫恤人猶以忍薄歸是我實未憫恤也一有之皆吾師天地有不已之運而人不如日月星辰有常明之象而人不如山嶽有常止之體而人不如草木有常生之機而人不如天地有時毁日月星辰有時食有時晦有時殞山嶽有時崩草木有時落而不已常明常止常生者其常而人不如皆無心皆吾師答馮少墟承翰教知復會講閲辨學録一過深快中間發明理字為陽明先生致良知之説補一實字蓋致知原不離格物物則實理也此正與佛氏不同處大率佛氏是欲了自已心性吾儒是欲了天地萬物心性吾輩但於此一體領略是窮理盡性至命實功自精一之説創自虞廷因一危字遂以人心為私欲之心私欲之心去之惟恐不盡而即以為虞廷人心之心恐經書中未有徑指人心二字為私欲之心者文公解不曰私而不公而曰易私難公謂此心若公則上達一私則下達矣豈不危哉惟精之一之允執其中則人心皆道心而免於危矣是於心之動處用精一之功千古學脈實始此其後孔子祖述堯舜全在從心所欲不踰矩精之一之也他人從心所欲或踰矩則人心肆而道心喪矣孟子願學孔子正學其所祖述也形色天性與口之於味二章正於口目耳鼻之形之色而盡合性命之學也不偏內不偏外謂之修身可謂之踐形可謂之中可謂之仁可謂之一貫可不然則自已心性形骸且分而二矣何以言一今日學脈似宜從此以入特質之同志溫恭毅集卷三十
