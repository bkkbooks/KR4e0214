body:
  text: 温恭毅集巻十八明温純撰古樂府艾如張鬱鬱灌木衆鳥嚶嚶臨深酌酒亦可怡情有鳥有鳥鷕鷕其鳴厥德耿介厥質文明嗟賈如臯但慱偶聲恐逢鷙鳥觸樹致驚以媒下翳以艾藏形庶幾我獲爲吾友生戰城南戰城南敵可㓕矢及逺馬如鐵火齊熾水立絶憤乘驕鼔待竭衛霍生左賢折饑餐肉渴飲血幕南空漢耻雪戰城南敵可㓕五雜爼平西夏紀事五雜爼醖盈瓿徃復還脱巾走不得己刄及首五雜爼城半虎徃復還士女殘不得已郊多壘五雜俎勾逺部徃復還帳滿山不得巳城環水五雜俎卯歴酉徃復還耦盡掊不得已樓火起五雜俎南城促徃復還矢相屬不得已自屠戮昭君怨長門囬首淚盈襟琵琶只弹薄命吟休問丹青受金否丹青得無用意深君王萬㡬日日有忍令粉黛惑其心况因丹青力暫受君王惻和戎苟有利在胡猶在國一時丹青手但易妍媸色古来更有如簧舌鹿可爲馬白可黒吁嗟乎鹿可爲馬白可黒如此丹青殺亦得自君之出矣自君之出矣晝永夜如年芳草随時緑秋月㡬廽圓其二自君之出矣夣中笑語并既醒還思夣復恐夣難成其三自君之出矣孤枕夏猶寒况聞沙塞苦秋冬衣又單其四自君之出矣新人易爲歡丁寜語新人莫令藁砧寒公無渡河公無渡河陸行坦坦尚有風波河水不測盤渦實多深不可厲内藏黿鼉得人則食不知其佗公無渡河雖有舟檝吞舟奈何長年辟易如見網羅不如安卧飲酒髙歌公無渡河温恭毅集巻十八
