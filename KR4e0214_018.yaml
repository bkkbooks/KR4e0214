body:
  text: 溫恭毅集卷十八明溫純撰古樂府艾如張鬱鬱灌木衆鳥嚶嚶臨深酌酒亦可怡情有鳥有鳥鷕鷕其鳴厥德耿介厥質文明嗟賈如臯但慱偶聲恐逢鷙鳥觸樹致驚以媒下翳以艾藏形庶幾我獲為吾友生戰城南戰城南敵可滅矢及逺馬如鐵火齊熾水立絶憤乘驕鼓待竭衛霍生左賢折饑餐肉渴飲血幕南空漢耻雪戰城南敵可滅五雜爼平西夏紀事五雜爼醖盈瓿往復還脫巾走不得己刃及首五雜爼城半虎往復還士女殘不得已郊多壘五雜俎勾逺部往復還帳滿山不得巳城環水五雜俎卯歷酉往復還耦盡掊不得已樓火起五雜俎南城促往復還矢相屬不得已自屠戮昭君怨長門回首淚盈襟琵琶只彈薄命吟休問丹青受金否丹青得無用意深君王萬幾日日有忍令粉黛惑其心况因丹青力暫受君王惻和戎苟有利在胡猶在國一時丹青手但易妍媸色古來更有如簧舌鹿可為馬白可黑吁嗟乎鹿可為馬白可黑如此丹青殺亦得自君之出矣自君之出矣晝永夜如年芳草隨時緑秋月幾廽圓其二自君之出矣夢中笑語并既醒還思夢復恐夢難成其三自君之出矣孤枕夏猶寒况聞沙塞苦秋冬衣又單其四自君之出矣新人易為歡丁寧語新人莫令藁砧寒公無渡河公無渡河陸行坦坦尚有風波河水不測盤渦實多深不可厲內藏黿鼉得人則食不知其他公無渡河雖有舟楫吞舟奈何長年辟易如見網羅不如安卧飲酒髙歌公無渡河溫恭毅集卷十八
