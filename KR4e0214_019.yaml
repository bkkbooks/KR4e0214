body:
  text: 溫恭毅集卷十九明溫純撰五言古詩紀懷并引壬寅冬仲余以紏彈乞休屢疏未允伏枕待命歷月多閒因仰思三聖隆恩二親永逝中及骨肉師友存沒參商與夫轍迹所經國事綢繆之計精神所注生平趨步之艱展轉于心不能己巳而歎初意可遂始願難酬于是改弧矢萬里之期為山澤終身之課苟為政于畎畝庶報禮于九重援筆得詩二十五首命名紀懷以志嵗月計偕試南宫遂上公車對時當世太平內外爭盡瘁穆穆肅皇聖主靜勤修內懷柔懾萬靈納言收中貴懲貪更訓亷信賞罰無貸嘉靖殷邦同久道萬方賴至今思祖功父老猶垂泪其二筮仕令北海海上半凋瘵初至百憂叢視事忘向晦出入童稚眠徒為簿書纍亦慕卓魯名愧非學道愛别來三十年父老猶虗戴補過恨無繇此任不更再寄語為令者毋如余徒慨其三三年頻于役憑軾臨滄海徙倚蓬萊間几席扶桑在始覺眼界寬西望極畏壘天浮日永浴鴈迷岸分彩歸泄無盈虛百川于此滙始作盧敖遊髙鳥慚意怠回陟大澤山日觀峯未改呼吸圓䆸通應接汗流浼歸來爽自失蝸居從前悔其四西征將之濟延頸問闕里泰山髙萬仭龜䝉亦難擬有阜迂以曲沂濟文相似卦列少昊陵鍾靈自此始禱尼應如響頂圬生夫子匹夫祖堯舜千載崇廟祀荆棘故不生異木森且美當時手植檜榮枯關泰否呵護煩神明感通有至理低佪瞻拜餘一貫如面擬其五莊皇初踐祚首重言官路徴書羅四方召從諸彥後左掖拜夕郎白簡容敷奏一時頌恭默納約無庸牖淵哉尼父言無為真聖度升遐胡太蚤遺弓泣宇宙其六朱明景風至銜命之瀋代言陟天下眷歷晉出鴈塞上黨文物集朱門多風槩沁水主人竒論文出流輩踟蹰馬邑城追慨詐為害雲中節至止帶礪盟千載邂逅趙將軍岢英聲無與佩接武渭陽周尚文出師敵輒北飬士周與雙眼鎗名趙創屈指名僅再賴有劉都督承嗣三捷威仍倍今為連炮雷一發敵盡碎省卒更省餉不戰功尤最先聲屈人兵庶以威為愛乃知禦侮䇿全勝在修內其七驅車之荆楚暫憩習家池西憶羊叔子山有墮淚碑言尋雲夢澤荒迷不可知江漢依然在皥皥濯于斯朝登黃鶴樓暮倚鸚鵡陂再過巴陵道不禁先憂思一著歸來賦逺謝叔子規夢濯纓與足如在江之涯仲尼不可尚千載是吾師其八歸泝漢水西言陟太和巔太和髙萬丈烏兔疑倒旋諸峯亦兒孫五嶽豈比肩中多學道侣相與證真詮真詮何可得依稀守丹田夜夢𤣥帝語鼓琴寧俟絃汝歸有餘師汝師言更𤣥無思與無為斯言信不偏北面終鄒魯庶幾永無愆其九繇鄖入商於驅車歷木末蜿蜒七百里天近海疑括崑崙於此終太華勢相奪坤厚信無疆鍾靈及遼濶姬歷八百年賢聖實超越歷代饒荃宰宇宙任旋斡晚近忽蕩潏絪緼氣疑脫鬱積端倪開地維竟軒豁君子期法坤厚德以載物其十入里返初服垂涕拜親闈二親方耆壽偕隱共采薇春秋耕南畝不愁寒與饑弟童兒方丱挾冊亦愛暉嵗時延賔友歡宴願無違但憐姊與妹各棄扊扅歸解鬱開春酒始幸早拂衣有甥跪羅列庶免永歔欷其十一壬申冬拜命乘春臨大河次且崤崡道踟蹰雒之涯默思圗與書千載永不磨淵哉坎之一萬象已森羅五十數非闕載籍文何多南北滋路岐楊子泣奈何所以魯尼父無言欲回波觀象登道岸守一更無他其十二迤邐臨熊耳從郟及申宛遵彼汝墳境追思王化逺言駐隆中軫問俗頻往返恨無隨車雨靦顔如餐飯有召及吾師孫公節再建銅隄竹馬迎云公來何晚當年羊叔子步武尤蹇蹇余在約束中依舊炙經苑㑹有二三子蔡子𢎞甫朱子巽甫馬子長平因依共勤懇忽為參與商回首空繾綣其十三時值大淵獻冏命以緑綬入關過里門北征將父母伏陛瞻龍衮端拱臨星斗余從典屬國再步廷尉後旋總大官署六禮親奔走喜遇泰交成逺近歡盈口至今三十年乾坤同悠久其十四禮樂容臺司駿奔郊廟際有友趙柱史應元之楚正攬轡久要故不忘相期秉忠義同歌蜀道難並失南郡意解組先後歸遂初涇峨內潜修卒舊業力耕供賦稅山林亦有責報恩明不倍目極日月邉如睹天顔霽其十五初宿邯鄲署偶聞鄰婦啼聲聲如有訴多云有所思不作雙飛鳥却為征夫妻征夫妻猶可邉塞苦誰知不愁衣帶緩但恐寄衣遲砧杵家家急賤妾心獨悲手紉衣未成衣成附阿誰其十六倚門有二親下車伏地拜拭淚轉開顔問訊疑夢寐乍聚忘逺遊囊空反增愛有美弱冠弟青襟亦聰慧隨行兼問字二親歡更倍東覔仙掌蓮西慕瑶池㑹蓮實猶可得桃熟難更再但釀清為聖濁亦賢可待蓂開柏葉進菊綻桑落美張筵聚賔從門巷填車蓋余舞老萊斑弟詠南山對諸孫爭進履椿榮萱樹背有召忽臨門承歡僅六載于今涕泪多不忍見松檜其十七涒灘為帝理再侍講筵內未幾拜命行捧勑臨東海二親猶及將扶侍供甘膬王事信靡盬不遑周仍隘采蓴更覔鯉奉飬敢云備明王隆孝思永言錫吾類遵海望天臺偶與知己㑹戴汝誠手染二親容駐顔語仍在語及世上名洗耳有真態相期雁蕩遊撫景嘗至再歸署襟已豁如在塵寰外乃知乾坤裏形骸元無礙其十八吳山天然境天目于此㑹江海襟嘗合龍鳯結仍大鍾靈更育秀都㑹千年在一水臨島夷所恃在武備余乏安攘䇿坐鎮渾無賴官聨幸同心但於簿書內民瘼尚未瘳何論滄溟外有時陟吳巔似與崑崙對我屋居其間視之僅如芥恐為形迹拘俯仰慚函蓋其十九視師鰲柱下尋登鰲柱上舉目溟渤盡樓船爭用命共恨海不波髀肉生愈慷翻思武欲修文事宜先尚郤縠何人哉禮樂稱名將回瞻孔廟頽鼎新如始創郡士課文藝薛子魯叔神尤王令如石頭城御李敏肅兒共傍其師亦千之余愧申公望師已魁多士蔡𢎞甫薛魯叔文日暢辛丑同對庭文子德任亦與伉又同讀祕書鹽梅吾已諒獨有兒豫知挾冊猶惆悵盍簮兼麗澤相期仍無量其二十虎林戒行李返舟停霅水旋從姑蘇城一水逹都鄙中經江淮河西自楚豫起軍儲四百萬私運亦稱此平江陳公瑄信多勞宋公禮良比美萬安朱公衡通夏鎮余亦從經紀至今三紀餘舳艫爭邐迤飛挽古未有陵園亦寧只乃知故與利子輿言有以紛紛泇萊議拘曲終當已誰其濬二洪行險深見底水繇地中行陵運咸永倚往來亦利涉朝貢疾如矢舍此談他途如車輕棄軌其二十一初從司農後旋領藏庾役金貯四百萬粟猶六年積人人懷婺恤已懼漁竭澤倐忽十年餘出多入不益粟乏兼嵗儲金萬不及百仰給人如麻嘖嘖朝與夕司農難以應仰屋憂難釋廣開鬻爵例銓路懼乖隔嚴督搜粟吏又為閭閻惜食寡與用舒斯言誠藥石九重方明聖成命正於赫屢示寬恤期四海手加額其二十二己丑罪逆積殃及我慈闈黃泉不可從䘖恤扶櫬歸䝉恩豫槥地又䝉享以詞封樹遂成林麗牲遂有碑附以名人閣學許文穆公銘不朽當在兹親恩日欲報夢翻萊子衣皇恩報更難䘖結不敢辭其二十三捧詔領南銓始遂金陵遊仰瞻定鼎基王氣莾千秋龍盤連燕磯虎踞對牛頭孝陵鬱以葱都㑹今稱留百司常拱衛南北盛二周余辱百官長表率愧前修癸巳當計吏但知右名流追憶郟鄏卜極目望宸旒其二十四夏拜冬官命承恩就子舍入門睹吾翁故顔驚雕謝嘗藥僅三時亥晦忽長夜皇恩慈闈並感極淚長㵼嗚呼馬鬛封千年鄰二華執秩富平孫公碑實録執憲涇陽李公銘匪假惟有罔極思不如從翁化鬱鬯非無酒酹地空薦藉其二十五讀禮松楸間併讀論孟語始知精一脉乃在不踰矩所欲惟從心危微寧異睹形色性命合鄒孟真學魯直飬開一關作聖如導瞽上逹在下學剛大豈襲取求一惟忠恕為已當學古日用精義足默識敢自沮不然內外岐空談竟何補題楊太宰桃花嶺茂叔獨愛蓮淵明獨愛菊蓮為名君子菊為供幽獨何如仙人桃花灼實亦馥古有木帝精蟠山三見熟主人海濵居種之滿山曲的皪陋河陽紛披成綺褥結實仍纍纍盡醉韶華足持以啖阿母百嵗顔如玉亦悟樹人理成蹊光前躅朅來厭紛囂夢寐山中屋託興在丹青開卷霞奪目不是避秦時寧問武陵澳金馬且陸沉神遊亦可掬再種菊與蓮時時春更簇他日賦歸來紉荷以為服或餐英與實輕身掛仙籙不則延良友花間醉醽醁我亦倦遊人求羊或不辱欲鼓山陰棹開徑待趢趗送劉衍亨宗伯還朝裊裊琴中操離離沼間芷賞音以同芳飲醇忘其㫖與君結綢繆願言未有已膏車駕言邁歡宴方伊始顧聼嚶鳴聲何以贈吾子宛彼石頭城日夕生春水曉月媚仙舟清風拂中沚含情將訴誰扣舷鳴其裏翩翩揚雙翮雙翮橫萬里簮笏歸承明禮樂唯君倚漢庭今側席正人在端揆東觀已然藜北省亦方軌瀛海神仙宅君恩去天咫承顔歸省畢調鼎報天子勿以明發心鍾情于岾屺至孝塞天地顯揚端在此閨思對月默默語清光應照君記得别時約相思但望雲月亦有圓缺雲亦有聚散散與缺猶可離愁尚减半忽見雲間月低頭憶逺人相思不相見空有泪沾巾君如失凰侣妾如寄生草桑末猶堪依誰念君懷抱孤棲霜露叢忽遇花落期花落無人掃凄凉兩地知溫恭毅集卷十九
